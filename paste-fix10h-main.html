(\"buryBones\", false)) {\n            for (var i = 0; i < ALL_BONE_IDS.length; i++) {\n                if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n                    state = STATES.BURY_BONES;\n                    return;\n                }\n            }\n        }\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    if (!pickUpLoot()) {\n        // Nothing to loot, back to fight\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- BURY_BONES ----\nfunction handleBuryBones() {\n    var buried = false;\n    for (var i = 0; i < ALL_BONE_IDS.length; i++) {\n        if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n            var buryBoneId = ALL_BONE_IDS[i];\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(buryBoneId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            buried = true;\n            break;\n        }\n    }\n    if (!buried) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- SPECIAL_FINISH ----\nfunction handleSpecialFinish() {\n    // This state is entered when a monster needs a specific finishing item\n    var finished = handleSpecialFinishCheck();\n    if (!finished) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- TASK_COMPLETE ----\nfunction handleTaskComplete() {\n    tasksCompleted++;\n    totalKills = totalKills + (killsLeft <= 0 ? 0 : killsLeft);\n    botMsg(\"Task complete! Total tasks: \" + tasksCompleted + \" | Total kills: \" + totalKills, \"SlayerBot\");\n\n    // Reset task state\n    currentTaskName = \"\";\n    currentTaskMonster = null;\n    killsLeft = 0;\n    usingSafespot = false;\n    cannonPlaced = false;\n\n    // Reset potion timers\n    ticksSinceAntifire = 0;\n    ticksSinceAntipoison = 0;\n    ticksSinceCombatPot = 0;\n\n    // v24: Track Turael boosting (already incremented in selectMasterWithBoosting)\n\n    // Get next task\n    state = STATES.CHECK_STATS;\n}\n\n// ---- HANDLE_DEATH ----\nfunction handleDeath() {\n    botMsg(\"Handling death. Saving death location for recovery.\", \"SlayerBot\");\n    deathDetected = true;\n    saveDeathLocation();\n    state = STATES.RECOVER_GRAVE;\n}\n\n// ---- RECOVER_GRAVE ----\nfunction handleRecoverGrave() {\n    // After respawn in Lumbridge:\n    // 1. Bank and withdraw emergency food\n    // 2. Walk to death location\n    // 3. Collect items\n    // 4. Re-equip gear\n    // 5. Return to task\n\n    if (!deathLocation) {\n        botMsg(\"No death location saved, re-checking supplies.\", \"SlayerBot\");\n        deathDetected = false;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Phase 1: Get emergency food from bank\n    var foodCt = countFood();\n    if (foodCt < 3) {\n        // Need to bank first\n        if (!Game.info.bank.isOpen()) {\n            var bank = findNearestBank();\n            if (bank && isNear(bank.x, bank.y, 8)) {\n                _gt = tickCounter;\n                if (_gt - bankOpenAttemptTick < 5) return;\n                bankOpenAttemptTick = _gt;\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.bank.openNearest(0, true);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            } else if (bank) {\n                if (!PlayerHelper.isWebWalking()) {\n                    isExecuting = true;\n                    var rbx = bank.x;\n                    var rby = bank.y;\n                    var rbp = bank.plane || 0;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(rbx, rby, rbp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n                return;\n            }\n        } else {\n            // Bank is open, withdraw food\n            var emergFoodId = 379;\n            try { emergFoodId = cfgVal(\"foodType\", 379); } catch(e) {}\n            withdrawBankItem(emergFoodId, 5);\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.close();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    }\n\n    // Phase 2: Walk to death pile\n    if (!isNear(deathLocation.x, deathLocation.y, 5)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var dlx = deathLocation.x;\n            var dly = deathLocation.y;\n            var dlp = deathLocation.plane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(dlx, dly, dlp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Phase 3: At grave - pick up items from ground\n    if (pickUpLoot()) return;\n\n    // Phase 4: Done recovering, return to supply check\n    botMsg(\"Death recovery complete, resuming task.\", \"SlayerBot\");\n    deathLocation = null;\n    deathDetected = false;\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- HANDLE_LEVEL_UP ----\nfunction handleLevelUp() {\n    updateCachedStats();\n    botMsg(\"Level up detected! Updated stats.\", \"SlayerBot\");\n    levelUpDetected = false;\n    setAttackStyle();\n    state = STATES.FIGHT_TASK;\n}\n\n// ---- SETUP_CANNON ----\nfunction handleSetupCannon() {\n    if (!currentTaskMonster) {\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // SAFETY: Never place cannon in single-combat zones\n    if (isTaskSingleCombat(currentTaskMonster)) {\n        botMsg(\"[SlayerBot] Single combat zone -- skipping cannon\", \"Bot\");\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Check if we have cannon base\n    if (!Game.info.inventory.hasItem(CANNON.BASE, 1)) {\n        botMsg(\"No cannon base in inventory.\", \"SlayerBot\");\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Walk to monster area center\n    if (!isNear(currentTaskMonster.x, currentTaskMonster.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var canX = currentTaskMonster.x;\n            var canY = currentTaskMonster.y;\n            var canP = currentTaskMonster.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(canX, canY, canP));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Place cannon by using the base item\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.inventory.consumeItem(6);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    cannonPlaced = true;\n    var loc = getPlayerLocation();\n    cannonX = loc.x;\n    cannonY = loc.y;\n    botMsg(\"Cannon placed at \" + cannonX + \",\" + cannonY, \"SlayerBot\");\n    state = STATES.FIGHT_TASK;\n}\n\n// =============================================================================\n// SELF-SUFFICIENCY STATES (existing, enhanced for v24)\n// =============================================================================\n\n// ---- GATHER_FOOD ----\nfunction handleGatherFood() {\n    // ---- TIER-AWARE FOOD GATHERING ----\n    // Uses SS_FOOD_TIERS to pick the best food for player's level\n    // Checks for required tool BEFORE trying to gather\n    // Universal pattern: check tool -> walk -> gather -> cook -> bank -> recheck\n\n    var fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;\n    var cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;\n\n    // Pick best food tier for our levels\n    var bestTier = null;\n    for (var t = SS_FOOD_TIERS.length - 1; t >= 0; t--) {\n        var tier = SS_FOOD_TIERS[t];\n        if (fishLvl >= tier.minFishLevel && cookLvl >= tier.minCookLevel) {\n            bestTier = tier;\n            break;\n        }\n    }\n    if (!bestTier) {\n        bestTier = SS_FOOD_TIERS[0]; // Chicken fallback\n    }\n\n    // Only log once per gather session\n    if (!gatherFoodTier || gatherFoodTier.name !== bestTier.name) {\n        botMsg(\"Gathering: \" + bestTier.name + \" (tier \" + bestTier.tier + \")\", \"SlayerBot\");\n    }\n    gatherFoodTier = bestTier;\n\n    // ---- TOOL CHECK ----\n    // If this tier needs a tool, make sure we have it\n    if (bestTier.toolId) {\n        var hasTool = Game.info.inventory.getItemCount(bestTier.toolId) > 0;\n        if (!hasTool) {\n            botMsg(\"Need tool: \" + bestTier.toolRequired + \" (id \" + bestTier.toolId + \") - banking for it\", \"SlayerBot\");\n            // Set a flag so BANK_SUPPLIES knows to withdraw this tool\n            gatherToolNeeded = bestTier.toolId;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n    // If tier needs secondary (e.g., feathers for fly fishing)\n    if (bestTier.secondaryId) {\n        var hasSecondary = Game.info.inventory.getItemCount(bestTier.secondaryId) >= 10;\n        if (!hasSecondary) {\n            botMsg(\"Need secondary: id \" + bestTier.secondaryId + \" - banking for it\", \"SlayerBot\");\n            gatherToolNeeded = bestTier.secondaryId;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // ---- CHICKEN TIER = KILL, NOT FISH ----\n    if (bestTier.method === \"kill\") {\n        // Walk to chicken pen (10-tick cooldown)\n        var chickenLoc = bestTier.gatherLocation;\n        if (!isNear(chickenLoc.x, chickenLoc.y, 12)) {\n            if (tickCounter - walkCooldown < 10) return;\n            walkCooldown = tickCounter;\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(chickenLoc.x, chickenLoc.y, chickenLoc.plane || 0));\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Kill chickens and pick up raw chicken\n        if (isPlayerIdle()) {\n            var chicken = Game.info.npc.getNearest(bestTier.npcIds);\n            if (chicken) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(chicken);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n        // Pick up raw chicken from ground\n        var loot = Game.info.groundItem.getNearest([bestTier.rawItemId]);\n        if (loot && !Game.info.inventory.isFull()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.take(loot);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        if (Game.info.inventory.isFull()) {\n            state = STATES.COOK_FOOD;\n        }\n        return;\n    }\n\n    // ---- FISHING ----\n    var spotIds = bestTier.spotIds;\n    var gatherLoc = bestTier.gatherLocation;\n\n    // Walk to fishing spot (10-tick cooldown to prevent spam)\n    if (!isNear(gatherLoc.x, gatherLoc.y, 12)) {\n        if (tickCounter - walkCooldown < 10) return;\n        walkCooldown = tickCounter;\n        isExecuting = true;\n        var gx = gatherLoc.x;\n        var gy = gatherLoc.y;\n        var gp = gatherLoc.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(gx, gy, gp));\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Idle? Click nearest fishing spot. Spot moves/despawns = player goes idle = re-click.\n    if (isPlayerIdle()) {\n        var spot = Game.info.npc.getNearest(spotIds);\n        if (spot) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.action(spot, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Inventory full -> cook\n    if (Game.info.inventory.isFull()) {\n        gatherFoodCount = 28;\n        state = STATES.COOK_FOOD;\n    }\n}\n\n// ---- COOK_FOOD ----\nfunction handleCookFood() {\n    if (!gatherFoodTier) {\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Use tier's cook location if available, otherwise find nearest range\n    var rangeInfo = null;\n    if (gatherFoodTier && gatherFoodTier.cookLocation) {\n        rangeInfo = gatherFoodTier.cookLocation;\n    }\n    if (!rangeInfo) {\n        var rangeKeys = Object.keys(COOKING_RANGES);\n        for (var i = 0; i < rangeKeys.length; i++) {\n            rangeInfo = dbLookup(COOKING_RANGES, rangeKeys[i]);\n            if (rangeInfo) break;\n        }\n    }\n    if (!rangeInfo) {\n        // Default Lumbridge kitchen range\n        rangeInfo = {x: 3211, y: 3215, plane: 0, objectId: 114};\n    }\n\n    // Walk to range (10-tick cooldown)\n    if (!isNear(rangeInfo.x, rangeInfo.y, 8)) {\n        if (tickCounter - walkCooldown < 10) return;\n        walkCooldown = tickCounter;\n        isExecuting = true;\n        var crx = rangeInfo.x;\n        var cry = rangeInfo.y;\n        var crp = rangeInfo.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(crx, cry, crp));\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Check if we still have raw food (support both old rawId and new rawItemId)\n    var rawFoodId = gatherFoodTier.rawItemId || gatherFoodTier.rawId;\n    if (!rawFoodId || !Game.info.inventory.hasItem(rawFoodId, 1)) {\n        // All cooked or burned, bank and check supplies\n        botMsg(\"Cooking complete, banking food.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Cook: use raw food on range\n    if (isPlayerIdle()) {\n        var rangeObj = Game.info.gameObject.getNearest([rangeInfo.objectId]);\n        if (rangeObj) {\n            isExecuting = true;\n            var rawId = rawFoodId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnGameObject(rawId, rangeObj);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_GEAR ----\nfunction handleGatherGear() {\n    // For melee gear: kill cows for hides, or mine ore for metal gear\n    if (!gatherGearTarget) {\n        // Determine what gear we need\n        var bestBody = getBestBody(defenceLevel);\n        var bestLegs = getBestLegs(defenceLevel);\n\n        // Check if we need leather or metal gear\n        if (defenceLevel < 20) {\n            // Leather gear -- kill cows for hides\n            gatherGearPhase = \"leather\";\n            leatherPhase = \"killing\";\n            state = STATES.GATHER_GEAR;\n        } else {\n            // Metal gear -- mine ore\n            gatherGearPhase = \"metal\";\n            state = STATES.MINE_ORE;\n        }\n        return;\n    }\n\n    if (gatherGearPhase === \"leather\") {\n        handleLeatherGathering();\n    } else if (gatherGearPhase === \"metal\") {\n        state = STATES.MINE_ORE;\n    }\n}\n\nfunction handleLeatherGathering() {\n    // Kill cows for cowhides\n    var cowNpcIds = [2791, 2793, 2795]; // Cow NPC IDs\n    var cowLocation = {x: 3253, y: 3271, plane: 0}; // Lumbridge cow field\n\n    if (leatherPhase === \"killing\") {\n        if (!isNear(cowLocation.x, cowLocation.y, 20)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(cowLocation.x, cowLocation.y, cowLocation.plane));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Pick up cowhides from ground\n        if (Game.info.inventory.isFull()) {\n            leatherPhase = \"tanning\";\n            state = STATES.TAN_HIDES;\n            return;\n        }\n\n        // Attack cow or pick up hide\n        if (!Client.getLocalPlayer().isInteracting()) {\n            // Check for hides on ground first\n            var hides = Game.info.groundItem.getAll();\n            if (hides) {\n                for (var h = 0; h < hides.length; h++) {\n                    if (hides[h].getId() === 1739) { // Cowhide\n                        isExecuting = true;\n                        var hideItem = hides[h];\n                        Utility.invokeLater(function() {\n                            Game.interact.groundItem.pickup(hideItem);\n                            isExecuting = false;\n                        }, Utility.getDelay());\n                        return;\n                    }\n                }\n            }\n\n            // Attack cow\n            if (isPlayerIdle()) {\n                var cow = Game.info.npc.getNearest(cowNpcIds);\n                if (cow && !cow.isDead()) {\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        Game.interact.npc.attack(cow);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n            }\n        }\n    }\n}\n\n// ---- TAN_HIDES ----\n\n// ---- CRAFT_GEAR ----\nfunction handleCraftGear() {\n    // Craft leather gear from tanned hides\n    // Requires needle (1733) and thread (1734)\n    var needleId = 1733;\n    var threadId = 1734;\n    var leatherId = 1741; // Leather\n\n    if (!Game.info.inventory.hasItem(leatherId, 1)) {\n        botMsg(\"Gear crafting complete, checking supplies.\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(needleId, 1) || !Game.info.inventory.hasItem(threadId, 1)) {\n        // Need to get crafting supplies from bank\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Use needle on leather to craft\n    if (isPlayerIdle()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(needleId, leatherId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- MINE_ORE ----\nfunction handleMineOre() {\n    // ---- PICKAXE CHECK ----\n    // Make sure we have the best pickaxe for our level before mining\n    var bestPick = getBestPickaxe(miningLevel);\n    if (bestPick) {\n        var hasAnyPickaxe = false;\n        for (var pp = 0; pp < PICKAXES.length; pp++) {\n            if (Game.info.inventory.getItemCount(PICKAXES[pp].id) > 0) {\n                hasAnyPickaxe = true;\n                break;\n            }\n        }\n        if (!hasAnyPickaxe) {\n            botMsg(\"No pickaxe in inventory - banking for one\", \"SlayerBot\");\n            gatherToolNeeded = bestPick.id;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // Determine ore to mine based on smithing level\n    var oreData = null;\n    var mineSpot = null;\n\n    // Simple tier selection\n    if (miningLevel >= 55) {\n        oreData = {oreId: 447, name: \"mithril\"}; // Mithril ore\n    } else if (miningLevel >= 30) {\n        oreData = {oreId: 440, name: \"iron\"}; // Iron ore\n    } else if (miningLevel >= 15) {\n        oreData = {oreId: 436, name: \"copper\"}; // Copper ore\n    } else {\n        oreData = {oreId: 438, name: \"tin\"}; // Tin ore\n    }\n\n    // Find mining spot\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var m = 0; m < mineKeys.length; m++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[m]);\n        if (ms && ms.oreId === oreData.oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        // Default to Varrock East mine\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    // Walk to mine\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var mmx = mineSpot.x;\n            var mmy = mineSpot.y;\n            var mmp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(mmx, mmy, mmp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Mine ore\n    if (Game.info.inventory.isFull()) {\n        // Full, smelt\n        state = STATES.SMELT_ORE;\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMELT_ORE ----\nfunction handleSmeltOre() {\n    // Find nearest furnace\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i < furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469}; // Edgeville\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sfx = furnaceInfo.x;\n            var sfy = furnaceInfo.y;\n            var sfp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sfx, sfy, sfp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check if we still have ore\n    var hasOre = Game.info.inventory.hasItem(447, 1) || Game.info.inventory.hasItem(440, 1) ||\n                 Game.info.inventory.hasItem(436, 1) || Game.info.inventory.hasItem(438, 1);\n    if (!hasOre) {\n        state = STATES.SMITH_GEAR;\n        return;\n    }\n\n    // Smelt at furnace\n    if (isPlayerIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMITH_GEAR ----\nfunction handleSmithGear() {\n    // Find nearest anvil\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i < anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097}; // Varrock west\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sax = anvilInfo.x;\n            var say = anvilInfo.y;\n            var sap = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sax, say, sap));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check for bars\n    var hasBars = Game.info.inventory.hasItem(2353, 1) || Game.info.inventory.hasItem(2351, 1) ||\n                  Game.info.inventory.hasItem(2349, 1) || Game.info.inventory.hasItem(2355, 1);\n    if (!hasBars) {\n        botMsg(\"Smithing complete, returning to supplies.\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Smith at anvil\n    if (isPlayerIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_RANGED ----\nfunction handleGatherRanged() {\n    // Kill chickens for feathers to make arrows\n    var chickenLoc = null;\n    var chickenLocKeys = Object.keys(CHICKEN_LOCATIONS);\n    if (chickenLocKeys.length > 0) {\n        chickenLoc = dbLookup(CHICKEN_LOCATIONS, chickenLocKeys[0]);\n    }\n    if (!chickenLoc) {\n        chickenLoc = {x: 3235, y: 3295, plane: 0}; // Lumbridge\n    }\n\n    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var grcx = chickenLoc.x;\n            var grcy = chickenLoc.y;\n            var grcp = chickenLoc.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(grcx, grcy, grcp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        // Bank feathers then continue or move to arrow crafting\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Pick up feathers\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var gItems = null;\n        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}\n        if (gItems) {\n            for (var gi = 0; gi < gItems.length; gi++) {\n                if (gItems[gi].getId() === FEATHER_ID) {\n                    isExecuting = true;\n                    var featherItem = gItems[gi];\n                    Utility.invokeLater(function() {\n                        Game.interact.groundItem.pickup(featherItem);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n\n        // Kill chicken for feathers\n        if (isPlayerIdle()) {\n            var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);\n            if (chicken && !chicken.isDead()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(chicken);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n    }\n}\n\n// ---- WALK_TO_GATHER ----\nfunction handleWalkToGather() {\n    // Generic walk-to state used to get to gathering locations\n    // After arrival, transitions to the appropriate gathering state\n    if (gatherGearTarget) {\n        if (isNear(gatherGearTarget.x, gatherGearTarget.y, 10)) {\n            // Arrived at gathering destination\n            if (gatherGearPhase === \"leather\") {\n                state = STATES.GATHER_GEAR;\n            } else if (gatherGearPhase === \"metal\") {\n                state = STATES.MINE_ORE;\n            } else {\n                state = STATES.GATHER_FOOD;\n            }\n            return;\n        }\n\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var wgx = gatherGearTarget.x;\n            var wgy = gatherGearTarget.y;\n            var wgp = gatherGearTarget.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(wgx, wgy, wgp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// =============================================================================\n// NEW v24 STATES\n// =============================================================================\n\n// ---- CRAFT_ARROWS ----\n// Multi-phase arrow crafting: mine ore -> smelt -> smith heads -> feathers -> chop -> fletch shafts -> combine\nfunction handleCraftArrows() {\n    // Determine best tier\n    var tier = getBestArrowCraftingTier(smithingLevel, fletchingLevel, miningLevel);\n    if (!tier) {\n        botMsg(\"Cannot craft arrows at current levels (Smith:\" + smithingLevel + \" Fletch:\" + fletchingLevel + \" Mine:\" + miningLevel + \")\", \"SlayerBot\");\n        arrowCraftPhase = \"idle\";\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    arrowCraftTier = tier;\n\n    // Initialize phase if idle\n    if (arrowCraftPhase === \"idle\") {\n        arrowCraftPhase = \"check_stock\";\n        arrowCraftCount = 0;\n    }\n\n    switch (arrowCraftPhase) {\n        case \"check_stock\":\n            handleArrowCheckStock();\n            break;\n        case \"mine_ore\":\n            handleArrowMineOre();\n            break;\n        case \"smelt_bars\":\n            handleArrowSmeltBars();\n            break;\n        case \"smith_heads\":\n            handleArrowSmithHeads();\n            break;\n        case \"kill_chickens\":\n            handleArrowKillChickens();\n            break;\n        case \"chop_trees\":\n            handleArrowChopTrees();\n            break;\n        case \"fletch_shafts\":\n            handleArrowFletchShafts();\n            break;\n        case \"fletch_arrows\":\n            handleArrowFletchArrows();\n            break;\n        case \"done\":\n            handleArrowDone();\n            break;\n        default:\n            arrowCraftPhase = \"check_stock\";\n            break;\n    }\n}\n\nfunction handleArrowCheckStock() {\n    // Check if we have enough components to skip steps\n    var headId = arrowCraftTier.headId;\n    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);\n    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);\n    var headCount = Game.info.inventory.getItemCount(headId);\n\n    // Target: 500 arrows minimum\n    if (headCount >= 500 && shaftCount >= 500 && featherCount >= 500) {\n        arrowCraftPhase = \"fletch_arrows\";\n        return;\n    }\n\n    if (headCount < 500) {\n        // Need arrowheads: mine ore -> smelt -> smith\n        arrowCraftPhase = \"mine_ore\";\n    } else if (featherCount < 500) {\n        arrowCraftPhase = \"kill_chickens\";\n    } else if (shaftCount < 500) {\n        arrowCraftPhase = \"chop_trees\";\n    } else {\n        arrowCraftPhase = \"fletch_arrows\";\n    }\n}\n\nfunction handleArrowMineOre() {\n    var oreId = arrowCraftTier.oreId;\n    if (!oreId) {\n        // If tier uses iron, default\n        oreId = 440;\n    }\n\n    // Find mining spot\n    var mineSpot = null;\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var i = 0; i < mineKeys.length; i++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[i]);\n        if (ms && ms.oreId === oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var amx = mineSpot.x;\n            var amy = mineSpot.y;\n            var amp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(amx, amy, amp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        arrowCraftPhase = \"smelt_bars\";\n        return;\n    }\n\n    // Mine\n    if (isPlayerIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmeltBars() {\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i < furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469};\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var asx = furnaceInfo.x;\n            var asy = furnaceInfo.y;\n            var asp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(asx, asy, asp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var oreId = arrowCraftTier.oreId || 440;\n    if (!Game.info.inventory.hasItem(oreId, 1)) {\n        // Need coal for some ores\n        if (arrowCraftTier.needsCoal && Game.info.inventory.hasItem(COAL_ID, 1)) {\n            // Still smelting coal-based bars\n        } else {\n            arrowCraftPhase = \"smith_heads\";\n            return;\n        }\n    }\n\n    if (isPlayerIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmithHeads() {\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i < anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097};\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var ahx = anvilInfo.x;\n            var ahy = anvilInfo.y;\n            var ahp = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(ahx, ahy, ahp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var barId = arrowCraftTier.barId;\n    if (!barId) barId = 2351; // Iron bar default\n    if (!Game.info.inventory.hasItem(barId, 1)) {\n        // Check if we have enough heads\n        var headCount = Game.info.inventory.getItemCount(arrowCraftTier.headId);\n        if (headCount >= 100) {\n            // Check feathers next\n            var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);\n            if (featherCt < 500) {\n                arrowCraftPhase = \"kill_chickens\";\n            } else {\n                arrowCraftPhase = \"chop_trees\";\n            }\n        } else {\n            // Need more ore\n            arrowCraftPhase = \"mine_ore\";\n        }\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowKillChickens() {\n    var chickenLoc = null;\n    var clKeys = Object.keys(CHICKEN_LOCATIONS);\n    if (clKeys.length > 0) {\n        chickenLoc = dbLookup(CHICKEN_LOCATIONS, clKeys[0]);\n    }\n    if (!chickenLoc) {\n        chickenLoc = {x: 3235, y: 3295, plane: 0};\n    }\n\n    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var ckx = chickenLoc.x;\n            var cky = chickenLoc.y;\n            var ckp = chickenLoc.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(ckx, cky, ckp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check feather count\n    var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);\n    if (featherCt >= 600 || Game.info.inventory.isFull()) {\n        // Bank feathers then move to next phase\n        arrowCraftPhase = \"chop_trees\";\n        return;\n    }\n\n    // Pick up feathers first\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var gItems = null;\n        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}\n        if (gItems) {\n            for (var gi = 0; gi < gItems.length; gi++) {\n                if (gItems[gi].getId() === FEATHER_ID) {\n                    isExecuting = true;\n                    var fItem = gItems[gi];\n                    Utility.invokeLater(function() {\n                        Game.interact.groundItem.pickup(fItem);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n\n        // Kill chickens\n        if (isPlayerIdle()) {\n            var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);\n            if (chicken && !chicken.isDead()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(chicken);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n    }\n}\n\nfunction handleArrowChopTrees() {\n    // Chop normal trees for logs to make arrow shafts\n    var treeLoc = {x: 3196, y: 3224, plane: 0}; // Near Lumbridge\n\n    if (!isNear(treeLoc.x, treeLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(treeLoc.x, treeLoc.y, treeLoc.plane));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check log count\n    var logCount = Game.info.inventory.getItemCount(LOGS_ID);\n    if (logCount >= 20 || Game.info.inventory.isFull()) {\n        arrowCraftPhase = \"fletch_shafts\";\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        // Find a tree\n        var tree = Game.info.gameObject.getNearest(TREE_IDS);\n        if (tree) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(tree, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowFletchShafts() {\n    // Use knife on logs to make arrow shafts\n    if (!Game.info.inventory.hasItem(KNIFE_ID, 1)) {\n        // Need knife from bank\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(LOGS_ID, 1)) {\n        // All logs fletched to shafts\n        arrowCraftPhase = \"fletch_arrows\";\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(KNIFE_ID, LOGS_ID);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleArrowFletchArrows() {\n    // Combine arrowheads + shafts, then attach feathers\n    var headId = arrowCraftTier.headId;\n    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);\n    var headCount = Game.info.inventory.getItemCount(headId);\n    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);\n\n    // First: attach feathers to shafts = headless arrows (53)\n    var headlessId = 53;\n    var headlessCount = Game.info.inventory.getItemCount(headlessId);\n\n    if (shaftCount > 0 && featherCount > 0) {\n        // Make headless arrows\n        if (isPlayerIdle()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(ARROW_SHAFT_ID, FEATHER_ID);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Then: attach heads to headless arrows = finished arrows\n    if (headlessCount > 0 && headCount > 0) {\n        if (isPlayerIdle()) {\n            isExecuting = true;\n            var hId = headId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(hId, headlessId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // All done or missing components\n    var arrowId = arrowCraftTier.arrowId;\n    var finalCount = Game.info.inventory.getItemCount(arrowId);\n    botMsg(\"Arrow crafting complete. Made \" + finalCount + \" arrows.\", \"SlayerBot\");\n    arrowCraftPhase = \"done\";\n}\n\nfunction handleArrowDone() {\n    arrowCraftPhase = \"idle\";\n    arrowCraftCount = 0;\n    // Equip arrows\n    if (arrowCraftTier && arrowCraftTier.arrowId) {\n        var arrowId = arrowCraftTier.arrowId;\n        if (Game.info.inventory.hasItem(arrowId, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(arrowId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Return to check supplies\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = \"\";\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- CRAFT_RUNES ----\n// Pipeline: mine essence -> walk to altar -> craft -> bank -> repeat\nfunction handleCraftRunes() {\n    if (runecraftPhase === \"idle\") {\n        runecraftPhase = \"mine_essence\";\n        rcEssenceCount = 0;\n\n        // Determine which runes we need\n        neededRunes = [];\n        var spell = getBestSpell(magicLevel);\n        if (spell) {\n            var runes = getRunesForSpell(spell.key);\n            if (runes) {\n                var runeKeys = Object.keys(runes);\n                for (var i = 0; i < runeKeys.length; i++) {\n                    neededRunes.push({runeId: parseInt(runeKeys[i]), quantity: 1000});\n                }\n            }\n        }\n        if (neededRunes.length === 0) {\n            // Default to fire runes\n            neededRunes.push({runeId: 554, quantity: 1000}); // Fire runes\n        }\n    }\n\n    switch (runecraftPhase) {\n        case \"mine_essence\":\n            handleRCMineEssence();\n            break;\n        case \"walk_to_altar\":\n            handleRCWalkToAltar();\n            break;\n        case \"craft_runes\":\n            handleRCCraftRunes();\n            break;\n        case \"bank_runes\":\n            handleRCBankRunes();\n            break;\n        case \"check_stock\":\n            handleRCCheckStock();\n            break;\n        case \"done\":\n            handleRCDone();\n            break;\n        default:\n            runecraftPhase = \"mine_essence\";\n            break;\n    }\n}\n\nfunction handleRCMineEssence() {\n    // Mine rune essence at Varrock mine\n    // Aubury (NPC 11435) teleports you to the mine\n    var auburyLoc = {x: 3253, y: 3401, plane: 0};\n    var auburyNpcId = 11435;\n\n    // Check if we're in the essence mine (plane changes)\n    var loc = getPlayerLocation();\n    var inMine = (loc.y > 5000); // Essence mine is in a different plane\n\n    if (!inMine) {\n        // Walk to Aubury\n        if (!isNear(auburyLoc.x, auburyLoc.y, 5)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(auburyLoc.x, auburyLoc.y, auburyLoc.plane));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Teleport via Aubury\n        var aubury = Game.info.npc.getNearest([auburyNpcId]);\n        if (aubury) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.action(aubury, MenuAction.NPC_SECOND_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // In the mine -- mine essence\n    if (Game.info.inventory.isFull()) {\n        // Full, go craft runes\n        runecraftPhase = \"walk_to_altar\";\n        return;\n    }\n\n    // Find rune essence rock\n    var essRockIds = [7471]; // Rune essence rock\n    if (isPlayerIdle()) {\n        var essRock = Game.info.gameObject.getNearest(essRockIds);\n        if (essRock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(essRock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleRCWalkToAltar() {\n    // Determine altar based on needed runes\n    var altarLoc = {x: 3313, y: 3254, plane: 0}; // Default: Air altar entrance\n    var altarObjId = 34760; // Air altar object\n\n    if (neededRunes.length > 0) {\n        var runeId = neededRunes[0].runeId;\n        if (runeId === 554) { // Fire runes\n            altarLoc = {x: 3312, y: 3254, plane: 0};\n            altarObjId = 34764;\n        } else if (runeId === 555) { // Water runes\n            altarLoc = {x: 3185, y: 3165, plane: 0};\n            altarObjId = 34762;\n        } else if (runeId === 556) { // Air runes\n            altarLoc = {x: 3313, y: 3254, plane: 0};\n            altarObjId = 34760;\n        } else if (runeId === 557) { // Earth runes\n            altarLoc = {x: 3305, y: 3472, plane: 0};\n            altarObjId = 34763;\n        } else if (runeId === 558) { // Mind runes\n            altarLoc = {x: 2981, y: 3512, plane: 0};\n            altarObjId = 34761;\n        } else if (runeId === 559) { // Body runes\n            altarLoc = {x: 3053, y: 3445, plane: 0};\n            altarObjId = 34765;\n        }\n    }\n\n    if (!isNear(altarLoc.x, altarLoc.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var rax = altarLoc.x;\n            var ray = altarLoc.y;\n            var rap = altarLoc.plane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(rax, ray, rap));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Enter altar (use mysterious ruins)\n    var ruins = Game.info.gameObject.getNearest([altarObjId]);\n    if (ruins) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.gameObject.interact(ruins, MenuAction.NPC_FIRST_OPTION);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n\n    runecraftPhase = \"craft_runes\";\n}\n\nfunction handleRCCraftRunes() {\n    // Look for the altar object inside the ruins\n    var altarIds = [34760, 34761, 34762, 34763, 34764, 34765]; // Various altars\n\n    // Check for essence\n    var essId = 1436; // Rune essence\n    if (runecraftingLevel >= 1) {\n        essId = 7936; // Pure essence\n    }\n\n    if (!Game.info.inventory.hasItem(essId, 1) && !Game.info.inventory.hasItem(1436, 1)) {\n        // No essence, bank\n        runecraftPhase = \"bank_runes\";\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        var altar = Game.info.gameObject.getNearest(altarIds);\n        if (altar) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(altar, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleRCBankRunes() {\n    // Walk to nearest bank and deposit runes, withdraw more essence\n    var bank = findNearestBank();\n    if (!bank) {\n        runecraftPhase = \"done\";\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var rbkx = bank.x;\n            var rbky = bank.y;\n            var rbkp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(rbkx, rbky, rbkp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        _gt = tickCounter;\n        if (_gt - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = _gt;\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest(0, true);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit all, withdraw essence\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    runecraftPhase = \"check_stock\";\n}\n\nfunction handleRCCheckStock() {\n    // Check if we have enough runes banked\n    // Simplified: craft 3 inventories worth then done\n    rcEssenceCount++;\n    if (rcEssenceCount >= 3) {\n        runecraftPhase = \"done\";\n        return;\n    }\n\n    // Withdraw more essence\n    var essId = 7936; // Pure essence\n    withdrawBankItem(essId, 28);\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.close();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    runecraftPhase = \"walk_to_altar\";\n}\n\nfunction handleRCDone() {\n    runecraftPhase = \"idle\";\n    rcEssenceCount = 0;\n    neededRunes = [];\n    botMsg(\"Runecrafting session complete.\", \"SlayerBot\");\n\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = \"\";\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- BREW_POTIONS ----\nfunction handleBrewPotions() {\n    if (!brewTarget) {\n        botMsg(\"No brew target set, returning to supplies.\", \"SlayerBot\");\n        brewPhase = \"idle\";\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Look up the recipe\n    var recipe = null;\n    var recipeKeys = Object.keys(POTION_RECIPES);\n    for (var i = 0; i < recipeKeys.length; i++) {\n        var r = dbLookup(POTION_RECIPES, recipeKeys[i]);\n        if (r && recipeKeys[i].toLowerCase().indexOf(brewTarget.toLowerCase()) !== -1) {\n            recipe = r;\n            break;\n        }\n    }\n\n    if (!recipe) {\n        botMsg(\"Unknown brew target: \" + brewTarget, \"SlayerBot\");\n        brewPhase = \"idle\";\n        brewTarget = null;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Check herblore level requirement\n    if (herbloreLevel < recipe.level) {\n        botMsg(\"Need herblore level \" + recipe.level + \" (have \" + herbloreLevel + \") for \" + brewTarget, \"SlayerBot\");\n        herbloreTargetLevel = recipe.level;\n        state = STATES.LEVEL_HERBLORE;\n        return;\n    }\n\n    if (brewPhase === \"idle\") {\n        brewPhase = \"bank_supplies\";\n        brewCount = 0;\n    }\n\n    switch (brewPhase) {\n        case \"bank_supplies\":\n            handleBrewBankSupplies(recipe);\n            break;\n        case \"clean_herbs\":\n            handleBrewCleanHerbs(recipe);\n            break;\n        case \"make_unfinished\":\n            handleBrewMakeUnfinished(recipe);\n            break;\n        case \"add_secondary\":\n            handleBrewAddSecondary(recipe);\n            break;\n        case \"bank_potions\":\n            handleBrewBankPotions();\n            break;\n        case \"done\":\n            handleBrewDone();\n            break;\n        default:\n            brewPhase = \"bank_supplies\";\n            break;\n    }\n}\n\nfunction handleBrewBankSupplies(recipe) {\n    var bank = findNearestBank();\n    if (!bank) {\n        brewPhase = \"done\";\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var bbx = bank.x;\n            var bby = bank.y;\n            var bbp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(bbx, bby, bbp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        _gt = tickCounter;\n        if (_gt - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = _gt;\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest(0, true);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit all\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    // Withdraw herbs, vials, and secondaries\n    if (recipe.grimyHerbId) {\n        withdrawBankItem(recipe.grimyHerbId, 14);\n    }\n    withdrawBankItem(VIAL_OF_WATER, 14);\n    if (recipe.secondaryId) {\n        withdrawBankItem(recipe.secondaryId, 14);\n    }\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.close();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    brewPhase = \"clean_herbs\";\n}\n\nfunction handleBrewCleanHerbs(recipe) {\n    if (!recipe.grimyHerbId) {\n        brewPhase = \"make_unfinished\";\n        return;\n    }\n\n    // Clean grimy herbs by clicking them\n    if (Game.info.inventory.hasItem(recipe.grimyHerbId, 1)) {\n        if (isPlayerIdle()) {\n            isExecuting = true;\n            var herbId = recipe.grimyHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(herbId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else {\n        brewPhase = \"make_unfinished\";\n    }\n}\n\nfunction handleBrewMakeUnfinished(recipe) {\n    // Use clean herb on vial of water\n    if (!recipe.cleanHerbId) {\n        brewPhase = \"add_secondary\";\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(recipe.cleanHerbId, 1) || !Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {\n        brewPhase = \"add_secondary\";\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        isExecuting = true;\n        var clnId = recipe.cleanHerbId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(clnId, VIAL_OF_WATER);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleBrewAddSecondary(recipe) {\n    // Use secondary ingredient on unfinished potion\n    if (!recipe.unfinishedId || !recipe.secondaryId) {\n        brewPhase = \"bank_potions\";\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(recipe.unfinishedId, 1) || !Game.info.inventory.hasItem(recipe.secondaryId, 1)) {\n        brewPhase = \"bank_potions\";\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        isExecuting = true;\n        var unfId = recipe.unfinishedId;\n        var secId = recipe.secondaryId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(unfId, secId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleBrewBankPotions() {\n    var bank = findNearestBank();\n    if (!bank) {\n        brewPhase = \"done\";\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var bpx = bank.x;\n            var bpy = bank.y;\n            var bpp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(bpx, bpy, bpp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        _gt = tickCounter;\n        if (_gt - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = _gt;\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest(0, true);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    brewCount++;\n    if (brewCount >= 3) {\n        brewPhase = \"done\";\n    } else {\n        brewPhase = \"bank_supplies\";\n    }\n}\n\nfunction handleBrewDone() {\n    botMsg(\"Potion brewing session complete (\" + brewTarget + \").\", \"SlayerBot\");\n    brewPhase = \"idle\";\n    brewTarget = null;\n    brewCount = 0;\n\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = \"\";\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- LEVEL_HERBLORE ----\nfunction handleLevelHerblore() {\n    // Make the highest level potion we CAN make until we reach herbloreTargetLevel\n\n    if (herbloreLevel >= herbloreTargetLevel) {\n        botMsg(\"Herblore level \" + herbloreLevel + \" reached! Returning to brewing.\", \"SlayerBot\");\n        state = STATES.BREW_POTIONS;\n        return;\n    }\n\n    // Find the highest recipe we can make\n    var bestRecipe = null;\n    var bestLevel = 0;\n    var recipeKeys = Object.keys(POTION_RECIPES);\n    for (var i = 0; i < recipeKeys.length; i++) {\n        var rec = dbLookup(POTION_RECIPES, recipeKeys[i]);\n        if (rec && rec.level <= herbloreLevel && rec.level > bestLevel) {\n            bestLevel = rec.level;\n            bestRecipe = rec;\n        }\n    }\n\n    if (!bestRecipe) {\n        botMsg(\"Cannot find a potion to make at herblore \" + herbloreLevel, \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Bank, withdraw ingredients, make potions, repeat\n    var bank = findNearestBank();\n    if (!bank) {\n        state = STATES.IDLE;\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var lhx = bank.x;\n            var lhy = bank.y;\n            var lhp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(lhx, lhy, lhp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        _gt = tickCounter;\n        if (_gt - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = _gt;\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest(0, true);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit, withdraw herbs + vials\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    if (bestRecipe.grimyHerbId) {\n        withdrawBankItem(bestRecipe.grimyHerbId, 14);\n    }\n    withdrawBankItem(VIAL_OF_WATER, 14);\n\n    // Clean herbs and make potions inline\n    if (bestRecipe.grimyHerbId && Game.info.inventory.hasItem(bestRecipe.grimyHerbId, 1)) {\n        if (isPlayerIdle()) {\n            isExecuting = true;\n            var gHerbId = bestRecipe.grimyHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(gHerbId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else if (bestRecipe.cleanHerbId && Game.info.inventory.hasItem(bestRecipe.cleanHerbId, 1) && Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {\n        if (isPlayerIdle()) {\n            isExecuting = true;\n            var cHerbId = bestRecipe.cleanHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(cHerbId, VIAL_OF_WATER);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Check for level up\n    updateCachedStats();\n}\n\n// =============================================================================\n// OnChatMessage -- Intercepts chat messages to detect tasks, kills, deaths\n// =============================================================================\nvar insideChatHandler = false;\nfunction OnChatMessage(chatMsg) {\n    if (!chatMsg) return;\n    if (insideChatHandler) return; // prevent recursion from sendGameMessage\n    insideChatHandler = true;\n    try { handleChatMessage(chatMsg); } catch(e) { /* swallow */ }\n    insideChatHandler = false;\n}\nfunction handleChatMessage(chatMsg) {\n    var rawText = \"\";\n    if (typeof chatMsg === \"string\") {\n        rawText = chatMsg;\n    } else if (chatMsg.getMessage) {\n        rawText = chatMsg.getMessage();\n    } else if (chatMsg.message) {\n        rawText = chatMsg.message;\n    }\n    if (!rawText || rawText.length === 0) return;\n    // Strip OSRS color/formatting tags like <col=ff0000> </col> <br> etc\n    var cleanText = rawText;\n    var tStart = cleanText.indexOf(\"<\");\n    while (tStart !== -1) {\n        var tEnd = cleanText.indexOf(\">\", tStart);\n        if (tEnd !== -1) {\n            cleanText = cleanText.substring(0, tStart) + cleanText.substring(tEnd + 1);\n        } else {\n            break;\n        }\n        tStart = cleanText.indexOf(\"<\");\n    }\n    var message = cleanText;\n    var msg = cleanText.toLowerCase();\n\n    // Detect gem response: \"You're assigned to kill [monster]; only [N] more to go\"\n    // This has DIFFERENT format than task assignment - name first, then count\n    if (msg.indexOf(\"assigned to kill\") !== -1 && msg.indexOf(\"more to go\") !== -1) {\n        var killIdx = msg.indexOf(\"assigned to kill\") + \"assigned to kill\".length;\n        // Monster name is between \"kill \" and \";\"\n        var semiIdx = msg.indexOf(\";\", killIdx);\n        if (semiIdx === -1) semiIdx = msg.indexOf(\",\", killIdx);\n        var gemMonster = \"\";\n        if (semiIdx !== -1) {\n            gemMonster = message.substring(killIdx, semiIdx).trim();\n        }\n        // Count is after \"only \" before \" more\" - extract digits robustly\n        var onlyIdx = msg.indexOf(\"only \");\n        if (onlyIdx !== -1) {\n            var numStr = \"\";\n            for (var gc = onlyIdx + 5; gc < msg.length; gc++) {\n                var ch = msg.charAt(gc);\n                if (ch >= \"0\" && ch <= \"9\") {\n                    numStr = numStr + ch;\n                } else if (numStr.length > 0) {\n                    break;\n                }\n            }\n            if (numStr.length > 0) {\n                var gemCount = parseInt(numStr);\n                if (!isNaN(gemCount)) {\n                    killsLeft = gemCount;\n                }\n            }\n        }\n        if (gemMonster) {\n            currentTaskName = gemMonster;\n        }\n        Game.sendGameMessage(\"RAW GEM MSG: \" + msg, \"SlayerBot\");\n        Game.sendGameMessage(\"GEM DETECTED TASK: \" + currentTaskName + \" x\" + killsLeft, \"SlayerBot\");\n        taskReceived = true;\n        gemCheckDone = true;\n        return;\n    }\n\n    // Detect task assignment from master: \"Your new task is to kill [N] [monster]\"\n    for (var p = 0; p < TASK_CHAT_PATTERNS.length; p++) {\n        if (msg.indexOf(TASK_CHAT_PATTERNS[p]) !== -1) {\n            parseTaskFromMessage(message);\n            taskReceived = true;\n            gemCheckDone = true;\n            return;\n        }\n    }\n\n    // Detect gem check response - no task\n    if (msg.indexOf(\"you do not currently have\") !== -1 || \n        msg.indexOf(\"you need something new\") !== -1 ||\n        msg.indexOf(\"please check back later\") !== -1 ||\n        msg.indexOf(\"you don't currently have\") !== -1 ||\n        msg.indexOf(\"you currently don't have a task\") !== -1 ||\n        msg.indexOf(\"you have no task\") !== -1) {\n        noTaskFromGem = true;\n        gemCheckDone = true;\n        return;\n    }\n\n    // If we got a task from gem check, mark it\n    if (state === STATES.WAIT_GEM_RESPONSE && taskReceived) {\n        gemCheckDone = true;\n        return;\n    }\n\n    // Detect kill count (e.g., \"You have completed your task! You killed 120 monsters.\")\n    if (msg.indexOf(\"you have completed your task\") !== -1) {\n        killsLeft = 0;\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    // Detect single kill (monster death message or XP drop)\n    if (msg.indexOf(\"your slayer assignment\") !== -1 && msg.indexOf(\"more to go\") !== -1) {\n        // Parse kills remaining\n        var remaining = parseKillsRemaining(msg);\n        if (remaining >= 0) {\n            killsLeft = remaining;\n        }\n        return;\n    }\n\n    // Detect superior spawn\n    if (msg.indexOf(\"a superior foe has appeared\") !== -1) {\n        Game.sendGameMessage(\"Superior monster spawned!\", \"SlayerBot\");\n        return;\n    }\n\n    // Detect death\n    if (msg.indexOf(\"oh dear, you are dead\") !== -1) {\n        deathDetected = true;\n        return;\n    }\n\n    // Detect level up\n    if (msg.indexOf(\"congratulations, you just advanced\") !== -1) {\n        levelUpDetected = true;\n        return;\n    }\n\n    // Detect task streaks\n    if (msg.indexOf(\"you've completed\") !== -1 && msg.indexOf(\"in a row\") !== -1) {\n        // Task streak notification\n        Game.sendGameMessage(\"Task streak tracked!\", \"SlayerBot\");\n        return;\n    }\n}\n\nfunction parseTaskFromMessage(message) {\n    // Parse: \"Your new task is to kill 135 Blue Dragons.\"\n    var msg = message;\n    var lower = msg.toLowerCase();\n\n    // Find the pattern\n    var idx = -1;\n    for (var p = 0; p < TASK_CHAT_PATTERNS.length; p++) {\n        idx = lower.indexOf(TASK_CHAT_PATTERNS[p]);\n        if (idx !== -1) {\n            idx = idx + TASK_CHAT_PATTERNS[p].length;\n            break;\n        }\n    }\n\n    if (idx === -1) return;\n\n    // Extract the rest: \" 135 Blue Dragons.\"\n    var rest = msg.substring(idx).trim();\n    // Remove trailing period\n    if (rest.slice(-1) === \".\") {\n        rest = rest.substring(0, rest.length - 1);\n    }\n\n    // Parse number and name\n    var parts = rest.split(\" \");\n    if (parts.length < 2) return;\n\n    var count = parseInt(parts[0]);\n    if (isNaN(count)) return;\n\n    var monsterName = parts.slice(1).join(\" \");\n\n    killsLeft = count;\n    currentTaskName = monsterName;\n    totalKills = totalKills + count;\n\n    botMsg(\"Parsed task: \" + count + \" x \" + monsterName, \"SlayerBot\");\n}\n\nfunction parseKillsRemaining(msg) {\n    // Parse: \"...120 more to go.\"\n    var idx = msg.indexOf(\"more to go\");\n    if (idx === -1) return -1;\n\n    // Work backwards to find the number\n    var numStr = \"\";\n    var i = idx - 1;\n    while (i >= 0 && msg.charAt(i) === \" \") i--;\n    while (i >= 0 && msg.charAt(i) >= \"0\" && msg.charAt(i) <= \"9\") {\n        numStr = msg.charAt(i) + numStr;\n        i--;\n    }\n\n    var num = parseInt(numStr);\n    if (isNaN(num)) return -1;\n    return num;\n}\n\n// =============================================================================\n// NPC LOOT APPEARED -- Track kills when NPC dies (more reliable than chat)\n// =============================================================================\nfunction OnNPCLootAppeared(npc) {\n    if (!currentTaskMonster || !npc) return;\n\n    var npcId = -1;\n    try {\n        npcId = npc.getId();\n    } catch (e) {\n        return;\n    }\n\n    // Check if this NPC is our task\n    var isTask = false;\n    if (currentTaskMonster.npcIds) {\n        for (var i = 0; i < currentTaskMonster.npcIds.length; i++) {\n            if (currentTaskMonster.npcIds[i] === npcId) {\n                isTask = true;\n                break;\n            }\n        }\n    }\n\n    // Also check superior monster IDs\n    if (!isTask) {\n        var superiorData = getSuperiorNpcId(currentTaskMonster.name);\n        if (superiorData && superiorData === npcId) {\n            isTask = true;\n        }\n    }\n\n    if (isTask) {\n        killsLeft--;\n        totalKills++;\n        if (killsLeftOverlay) killsLeftOverlay.setValue(\"Kills Left: \" + Math.max(0, killsLeft));\n        botMsg(\"Kill tracked! \" + killsLeft + \" \" + currentTaskMonster.name + \" remaining. Total kills: \" + totalKills, \"SlayerBot\");\n\n        if (killsLeft <= 0) {\n            botMsg(\"All kills complete!\", \"SlayerBot\");\n            state = STATES.TASK_COMPLETE;\n        }\n    }\n}\n\n// ===========================================================================\n// CANNONBALL GATHERING SYSTEM\n// Mine iron + coal -> smelt steel bars -> smith cannonballs at furnace\n// NOTE: Do NOT bring cannon to single-combat zones!\n// ===========================================================================\nvar gatherCballState = \"CHECK\";\nvar gatherCballTarget = 1000;\n\nfunction handleGatherCannonballs() {\n    if (isExecuting) return;\n\n    // Check smithing level\n    var smithLvl = Client.getRealSkillLevel(Skill.SMITHING);\n    var miningLvl = Client.getRealSkillLevel(Skill.MINING);\n\n    if (smithLvl < CANNONBALL_CRAFT.smithLevel) {\n        botMsg(\"[SlayerBot] Need 35 Smithing to make cannonballs. Current: \" + smithLvl, \"Bot\");\n        // Fall back to buying from GE if possible\n        gatherCballState = \"BUY_GE\";\n    }\n\n    var cballCount = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n    if (cballCount >= gatherCballTarget) {\n        botMsg(\"[SlayerBot] Have \" + cballCount + \" cannonballs -- returning to task\", \"Bot\");\n        gatherCballState = \"CHECK\";\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    if (gatherCballState === \"CHECK\") {\n        // Figure out what we need\n        var barsInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n        var ironInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n        var hasMould = Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1);\n\n        if (barsInInv >= 10) {\n            // Have steel bars -- go smith cannonballs\n            if (!hasMould) {\n                gatherCballState = \"GET_MOULD\";\n            } else {\n                gatherCballState = \"SMITH_CBALLS\";\n            }\n        } else if (ironInInv > 0 && coalInInv >= (ironInInv * 2)) {\n            // Have ores -- go smelt\n            gatherCballState = \"SMELT_BARS\";\n        } else {\n            // Need to bank for supplies or mine\n            gatherCballState = \"BANK_SUPPLIES\";\n        }\n        return;\n    }\n\n    if (gatherCballState === \"BANK_SUPPLIES\") {\n        if (!Game.info.bank.isOpen()) {\n            _gt = tickCounter;\n            if (_gt - bankOpenAttemptTick < 5) return;\n            bankOpenAttemptTick = _gt;\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.openNearest(0, true);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Deposit inventory\n        Game.interact.bank.depositAllInventory();\n        // Withdraw ammo mould\n        if (!Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {\n            withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);\n        }\n        // Try to withdraw steel bars from bank\n        withdrawBankItem(CANNONBALL_CRAFT.steelBar, 27);\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            var barsGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n            if (barsGot >= 5) {\n                Game.interact.bank.close();\n                gatherCballState = \"SMITH_CBALLS\";\n            } else {\n                // No steel bars in bank -- try to withdraw ores\n                withdrawBankItem(CANNONBALL_CRAFT.ironOre, 9);\n                withdrawBankItem(CANNONBALL_CRAFT.coal, 18);\n                var ironGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n                if (ironGot >= 3) {\n                    Game.interact.bank.close();\n                    gatherCballState = \"SMELT_BARS\";\n                } else {\n                    // Nothing in bank -- need to mine\n                    Game.interact.bank.close();\n                    botMsg(\"[SlayerBot] No steel bars or ores in bank -- mining iron and coal\", \"Bot\");\n                    gatherCballState = \"MINE_ORES\";\n                }\n            }\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    if (gatherCballState === \"MINE_ORES\") {\n        // Walk to Al Kharid mine (has both iron and coal rocks nearby)\n        var minePos = SS_LOCATIONS.AL_KHARID_MINE;\n        if (!isNear(minePos.x, minePos.y, 15)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(minePos.x, minePos.y, minePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        var ironCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n\n        // Need 2 coal per iron for steel bars. Mine ~9 iron + 18 coal per trip\n        if (ironCount < 9) {\n            // Mine iron\n            var ironRock = Game.info.gameObject.getNearest(SS_OBJECTS.IRON_ROCK);\n            if (ironRock && PlayerHelper.isPlayerIdle()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(ironRock, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (coalCount < (ironCount * 2)) {\n            // Mine coal\n            var coalRock = Game.info.gameObject.getNearest(SS_OBJECTS.COAL_ROCK);\n            if (coalRock && PlayerHelper.isPlayerIdle()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(coalRock, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else {\n            // Have enough ores for a trip -- go smelt\n            gatherCballState = \"SMELT_BARS\";\n        }\n\n        // Full inventory -- bank or smelt\n        if (Game.info.inventory.isFull()) {\n            if (ironCount >= 5 && coalCount >= (ironCount * 2)) {\n                gatherCballState = \"SMELT_BARS\";\n            } else {\n                gatherCballState = \"BANK_SUPPLIES\";\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === \"SMELT_BARS\") {\n        // Walk to Al Kharid furnace\n        var furnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;\n        if (!isNear(furnacePos.x, furnacePos.y, 10)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(furnacePos.x, furnacePos.y, furnacePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Smelt at furnace\n        var ironInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n        if (ironInv > 0 && coalInv >= 2 && PlayerHelper.isPlayerIdle()) {\n            var furnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);\n            if (furnace) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(furnace, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    botMsg(\"[SlayerBot] Smelting steel bars for cannonballs\", \"Bot\");\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (ironInv <= 0 || coalInv < 2) {\n            // Done smelting -- check steel bar count\n            var steelBars = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n            if (steelBars >= 5) {\n                gatherCballState = \"SMITH_CBALLS\";\n            } else {\n                // Need more ores\n                gatherCballState = \"BANK_SUPPLIES\";\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === \"SMITH_CBALLS\") {\n        // Walk to Al Kharid furnace (cannonballs are smithed at furnace, not anvil)\n        var smFurnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;\n        if (!isNear(smFurnacePos.x, smFurnacePos.y, 10)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(smFurnacePos.x, smFurnacePos.y, smFurnacePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Smith cannonballs: use steel bar on furnace with ammo mould in inventory\n        var steelCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n        if (steelCount > 0 && Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1) && PlayerHelper.isPlayerIdle()) {\n            var smFurnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);\n            if (smFurnace) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    // Use steel bar on furnace to smith cannonballs\n                    Game.interact.inventory.useItemOnObject(CANNONBALL_CRAFT.steelBar, smFurnace);\n                    botMsg(\"[SlayerBot] Smithing cannonballs (\" + steelCount + \" bars left)\", \"Bot\");\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (steelCount <= 0) {\n            // All bars used -- check cannonball count\n            var newCballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n            botMsg(\"[SlayerBot] Smithed cannonballs. Total: \" + newCballs, \"Bot\");\n            if (newCballs >= gatherCballTarget) {\n                gatherCballState = \"CHECK\";\n                state = STATES.CHECK_SUPPLIES;\n            } else {\n                // Need more -- bank and get more bars/ores\n                gatherCballState = \"BANK_SUPPLIES\";\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === \"GET_MOULD\"
