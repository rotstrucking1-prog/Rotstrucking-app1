false;\n    botMsg(\"[Slayer] Initialized. Waiting for first game tick...\", \"BOT\");\n}\n\n// =============================================================================\n// OnGameTick -- Called every game tick (~600ms). Core dispatch loop.\n// =============================================================================\nfunction OnGameTick() {\n  try {\n    var gt, _gt;\n    tickCounter++;\n    ticksSinceLastBreak++;\n    ticksSinceAntifire++;\n    ticksSinceAntipoison++;\n    ticksSinceCombatPot++;\n\n    // Tick 1 diagnostic \u2014 confirms OnGameTick is running\n    if (tickCounter === 1) {\n        Game.sendGameMessage(\"[ROTS] OnGameTick ALIVE - tick 1 - state: \" + state, \"[DIAG]\");\n    }\n    if (tickCounter === 5) {\n        Game.sendGameMessage(\"[ROTS] Tick 5 - state: \" + state, \"[DIAG]\");\n    }\n\n    if (isExecuting) {\n        stateTimeout++;\n        if (stateTimeout > 30) {\n            isExecuting = false;\n            stateTimeout = 0;\n            botMsg(\"State timeout - resetting execution lock\", \"SlayerBot\");\n        }\n        return;\n    }\n\n    // ================================================================\n    // SCHEDULE CHECK -- Are we within play hours?\n    // ================================================================\n    if (cfgVal(\"enableSchedule\", false)) {\n        var schedStart = cfgVal(\"startHour\", 8);\n        var schedEnd = cfgVal(\"endHour\", 22);\n        if (!isWithinSchedule(schedStart, schedEnd)) {\n            if (state !== STATES.OUTSIDE_SCHEDULE && state !== STATES.TAKING_BREAK) {\n                stateBeforeBreak = state;\n                state = STATES.OUTSIDE_SCHEDULE;\n                outsideScheduleLogout = false;\n                botMsg(\"[Schedule] Outside play hours -- stopping\", \"Bot\");\n                scheduleOverlay.setValue(\"Schedule: OUTSIDE HOURS\");\n            }\n        } else {\n            scheduleOverlay.setValue(\"Schedule: Active\");\n        }\n    }\n\n    // ================================================================\n    // BREAK CHECK -- Time for a random human break?\n    // ================================================================\n    if (cfgVal(\"enableBreaks\", false) && state !== STATES.TAKING_BREAK && state !== STATES.OUTSIDE_SCHEDULE) {\n        // Initialize first break timer on session start\n        if (!sessionStarted) {\n            sessionStarted = true;\n            ticksSinceLastBreak = 0;\n            var initMin = cfgVal(\"minPlayMinutes\", 30);\n            var initMax = cfgVal(\"maxPlayMinutes\", 120);\n            nextBreakAtTick = calculateNextBreakDelay(initMin, initMax);\n            breakOverlay.setValue(\"Break: in ~\" + ticksToMinutes(nextBreakAtTick) + \"m\");\n        }\n\n        // Check if it is break time\n        if (ticksSinceLastBreak >= nextBreakAtTick) {\n            // Only break when safe -- not mid-combat or death\n            var safeToBreak = (state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT &&\n                state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE &&\n                state !== STATES.EAT_FOOD && state !== STATES.DRINK_PRAYER);\n\n            if (safeToBreak) {\n                stateBeforeBreak = state;\n                state = STATES.TAKING_BREAK;\n                breakReason = getRandomBreakReason();\n                var bMin = cfgVal(\"minBreakMinutes\", 3);\n                var bMax = cfgVal(\"maxBreakMinutes\", 15);\n                var duration = calculateBreakDuration(bMin, bMax);\n                breakEndTick = tickCounter + duration;\n                lastBreakDurationMins = ticksToMinutes(duration);\n                totalBreaksTaken++;\n                botMsg(\"[Break] \" + breakReason + \" (~\" + lastBreakDurationMins + \" min)\", \"Bot\");\n                breakOverlay.setValue(\"Break: \" + breakReason + \" (\" + lastBreakDurationMins + \"m)\");\n                return;\n            }\n        } else {\n            // Update countdown overlay\n            var remaining = nextBreakAtTick - ticksSinceLastBreak;\n            if (tickCounter % 100 === 0) {\n                breakOverlay.setValue(\"Break: in ~\" + ticksToMinutes(remaining) + \"m\");\n            }\n        }\n    }\n\n    // Update cached stats every 10 ticks\n    if (tickCounter % 10 === 0) {\n        updateCachedStats();\n    }\n\n    // Update overlay\n    updateOverlay();\n\n    // Track state changes\n    if (state !== lastState) {\n        stateTickCounter = 0;\n        lastState = state;\n        botMsg(\"State -> \" + state, \"SlayerBot\");\n    }\n    stateTickCounter++;\n\n    // Stuck detection: if we are in a non-idle state for too long, reset\n    if (stateTickCounter > 500 && state !== STATES.IDLE && state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT) {\n        botMsg(\"Stuck in \" + state + \" for 500 ticks, resetting to CHECK_STATS\", \"SlayerBot\");\n        state = STATES.CHECK_STATS;\n        stateTickCounter = 0;\n        retryCount = 0;\n    }\n\n    // Death detection: check if we are at Lumbridge spawn\n    if (state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE && state !== STATES.STARTUP) {\n        if (isAtDeathSpawn()) {\n            if (state === STATES.FIGHT_TASK || state === STATES.SAFESPOT_FIGHT || state === STATES.WALK_TO_TASK) {\n                botMsg(\"Death detected! Saving death location.\", \"SlayerBot\");\n                state = STATES.HANDLE_DEATH;\n                return;\n            }\n        }\n    }\n\n    // Level up detection\n    if (levelUpDetected) {\n        levelUpDetected = false;\n        updateCachedStats();\n    }\n\n    // =========================================================================\n    // PERIODIC BARROWS REPAIR CHECK (every ~30 sec)\n    // =========================================================================\n    ticksSinceRepairCheck++;\n    if (ticksSinceRepairCheck >= repairCheckInterval && state !== STA AT_GE:\n            handleBuyAtGE();\n            break;\n        case STATES.WALK_TO_TASK:\n            handleWalkToTask();\n            break;\n        case STATES.FIGHT_TASK:\n            handleFightTask();\n            break;\n        case STATES.SAFESPOT_FIGHT:\n            handleSafespotFight();\n            break;\n        case STATES.SPECIAL_FINISH:\n            handleSpecialFinish();\n            break;\n        case STATES.EAT_FOOD:\n            handleEatFood();\n            break;\n        case STATES.DRINK_PRAYER:\n            handleDrinkPrayer();\n            break;\n        case STATES.LOOT_ITEMS:\n            handleLootItems();\n            break;\n        case STATES.BURY_BONES:\n            handleBuryBones();\n            break;\n        case STATES.TASK_COMPLETE:\n            handleTaskComplete();\n            break;\n        case STATES.HANDLE_DEATH:\n            handleDeath();\n            break;\n        case STATES.HANDLE_LEVEL_UP:\n            handleLevelUp();\n            break;\n        case STATES.GATHER_FOOD:\n            handleGatherFood();\n            break;\n        case STATES.COOK_FOOD:\n            handleCookFood();\n            break;\n        case STATES.GATHER_GEAR:\n            handleGatherGear();\n            break;\n        case STATES.TAN_HIDES:\n            handleTanHides();\n            break;\n        case STATES.CRAFT_GEAR:\n            handleCraftGear();\n            break;\n        case STATES.MINE_ORE:\n            handleMineOre();\n            break;\n        case STATES.SMELT_ORE:\n            handleSmeltOre();\n            break;\n        case STATES.SMITH_GEAR:\n            handleSmithGear();\n            break;\n        case STATES.GATHER_RANGED:\n            handleGatherRanged();\n            break;\n        case STATES.WALK_TO_GATHER:\n            handleWalkToGather();\n            break;\n        case STATES.CRAFT_ARROWS:\n            handleCraftArrows();\n            break;\n        case STATES.CRAFT_RUNES:\n            handleCraftRunes();\n            break;\n        case STATES.BREW_POTIONS:\n            handleBrewPotions();\n            break;\n        case STATES.LEVEL_HERBLORE:\n            handleLevelHerblore();\n            break;\n        case STATES.RECOVER_GRAVE:\n            handleRecoverGrave();\n            break;\n        case STATES.SETUP_CANNON:\n            handleSetupCannon();\n            break;\n        case STATES.GATHER_CANNONBALLS:\n            handleGatherCannonballs();\n            break;\n        case STATES.TAKING_BREAK:\n            handleTakingBreak();\n            break;\n        case STATES.OUTSIDE_SCHEDULE:\n            handleOutsideSchedule();\n            break;\n        case STATES.REPAIR_BARROWS:\n            handleRepairBarrows();\n            break;\n        case STATES.IDLE:\n            // Do nothing -- idle until manually restarted or state changed\n            break;\n        default:\n            botMsg(\"Unknown state: \" + state + \", resetting.\", \"SlayerBot\");\n            state = STATES.STARTUP;\n            break;\n    }\n  } catch (err) {\n    Game.sendGameMessage(\"[ROTS] ERROR in OnGameTick: \" + err, \"[ERR]\");\n    Game.sendGameMessage(\"[ROTS] State was: \" + state + \" | Tick: \" + tickCounter, \"[ERR]\");\n  }\n}\n\n// =============================================================================\n// OnShutdown -- Called when the bot is stopped.\n// =============================================================================\nfunction OnShutdown() {\n    botMsg(\"Slayer Bot v24 shutting down. Tasks: \" + tasksCompleted + \" | Kills: \" + totalKills, \"SlayerBot\");\n}\n\n// =============================================================================\n// UTILITY HELPERS\n// =============================================================================\n\nfunction updateCachedStats() {\n    combatLevel = getCombatLevel();\n    slayerLevel = Client.getRealSkillLevels(Skill.SLAYER);\n    attackLevel = Client.getRealSkillLevels(Skill.ATTACK);\n    strengthLevel = Client.getRealSkillLevels(Skill.STRENGTH);\n    defenceLevel = Client.getRealSkillLevels(Skill.DEFENCE);\n    hitpointsLevel = Client.getRealSkillLevels(Skill.HITPOINTS);\n    prayerLevel = Client.getRealSkillLevels(Skill.PRAYER);\n    rangedLevel = Client.getRealSkillLevels(Skill.RANGED);\n    magicLevel = Client.getRealSkillLevels(Skill.MAGIC);\n    herbloreLevel = Client.getRealSkillLevels(Skill.HERBLORE);\n    fletchingLevel = Client.getRealSkillLevels(Skill.FLETCHING);\n    smithingLevel = Client.getRealSkillLevels(Skill.SMITHING);\n    miningLevel = Client.getRealSkillLevels(Skill.MINING);\n    runecraftingLevel = Client.getRealSkillLevels(Skill.RUNECRAFT);\n    fishingLevel = Client.getRealSkillLevels(Skill.FISHING);\n    cookingLevel = Client.getRealSkillLevels(Skill.COOKING);\n}\n\nfunction updateOverlay() {\n    try {\n        currentStateOverlay.setValue(\"State: \" + state);\n        if (currentTaskName && killsLeft > 0) {\n            taskOverlay.setValue(\"Task: \" + currentTaskName + \" (\" + killsLeft + \" left)\");\n        } else {\n            taskOverlay.setValue(\"Task: None\");\n        }\n        if (selectedMaster) {\n            slayerMasterOverlay.setValue(\"Master: \" + selectedMaster.name);\n        } else {\n            slayerMasterOverlay.setValue(\"Master: None\");\n        }\n        combatInfoOverlay.setValue(\"Cmb: \" + combatLevel + \" | Slay: \" + slayerLevel);\n        killCountOverlay.setValue(\"Kills: \" + totalKills);\n        tasksCompletedOverlay.setValue(\"Tasks: \" + tasksCompleted);\n        var mins = Math.floor(tickCounter / 100);\n        runtimeOverlay.setValue(\"Runtime: ~\" + mins + \"m\");\n        supplyInfoOverlay.setValue(\"Food: \" + countFood() + \" | PPots: \" + countPrayerPots());\n    } catch (e) {\n        // Overlay might not be available\n    }\n}\n\nfunction isDragonTask(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i < DRAGON_TASKS.length; i++) {\n        if (lower.indexOf(DRAGON_TASKS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction canPoison(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i < POISON_MONSTERS.length; i++) {\n        if (lower.indexOf(POISON_MONSTERS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction getPlayerLocation() {\n    var loc = Client.getLocalPlayer().getWorldLocation();\n    return {x: loc.getX(), y: loc.getY(), plane: loc.getPlane()};\n}\n\nfunction hasClueScroll() {\n    for (var i = 0; i < CLUE_SCROLLS.length; i++) {\n        if (Game.info.inventory.hasItem(CLUE_SCROLLS[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction hasPotionInGroup(potGroup) {\n    for (var i = 0; i < potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction drinkPotionFromGroup(potGroup) {\n    for (var i = 0; i < potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) {\n            isExecuting = true;\n            var potId = potGroup[i];\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(potId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkCombatPotion() {\n    // Try super combat first, then super attack\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_ATTACK_POTS)) return true;\n    if (drinkPotionFromGroup(ATTACK_POTS)) return true;\n    return false;\n}\n\nfunction drinkStrengthPotion() {\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_STRENGTH_POTS)) return true;\n    if (drinkPotionFromGroup(STRENGTH_POTS)) return true;\n    return false;\n}\n\nfunction drinkAntifire() {\n    if (drinkPotionFromGroup(SUPER_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(EXTENDED_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    return false;\n}\n\nfunction drinkAntipoison() {\n    // From UTILITIES: ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS\n    var groups = [ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS];\n    for (var g = 0; g < groups.length; g++) {\n        if (drinkPotionFromGroup(groups[g])) {\n            ticksSinceAntipoison = 0;\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkRangingPotion() {\n    return drinkPotionFromGroup(RANGING_POTS);\n}\n\nfunction drinkMagicPotion() {\n    return drinkPotionFromGroup(MAGIC_POTS);\n}\n\nfunction eatFood() {\n    // Try the configured food first, then any known food\n    var foodId = 0;\n    try {\n        foodId = cfgVal(\"foodType\", 379);\n    } catch (e) {\n        foodId = 379; // Default lobster\n    }\n    if (Game.info.inventory.hasItem(foodId, 1)) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.consumeItem(foodId);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    // Try any known food\n    var foodKeys = Object.keys(FOOD_HEALING);\n    for (var i = 0; i < foodKeys.length; i++) {\n        var fid = parseInt(foodKeys[i]);\n        if (Game.info.inventory.hasItem(fid, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(fid);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkPrayerPot() {\n    if (drinkPotionFromGroup(SUPER_RESTORE_POTS)) return true;\n    if (drinkPotionFromGroup(PRAYER_POTS)) return true;\n    return false;\n}\n\nfunction useSpecialAttack() {\n    var specPercent = 0;\n    try { specPercent = Client.getSpecialAttackPercent(); } catch(e) { return; }\n    if (specPercent < 25) return;\n\n    // Check if we have a spec weapon\n    var specWeaponId = DDS_ID;\n    var specKeys = Object.keys(SPEC_WEAPONS);\n    for (var i = 0; i < specKeys.length; i++) {\n        var sw = dbLookup(SPEC_WEAPONS, specKeys[i]);\n        if (Game.info.inventory.hasItem(sw.id, 1)) {\n            specWeaponId = sw.id;\n            break;\n        }\n    }\n\n    if (Game.info.inventory.hasItem(specWeaponId, 1)) {\n        isExecuting = true;\n        var weapId = specWeaponId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.equipItem(weapId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction activatePrayer(monsterName) {\n    if (!cfgVal(\"usePrayer\", false)) return;\n    // Activate protection prayer based on monster type\n    // Most slayer monsters use melee; some use ranged/magic\n    try {\n        var prayerWidget = Game.info.widget.getWidget(541, 22); // Protect from Melee\n        if (prayerWidget) {\n            // Prayer already handled via prayer flicking -- just ensure protect melee is on\n        }\n    } catch(e) {}\n}\n\nfunction activateSpecificPrayer(prayerName) {\n    if (!prayerName) return;\n    try {\n        var prayerData = dbLookup(PRAYERS, prayerName);\n        if (prayerData) {\n            var widget = Game.info.widget.getWidget(541, prayerData.widgetChild);\n            if (widget) {\n                // Activate the prayer widget\n            }\n        }\n    } catch(e) {}\n}\n\n// =============================================================================\n// TASK DIFFICULTY CLASSIFIER -- determines supply needs by monster combat level\n// TRIVIAL = ghosts/chickens/rats, EASY = goblins/skeletons, MEDIUM = giants,\n// HARD = dragons/demons, BOSS = abyssal demons/gargoyles\n// =============================================================================\nfunction getTaskDifficulty() {\n    if (!currentTaskMonster) return \"MEDIUM\"; // default safe\n    var cmb = currentTaskMonster.combatLevel || 1;\n\n    if (cmb <= 25) return \"TRIVIAL\";   // ghosts(19), chickens, rats, cows, goblins\n    if (cmb <= 60) return \"EASY\";      // skeletons, zombies, hill giants\n    if (cmb <= 120) return \"MEDIUM\";   // fire giants, moss giants, bloodveld\n    if (cmb <= 200) return \"HARD\";     // dragons, greater demons, hellhounds\n    return \"BOSS\";                      // abyssal demons, gargoyles, kraken\n}\n\n// Returns how much food the player actually needs for this task\nfunction getDesiredFoodCount() {\n    var diff = getTaskDifficulty();\n    var kl = killsLeft || 10;\n\n    // Scale by difficulty AND kill count\n    if (diff === \"TRIVIAL\") {\n        // Ghosts, chickens, etc - barely need food\n        if (kl <= 15) return 2;\n        return 4;\n    }\n    if (diff === \"EASY\") {\n        if (kl <= 20) return 4;\n        return 6;\n    }\n    if (diff === \"MEDIUM\") {\n        if (kl <= 15) return 8;\n        return 12;\n    }\n    if (diff === \"HARD\") {\n        return 16; // dragons/demons hit hard\n    }\n    // BOSS\n    return 20;\n}\n\n// Returns how many prayer pots needed (0 if task doesnt warrant it)\nfunction getDesiredPrayerPotCount() {\n    var diff = getTaskDifficulty();\n    // TRIVIAL and EASY: never need prayer pots\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return 0;\n    // MEDIUM: only if config says use prayer\n    if (diff === \"MEDIUM\") {\n        if (!cfgVal(\"usePrayer\", false)) return 0;\n        return 1;\n    }\n    // HARD: always want prayer pots if available\n    if (diff === \"HARD\") return 2;\n    // BOSS\n    return 4;\n}\n\n// Does this task need combat potions?\nfunction taskNeedsCombatPots() {\n    var diff = getTaskDifficulty();\n    // TRIVIAL and EASY: waste of potions\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return false;\n    return true;\n}\n\n// Does this task warrant a cannon?\nfunction taskNeedsCannon() {\n    if (!cfgVal(\"useCannon\", false)) return false;\n    var diff = getTaskDifficulty();\n    // TRIVIAL/EASY: absolute waste of cannonballs\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return false;\n    // Only in multicombat\n    if (!currentTaskMonster) return false;\n    return shouldUseCannon(currentTaskMonster, true);\n}\n\n// Pick the best food tier player can actually fish/cook\n// Returns full fishing plan based on player's fishing + cooking level\n// Uses SS_FOOD_TIERS to pick best fish, tool, secondary items, and location\nfunction getFishingPlan(fishLvl) {\n    var cookLvl = 1;\n    try { cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1; } catch(e) {}\n    var bestTier = null;\n    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {\n        var t = SS_FOOD_TIERS[i];\n        if (t.method !== \"fish\") continue;\n        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {\n            bestTier = t;\n            break;\n        }\n    }\n    if (!bestTier) {\n        // Fallback to shrimps (tier 1) - always available\n        bestTier = SS_FOOD_TIERS[1];\n    }\n    return bestTier;\n}\n\n// Backward-compat wrapper: returns just the tool ID\nfunction getBestFishingTool(fishLvl) {\n    var plan = getFishingPlan(fishLvl);\n    return plan ? plan.toolId : 303;\n}\n\nfunction getBestFoodTierForPlayer() {\n    var cookLvl = 1;\n    var fishLvl = 1;\n    try {\n        cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;\n        fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;\n    } catch(e) {}\n\n    // Walk the food tiers backwards to find best player can use\n    var bestTier = null;\n    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {\n        var t = SS_FOOD_TIERS[i];\n        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {\n            // Skip quest-locked tiers player may not have\n            if (t.questRequired) continue;\n            bestTier = t;\n            break;\n        }\n    }\n    if (!bestTier) bestTier = SS_FOOD_TIERS[0]; // chicken fallback\n    return bestTier;\n}\n\nfunction needsArrows() {\n    if (!cfgVal(\"useRanged\", false)) return false;\n    var count = countArrows();\n    return count < 50;\n}\n\nfunction needsRunes() {\n    if (!cfgVal(\"useMagic\", false)) return false;\n    var count = countRunes();\n    return count < 50;\n}\n\nfunction selectMasterWithBoosting(cmb, slay) {\n    var pref = \"Auto\";\n    try { pref = cfgVal(\"masterPreference\", \"auto\"); } catch(e) {}\n\n    if (!cfgVal(\"turaelBoosting\", false)) {\n        return selectBestMaster(cmb, slay, pref);\n    }\n\n    turaelStreakCount++;\n    if (turaelStreakCount % 10 === 0) {\n        // 10th task: use highest master for bonus points\n        botMsg(\"Turael boosting: using highest master (task #\" + turaelStreakCount + \")\", \"SlayerBot\");\n        return selectBestMaster(cmb, slay, \"Auto\");\n    } else {\n        // Use Turael for quick easy tasks\n        botMsg(\"Turael boosting: using Turael (task #\" + turaelStreakCount + \")\", \"SlayerBot\");\n        return SLAYER_MASTERS.TURAEL;\n    }\n}\n\nfunction equipTaskBracelet(taskName) {\n    var quality = getTaskQuality(taskName);\n    if (quality === \"good\") {\n        if (Game.info.inventory.hasItem(BRACELET_SLAUGHTER.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_SLAUGHTER.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else if (quality === \"bad\") {\n        if (Game.info.inventory.hasItem(BRACELET_EXPEDITIOUS.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_EXPEDITIOUS.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction checkForSuperior() {\n    if (!currentTaskMonster) return null;\n    var superiorData = getSuperiorNpcId(currentTaskMonster.name);\n    if (!superiorData) return null;\n    var superior = Game.info.npc.getNearest([superiorData]);\n    if (superior && !superior.isDead()) {\n        return superior;\n    }\n    return null;\n}\n\nfunction pickUpLoot() {\n    var groundItems = null;\n    try { groundItems = Game.info.groundItem.getAll(); } catch(e) { return false; }\n    if (!groundItems || groundItems.length === 0) return false;\n\n    var playerLoc = getPlayerLocation();\n\n    for (var i = 0; i < groundItems.length; i++) {\n        var item = groundItems[i];\n        var itemId = item.getId();\n\n        // Distance check: only pick up items within 5 tiles\n        var itemLoc = item.getWorldLocation();\n        var dx = Math.abs(itemLoc.getX() - playerLoc.x);\n        var dy = Math.abs(itemLoc.getY() - playerLoc.y);\n        if (dx > 5 || dy > 5) continue;\n\n        // Always pick up: bones, clue scrolls\n        var isBone = ALL_BONE_IDS.indexOf(itemId) !== -1;\n        var isClue = CLUE_SCROLLS.indexOf(itemId) !== -1;\n\n        if (isBone && cfgVal(\"buryBones\", false)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        if (isClue) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        // Pick up stackable/notable items\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.groundItem.pickup(item);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    return false;\n}\n\nfunction setAttackStyle() {\n    var focus = \"Shared\";\n    try { focus = cfgVal(\"trainingFocus\", \"balanced\"); } catch(e) {}\n    var atkCap = 99;\n    var strCap = 99;\n    var defCap = 99;\n    try { atkCap = cfgVal(\"attackCap\", 99); } catch(e) {}\n    try { strCap = cfgVal(\"strengthCap\", 99); } catch(e) {}\n    try { defCap = cfgVal(\"defenceCap\", 99); } catch(e) {}\n\n    var desiredStyle = getAttackStyleForFocus(focus, atkCap, strCap, defCap, attackLevel, strengthLevel, defenceLevel);\n\n    // desiredStyle is a widget child index (0=Accurate/atk, 1=Aggressive/str, 2=Defensive/def, 3=Controlled)\n    try {\n        var widget = Game.info.widget.getWidget(593, desiredStyle);\n        if (widget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(widget, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\nfunction attackWithRangedOrMagic() {\n    if (!currentTaskMonster) return;\n    if (!isPlayerIdle()) return;\n    var npcIds = currentTaskMonster.ids;\n    if (!npcIds || npcIds.length === 0) return;\n\n    var target = Game.info.npc.getNearest(npcIds);\n    if (!target || target.isDead()) return;\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.npc.attack(target);\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\nfunction handleSurvivalChecks() {\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // Emergency eat\n    if (currentHP <= Math.floor(maxHP * 0.4)) {\n        eatFood();\n        return;\n    }\n\n    // Prayer check\n    if (cfgVal(\"usePrayer\", false)) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer <= 10) {\n            drinkPrayerPot();\n            return;\n        }\n    }\n\n    // Dragon task antifire\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {\n            drinkAntifire();\n        }\n    }\n\n    // Poison monsters antipoison\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {\n            drinkAntipoison();\n        }\n    }\n\n    // Combat potion re-dose\n    if (ticksSinceCombatPot > 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk <= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr <= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n    }\n}\n\nfunction saveDeathLocation() {\n    var loc = getPlayerLocation();\n    // Death location should be the PREVIOUS location, not Lumbridge\n    // We track it from FIGHT_TASK\n    if (currentTaskMonster) {\n        deathLocation = {\n            x: currentTaskMonster.x,\n            y: currentTaskMonster.y,\n            plane: currentTaskMonster.plane || 0\n        };\n    } else {\n        deathLocation = null;\n    }\n}\n\nfunction withdrawPotionFromBank(potGroup, qty) {\n    for (var i = 0; i < potGroup.length; i++) {\n        try {\n            Game.interact.bank.withdrawItem(potGroup[i], BankWithdrawType.WITHDRAW_ALL, false);\n            return true;\n        } catch(e) {}\n    }\n    return false;\n}\n\n// =============================================================================\n// CORE STATE HANDLERS\n// =============================================================================\n\n// ---- STARTUP ----\nfunction handleStartup() {\n    botMsg(\"Auto Slayer Bot v24 starting up!\", \"SlayerBot\");\n    updateCachedStats();\n    retryCount = 0;\n    isExecuting = false;\n\n    // FIRST: Check for enchanted gem in inventory -- if missing, bank for it\n    var hasGem = Game.info.inventory.hasItem(4155, 1);\n    if (!hasGem) {\n        botMsg(\"No enchanted gem in inventory! Banking to get one FIRST.\", \"SlayerBot\");\n        needGemFromBank = true;\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Check if we already have a task from previous run\n    if (currentTaskName && killsLeft > 0) {\n        botMsg(\"Resuming existing task: \" + currentTaskName + \" (\" + killsLeft + \" left)\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        // Check gem for existing task BEFORE anything else\n        botMsg(\"Checking for existing slayer task...\", \"SlayerBot\");\n        state = STATES.CHECK_GEM;\n    }\n}\n\n// ---- CHECK_STATS ----\nfunction handleCheckStats() {\n    updateCachedStats();\n    botMsg(\"Stats - Cmb:\" + combatLevel + \" Slay:\" + slayerLevel + \" Atk:\" + attackLevel + \" Str:\" + strengthLevel + \" Def:\" + defenceLevel, \"SlayerBot\");\n    botMsg(\"Stats - Rng:\" + rangedLevel + \" Mag:\" + magicLevel + \" Herb:\" + herbloreLevel + \" Fletch:\" + fletchingLevel + \" Smith:\" + smithingLevel, \"SlayerBot\");\n\n    // Set attack style based on training focus\n    setAttackStyle();\n\n    // Go to master to get/check task\n    state = STATES.SELECT_MASTER;\n}\n\n\n// ---- CHECK_GEM (check enchanted gem or slayer helm for existing task) ----\nfunction handleCheckGem() {\n    // If we already know we have a task (e.g., from previous run), skip\n    if (currentTaskName && killsLeft > 0) {\n        botMsg(\"Already have task: \" + currentTaskName + \" (\" + killsLeft + \" left)\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // If we already tried gem check 2+ times, skip to master\n    if (gemCheckAttempts >= 2) {\n        botMsg(\"Gem check failed \" + gemCheckAttempts + \" times - skipping to master\", \"SlayerBot\");\n        gemCheckAttempts = 0;\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    gemCheckDone = false;\n    noTaskFromGem = false;\n    gemCheckAttempts++;\n\n    // Check for enchanted gem (4155) in inventory or slayer helmet equipped\n    var hasGem = Game.info.inventory.hasItem(4155, 1);\n    var hasHelm = false;\n    try {\n        hasHelm = Game.info.equipment.hasItem(11864, 1) || Game.info.equipment.hasItem(11865, 1);\n    } catch(e) {}\n\n    if (hasGem) {\n        botMsg(\"Found enchanted gem - checking task (attempt \" + gemCheckAttempts + \")...\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.actionItem(4155, 3, MenuAction.CC_OP);\n            isExecuting = false;\n        }, Utility.getDelay());\n        gemCheckTick = tickCounter;\n        state = STATES.WAIT_GEM_RESPONSE;\n    } else if (hasHelm) {\n        botMsg(\"Slayer helm equipped - can check task via helm\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n    } else {\n        botMsg(\"No gem in inventory - going to bank to grab one\", \"SlayerBot\");\n        needGemFromBank = true;\n\n        bankPhase = 0;\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- WAIT_GEM_RESPONSE ----\nfunction handleWaitGemResponse() {\n    // Wait up to 15 ticks for chat response from gem check\n    var elapsed = tickCounter - gemCheckTick;\n\n    if (gemCheckDone) {\n        // Chat handler set the task info\n        gemCheckAttempts = 0;\n        if (currentTaskName && killsLeft > 0) {\n            botMsg(\"GEM FOUND TASK: \" + currentTaskName + \" (\" + killsLeft + \" left) - skipping master!\", \"SlayerBot\");\n            updateCachedStats();\n            state = STATES.CHECK_SUPPLIES;\n        } else {\n            botMsg(\"Gem check: no active task. Getting stats then going to master.\", \"SlayerBot\");\n            state = STATES.CHECK_STATS;\n        }\n        return;\n    }\n\n    if (noTaskFromGem) {\n        botMsg(\"Gem confirms: NO active task. Getting stats then going to master.\", \"SlayerBot\");\n        state = STATES.CHECK_STATS;\n        return;\n    }\n\n    if (elapsed > 15) {\n        botMsg(\"Gem check timed out after 15 ticks - going to master\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n    }\n}\n\n// ---- SELECT_MASTER ----\nfunction handleSelectMaster() {\n    selectedMaster = selectMasterWithBoosting(combatLevel, slayerLevel);\n\n    if (!selectedMaster) {\n        botMsg(\"Could not select a slayer master! Using Turael.\", \"SlayerBot\");\n        selectedMaster = SLAYER_MASTERS.TURAEL;\n    }\n\n    botMsg(\"Selected master: \" + selectedMaster.name, \"SlayerBot\");\n    state = STATES.WALK_TO_MASTER;\n}\n\n// ---- WALK_TO_MASTER ----\nvar masterWalkCooldown = 0;\nfunction handleWalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (isNear(selectedMaster.location.x, selectedMaster.location.y, 10)) {\n        state = STATES.TALK_TO_MASTER;\n        retryCount = 0;\n        masterWalkCooldown = 0;\n        return;\n    }\n\n    if (masterWalkCooldown > 0) {\n        masterWalkCooldown--;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        var masterX = selectedMaster.location.x;\n        var masterY = selectedMaster.location.y;\n        var masterPlane = selectedMaster.location.plane || 0;\n        masterWalkCooldown = 10;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(masterX, masterY, masterPlane));\n        }, Utility.getDelay());\n    }\n}\n\n// ---- TALK_TO_MASTER ----\nfunction handleTalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Find the master NPC\n    var masterNpc = Game.info.npc.getNearest([selectedMaster.npcId]);\n    if (!masterNpc) {\n        // Not close enough, keep walking\n        if (retryCount < maxRetries) {\n            retryCount++;\n            state = STATES.WALK_TO_MASTER;\n        } else {\n            botMsg(\"Cannot find master NPC after retries, resetting.\", \"SlayerBot\");\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        }\n        return;\n    }\n\n    taskReceived = false;\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.npc.action(masterNpc, MenuAction.NPC_SECOND_OPTION);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    state = STATES.WAIT_FOR_TASK;\n    waitTicks = 0;\n}\n\n// ---- WAIT_FOR_TASK ----\nfunction handleWaitForTask() {\n    waitTicks++;\n\n    if (taskReceived) {\n        state = STATES.READ_TASK;\n        waitTicks = 0;\n        return;\n    }\n\n    // Handle dialog continuation -- check ALL OSRS dialog widgets\n    try {\n        // === AL KHARID TOLL GATE === Pay 10gp option\n        // Widget 219 = \"Select an Option\" dialogue; child 1 = first option (\"Yes\")\n        var optionWidget = Game.info.widget.getWidget(219, 1);\n        if (optionWidget) {\n            isExecuting = true;\n            botMsg(\"[SlayerBot] Toll gate detected - paying 10gp\", \"Bot\");\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(optionWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n\n        // NPC dialog (Turael talking)\n        var dialogWidget = Game.info.widget.getWidget(231, 4);\n        if (dialogWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(dialogWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Player dialog continue\n        var continueWidget = Game.info.widget.getWidget(217, 4);\n        if (continueWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(continueWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Simple notification continue\n        var notifWidget = Game.info.widget.getWidget(229, 2);\n        if (notifWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(notifWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Level up / notification continue\n        var levelWidget = Game.info.widget.getWidget(233, 3);\n        if (levelWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(levelWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    } catch (e) {}\n\n    if (waitTicks > 30) {\n        botMsg(\"Task not received after 30 ticks, retrying talk.\", \"SlayerBot\");\n        waitTicks = 0;\n        retryCount++;\n        if (retryCount > maxRetries) {\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        } else {\n            state = STATES.TALK_TO_MASTER;\n        }\n    }\n}\n\n// ---- READ_TASK ----\nfunction handleReadTask() {\n    if (!currentTaskName || killsLeft <= 0) {\n        botMsg(\"No valid task found, returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    botMsg(\"Task: Kill \" + killsLeft + \" \" + currentTaskName, \"SlayerBot\");\n\n    // Look up monster data\n    currentTaskMonster = findMonster(currentTaskName);\n    if (!currentTaskMonster) {\n        botMsg(\"WARNING: Unknown monster '\" + currentTaskName + \"', returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Equip task bracelet (expeditious or slaughter)\n    equipTaskBracelet(currentTaskName);\n\n    // v24: Check if safespot is available and configured\n    var safespotData = null;\n    if (cfgVal(\"useSafespots\", false)) {\n        safespotData = hasSafeSpot(currentTaskName);\n    }\n    if (safespotData) {\n        usingSafespot = true;\n        botMsg(\"Safespot available for \" + currentTaskName + \"!\", \"SlayerBot\");\n    } else {\n        usingSafespot = false;\n    }\n\n    // Move to supply check\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- CHECK_SUPPLIES (TIER-AWARE) ----\nfunction handleCheckSupplies() {\n    missingItems = [];\n    needsRestock = false;\n\n    var diff = getTaskDifficulty();\n    var monName = currentTaskMonster ? currentTaskMonster.name : \"unknown\";\n    botMsg(\"Task: \" + monName + \" (\" + killsLeft + \" left) | Difficulty: \" + diff, \"SlayerBot\");\n\n    // 0. Check coins -- always carry at least 250 GP\n    var coinCount = Game.info.inventory.getItemCount(995);\n    if (coinCount < 250) {\n        missingItems.push({type: \"coins\", current: coinCount, needed: 250});\n        needsRestock = true;\n    }\n\n    // 1. Check enchanted gem -- only need it if we don't know our task\n    // Once task is known, gem can stay in bank until logout\n    if (!currentTaskName && !Game.info.inventory.hasItem(4155, 1)) {\n        missingItems.push({type: \"gem\", current: 0, needed: 1});\n        needsRestock = true;\n    }\n\n    // 2. Check food -- scaled by difficulty\n    var foodCount = countFood();\n    var desiredFood = getDesiredFoodCount();\n    if (foodCount < desiredFood) {\n        missingItems.push({type: \"food\", current: foodCount, needed: desiredFood});\n        needsRestock = true;\n    }\n\n    // 3. Prayer pots -- only MEDIUM+ tasks\n    var desiredPpots = getDesiredPrayerPotCount();\n    if (desiredPpots > 0) {\n        var ppotCount = countPrayerPots();\n        if (ppotCount < desiredPpots) {\n            missingItems.push({type: \"prayer_pot\", current: ppotCount, needed: desiredPpots});\n            needsRestock = true;\n        }\n    }\n\n    // 4. Combat potions -- only MEDIUM+ tasks\n    if (taskNeedsCombatPots()) {\n        var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||\n                           hasPotionInGroup(SUPER_ATTACK_POTS) ||\n                           hasPotionInGroup(ATTACK_POTS);\n        if (!hasCombatPot) {\n            missingItems.push({type: \"combat_pot\", current: 0, needed: 1});\n            needsRestock = true;\n        }\n    }\n\n    // 5. Arrows (ranged users or safespot)\n    if (cfgVal(\"useRanged\", false) || usingSafespot) {\n        var arrowCount = countArrows();\n        if (arrowCount < 100) {\n            missingItems.push({type: \"arrows\", current: arrowCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // 6. Runes (magic users)\n    if (cfgVal(\"useMagic\", false)) {\n        var runeCount = countRunes();\n        if (runeCount < 100) {\n            missingItems.push({type: \"runes\", current: runeCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // 7. Antifire potions (dragon tasks only -- always HARD+)\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        var hasAntifire = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(ANTIFIRE_POTS);\n        if (!hasAntifire) {\n            missingItems.push({type: \"antifire\", current: 0, needed: 2});\n            needsRestock = true;\n        }\n    }\n\n    // 8. Antipoison (poison tasks only)\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        var hasAntipois = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||\n                          hasPotionInGroup(ANTIVENOM_IDS) ||\n                          hasPotionInGroup(SUPER_ANTIPOISON_IDS);\n        if (!hasAntipois) {\n            missingItems.push({type: \"antipoison\", current: 0, needed: 1});\n            needsRestock = true;\n        }\n    }\n\n    // 9. Cannonballs -- only MEDIUM+ multicombat\n    if (taskNeedsCannon()) {\n        var cballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n        if (cballs < 200) {\n            missingItems.push({type: \"cannonballs\", current: cballs, needed: CANNON.MIN_CANNONBALLS});\n            needsRestock = true;\n        }\n    }\n\n    // 10. Barrows gear condition -- repair at 25%\n    var barrowsRepairNeeded = checkEquippedBarrowsCondition();\n    if (barrowsRepairNeeded.length > 0) {\n        for (var br = 0; br < barrowsRepairNeeded.length; br++) {\n            botMsg(\"[SlayerBot] WARNING: \" + barrowsRepairNeeded[br].piece +\n                \" is at \" + barrowsRepairNeeded[br].condition + \"% - repair needed!\", \"Bot\");\n        }\n        stateBeforeRepair = state;\n        repairPhase = \"walk_to_bob\";\n        state = STATES.REPAIR_BARROWS;\n        return;\n    }\n\n    // 11. Special finish items (gargoyle/rockslug/lizard)\n    if (cfgVal(\"specialFinish\", false) && currentTaskMonster) {\n        var mn = currentTaskMonster.name.toLowerCase();\n        if (mn.indexOf(\"gargoyle\") !== -1 && !Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n            missingItems.push({type: \"special\", itemId: ROCK_HAMMER_ID, name: \"rock_hammer\"});\n            needsRestock = true;\n        }\n        if ((mn.indexOf(\"rockslug\") !== -1 || mn.indexOf(\"lizard\") !== -1) && !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n            missingItems.push({type: \"special\", itemId: ICE_COOLER_ID, name: \"ice_cooler\"});\n            needsRestock = true;\n        }\n    }\n\n    if (needsRestock) {\n        var types = [];\n        for (var mi = 0; mi < missingItems.length; mi++) { types.push(missingItems[mi].type); }\n        botMsg(diff + \" task needs: \" + types.join(\", \"), \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n    } else {\n        botMsg(diff + \" task - supplies OK! Heading to \" + monName + \".\", \"SlayerBot\");\n        state = STATES.WALK_TO_TASK;\n    }\n}\n\n// ---- WALK_TO_BANK ----\n// SIMPLIFIED: openNearest(0, true) handles BOTH walking AND opening!\n// No more coordinate lists, distance checks, or bankTarget needed.\nfunction handleWalkToBank() {\n    // If bank is already open (player manually opened or openNearest succeeded)\n    if (Game.info.bank.isOpen()) {\n        state = STATES.BANK_SUPPLIES;\n        waitTicks = 0;\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        // Trip 1 (gem) or Trip 2 (supplies)?\n        if (!currentTaskName && needGemFromBank) {\n            botMsg(\"Bank open - Trip 1: getting gem\");\n            bankPhase = 1; // gem retrieval flow\n        } else {\n            botMsg(\"Bank open - Trip 2: supply run\");\n            bankPhase = 10; // main supply run\n        }\n        return;\n    }\n\n    // If still walking to bank, wait\n    if (PlayerHelper.isWebWalking()) return;\n\n    // Don't spam - wait for previous action to complete\n    if (isExecuting) return;\n\n    // Call openNearest(0, true) - this walks to AND opens the nearest bank!\n    // distance=0 means maximum range, prioritize=true means booth > chest > npc\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        try {\n            Game.interact.bank.openNearest(0, true);\n        } catch(e) {\n            botMsg(\"openNearest error: \" + e.message);\n        }\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\n// ---- BANK_SUPPLIES ----\n// ============================================================\n// BANK FLOW \u2014 Brad's exact spec:\n// Trip 1 (task unknown only): open \u2192 get gem \u2192 close \u2192 check gem\n// Trip 2 (main supply run):   open \u2192 deposit gem \u2192 resource check\n//   if good: withdraw all supplies \u2192 close \u2192 go kill\n//   if bad:  grab gather tools + 250gp \u2192 close \u2192 go gather\n// ALL decisions made WHILE BANK IS OPEN \u2014 never close to think\n// ============================================================\nvar bankPhase = 0;\nvar withdrawQueue = [];\nvar bankOpenAttemptTick = 0;\nvar gatherNeeded = [];\nvar gatherToolsToWithdraw = []; // tools needed to go gather missing resources\n\nfunction handleBankSupplies() {\n    if (isExecuting) return;\n\n    // ---- MANUAL BANK OVERRIDE: Brad opens bank himself ----\n    if (bankPhase === 0 && Game.info.bank.isOpen()) {\n        botMsg(\"Bank detected - starting supply run\");\n        bankPhase = 10; // jump to main supply run deposit phase\n        waitTicks = 0;\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        return;\n    }\n\n    // ========================================================\n    // TRIP 1: GEM RETRIEVAL (only when task is unknown)\n    // Phases 1-5\n    // ========================================================\n\n    // Phase 1: Open bank for gem\n    if (bankPhase === 1) {\n        if (Game.info.bank.isOpen()) {\n            if (!Game.info.bank.setupCorrectly()) return;\n            bankPhase = 2;\n            waitTicks = 0;\n            return;\n        }\n        // Not open yet \u2014 let WALK_TO_BANK handle opening\n        if (tickCounter - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = tickCounter;\n        Game.interact.bank.openNearest(0, true);\n        return;\n    }\n\n    // Phase 2: Withdraw gem\n    if (bankPhase === 2) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 1; return; }\n        waitTicks++;\n        if (waitTicks < 3) return; // settle\n        if (Game.info.bank.hasItem(4155, 1)) {\n            botMsg(\"Withdrawing gem...\");\n            withdrawBankItem(4155, 1);\n            needGemFromBank = false;\n            bankPhase = 3;\n            waitTicks = 0;\n        } else {\n            botMsg(\"No gem in bank - going to master without it\");\n            needGemFromBank = false;\n            bankPhase = 4; // close and go to master\n            waitTicks = 0;\n            postBankState = STATES.SELECT_MASTER;\n        }\n        return;\n    }\n\n    // Phase 3: Close bank after gem withdrawal (need to close to check gem)\n    if (bankPhase === 3) {\n        waitTicks++;\n        if (waitTicks < 3) return; // let withdrawal settle\n        if (Game.info.bank.isOpen()) {\n            Game.interact.bank.close();\n        }\n        bankPhase = 35;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 3.5: Wait for bank to close, then go check gem\n    if (bankPhase === 35) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return; // still closing\n        botMsg(\"Bank closed. Checking gem...\");\n        bankPhase = 0;\n        waitTicks = 0;\n        state = STATES.CHECK_GEM;\n        return;\n    }\n\n    // Phase 4: Close bank and go to postBankState (gem not found path)\n    if (bankPhase === 4) {\n        if (Game.info.bank.isOpen()) {\n            Game.interact.bank.close();\n        }\n        bankPhase = 5;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 5: Wait for close then transition\n    if (bankPhase === 5) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return;\n        var ns = postBankState || STATES.SELECT_MASTER;\n        postBankState = null;\n        bankPhase = 0;\n        waitTicks = 0;\n        state = ns;\n        return;\n    }\n\n    // ========================================================\n    // TRIP 2: MAIN SUPPLY RUN (task is known)\n    // Phases 10-19\n    // ========================================================\n\n    // Phase 10: Open bank for supply run\n    if (bankPhase === 10) {\n        if (Game.info.bank.isOpen()) {\n            if (!Game.info.bank.setupCorrectly()) return;\n            bankPhase = 11;\n            waitTicks = 0;\n            return;\n        }\n        if (tickCounter - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = tickCounter;\n        Game.interact.bank.openNearest(0, true);\n        return;\n    }\n\n    // Phase 11: Deposit everything (including gem if we have it)\n    if (bankPhase === 11) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        botMsg(\"Depositing all inventory...\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.depositAllInventory();\n            isExecuting = false;\n        }, Utility.getDelay());\n        bankPhase = 12;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 12: Wait for deposit to settle, then do RESOURCE CHECK while bank is open\n    if (bankPhase === 12) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        waitTicks++;\n        if (waitTicks < 4) return;\n        waitTicks = 0;\n\n        // ---- RESOURCE CHECK (bank is open \u2014 we can see what we have) ----\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n\n        var diff = getTaskDifficulty();\n\n        // --- Food ---\n        var foodId = cfgVal(\"foodType\", 379);\n        if (typeof foodId === \"string\") {\n            var FOOD_MAP = {\n                \"shrimps\": 315, \"shrimp\": 315, \"anchovies\": 319,\n                \"trout\": 333, \"salmon\": 329, \"tuna\": 361,\n                \"lobster\": 379, \"swordfish\": 373,\n                \"monkfish\": 7946, \"shark\": 385,\n                \"manta ray\": 391, \"karambwan\": 3144,\n                \"anglerfish\": 13441\n            };\n            foodId = FOOD_MAP[foodId.toLowerCase()] || 379;\n        }\n        var desiredFood = getDesiredFoodCount();\n        if (desiredFood > 0) {\n            if (Game.info.bank.hasItem(foodId, 1)) {\n                withdrawQueue.push({ id: foodId, qty: desiredFood, label: \"Food x\" + desiredFood });\n            } else {\n                gatherNeeded.push(\"food\");\n                // Get full fishing plan: tool + secondary + location\n                var fishLvl = Client.getRealSkillLevels(Skill.FISHING);\n                var fishPlan = getFishingPlan(fishLvl);\n                if (fishPlan) {\n                    gatherFoodTier = fishPlan;\n                    botMsg(\"Fish plan: \" + fishPlan.name + \" (tool: \" + fishPlan.toolRequired + \", location: \" + JSON.stringify(fishPlan.gatherLocation) + \")\");\n                    // Withdraw fishing tool\n                    if (fishPlan.toolId && Game.info.bank.hasItem(fishPlan.toolId, 1)) {\n                        gatherToolsToWithdraw.push({ id: fishPlan.toolId, qty: 1, label: fishPlan.toolRequired });\n                    }\n                    // Withdraw secondary (feathers for fly fishing, etc.)\n                    if (fishPlan.secondaryId && fishPlan.secondaryNeeded) {\n                        if (Game.info.bank.hasItem(fishPlan.secondaryId, 1)) {\n                            gatherToolsToWithdraw.push({ id: fishPlan.secondaryId, qty: fishPlan.secondaryNeeded, label: \"Fishing secondary x\" + fishPlan.secondaryNeeded });\n                        }\n                    }\n                }\n            }\n        }\n\n        // --- Prayer pots ---\n        var desiredPpots = getDesiredPrayerPotCount();\n        if (desiredPpots > 0) {\n            withdrawQueue.push({ id: \"ppot\", qty: desiredPpots, label: \"Prayer pots\", potion: true, group: PRAYER_POTS });\n        }\n\n        // --- Combat pots ---\n        if (taskNeedsCombatPots()) {\n            withdrawQueue.push({ id: \"combatpot\", qty: 1, label: \"Combat pot\", potion: true, group: SUPER_COMBAT_POTS, fallback1: SUPER_ATTACK_POTS, fallback2: ATTACK_POTS });\n        }\n\n        // --- Arrows ---\n        if (cfgVal(\"useRanged\", false) || usingSafespot) {\n            var bestArrow = getBestArrows(rangedLevel);\n            if (bestArrow) {\n                if (Game.info.bank.hasItem(bestArrow.id, 1)) {\n                    withdrawQueue.push({ id: bestArrow.id, qty: 500, label: \"Arrows x500\" });\n                } else {\n                    gatherNeeded.push(\"arrows\");\n                }\n            }\n        }\n\n        // --- Runes ---\n        if (cfgVal(\"useMagic\", false)) {\n            var spell = getBestSpell(magicLevel);\n            if (spell) {\n                var runes = getRunesForSpell(spell.key);\n                if (runes) {\n                    var runeKeys = Object.keys(runes);\n                    for (var r = 0; r < runeKeys.length; r++) {\n                        var runeId = parseInt(runeKeys[r]);\n                        var runeQty = runes[runeKeys[r]] * 200;\n                        if (Game.info.bank.hasItem(runeId, 1)) {\n                            withdrawQueue.push({ id: runeId, qty: runeQty, label: \"Rune \" + runeId });\n                        } else {\n                            gatherNeeded.push(\"runes\");\n                        }\n                    }\n                }\n            }\n        }\n\n        // --- Antifire (dragons) ---\n        if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n            withdrawQueue.push({ id: \"antifire\", qty: 2, label: \"Antifire\", potion: true, group: SUPER_ANTIFIRE_POTS, fallback1: EXTENDED_ANTIFIRE_POTS, fallback2: ANTIFIRE_POTS });\n        }\n\n        // --- Antipoison ---\n        if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n            withdrawQueue.push({ id: \"antipoison\", qty: 1, label: \"Antipoison\", potion: true, group: SUPER_ANTIPOISON_IDS });\n        }\n\n        // --- Cannonballs ---\n        if (cfgVal(\"useCannon\", false) && shouldUseCannon(currentTaskMonster, true)) {\n            if (Game.info.bank.hasItem(CANNON.CANNONBALL, 1)) {\n                withdrawQueue.push({ id: CANNON.CANNONBALL, qty: CANNON.MIN_CANNONBALLS, label: \"Cannonballs\" });\n            } else {\n                gatherNeeded.push(\"cannonballs\");\n            }\n        }\n\n        // --- Special items (rock hammer, ice cooler) ---\n        if (cfgVal(\"specialFinish\", false) && currentTaskMonster) {\n            var monName = currentTaskMonster.name.toLowerCase();\n            if (monName.indexOf(\"gargoyle\") !== -1 && Game.info.bank.hasItem(ROCK_HAMMER_ID, 1)) {\n                withdrawQueue.push({ id: ROCK_HAMMER_ID, qty: 1, label: \"Rock hammer\" });\n            }\n            if ((monName.indexOf(\"rockslug\") !== -1 || monName.indexOf(\"lizard\") !== -1) && Game.info.bank.hasItem(ICE_COOLER_ID, 1)) {\n                withdrawQueue.push({ id: ICE_COOLER_ID, qty: 1, label: \"Ice cooler\" });\n            }\n        }\n\n        // --- Coins (always 250gp) ---\n        if (Game.info.bank.hasItem(995, 1)) {\n            withdrawQueue.push({ id: 995, qty: 250, label: \"250 GP\" });\n        }\n\n        // ---- DECISION (while bank is still open!) ----\n        if (gatherNeeded.length > 0) {\n            // Bank doesn't have everything \u2014 switch to gather plan\n            botMsg(\"Missing from bank: \" + gatherNeeded.join(\", \") + \" \u2014 prepping gather run\");\n            // Replace withdraw queue with JUST gather tools + coins\n            withdrawQueue = [];\n            // Add gather tools\n            for (var g = 0; g < gatherToolsToWithdraw.length; g++) {\n                withdrawQueue.push(gatherToolsToWithdraw[g]);\n            }\n            // Always bring 250gp for travel\n            if (Game.info.bank.hasItem(995, 1)) {\n                withdrawQueue.push({ id: 995, qty: 250, label: \"250 GP (travel)\" });\n            }\n            // Route to first gather need\n            var firstNeed = gatherNeeded[0];\n            if (firstNeed === \"food\") {\n                postBankState = STATES.GATHER_FOOD;\n            } else if (firstNeed === \"arrows\") {\n                postBankState = STATES.CRAFT_ARROWS;\n            } else if (firstNeed === \"runes\") {\n                postBankState = STATES.CRAFT_RUNES;\n            } else if (firstNeed === \"cannonballs\") {\n                postBankState = STATES.GATHER_CANNONBALLS;\n            } else {\n                postBankState = STATES.WALK_TO_GE;\n            }\n        } else {\n            // Bank has everything \u2014 going to task!\n            botMsg(\"All supplies available! Withdrawing \" + withdrawQueue.length + \" items\");\n            missingItems = [];\n            postBankState = STATES.WALK_TO_TASK;\n        }\n\n        bankPhase = 13;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 13: Process withdraw queue \u2014 one item per tick, 2-tick spacing\n    if (bankPhase === 13) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        if (withdrawQueue.length === 0) {\n            // Done withdrawing \u2014 go to close phase\n            bankPhase = 14;\n            waitTicks = 0;\n            return;\n        }\n        waitTicks++;\n        if (waitTicks % 2 !== 0) return; // 2-tick spacing\n\n        var item = withdrawQueue[0];\n        withdrawQueue.splice(0, 1);\n        botMsg(\"Withdrawing: \" + item.label);\n\n        if (item.potion) {\n            if (!withdrawPotionFromBank(item.group, item.qty)) {\n                if (item.fallback1 && !withdrawPotionFromBank(item.fallback1, item.qty)) {\n                    if (item.fallback2) {\n                        withdrawPotionFromBank(item.fallback2, item.qty);\n                    }\n                }\n            }\n        } else {\n            withdrawBankItem(item.id, item.qty);\n        }\n        return;\n    }\n\n    // Phase 14: Settle after withdrawals (4 ticks)\n    if (bankPhase === 14) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        waitTicks = 0;\n        bankPhase = 15;\n        return;\n    }\n\n    // Phase 15: Close bank\n    if (bankPhase === 15) {\n        if (Game.info.bank.isOpen()) {\n            botMsg(\"Closing bank...\");\n            Game.interact.bank.close();\n        }\n        bankPhase = 16;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 16: Wait for close, then GO\n    if (bankPhase === 16) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return; // still closing\n        \n        var nextState = postBankState || STATES.CHECK_SUPPLIES;\n        postBankState = null;\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        bankPhase = 0;\n        waitTicks = 0;\n        botMsg(\"Bank done -> \" + nextState);\n        state = nextState;\n        return;\n    }\n}\n\nfunction withdrawBankItem(itemId, qty) {\n    try {\n        // Safety: itemId MUST be a number -- bank API crashes on strings\n        if (typeof itemId === \"string\") {\n            botMsg(\"WITHDRAW ERROR: itemId is a string ('\" + itemId + \"') not a number! Skipping.\");\n            return;\n        }\n        itemId = parseInt(itemId);\n        if (isNaN(itemId) || itemId <= 0) {\n            botMsg(\"WITHDRAW ERROR: invalid itemId \" + itemId + \"! Skipping.\");\n            return;\n        }\n        // CORRECT DZ API: withdrawItem(id, BankWithdrawType, allowDuplicate)\n        // 2nd arg = BankWithdrawType enum (NOT a number!)\n        // 3rd arg = boolean allowDuplicate\n        var amount = qty || 1;\n        var wType;\n        if (amount <= 0) {\n            wType = BankWithdrawType.WITHDRAW_ALL;\n        } else if (amount === 1) {\n            wType = BankWithdrawType.WITHDRAW_ONE;\n        } else if (amount <= 5) {\n            wType = BankWithdrawType.WITHDRAW_FIVE;\n        } else if (amount <= 10) {\n            wType = BankWithdrawType.WITHDRAW_TEN;\n        } else {\n            wType = BankWithdrawType.WITHDRAW_ALL;\n        }\n        botMsg(\"Bank withdraw: item \" + itemId + \" x\" + amount + \" (type=\" + wType + \")\");\n        Game.interact.bank.withdrawItem(itemId, wType, false);\n    } catch(e) {\n        botMsg(\"Withdraw FAILED for item \" + itemId + \": \" + e);\n    }\n}\n\n// ---- WALK_TO_GE ----\nfunction handleWalkToGE() {\n    if (isNear(GE_LOCATION.x, GE_LOCATION.y, 10)) {\n        state = STATES.BUY_AT_GE;\n        retryCount = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(GE_LOCATION.x, GE_LOCATION.y, GE_LOCATION.plane));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- BUY_AT_GE ----\nfunction handleBuyAtGE() {\n    // GE purchasing is complex and depends on DZ APIs\n    // For now, log and skip to self-sufficient gathering\n    botMsg(\"GE purchasing not available in self-sufficient mode. Crafting instead.\", \"SlayerBot\");\n    if (cfgVal(\"selfSufficiency\", false)) {\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        state = STATES.IDLE;\n    }\n}\n\n// ---- WALK_TO_TASK ----\nfunction handleWalkToTask() {\n    if (!currentTaskMonster) {\n        botMsg(\"No task monster data, returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Cannon setup -- ONLY in multicombat zones (never bring to single combat)\n    if (cfgVal(\"useCannon\", false) && !cannonPlaced && shouldUseCannon(currentTaskMonster, true)) {\n        if (Game.info.inventory.hasItem(CANNON.BASE, 1) && Game.info.inventory.hasItem(CANNON.CANNONBALL, 1)) {\n            if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n                botMsg(\"[SlayerBot] Multicombat zone -- setting up cannon\", \"Bot\");\n                state = STATES.SETUP_CANNON;\n                return;\n            }\n        }\n    }\n\n    if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n        // v24: Choose fight mode based on safespot\n        if (usingSafespot && cfgVal(\"useSafespots\", false)) {\n            state = STATES.SAFESPOT_FIGHT;\n        } else {\n            state = STATES.FIGHT_TASK;\n        }\n        retryCount = 0;\n        ticksSinceAntifire = 0;\n        ticksSinceAntipoison = 0;\n        ticksSinceCombatPot = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        var mx = currentTaskMonster.x;\n        var my = currentTaskMonster.y;\n        var mp = currentTaskMonster.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(mx, my, mp));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- FIGHT_TASK (major overhaul for v24) ----\nfunction handleFightTask() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Task complete check\n    if (killsLeft <= 0) {\n        botMsg(\"Task complete! Killed all \" + currentTaskName, \"SlayerBot\");\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // === PRIORITY 1: Death check ===\n    if (currentHP <= 0) {\n        saveDeathLocation();\n        state = STATES.HANDLE_DEATH;\n        return;\n    }\n\n    // === PRIORITY 2: Emergency teleport if critically low ===\n    if (currentHP <= EMERGENCY_HP_THRESHOLD && countFood() === 0) {\n        botMsg(\"CRITICAL HP with no food! Emergency retreat!\", \"SlayerBot\");\n        // Try to eat anything\n        if (!eatFood()) {\n            // Walk away from combat\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 3: Eat food ===\n    if (currentHP <= Math.floor(maxHP * 0.45)) {\n        if (countFood() > 0) {\n            eatFood();\n            return;\n        } else {\n            // Out of food -- bank\n            botMsg(\"Out of food, banking.\", \"SlayerBot\");\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 4: Drink prayer pot ===\n    if (cfgVal(\"usePrayer\", false)) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer <= 15) {\n            if (countPrayerPots() > 0) {\n                drinkPrayerPot();\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 5: Anti-fire check (dragon tasks) ===\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {\n            if (drinkAntifire()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 6: Anti-poison check ===\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {\n            if (drinkAntipoison()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 7: Combat potion re-dose ===\n    if (ticksSinceCombatPot > 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk <= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr <= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 8: Special attack ===\n    if (cfgVal(\"useSpecialAttack\", false)) {\n        var specPercent = 0;\n        try { specPercent = Client.getSpecialAttackPercent(); } catch(e) {}\n        if (specPercent >= 25) {\n            useSpecialAttack();\n        }\n    }\n\n    // === PRIORITY 9: Superior monster check ===\n    var superior = checkForSuperior();\n    if (superior) {\n        botMsg(\"SUPERIOR FOUND! Attacking superior.\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superior);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // === PRIORITY 10: Special finish items ===\n    if (cfgVal(\"specialFinish\", false)) {\n        var finished = handleSpecialFinishCheck();\n        if (finished) return;\n    }\n\n    // === PRIORITY 11: Loot check ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // === PRIORITY 12: Clue scroll banking ===\n    if (Game.info.inventory.isFull() && hasClueScroll()) {\n        botMsg(\"Inventory full with clue scroll, banking.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // === PRIORITY 13: Bone burying ===\n    if (cfgVal(\"buryBones\", false) && !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b < ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var boneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(boneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 14: Cannon reload ===\n    if (cfgVal(\"useCannon\", false) && cannonPlaced) {\n        reloadCannon();\n    }\n\n    // === PRIORITY 15: Attack target ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var npcIds = currentTaskMonster.ids;\n        if (!npcIds || npcIds.length === 0) {\n            botMsg(\"No NPC IDs for \" + currentTaskName, \"SlayerBot\");\n            state = STATES.SELECT_MASTER;\n            return;\n        }\n\n        var target = Game.info.npc.getNearest(npcIds);\n        if (target && !target.isDead()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.attack(target);\n                isExecuting = false;\n            }, Utility.getDelay());\n        } else {\n            // No monster found -- might need to wait or move\n            if (stateTickCounter > 20 && !target) {\n                // Try walking closer to task center\n                if (!PlayerHelper.isWebWalking()) {\n                    var cx = currentTaskMonster.x;\n                    var cy = currentTaskMonster.y;\n                    var cp = currentTaskMonster.plane || 0;\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(cx, cy, cp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n            }\n        }\n    }\n}\n\nfunction handleSpecialFinishCheck() {\n    if (!currentTaskMonster) return false;\n    var monName = currentTaskMonster.name.toLowerCase();\n    var npcIds = currentTaskMonster.ids;\n\n    // Gargoyles: rock hammer when low HP\n    if (monName.indexOf(\"gargoyle\") !== -1 && Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n        var gargoyle = Game.info.npc.getNearest(npcIds);\n        if (gargoyle && gargoyle.getHealthRatio() > 0 && gargoyle.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                // Use rock hammer on gargoyle\n                Game.interact.inventory.useItemOnNpc(ROCK_HAMMER_ID, gargoyle);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Rockslugs: bag of salt when low HP\n    if (monName.indexOf(\"rockslug\") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var rockslug = Game.info.npc.getNearest(npcIds);\n        if (rockslug && rockslug.getHealthRatio() > 0 && rockslug.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, rockslug);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Desert lizards: ice cooler when low HP\n    if (monName.indexOf(\"lizard\") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var lizard = Game.info.npc.getNearest(npcIds);\n        if (lizard && lizard.getHealthRatio() > 0 && lizard.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, lizard);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    return false;\n}\n\nfunction reloadCannon() {\n    // Check cannonball count\n    var cballs = Game.info.inventory.getItemCount(2);\n    if (cballs <= 0) return;\n\n    // Try to find cannon object near us\n    try {\n        var cannonObj = Game.info.gameObject.getNearest([6]);\n        if (cannonObj) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(cannonObj, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\n// ---- SAFESPOT_FIGHT ----\nfunction handleSafespotFight() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (killsLeft <= 0) {\n        botMsg(\"Safespot task complete! Killed all \" + currentTaskName, \"SlayerBot\");\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var spot = hasSafeSpot(currentTaskMonster.name);\n    if (!spot) {\n        // Fallback to normal melee fight\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Move to safe tile if not there\n    if (!isNear(spot.safeX, spot.safeY, 2)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sx = spot.safeX;\n            var sy = spot.safeY;\n            var sp = spot.safePlane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sx, sy, sp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Activate prayer if needed\n    if (spot.prayAgainst) {\n        activateSpecificPrayer(spot.prayAgainst);\n    }\n\n    // Survival checks\n    handleSurvivalChecks();\n\n    // Check for superior (even in safespot)\n    var superiorNpc = checkForSuperior();\n    if (superiorNpc) {\n        botMsg(\"SUPERIOR in safespot! Attacking.\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superiorNpc);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Loot check\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // Bone burying\n    if (cfgVal(\"buryBones\", false) && !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b < ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var safeBoneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(safeBoneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // Supply interrupts\n    var fCount = countFood();\n    if (fCount <= 0) {\n        botMsg(\"Out of food in safespot, banking.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Arrow/rune supply interrupt\n    if (cfgVal(\"useRanged\", false) && countArrows() < 10) {\n        botMsg(\"Low on arrows, restocking.\", \"SlayerBot\");\n        if (cfgVal(\"selfSufficiency\", false)) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_ARROWS;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n    if (cfgVal(\"useMagic\", false) && countRunes() < 10) {\n        botMsg(\"Low on runes, restocking.\", \"SlayerBot\");\n        if (cfgVal(\"selfSufficiency\", false)) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_RUNES;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n\n    // Attack with ranged/magic from safe spot\n    if (!Client.getLocalPlayer().isInteracting()) {\n        attackWithRangedOrMagic();\n    }\n}\n\n// ---- EAT_FOOD ----\nfunction handleEatFood() {\n    if (eatFood()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        // No food, need to bank\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- DRINK_PRAYER ----\nfunction handleDrinkPrayer() {\n    if (drinkPrayerPot()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- LOOT_ITEMS ----\nfunction handleLootItems() {\n    if (Game.info.inventory.isFull()) {\n        // Inventory full -- bury bones or bank\n        if (cfgVal
