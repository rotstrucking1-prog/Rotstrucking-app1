// =============================================================================
// OnChatMessage -- Intercepts chat messages to detect tasks, kills, deaths
// =============================================================================
var insideChatHandler = false;
function OnChatMessage(chatMsg) {
    if (!chatMsg) return;
    if (insideChatHandler) return; // prevent recursion from sendGameMessage
    insideChatHandler = true;
    try { handleChatMessage(chatMsg); } catch(e) { /* swallow */ }
    insideChatHandler = false;
}
function handleChatMessage(chatMsg) {
    var rawText = &quot;&quot;;
    if (typeof chatMsg === &quot;string&quot;) {
        rawText = chatMsg;
    } else if (chatMsg.getMessage) {
        rawText = chatMsg.getMessage();
    } else if (chatMsg.message) {
        rawText = chatMsg.message;
    }
    if (!rawText || rawText.length === 0) return;
    // Strip OSRS color/formatting tags like &lt;col=ff0000&gt; &lt;/col&gt; &lt;br&gt; etc
    var cleanText = rawText;
    var tStart = cleanText.indexOf(&quot;&lt;&quot;);
    while (tStart !== -1) {
        var tEnd = cleanText.indexOf(&quot;&gt;&quot;, tStart);
        if (tEnd !== -1) {
            cleanText = cleanText.substring(0, tStart) + cleanText.substring(tEnd + 1);
        } else {
            break;
        }
        tStart = cleanText.indexOf(&quot;&lt;&quot;);
    }
    var message = cleanText;
    var msg = cleanText.toLowerCase();

    // Detect gem response: &quot;You&#x27;re assigned to kill [monster]; only [N] more to go&quot;
    // This has DIFFERENT format than task assignment - name first, then count
    if (msg.indexOf(&quot;assigned to kill&quot;) !== -1 &amp;&amp; msg.indexOf(&quot;more to go&quot;) !== -1) {
        var killIdx = msg.indexOf(&quot;assigned to kill&quot;) + &quot;assigned to kill&quot;.length;
        // Monster name is between &quot;kill &quot; and &quot;;&quot;
        var semiIdx = msg.indexOf(&quot;;&quot;, killIdx);
        if (semiIdx === -1) semiIdx = msg.indexOf(&quot;,&quot;, killIdx);
        var gemMonster = &quot;&quot;;
        if (semiIdx !== -1) {
            gemMonster = message.substring(killIdx, semiIdx).trim();
        }
        // Count is after &quot;only &quot; before &quot; more&quot; - extract digits robustly
        var onlyIdx = msg.indexOf(&quot;only &quot;);
        if (onlyIdx !== -1) {
            var numStr = &quot;&quot;;
            for (var gc = onlyIdx + 5; gc &lt; msg.length; gc++) {
                var ch = msg.charAt(gc);
                if (ch &gt;= &quot;0&quot; &amp;&amp; ch &lt;= &quot;9&quot;) {
                    numStr = numStr + ch;
                } else if (numStr.length &gt; 0) {
                    break;
                }
            }
            if (numStr.length &gt; 0) {
                var gemCount = parseInt(numStr);
                if (!isNaN(gemCount)) {
                    killsLeft = gemCount;
                }
            }
        }
        if (gemMonster) {
            currentTaskName = gemMonster;
        }
        Game.sendGameMessage(&quot;RAW GEM MSG: &quot; + msg, &quot;SlayerBot&quot;);
        Game.sendGameMessage(&quot;GEM DETECTED TASK: &quot; + currentTaskName + &quot; x&quot; + killsLeft, &quot;SlayerBot&quot;);
        taskReceived = true;
        gemCheckDone = true;
        return;
    }

    // Detect task assignment from master: &quot;Your new task is to kill [N] [monster]&quot;
    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {
        if (msg.indexOf(TASK_CHAT_PATTERNS[p]) !== -1) {
            parseTaskFromMessage(message);
            taskReceived = true;
            gemCheckDone = true;
            return;
        }
    }

    // Detect gem check response - no task
    if (msg.indexOf(&quot;you do not currently have&quot;) !== -1 || 
        msg.indexOf(&quot;you need something new&quot;) !== -1 ||
        msg.indexOf(&quot;please check back later&quot;) !== -1 ||
        msg.indexOf(&quot;you don&#x27;t currently have&quot;) !== -1 ||
        msg.indexOf(&quot;you currently don&#x27;t have a task&quot;) !== -1 ||
        msg.indexOf(&quot;you have no task&quot;) !== -1) {
        noTaskFromGem = true;
        gemCheckDone = true;
        return;
    }

    // If we got a task from gem check, mark it
    if (state === STATES.WAIT_GEM_RESPONSE &amp;&amp; taskReceived) {
        gemCheckDone = true;
        return;
    }

    // Detect kill count (e.g., &quot;You have completed your task! You killed 120 monsters.&quot;)
    if (msg.indexOf(&quot;you have completed your task&quot;) !== -1) {
        killsLeft = 0;
        state = STATES.TASK_COMPLETE;
        return;
    }

    // Detect single kill (monster death message or XP drop)
    if (msg.indexOf(&quot;your slayer assignment&quot;) !== -1 &amp;&amp; msg.indexOf(&quot;more to go&quot;) !== -1) {
        // Parse kills remaining
        var remaining = parseKillsRemaining(msg);
        if (remaining &gt;= 0) {
            killsLeft = remaining;
        }
        return;
    }

    // Detect superior spawn
    if (msg.indexOf(&quot;a superior foe has appeared&quot;) !== -1) {
        Game.sendGameMessage(&quot;Superior monster spawned!&quot;, &quot;SlayerBot&quot;);
        return;
    }

    // Detect death
    if (msg.indexOf(&quot;oh dear, you are dead&quot;) !== -1) {
        deathDetected = true;
        return;
    }

    // Detect level up
    if (msg.indexOf(&quot;congratulations, you just advanced&quot;) !== -1) {
        levelUpDetected = true;
        return;
    }

    // Detect task streaks
    if (msg.indexOf(&quot;you&#x27;ve completed&quot;) !== -1 &amp;&amp; msg.indexOf(&quot;in a row&quot;) !== -1) {
        // Task streak notification
        Game.sendGameMessage(&quot;Task streak tracked!&quot;, &quot;SlayerBot&quot;);
        return;
    }
}

function parseTaskFromMessage(message) {
    // Parse: &quot;Your new task is to kill 135 Blue Dragons.&quot;
    var msg = message;
    var lower = msg.toLowerCase();

    // Find the pattern
    var idx = -1;
    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {
        idx = lower.indexOf(TASK_CHAT_PATTERNS[p]);
        if (idx !== -1) {
            idx = idx + TASK_CHAT_PATTERNS[p].length;
            break;
        }
    }

    if (idx === -1) return;

    // Extract the rest: &quot; 135 Blue Dragons.&quot;
    var rest = msg.substring(idx).trim();
    // Remove trailing period
    if (rest.slice(-1) === &quot;.&quot;) {
        rest = rest.substring(0, rest.length - 1);
    }

    // Parse number and name
    var parts = rest.split(&quot; &quot;);
    if (parts.length &lt; 2) return;

    var count = parseInt(parts[0]);
    if (isNaN(count)) return;

    var monsterName = parts.slice(1).join(&quot; &quot;);

    killsLeft = count;
    currentTaskName = monsterName;
    totalKills = totalKills + count;

    botMsg(&quot;Parsed task: &quot; + count + &quot; x &quot; + monsterName, &quot;SlayerBot&quot;);
}

function parseKillsRemaining(msg) {
    // Parse: &quot;...120 more to go.&quot;
    var idx = msg.indexOf(&quot;more to go&quot;);
    if (idx === -1) return -1;

    // Work backwards to find the number
    var numStr = &quot;&quot;;
    var i = idx - 1;
    while (i &gt;= 0 &amp;&amp; msg.charAt(i) === &quot; &quot;) i--;
    while (i &gt;= 0 &amp;&amp; msg.charAt(i) &gt;= &quot;0&quot; &amp;&amp; msg.charAt(i) &lt;= &quot;9&quot;) {
        numStr = msg.charAt(i) + numStr;
        i--;
    }

    var num = parseInt(numStr);
    if (isNaN(num)) return -1;
    return num;
}

// =============================================================================
// NPC LOOT APPEARED -- Track kills when NPC dies (more reliable than chat)
// =============================================================================
function OnNPCLootAppeared(npc) {
    if (!currentTaskMonster || !npc) return;

    var npcId = -1;
    try {
        npcId = npc.getId();
    } catch (e) {
        return;
    }

    // Check if this NPC is our task
    var isTask = false;
    if (currentTaskMonster.npcIds) {
        for (var i = 0; i &lt; currentTaskMonster.npcIds.length; i++) {
            if (currentTaskMonster.npcIds[i] === npcId) {
                isTask = true;
                break;
            }
        }
    }

    // Also check superior monster IDs
    if (!isTask) {
        var superiorData = getSuperiorNpcId(currentTaskMonster.name);
        if (superiorData &amp;&amp; superiorData === npcId) {
            isTask = true;
        }
    }

    if (isTask) {
        killsLeft--;
        totalKills++;
        if (killsLeftOverlay) killsLeftOverlay.setValue(&quot;Kills Left: &quot; + Math.max(0, killsLeft));
        botMsg(&quot;Kill tracked! &quot; + killsLeft + &quot; &quot; + currentTaskMonster.name + &quot; remaining. Total kills: &quot; + totalKills, &quot;SlayerBot&quot;);

        if (killsLeft &lt;= 0) {
            botMsg(&quot;All kills complete!&quot;, &quot;SlayerBot&quot;);
            state = STATES.TASK_COMPLETE;
        }
    }
}

        if (barsInInv &gt;= 10) {

        }
        // Try to withdraw steel bars from bank
        withdrawBankItem(CANNONBALL_CRAFT.steelBar, 27);
        isExecuting = true;
        Utility.invokeLater(function() {
            var barsGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
            if (barsGot &gt;= 5) {
                Game.interact.bank.close();
                gatherCballState = &quot;SMITH_CBALLS&quot;;
            } else {
                // No steel bars in bank -- try to withdraw ores
                withdrawBankItem(CANNONBALL_CRAFT.ironOre, 9);
                withdrawBankItem(CANNONBALL_CRAFT.coal, 18);
                var ironGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
                if (ironGot &gt;= 3) {
                    Game.interact.bank.close();
                    gatherCballState = &quot;SMELT_BARS&quot;;
                } else {
                    // Nothing in bank -- need to mine
                    Game.interact.bank.close();
                    botMsg(&quot;[SlayerBot] No steel bars or ores in bank -- mining iron and coal&quot;, &quot;Bot&quot;);
                    gatherCballState = &quot;MINE_ORES&quot;;
                }
            }
            isExecuting = false;
        }, Utility.getDelay());

    }

    if (gatherCballState === &quot;MINE_ORES&quot;) {
        // Walk to Al Kharid mine (has both iron and coal rocks nearby)
        var minePos = SS_LOCATIONS.AL_KHARID_MINE;
        if (!isNear(minePos.x, minePos.y, 15)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(minePos.x, minePos.y, minePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }

        }

        var ironCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
        var coalCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);

        // Need 2 coal per iron for steel bars. Mine ~9 iron + 18 coal per trip
        if (ironCount &lt; 9) {
            // Mine iron
            var ironRock = Game.info.gameObject.getNearest(SS_OBJECTS.IRON_ROCK);
            if (ironRock &amp;&amp; PlayerHelper.isPlayerIdle()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(ironRock, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else if (coalCount &lt; (ironCount * 2)) {
            // Mine coal
            var coalRock = Game.info.gameObject.getNearest(SS_OBJECTS.COAL_ROCK);
            if (coalRock &amp;&amp; PlayerHelper.isPlayerIdle()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(coalRock, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else {
            // Have enough ores for a trip -- go smelt
            gatherCballState = &quot;SMELT_BARS&quot;;
        }

        // Full inventory -- bank or smelt
        if (Game.info.inventory.isFull()) {
            if (ironCount &gt;= 5 &amp;&amp; coalCount &gt;= (ironCount * 2)) {
                gatherCballState = &quot;SMELT_BARS&quot;;
            } else {
                gatherCballState = &quot;BANK_SUPPLIES&quot;;
            }
        }
        return;
    }

    if (gatherCballState === &quot;SMELT_BARS&quot;) {
        // Walk to Al Kharid furnace
        var furnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;
        if (!isNear(furnacePos.x, furnacePos.y, 10)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(furnacePos.x, furnacePos.y, furnacePos.z || 0));

                }, Utility.getDelay());
            }

        }

        // Smelt at furnace
        var ironInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
        var coalInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);
        if (ironInv &gt; 0 &amp;&amp; coalInv &gt;= 2 &amp;&amp; PlayerHelper.isPlayerIdle()) {
            var furnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);
            if (furnace) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(furnace, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    botMsg(&quot;[SlayerBot] Smelting steel bars for cannonballs&quot;, &quot;Bot&quot;);
                    isExecuting = false;
                }, Utility.getDelay());

        } else if (ironInv &lt;= 0 || coalInv &lt; 2) {

            var steelBars = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
            if (steelBars &gt;= 5) {
                gatherCballState = &quot;SMITH_CBALLS&quot;;
            } else {
                // Need more ores
                gatherCballState = &quot;BANK_SUPPLIES&quot;;
            }
        }
        return;
    }

    if (gatherCballState === &quot;SMITH_CBALLS&quot;) {
        // Walk to Al Kharid furnace (cannonballs are smithed at furnace, not anvil)
        var smFurnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;
        if (!isNear(smFurnacePos.x, smFurnacePos.y, 10)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(smFurnacePos.x, smFurnacePos.y, smFurnacePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }

        // Smith cannonballs: use steel bar on furnace with ammo mould in inventory
        var steelCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
        if (steelCount &gt; 0 &amp;&amp; Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1) &amp;&amp; PlayerHelper.isPlayerIdle()) {
            var smFurnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);
            if (smFurnace) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    // Use steel bar on furnace to smith cannonballs

                    isExecuting = false;

        } else if (steelCount &lt;= 0) {

            if (newCballs &gt;= gatherCballTarget) {
                gatherCballState = &quot;CHECK&quot;;
                state = STATES.CHECK_SUPPLIES;
            } else {
                // Need more -- bank and get more bars/ores
                gatherCballState = &quot;BANK_SUPPLIES&quot;;
            }
        }
        return;
    }

    if (gatherCballState === &quot;GET_MOULD&quot;) {
        // Buy ammo mould from Nulodion at Dwarf Mines or GE
        // Simplest: try to withdraw from bank first
        if (!Game.info.bank.isOpen()) {
            _gt = tickCounter;
            if (_gt - bankOpenAttemptTick &lt; 5) return;
            bankOpenAttemptTick = _gt;
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest(0, true);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.close();
            if (Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {
                gatherCballState = &quot;CHECK&quot;;
            } else {
                botMsg(&quot;[SlayerBot] No ammo mould in bank -- trying GE&quot;, &quot;Bot&quot;);
                gatherCballState = &quot;BUY_GE&quot;;
            }
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    if (gatherCballState === &quot;BUY_GE&quot;) {
        // Walk to GE and buy cannonballs directly if we have GP
        var gePos = SS_LOCATIONS.GRAND_EXCHANGE;
        if (!isNear(gePos.x, gePos.y, 15)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(gePos.x, gePos.y, gePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }
        botMsg(&quot;[SlayerBot] At GE -- buy cannonballs manually or level Smithing to 35&quot;, &quot;Bot&quot;);
        gatherCballState = &quot;CHECK&quot;;
        state = STATES.CHECK_SUPPLIES;
        return;
    }
}

// TAKING_BREAK -- Human-like break handler
// =============================================================================
function handleTakingBreak() {
    currentStateOverlay.setValue(&quot;State: BREAK (&quot; + breakReason + &quot;)&quot;);

    // Check if break is over
    if (tickCounter &gt;= breakEndTick) {
        botMsg(&quot;[Break] Break over! Resuming play.&quot;, &quot;Bot&quot;);

        // Reset break timer for next break
        ticksSinceLastBreak = 0;
        var playMin = cfgVal(&quot;minPlayMinutes&quot;, 30);
        var playMax = cfgVal(&quot;maxPlayMinutes&quot;, 120);
        nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);
        breakScheduled = false;

        breakOverlay.setValue(&quot;Break: in ~&quot; + ticksToMinutes(nextBreakAtTick) + &quot;m&quot;);

        // Return to previous state
        state = stateBeforeBreak;
        return;
    }

    // During break: random idle actions every ~30 ticks to mimic AFK player
    if (tickCounter % 30 === 0) {
        var action = getRandomIdleAction();
        if (action === &quot;camera_rotate&quot;) {
            // Just a cosmetic log -- DZ handles camera
            // Real players sometimes move camera while AFK
        } else if (action === &quot;open_stats&quot;) {
            // Some players tab through interfaces while AFK
        } else if (action === &quot;open_inventory&quot;) {
            // Open inventory tab
        }
        // Most of the time: do nothing (standing idle)
    }

    // Random mouse micro-movements every ~100 ticks
    // This is just a status update -- DZ does not detect idle kicks
    if (tickCounter % 100 === 0) {
        var timeLeft = ticksToMinutes(breakEndTick - tickCounter);

}

// =============================================================================
// OUTSIDE_SCHEDULE -- Handles being outside play hours
// =============================================================================
function handleOutsideSchedule() {
    currentStateOverlay.setValue(&quot;State: OUTSIDE SCHEDULE&quot;);

    // Check if we are back in schedule
    if (cfgVal(&quot;enableSchedule&quot;, false)) {
        var schedStart = cfgVal(&quot;startHour&quot;, 8);
        var schedEnd = cfgVal(&quot;endHour&quot;, 22);
        if (isWithinSchedule(schedStart, schedEnd)) {
            botMsg(&quot;[Schedule] Back within play hours! Resuming.&quot;, &quot;Bot&quot;);
            scheduleOverlay.setValue(&quot;Schedule: Active&quot;);

            // Reset break timer for the new session
            ticksSinceLastBreak = 0;
            var playMin = cfgVal(&quot;minPlayMinutes&quot;, 30);
            var playMax = cfgVal(&quot;maxPlayMinutes&quot;, 120);
            nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);
            sessionStarted = true;

            // Return to previous state
            state = stateBeforeBreak;
            return;
        }
    }

    // If not logged out yet, walk to a bank and log out
    if (!outsideScheduleLogout) {
        // Bank inventory first to save all loot
        if (!Game.info.bank.isOpen()) {
            _gt = tickCounter;
            if (_gt - bankOpenAttemptTick &lt; 5) return;
            bankOpenAttemptTick = _gt;
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest(0, true);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }

        // Deposit everything
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.depositAllInventory();
            isExecuting = false;
        }, Utility.getDelay());

        Utility.invokeLater(function() {
            Game.interact.bank.close();
        }, Utility.getDelay());

        outsideScheduleLogout = true;
        botMsg(&quot;[Schedule] Banked items. Waiting for play hours to resume.&quot;, &quot;Bot&quot;);
        scheduleOverlay.setValue(&quot;Schedule: WAITING (banked items)&quot;);
        return;
    }

    // Already banked -- just idle and wait for schedule to resume
    // Check every ~200 ticks (2 minutes)
    if (tickCounter % 200 === 0) {
        var hour = getCurrentHour();
        scheduleOverlay.setValue(&quot;Schedule: OFF (hour &quot; + hour + &quot;) waiting...&quot;);
    }
}

function handleRepairBarrows() {
    switch (repairPhase) {
        case &quot;walk_to_bob&quot;:
            // Check if we have coins for repair (Barrows repair costs ~50k-120k GP)
            if (!Game.info.inventory.hasItem(COINS_ID, 1)) {

                    state = stateBeforeRepair;
                    return;

                Game.interact.bank.close();
                return;
            }

            // Walk to Bob&#x27;s Axes in Lumbridge
            var pos = Client.getLocalPlayer().getWorldLocation();
            var bobLoc = BOB_AXES_LOCATION;
            if (Math.abs(pos.getX() - bobLoc.x) &lt;= 5 &amp;&amp; Math.abs(pos.getY() - bobLoc.y) &lt;= 5) {

            } else {
                if (!PlayerHelper.isWebWalking()) {
                    PlayerHelper.webWalkTo(new WorldPoint(bobLoc.x, bobLoc.y, bobLoc.z));

                botMsg(&quot;[SlayerBot] Walking to Bob&#x27;s Axes in Lumbridge...&quot;, &quot;Bot&quot;);
            }
            break;

        case &quot;talk_to_bob&quot;:
            // Find Bob NPC
            var bob = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
            if (!bob) {
                botMsg(&quot;[SlayerBot] Can&#x27;t find Bob! Walking closer.&quot;, &quot;Bot&quot;);
                if (!PlayerHelper.isWebWalking()) {
                    PlayerHelper.webWalkTo(new WorldPoint(BOB_AXES_LOCATION.x, BOB_AXES_LOCATION.y, BOB_AXES_LOCATION.z));
                }
                return;
            }
            // Trade with Bob (second menu option: Talk-to / Trade)
            Game.interact.npc.action(bob, MenuAction.NPC_SECOND_OPTION);
            repairPhase = &quot;wait_for_shop&quot;;
            break;

        case &quot;wait_for_shop&quot;:
            // Wait for repair interface to open (takes a tick or two)
            // The repair uses &quot;Trade&quot; option which opens shop
            // For Barrows: right-click item in inventory -&gt; &quot;Use&quot; on Bob
            // Actually, Bob&#x27;s repair: Talk -&gt; &quot;I&#x27;d like to trade&quot; -&gt; Use broken item on Bob
            // Simpler approach: use items on Bob directly
            repairPhase = &quot;repair_items&quot;;
            break;

        case &quot;repair_items&quot;:
            // Find all barrows items that need repair in inventory
            var repairNeeded = checkEquippedBarrowsCondition();
            if (repairNeeded.length === 0) {
                // Check inventory too
                var invRepairNeeded = false;
                for (var slot = 0; slot &lt; 28; slot++) {
                    // This would require iterating inventory -- for now check known barrows IDs
                }
                botMsg(&quot;[SlayerBot] All Barrows gear repaired! Returning to task.&quot;, &quot;Bot&quot;);
                repairPhase = &quot;done&quot;;
                return;
            }

            // For equipped items: unequip first, then use on Bob
            // For now, use the NPC_FIRST_OPTION (Talk-to) which offers repair dialogue
            var bob2 = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
            if (!bob2) {
                repairPhase = &quot;walk_to_bob&quot;;
                return;
            }

            // Use the repair option through dialogue
            // Bob offers: &quot;Shall I repair that for you?&quot; when you use a broken item on him
            // Use actionItem to &quot;Use&quot; barrows piece, then click on Bob
            var itemToRepair = repairNeeded[0];
            try {
                // Use the broken item on Bob via inventory action
                Game.interact.inventory.useItem(itemToRepair.itemId, MenuAction.WIDGET_TARGET);
                Utility.invokeLater(function() {
                    var bobNpc = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
                    if (bobNpc) {
                        Game.interact.npc.action(bobNpc, MenuAction.NPC_FIRST_OPTION);
                    }
                }, Utility.getDelay());
                botMsg(&quot;[SlayerBot] Repairing &quot; + itemToRepair.piece + &quot;...&quot;, &quot;Bot&quot;);
            } catch (e) {
                botMsg(&quot;[SlayerBot] Repair error: &quot; + e + &quot;. Trying dialogue method.&quot;, &quot;Bot&quot;);
                // Fallback: talk to Bob
                Game.interact.npc.action(bob2, MenuAction.NPC_FIRST_OPTION);
            }
            repairPhase = &quot;wait_repair_done&quot;;
            break;

        case &quot;wait_repair_done&quot;:
            // Check if the item was repaired (ID should change from 25% to 100%)
            var stillBroken = checkEquippedBarrowsCondition();
            if (stillBroken.length &gt; 0) {
                // Still items to repair -- cycle back
                repairPhase = &quot;repair_items&quot;;
            } else {
                repairPhase = &quot;done&quot;;
            }
            break;

        case &quot;done&quot;:
            botMsg(&quot;[SlayerBot] Barrows repair complete! Returning to previous task.&quot;, &quot;Bot&quot;);
            state = stateBeforeRepair;
            repairPhase = &quot;walk_to_bob&quot;;
            break;

        default:
            repairPhase = &quot;walk_to_bob&quot;;
            break;
    }
}

var codeText = "// =============================================================================\n// AUTO SLAYER BOT v24 -- MAIN STATE MACHINE\n// =============================================================================\n// The brain of the slayer bot. Implements a full autonomous state machine that:\n//   1. Selects the best slayer master based on combat/slayer levels\n//   2. Walks to master, gets a task assignment\n//   3. Banks for supplies (food, potions, special items, gear)\n//   4. Walks to monster location and fights until task is complete\n//   5. Handles special kill mechanics, loot, bones, prayer\n//   6. Self-sufficiency: crafts arrows, brews potions, runecrafts\n//   7. Advanced combat: safespots, superiors, bracelets, cannon\n//   8. Loops forever -- completing task after task\n// =============================================================================\n\n// -----------------------------------------------------------------------------\n// SAFE CONFIG READER - prevents crash when config property is missing\n// -----------------------------------------------------------------------------\nfunction cfgVal(name, defaultVal) {\n    if (config && config[name] && typeof config[name].getValue === \"function\") {\n        var v = config[name].getValue();\n        if (v !== null && v !== undefined) {\n            return v;\n        }\n    }\n    return defaultVal;\n}\n\n// -----------------------------------------------------------------------------\n// STATE DEFINITIONS\n// -----------------------------------------------------------------------------\nvar STATES = {\n    // === CORE SLAYER LOOP ===\n    STARTUP: \"STARTUP\",\n    CHECK_STATS: \"CHECK_STATS\",\n    CHECK_GEM: \"CHECK_GEM\",\n    WAIT_GEM_RESPONSE: \"WAIT_GEM_RESPONSE\",\n    SELECT_MASTER: \"SELECT_MASTER\",\n    WALK_TO_MASTER: \"WALK_TO_MASTER\",\n    TALK_TO_MASTER: \"TALK_TO_MASTER\",\n    WAIT_FOR_TASK: \"WAIT_FOR_TASK\",\n    READ_TASK: \"READ_TASK\",\n    CHECK_SUPPLIES: \"CHECK_SUPPLIES\",\n    WALK_TO_BANK: \"WALK_TO_BANK\",\n    BANK_SUPPLIES: \"BANK_SUPPLIES\",\n    WALK_TO_GE: \"WALK_TO_GE\",\n    BUY_AT_GE: \"BUY_AT_GE\",\n    WALK_TO_TASK: \"WALK_TO_TASK\",\n    FIGHT_TASK: \"FIGHT_TASK\",\n    SPECIAL_FINISH: \"SPECIAL_FINISH\",\n    EAT_FOOD: \"EAT_FOOD\",\n    DRINK_PRAYER: \"DRINK_PRAYER\",\n    LOOT_ITEMS: \"LOOT_ITEMS\",\n    BURY_BONES: \"BURY_BONES\",\n    TASK_COMPLETE: \"TASK_COMPLETE\",\n    HANDLE_DEATH: \"HANDLE_DEATH\",\n    HANDLE_LEVEL_UP: \"HANDLE_LEVEL_UP\",\n\n    // === SELF-SUFFICIENCY (existing) ===\n    GATHER_FOOD: \"GATHER_FOOD\",\n    COOK_FOOD: \"COOK_FOOD\",\n    GATHER_GEAR: \"GATHER_GEAR\",\n    TAN_HIDES: \"TAN_HIDES\",\n    CRAFT_GEAR: \"CRAFT_GEAR\",\n    MINE_ORE: \"MINE_ORE\",\n    SMELT_ORE: \"SMELT_ORE\",\n    SMITH_GEAR: \"SMITH_GEAR\",\n    GATHER_RANGED: \"GATHER_RANGED\",\n    WALK_TO_GATHER: \"WALK_TO_GATHER\",\n\n    // === NEW v24 STATES ===\n    CRAFT_ARROWS: \"CRAFT_ARROWS\",\n    CRAFT_RUNES: \"CRAFT_RUNES\",\n    BREW_POTIONS: \"BREW_POTIONS\",\n    LEVEL_HERBLORE: \"LEVEL_HERBLORE\",\n    SAFESPOT_FIGHT: \"SAFESPOT_FIGHT\",\n    RECOVER_GRAVE: \"RECOVER_GRAVE\",\n    SETUP_CANNON: \"SETUP_CANNON\",\n    GATHER_CANNONBALLS: \"GATHER_CANNONBALLS\",\n\n    // === SCHEDULE + BREAK STATES ===\n    TAKING_BREAK: \"TAKING_BREAK\",\n    OUTSIDE_SCHEDULE: \"OUTSIDE_SCHEDULE\",\n    REPAIR_BARROWS: \"REPAIR_BARROWS\",\n\n    IDLE: \"IDLE\"\n};\n\n// -----------------------------------------------------------------------------\n// BOT STATE VARIABLES\n// -----------------------------------------------------------------------------\nvar state = STATES.STARTUP;\nvar isExecuting = false;\nvar actionCooldown = 0; // Ticks to wait after an action before allowing another\n// ---- IDLE CHECK HELPER ----\n// DZ API has NO .isIdle() on player! Use animation + movement check instead.\nfunction isPlayerIdle() {\n    var p = Client.getLocalPlayer();\n    if (!p) return false;\n    return p.getAnimation() === -1 && !PlayerHelper.isMoving() && !PlayerHelper.isWebWalking();\n}\n\nvar executingStuckTicks = 0;\nvar tickCounter = 0;\nvar stateTickCounter = 0;\nvar lastState = \"\";\n\n// Task info\nvar currentTaskName = \"\";\nvar currentTaskMonster = null;\nvar killsLeft = 0;\nvar totalKills = 0;\nvar tasksCompleted = 0;\nvar taskReceived = false;\nvar gemCheckDone = false;\nvar gemCheckTick = 0;\nvar noTaskFromGem = false;\nvar gemCheckAttempts = 0;\n\n// Master info\nvar selectedMaster = null;\n\n// Player stats (cached)\nvar combatLevel = 0;\nvar slayerLevel = 0;\nvar attackLevel = 0;\nvar strengthLevel = 0;\nvar defenceLevel = 0;\nvar hitpointsLevel = 0;\nvar prayerLevel = 0;\nvar rangedLevel = 0;\nvar magicLevel = 0;\nvar herbloreLevel = 0;\nvar fletchingLevel = 0;\nvar smithingLevel = 0;\nvar miningLevel = 0;\nvar runecraftingLevel = 0;\nvar fishingLevel = 0;\nvar cookingLevel = 0;\n\n// Banking\nvar bankTarget = null;\nvar needsRestock = false;\nvar missingItems = [];\nvar needGemFromBank = false;\nvar gatherToolNeeded = 0;  // Item ID of tool needed for current gather operation\nvar postBankState = null;  // State to transition to after closing bank\nvar gatherFoodTier = null; // Current food tier being gathered (prevents log spam)\nvar gatherLastClickTick = 0; // Last tick we clicked a gather spot (re-click timer)\nvar walkCooldown = 0; // Walk cooldown for gather states (10-tick min between webWalkTo calls)\nvar currentState = \"\"; // Current state name string for logging\nvar isOnBreak = false; // Whether the bot is currently on a human-like break\nvar gatherFoodCount = 0; // Number of food items gathered so far\nvar gatherGearPhase = \"\"; // Phase of gear gathering (\"leather\" or \"metal\")\nvar leatherPhase = \"\"; // Phase of leather crafting (\"killing\", \"tanning\", etc)\n\n// Timeouts\nvar stateTimeout = 0;\nvar waitTicks = 0;\nvar retryCount = 0;\nvar maxRetries = 3;\n\n// Loot tracking\nvar lootQueue = [];\n\n// Death detection\nvar previousHP = 0;\nvar deathDetected = false;\nvar deathLocation = null;\n\n// Level up handling\nvar levelUpDetected = false;\n\n// v24: Turael boosting\nvar turaelStreakCount = 0;\n\n// v24: Combat boost monitoring\nvar ticksSinceAntifire = 0;\nvar ticksSinceAntipoison = 0;\nvar ticksSinceCombatPot = 0;\n\n// v24: Cannon\nvar cannonPlaced = false;\nvar cannonX = 0;\nvar cannonY = 0;\n\n// v24: Arrow crafting\nvar arrowCraftPhase = \"idle\";\nvar arrowCraftTier = null;\nvar arrowCraftCount = 0;\n\n// v24: Runecrafting\nvar runecraftPhase = \"idle\";\nvar neededRunes = [];\nvar rcEssenceCount = 0;\n\n// v24: Potion brewing\nvar brewPhase = \"idle\";\nvar brewTarget = null;\nvar brewCount = 0;\n\n// v24: Herblore leveling\nvar herbloreTargetLevel = 0;\n\n// v24: Safespot\nvar usingSafespot = false;\n\n// v24: Previous state for supply interrupts\nvar stateBeforeInterrupt = \"\";\nvar interruptReturnState = \"\";\n\n// v24: Schedule + Break system\nvar ticksSinceLastBreak = 0;\nvar nextBreakAtTick = 0;\nvar breakEndTick = 0;\nvar breakReason = \"\";\nvar stateBeforeBreak = \"\";\nvar breakScheduled = false;\nvar outsideScheduleLogout = false;\nvar sessionStarted = false;\nvar totalBreaksTaken = 0;\nvar lastBreakDurationMins = 0;\n\n// v24: Barrows repair tracking\nvar repairPhase = \"walk_to_bob\"; // walk_to_bob, open_shop, repair_items, done\nvar stateBeforeRepair = \"\";\nvar repairCheckInterval = 500; // check every 500 ticks (~5 min)\nvar ticksSinceRepairCheck = 0;\n\n// v24: Self-sufficiency vars (shared with UTILITIES)\nvar gatherBankPhase = 0;\n\n// Anti-spam: deduplicate bot messages\nvar lastBotMsg = \"\";\nfunction botMsg(msg, prefix) {\n    if (msg === lastBotMsg) return;\n    lastBotMsg = msg;\n    botMsg(msg, prefix || \"SlayerBot\");\n}\n\n\n// -----------------------------------------------------------------------------\n// CONFIG ITEMS (declared in DZ config panel)\n// -----------------------------------------------------------------------------\n// config.masterPreference       -- \"Auto\", \"Turael\", \"Krystilia\", etc.\n// config.foodType               -- Food item ID to use\n// config.minFood                -- Minimum food for tasks (default: 8)\n// config.usePrayer              -- Boolean: use protection prayers\n// config.buryBones              -- Boolean: bury bones from kills\n// config.lootMinValue           -- Minimum loot GP value (default: 250)\n// config.specialFinish          -- Boolean: use spec items (rock hammer, ice cooler)\n// config.trainingFocus          -- \"Attack\", \"Strength\", \"Defence\", \"Shared\"\n// config.attackCap              -- Max attack level before switching\n// config.strengthCap            -- Max strength level before switching\n// config.defenceCap             -- Max defence level before switching\n// config.selfSufficient         -- Boolean: craft own gear/food/supplies\n// config.useSpecialAttack       -- Boolean: use special attack weapon\n// config.turaelBoosting         -- Boolean: use Turael boosting strategy\n// config.useCannon              -- Boolean: use dwarf multicannon\n// config.useSafespots           -- Boolean: use safespots when available\n// config.useRanged              -- Boolean: allow ranged combat\n// config.useMagic               -- Boolean: allow magic combat\n\n// -----------------------------------------------------------------------------\n// OVERLAY ITEMS (displayed on DZ overlay panel)\n// -----------------------------------------------------------------------------\n// overlay.botState              -- Current state display\n// overlay.taskInfo              -- Current task and kills left\n// overlay.masterInfo            -- Selected slayer master\n// overlay.combatInfo            -- Combat style + stats\n// overlay.killCount             -- Total kills across all tasks\n// overlay.taskCount             -- Tasks completed\n// overlay.runtime               -- How long bot has been running\n// overlay.supplyInfo            -- Supply status\n\n// -------- Bone IDs --------\n\n// -------- Food healing lookup --------\nvar FOOD_HEALING = {};\nFOOD_HEALING[315] = 4;    // Shrimps\nFOOD_HEALING[325] = 5;    // Sardine\nFOOD_HEALING[329] = 7;    // Salmon\nFOOD_HEALING[333] = 9;    // Trout\nFOOD_HEALING[365] = 11;   // Bass\nFOOD_HEALING[379] = 12;   // Lobster\nFOOD_HEALING[373] = 16;   // Swordfish\nFOOD_HEALING[385] = 20;   // Shark\nFOOD_HEALING[7946] = 16;  // Monkfish\n\n// -------- Potion IDs (dose 1-4 groups) --------\n// VERIFIED vs OSRS Wiki -- each dose has unique item ID (NOT sequential!)\nvar SUPER_COMBAT_POTS = [12695, 12697, 12699, 12701]; // (4),(3),(2),(1)\nvar SUPER_ATTACK_POTS = [2436, 145, 147, 149];         // (4),(3),(2),(1) -- wiki verified\nvar SUPER_STRENGTH_POTS = [2440, 157, 159, 161];       // (4),(3),(2),(1) -- wiki verified\nvar SUPER_DEFENCE_POTS = [2442, 163, 165, 167];        // (4),(3),(2),(1) -- wiki verified\nvar ATTACK_POTS = [2428, 121, 123, 125];               // (4),(3),(2),(1) -- wiki verified\nvar STRENGTH_POTS = [113, 115, 117, 119];              // (4),(3),(2),(1) -- wiki verified\nvar DEFENCE_POTS = [2432, 133, 135, 137];              // (4),(3),(2),(1) -- wiki verified\nvar PRAYER_POTS = [2434, 139, 141, 143];               // (4),(3),(2),(1) -- wiki verified\nvar ANTIFIRE_POTS = [2452, 2454, 2456, 2458];          // (4),(3),(2),(1) -- wiki verified\nvar EXTENDED_ANTIFIRE_POTS = [11951, 11953, 11955, 11957]; // wiki verified\nvar SUPER_ANTIFIRE_POTS = [21978, 21981, 21984, 21987];   // wiki verified\nvar SUPER_RESTORE_POTS = [3024, 3026, 3028, 3030];        // wiki verified\nvar RANGING_POTS = [2444, 169, 171, 173];                  // wiki verified\nvar MAGIC_POTS = [3040, 3042, 3044, 3046];                 // wiki verified\nvar SARADOMIN_BREW_POTS = [6685, 6687, 6689, 6691];       // wiki verified\n\n// -------- Antipoison arrays from UTILITIES --------\n// ANTIVENOM_IDS, ANTIVENOM_PLUS_IDS, SUPER_ANTIPOISON_IDS are in UTILITIES\n\n// -------- Special finish items --------\nvar ROCK_HAMMER_ID = 4162;\nvar ICE_COOLER_ID = 6696;\nvar MIRROR_SHIELD_ID = 4156;\nvar LEAF_BLADED_SPEAR_ID = 4158;\nvar LEAF_BLADED_SWORD_ID = 11902;\nvar LEAF_BLADED_BAXE_ID = 20727;\nvar FUNGICIDE_SPRAY_ID = 7421;\nvar WITCHWOOD_ICON_ID = 8923;\n\n// -------- Spec weapon sets --------\nvar DDS_ID = 5698;\n\n// -------- Poisoning monsters --------\nvar POISON_MONSTERS = [\n    \"aberrant spectre\", \"cave crawler\", \"jungle horror\", \"poison spider\",\n    \"cave horror\", \"kalphite\", \"scorpion\", \"tribesman\", \"fever spider\",\n    \"infernal mage\", \"dust devil\"\n];\n\n// -------- Dragon tasks --------\nvar DRAGON_TASKS = [\n    \"blue dragon\", \"green dragon\", \"red dragon\", \"black dragon\",\n    \"bronze dragon\", \"iron dragon\", \"steel dragon\", \"mithril dragon\",\n    \"adamant dragon\", \"rune dragon\", \"skeletal wyvern\", \"fossil island wyvern\"\n];\n\n// -------- Tasks needing special items to finish --------\nvar GARGOYLE_IDS = [412, 413];\nvar ROCKSLUG_IDS = [421, 422];\nvar DESERT_LIZARD_IDS = [458, 459, 460, 461];\nvar ZYGOMITE_IDS = [537, 1024];\n\n// -------- Task names for detecting current task --------\nvar TASK_CHAT_PATTERNS = [\n    \"your new task is to kill\",\n    \"you are currently assigned to kill\",\n    \"you're currently assigned to kill\",\n    \"you're assigned to kill\",\n    \"your current assignment is to kill\",\n    \"your task is to kill\"\n];\n\n// -------- Lumbridge spawn --------\nvar LUMBRIDGE_SPAWN = {x: 3222, y: 3218, plane: 0};\n\n// -------- Emergency teleport threshold --------\nvar EMERGENCY_HP_THRESHOLD = 10;\n\n// -------- GE location --------\nvar GE_LOCATION = {x: 3165, y: 3487, plane: 0};\n\n// =============================================================================\n// OnStart -- Called when the script is started. Required by DZ.\n// =============================================================================\nfunction OnStart() {\n    botMsg(\"[Slayer] Auto Slayer Bot v24 starting up...\", \"BOT\");\n    currentState = STATES.STARTUP;\n    tickCounter = 0;\n    ticksSinceLastBreak = 0;\n    isOnBreak = false;\n    isExecuting = false;\n    botMsg(\"[Slayer] Initialized. Waiting for first game tick...\", \"BOT\");\n}\n\n// =============================================================================\n// OnGameTick -- Called every game tick (~600ms). Core dispatch loop.\n// =============================================================================\nfunction OnGameTick() {\n  try {\n    var gt, _gt;\n    tickCounter++;\n    ticksSinceLastBreak++;\n    ticksSinceAntifire++;\n    ticksSinceAntipoison++;\n    ticksSinceCombatPot++;\n\n    // Tick 1 diagnostic \u2014 confirms OnGameTick is running\n    if (tickCounter === 1) {\n        Game.sendGameMessage(\"[ROTS] OnGameTick ALIVE - tick 1 - state: \" + state, \"[DIAG]\");\n    }\n    if (tickCounter === 5) {\n        Game.sendGameMessage(\"[ROTS] Tick 5 - state: \" + state, \"[DIAG]\");\n    }\n\n    if (isExecuting) {\n        stateTimeout++;\n        if (stateTimeout > 30) {\n            isExecuting = false;\n            stateTimeout = 0;\n            botMsg(\"State timeout - resetting execution lock\", \"SlayerBot\");\n        }\n        return;\n    }\n    if (actionCooldown > 0) {\n        actionCooldown--;\n        return;\n    }\n\n    // ================================================================\n    // SCHEDULE CHECK -- Are we within play hours?\n    // ================================================================\n    if (cfgVal(\"enableSchedule\", false)) {\n        var schedStart = cfgVal(\"startHour\", 8);\n        var schedEnd = cfgVal(\"endHour\", 22);\n        if (!isWithinSchedule(schedStart, schedEnd)) {\n            if (state !== STATES.OUTSIDE_SCHEDULE && state !== STATES.TAKING_BREAK) {\n                stateBeforeBreak = state;\n                state = STATES.OUTSIDE_SCHEDULE;\n                outsideScheduleLogout = false;\n                botMsg(\"[Schedule] Outside play hours -- stopping\", \"Bot\");\n                scheduleOverlay.setValue(\"Schedule: OUTSIDE HOURS\");\n            }\n        } else {\n            scheduleOverlay.setValue(\"Schedule: Active\");\n        }\n    }\n\n    // ================================================================\n    // BREAK CHECK -- Time for a random human break?\n    // ================================================================\n    if (cfgVal(\"enableBreaks\", false) && state !== STATES.TAKING_BREAK && state !== STATES.OUTSIDE_SCHEDULE) {\n        // Initialize first break timer on session start\n        if (!sessionStarted) {\n            sessionStarted = true;\n            ticksSinceLastBreak = 0;\n            var initMin = cfgVal(\"minPlayMinutes\", 30);\n            var initMax = cfgVal(\"maxPlayMinutes\", 120);\n            nextBreakAtTick = calculateNextBreakDelay(initMin, initMax);\n            breakOverlay.setValue(\"Break: in ~\" + ticksToMinutes(nextBreakAtTick) + \"m\");\n        }\n\n        // Check if it is break time\n        if (ticksSinceLastBreak >= nextBreakAtTick) {\n            // Only break when safe -- not mid-combat or death\n            var safeToBreak = (state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT &&\n                state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE &&\n                state !== STATES.EAT_FOOD && state !== STATES.DRINK_PRAYER);\n\n            if (safeToBreak) {\n                stateBeforeBreak = state;\n                state = STATES.TAKING_BREAK;\n                breakReason = getRandomBreakReason();\n                var bMin = cfgVal(\"minBreakMinutes\", 3);\n                var bMax = cfgVal(\"maxBreakMinutes\", 15);\n                var duration = calculateBreakDuration(bMin, bMax);\n                breakEndTick = tickCounter + duration;\n                lastBreakDurationMins = ticksToMinutes(duration);\n                totalBreaksTaken++;\n                botMsg(\"[Break] \" + breakReason + \" (~\" + lastBreakDurationMins + \" min)\", \"Bot\");\n                breakOverlay.setValue(\"Break: \" + breakReason + \" (\" + lastBreakDurationMins + \"m)\");\n                return;\n            }\n        } else {\n            // Update countdown overlay\n            var remaining = nextBreakAtTick - ticksSinceLastBreak;\n            if (tickCounter % 100 === 0) {\n                breakOverlay.setValue(\"Break: in ~\" + ticksToMinutes(remaining) + \"m\");\n            }\n        }\n    }\n\n    // Update cached stats every 10 ticks\n    if (tickCounter % 10 === 0) {\n        updateCachedStats();\n    }\n\n    // Update overlay\n    updateOverlay();\n\n    // Track state changes\n    if (state !== lastState) {\n        stateTickCounter = 0;\n        lastState = state;\n        botMsg(\"State -> \" + state, \"SlayerBot\");\n    }\n    stateTickCounter++;\n\n    // Stuck detection: if we are in a non-idle state for too long, reset\n    if (stateTickCounter > 500 && state !== STATES.IDLE && state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT) {\n        botMsg(\"Stuck in \" + state + \" for 500 ticks, resetting to CHECK_STATS\", \"SlayerBot\");\n        state = STATES.CHECK_STATS;\n        stateTickCounter = 0;\n        retryCount = 0;\n    }\n\n    // Death detection: check if we are at Lumbridge spawn\n    if (state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE && state !== STATES.STARTUP) {\n        if (isAtDeathSpawn()) {\n            if (state === STATES.FIGHT_TASK || state === STATES.SAFESPOT_FIGHT || state === STATES.WALK_TO_TASK) {\n                botMsg(\"Death detected! Saving death location.\", \"SlayerBot\");\n                state = STATES.HANDLE_DEATH;\n                return;\n            }\n        }\n    }\n\n    // Level up detection\n    if (levelUpDetected) {\n        levelUpDetected = false;\n        updateCachedStats();\n    }\n\n    // =========================================================================\n    // PERIODIC BARROWS REPAIR CHECK (every ~30 sec)\n    // =========================================================================\n    ticksSinceRepairCheck++;\n    if (ticksSinceRepairCheck >= repairCheckInterval && state !== STATES.REPAIR_BARROWS &&\n        state !== STATES.TAKING_BREAK && state !== STATES.OUTSIDE_SCHEDULE &&\n        state !== STATES.STARTUP && state !== STATES.CHECK_STATS && state !== STATES.CHECK_GEM && state !== STATES.WAIT_GEM_RESPONSE) {\n        ticksSinceRepairCheck = 0;\n        var repairItems = checkEquippedBarrowsCondition();\n        if (repairItems.length > 0) {\n            botMsg(\"[SlayerBot] Barrows gear at 25%! Heading to Bob for repair.\", \"Bot\");\n            stateBeforeRepair = state;\n            repairPhase = \"walk_to_bob\";\n            state = STATES.REPAIR_BARROWS;\n        }\n    }\n\n    // =========================================================================\n    // STATE ROUTER\n    // =========================================================================\n    switch (state) {\n        case STATES.STARTUP:\n            handleStartup();\n            break;\n        case STATES.CHECK_STATS:\n            handleCheckStats();\n            break;\n        case STATES.CHECK_GEM:\n            handleCheckGem();\n            break;\n        case STATES.WAIT_GEM_RESPONSE:\n            handleWaitGemResponse();\n            break;\n        case STATES.SELECT_MASTER:\n            handleSelectMaster();\n            break;\n        case STATES.WALK_TO_MASTER:\n            handleWalkToMaster();\n            break;\n        case STATES.TALK_TO_MASTER:\n            handleTalkToMaster();\n            break;\n        case STATES.WAIT_FOR_TASK:\n            handleWaitForTask();\n            break;\n        case STATES.READ_TASK:\n            handleReadTask();\n            break;\n        case STATES.CHECK_SUPPLIES:\n            handleCheckSupplies();\n            break;\n        case STATES.WALK_TO_BANK:\n            handleWalkToBank();\n            break;\n        case STATES.BANK_SUPPLIES:\n            handleBankSupplies();\n            break;\n        case STATES.WALK_TO_GE:\n            handleWalkToGE();\n            break;\n        case STATES.BUY_AT_GE:\n            handleBuyAtGE();\n            break;\n        case STATES.WALK_TO_TASK:\n            handleWalkToTask();\n            break;\n        case STATES.FIGHT_TASK:\n            handleFightTask();\n            break;\n        case STATES.SAFESPOT_FIGHT:\n            handleSafespotFight();\n            break;\n        case STATES.SPECIAL_FINISH:\n            handleSpecialFinish();\n            break;\n        case STATES.EAT_FOOD:\n            handleEatFood();\n            break;\n        case STATES.DRINK_PRAYER:\n            handleDrinkPrayer();\n            break;\n        case STATES.LOOT_ITEMS:\n            handleLootItems();\n            break;\n        case STATES.BURY_BONES:\n            handleBuryBones();\n            break;\n        case STATES.TASK_COMPLETE:\n            handleTaskComplete();\n            break;\n        case STATES.HANDLE_DEATH:\n            handleDeath();\n            break;\n        case STATES.HANDLE_LEVEL_UP:\n            handleLevelUp();\n            break;\n        case STATES.GATHER_FOOD:\n            handleGatherFood();\n            break;\n        case STATES.COOK_FOOD:\n            handleCookFood();\n            break;\n        case STATES.GATHER_GEAR:\n            handleGatherGear();\n            break;\n        case STATES.TAN_HIDES:\n            handleTanHides();\n            break;\n        case STATES.CRAFT_GEAR:\n            handleCraftGear();\n            break;\n        case STATES.MINE_ORE:\n            handleMineOre();\n            break;\n        case STATES.SMELT_ORE:\n            handleSmeltOre();\n            break;\n        case STATES.SMITH_GEAR:\n            handleSmithGear();\n            break;\n        case STATES.GATHER_RANGED:\n            handleGatherRanged();\n            break;\n        case STATES.WALK_TO_GATHER:\n            handleWalkToGather();\n            break;\n        case STATES.CRAFT_ARROWS:\n            handleCraftArrows();\n            break;\n        case STATES.CRAFT_RUNES:\n            handleCraftRunes();\n            break;\n        case STATES.BREW_POTIONS:\n            handleBrewPotions();\n            break;\n        case STATES.LEVEL_HERBLORE:\n            handleLevelHerblore();\n            break;\n        case STATES.RECOVER_GRAVE:\n            handleRecoverGrave();\n            break;\n        case STATES.SETUP_CANNON:\n            handleSetupCannon();\n            break;\n        case STATES.GATHER_CANNONBALLS:\n            handleGatherCannonballs();\n            break;\n        case STATES.TAKING_BREAK:\n            handleTakingBreak();\n            break;\n        case STATES.OUTSIDE_SCHEDULE:\n            handleOutsideSchedule();\n            break;\n        case STATES.REPAIR_BARROWS:\n            handleRepairBarrows();\n            break;\n        case STATES.IDLE:\n            // Do nothing -- idle until manually restarted or state changed\n            break;\n        default:\n            botMsg(\"Unknown state: \" + state + \", resetting.\", \"SlayerBot\");\n            state = STATES.STARTUP;\n            break;\n    }\n  } catch (err) {\n    Game.sendGameMessage(\"[ROTS] ERROR in OnGameTick: \" + err, \"[ERR]\");\n    Game.sendGameMessage(\"[ROTS] State was: \" + state + \" | Tick: \" + tickCounter, \"[ERR]\");\n  }\n}\n\n// =============================================================================\n// OnShutdown -- Called when the bot is stopped.\n// =============================================================================\nfunction OnShutdown() {\n    botMsg(\"Slayer Bot v24 shutting down. Tasks: \" + tasksCompleted + \" | Kills: \" + totalKills, \"SlayerBot\");\n}\n\n// =============================================================================\n// UTILITY HELPERS\n// =============================================================================\n\nfunction updateCachedStats() {\n    combatLevel = getCombatLevel();\n    slayerLevel = Client.getRealSkillLevels(Skill.SLAYER);\n    attackLevel = Client.getRealSkillLevels(Skill.ATTACK);\n    strengthLevel = Client.getRealSkillLevels(Skill.STRENGTH);\n    defenceLevel = Client.getRealSkillLevels(Skill.DEFENCE);\n    hitpointsLevel = Client.getRealSkillLevels(Skill.HITPOINTS);\n    prayerLevel = Client.getRealSkillLevels(Skill.PRAYER);\n    rangedLevel = Client.getRealSkillLevels(Skill.RANGED);\n    magicLevel = Client.getRealSkillLevels(Skill.MAGIC);\n    herbloreLevel = Client.getRealSkillLevels(Skill.HERBLORE);\n    fletchingLevel = Client.getRealSkillLevels(Skill.FLETCHING);\n    smithingLevel = Client.getRealSkillLevels(Skill.SMITHING);\n    miningLevel = Client.getRealSkillLevels(Skill.MINING);\n    runecraftingLevel = Client.getRealSkillLevels(Skill.RUNECRAFT);\n    fishingLevel = Client.getRealSkillLevels(Skill.FISHING);\n    cookingLevel = Client.getRealSkillLevels(Skill.COOKING);\n}\n\nfunction updateOverlay() {\n    try {\n        currentStateOverlay.setValue(\"State: \" + state);\n        if (currentTaskName && killsLeft > 0) {\n            taskOverlay.setValue(\"Task: \" + currentTaskName + \" (\" + killsLeft + \" left)\");\n        } else {\n            taskOverlay.setValue(\"Task: None\");\n        }\n        if (selectedMaster) {\n            slayerMasterOverlay.setValue(\"Master: \" + selectedMaster.name);\n        } else {\n            slayerMasterOverlay.setValue(\"Master: None\");\n        }\n        combatInfoOverlay.setValue(\"Cmb: \" + combatLevel + \" | Slay: \" + slayerLevel);\n        killCountOverlay.setValue(\"Kills: \" + totalKills);\n        tasksCompletedOverlay.setValue(\"Tasks: \" + tasksCompleted);\n        var mins = Math.floor(tickCounter / 100);\n        runtimeOverlay.setValue(\"Runtime: ~\" + mins + \"m\");\n        supplyInfoOverlay.setValue(\"Food: \" + countFood() + \" | PPots: \" + countPrayerPots());\n    } catch (e) {\n        // Overlay might not be available\n    }\n}\n\nfunction isDragonTask(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i < DRAGON_TASKS.length; i++) {\n        if (lower.indexOf(DRAGON_TASKS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction canPoison(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i < POISON_MONSTERS.length; i++) {\n        if (lower.indexOf(POISON_MONSTERS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction getPlayerLocation() {\n    var loc = Client.getLocalPlayer().getWorldLocation();\n    return {x: loc.getX(), y: loc.getY(), plane: loc.getPlane()};\n}\n\nfunction hasClueScroll() {\n    for (var i = 0; i < CLUE_SCROLLS.length; i++) {\n        if (Game.info.inventory.hasItem(CLUE_SCROLLS[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction hasPotionInGroup(potGroup) {\n    for (var i = 0; i < potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction drinkPotionFromGroup(potGroup) {\n    for (var i = 0; i < potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) {\n            isExecuting = true;\n            var potId = potGroup[i];\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(potId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkCombatPotion() {\n    // Try super combat first, then super attack\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_ATTACK_POTS)) return true;\n    if (drinkPotionFromGroup(ATTACK_POTS)) return true;\n    return false;\n}\n\nfunction drinkStrengthPotion() {\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_STRENGTH_POTS)) return true;\n    if (drinkPotionFromGroup(STRENGTH_POTS)) return true;\n    return false;\n}\n\nfunction drinkAntifire() {\n    if (drinkPotionFromGroup(SUPER_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(EXTENDED_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    return false;\n}\n\nfunction drinkAntipoison() {\n    // From UTILITIES: ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS\n    var groups = [ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS];\n    for (var g = 0; g < groups.length; g++) {\n        if (drinkPotionFromGroup(groups[g])) {\n            ticksSinceAntipoison = 0;\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkRangingPotion() {\n    return drinkPotionFromGroup(RANGING_POTS);\n}\n\nfunction drinkMagicPotion() {\n    return drinkPotionFromGroup(MAGIC_POTS);\n}\n\nfunction eatFood() {\n    // Try the configured food first, then any known food\n    var foodId = 0;\n    try {\n        foodId = cfgVal(\"foodType\", 379);\n    } catch (e) {\n        foodId = 379; // Default lobster\n    }\n    if (Game.info.inventory.hasItem(foodId, 1)) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.consumeItem(foodId);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    // Try any known food\n    var foodKeys = Object.keys(FOOD_HEALING);\n    for (var i = 0; i < foodKeys.length; i++) {\n        var fid = parseInt(foodKeys[i]);\n        if (Game.info.inventory.hasItem(fid, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(fid);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkPrayerPot() {\n    if (drinkPotionFromGroup(SUPER_RESTORE_POTS)) return true;\n    if (drinkPotionFromGroup(PRAYER_POTS)) return true;\n    return false;\n}\n\nfunction useSpecialAttack() {\n    var specPercent = 0;\n    try { specPercent = Client.getSpecialAttackPercent(); } catch(e) { return; }\n    if (specPercent < 25) return;\n\n    // Check if we have a spec weapon\n    var specWeaponId = DDS_ID;\n    var specKeys = Object.keys(SPEC_WEAPONS);\n    for (var i = 0; i < specKeys.length; i++) {\n        var sw = dbLookup(SPEC_WEAPONS, specKeys[i]);\n        if (Game.info.inventory.hasItem(sw.id, 1)) {\n            specWeaponId = sw.id;\n            break;\n        }\n    }\n\n    if (Game.info.inventory.hasItem(specWeaponId, 1)) {\n        isExecuting = true;\n        var weapId = specWeaponId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.equipItem(weapId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction activatePrayer(monsterName) {\n    if (!cfgVal(\"usePrayer\", false)) return;\n    // Activate protection prayer based on monster type\n    // Most slayer monsters use melee; some use ranged/magic\n    try {\n        var prayerWidget = Game.info.widget.getWidget(541, 22); // Protect from Melee\n        if (prayerWidget) {\n            // Prayer already handled via prayer flicking -- just ensure protect melee is on\n        }\n    } catch(e) {}\n}\n\nfunction activateSpecificPrayer(prayerName) {\n    if (!prayerName) return;\n    try {\n        var prayerData = dbLookup(PRAYERS, prayerName);\n        if (prayerData) {\n            var widget = Game.info.widget.getWidget(541, prayerData.widgetChild);\n            if (widget) {\n                // Activate the prayer widget\n            }\n        }\n    } catch(e) {}\n}\n\n// =============================================================================\n// TASK DIFFICULTY CLASSIFIER -- determines supply needs by monster combat level\n// TRIVIAL = ghosts/chickens/rats, EASY = goblins/skeletons, MEDIUM = giants,\n// HARD = dragons/demons, BOSS = abyssal demons/gargoyles\n// =============================================================================\nfunction getTaskDifficulty() {\n    if (!currentTaskMonster) return \"MEDIUM\"; // default safe\n    var cmb = currentTaskMonster.combatLevel || 1;\n\n    if (cmb <= 25) return \"TRIVIAL\";   // ghosts(19), chickens, rats, cows, goblins\n    if (cmb <= 60) return \"EASY\";      // skeletons, zombies, hill giants\n    if (cmb <= 120) return \"MEDIUM\";   // fire giants, moss giants, bloodveld\n    if (cmb <= 200) return \"HARD\";     // dragons, greater demons, hellhounds\n    return \"BOSS\";                      // abyssal demons, gargoyles, kraken\n}\n\n// Returns how much food the player actually needs for this task\nfunction getDesiredFoodCount() {\n    var diff = getTaskDifficulty();\n    var kl = killsLeft || 10;\n\n    // Scale by difficulty AND kill count\n    if (diff === \"TRIVIAL\") {\n        // Ghosts, chickens, etc - barely need food\n        if (kl <= 15) return 2;\n        return 4;\n    }\n    if (diff === \"EASY\") {\n        if (kl <= 20) return 4;\n        return 6;\n    }\n    if (diff === \"MEDIUM\") {\n        if (kl <= 15) return 8;\n        return 12;\n    }\n    if (diff === \"HARD\") {\n        return 16; // dragons/demons hit hard\n    }\n    // BOSS\n    return 20;\n}\n\n// Returns how many prayer pots needed (0 if task doesnt warrant it)\nfunction getDesiredPrayerPotCount() {\n    var diff = getTaskDifficulty();\n    // TRIVIAL and EASY: never need prayer pots\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return 0;\n    // MEDIUM: only if config says use prayer\n    if (diff === \"MEDIUM\") {\n        if (!cfgVal(\"usePrayer\", false)) return 0;\n        return 1;\n    }\n    // HARD: always want prayer pots if available\n    if (diff === \"HARD\") return 2;\n    // BOSS\n    return 4;\n}\n\n// Does this task need combat potions?\nfunction taskNeedsCombatPots() {\n    var diff = getTaskDifficulty();\n    // TRIVIAL and EASY: waste of potions\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return false;\n    return true;\n}\n\n// Does this task warrant a cannon?\nfunction taskNeedsCannon() {\n    if (!cfgVal(\"useCannon\", false)) return false;\n    var diff = getTaskDifficulty();\n    // TRIVIAL/EASY: absolute waste of cannonballs\n    if (diff === \"TRIVIAL\" || diff === \"EASY\") return false;\n    // Only in multicombat\n    if (!currentTaskMonster) return false;\n    return shouldUseCannon(currentTaskMonster, true);\n}\n\n// Pick the best food tier player can actually fish/cook\n// Returns full fishing plan based on player's fishing + cooking level\n// Uses SS_FOOD_TIERS to pick best fish, tool, secondary items, and location\nfunction getFishingPlan(fishLvl) {\n    var cookLvl = 1;\n    try { cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1; } catch(e) {}\n    var bestTier = null;\n    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {\n        var t = SS_FOOD_TIERS[i];\n        if (t.method !== \"fish\") continue;\n        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {\n            bestTier = t;\n            break;\n        }\n    }\n    if (!bestTier) {\n        // Fallback to shrimps (tier 1) - always available\n        bestTier = SS_FOOD_TIERS[1];\n    }\n    return bestTier;\n}\n\n// Backward-compat wrapper: returns just the tool ID\nfunction getBestFishingTool(fishLvl) {\n    var plan = getFishingPlan(fishLvl);\n    return plan ? plan.toolId : 303;\n}\n\nfunction getBestFoodTierForPlayer() {\n    var cookLvl = 1;\n    var fishLvl = 1;\n    try {\n        cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;\n        fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;\n    } catch(e) {}\n\n    // Walk the food tiers backwards to find best player can use\n    var bestTier = null;\n    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {\n        var t = SS_FOOD_TIERS[i];\n        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {\n            // Skip quest-locked tiers player may not have\n            if (t.questRequired) continue;\n            bestTier = t;\n            break;\n        }\n    }\n    if (!bestTier) bestTier = SS_FOOD_TIERS[0]; // chicken fallback\n    return bestTier;\n}\n\nfunction needsArrows() {\n    if (!cfgVal(\"useRanged\", false)) return false;\n    var count = countArrows();\n    return count < 50;\n}\n\nfunction needsRunes() {\n    if (!cfgVal(\"useMagic\", false)) return false;\n    var count = countRunes();\n    return count < 50;\n}\n\nfunction selectMasterWithBoosting(cmb, slay) {\n    var pref = \"Auto\";\n    try { pref = cfgVal(\"masterPreference\", \"auto\"); } catch(e) {}\n\n    if (!cfgVal(\"turaelBoosting\", false)) {\n        return selectBestMaster(cmb, slay, pref);\n    }\n\n    turaelStreakCount++;\n    if (turaelStreakCount % 10 === 0) {\n        // 10th task: use highest master for bonus points\n        botMsg(\"Turael boosting: using highest master (task #\" + turaelStreakCount + \")\", \"SlayerBot\");\n        return selectBestMaster(cmb, slay, \"Auto\");\n    } else {\n        // Use Turael for quick easy tasks\n        botMsg(\"Turael boosting: using Turael (task #\" + turaelStreakCount + \")\", \"SlayerBot\");\n        return SLAYER_MASTERS.TURAEL;\n    }\n}\n\nfunction equipTaskBracelet(taskName) {\n    var quality = getTaskQuality(taskName);\n    if (quality === \"good\") {\n        if (Game.info.inventory.hasItem(BRACELET_SLAUGHTER.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_SLAUGHTER.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else if (quality === \"bad\") {\n        if (Game.info.inventory.hasItem(BRACELET_EXPEDITIOUS.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_EXPEDITIOUS.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction checkForSuperior() {\n    if (!currentTaskMonster) return null;\n    var superiorData = getSuperiorNpcId(currentTaskMonster.name);\n    if (!superiorData) return null;\n    var superior = Game.info.npc.getNearest([superiorData]);\n    if (superior && !superior.isDead()) {\n        return superior;\n    }\n    return null;\n}\n\nfunction pickUpLoot() {\n    var groundItems = null;\n    try { groundItems = Game.info.groundItem.getAll(); } catch(e) { return false; }\n    if (!groundItems || groundItems.length === 0) return false;\n\n    var playerLoc = getPlayerLocation();\n\n    for (var i = 0; i < groundItems.length; i++) {\n        var item = groundItems[i];\n        var itemId = item.getId();\n\n        // Distance check: only pick up items within 5 tiles\n        var itemLoc = item.getWorldLocation();\n        var dx = Math.abs(itemLoc.getX() - playerLoc.x);\n        var dy = Math.abs(itemLoc.getY() - playerLoc.y);\n        if (dx > 5 || dy > 5) continue;\n\n        // Always pick up: bones, clue scrolls\n        var isBone = ALL_BONE_IDS.indexOf(itemId) !== -1;\n        var isClue = CLUE_SCROLLS.indexOf(itemId) !== -1;\n\n        if (isBone && cfgVal(\"buryBones\", false)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        if (isClue) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        // Pick up stackable/notable items\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.groundItem.pickup(item);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    return false;\n}\n\nfunction setAttackStyle() {\n    var focus = \"Shared\";\n    try { focus = cfgVal(\"trainingFocus\", \"balanced\"); } catch(e) {}\n    var atkCap = 99;\n    var strCap = 99;\n    var defCap = 99;\n    try { atkCap = cfgVal(\"attackCap\", 99); } catch(e) {}\n    try { strCap = cfgVal(\"strengthCap\", 99); } catch(e) {}\n    try { defCap = cfgVal(\"defenceCap\", 99); } catch(e) {}\n\n    var desiredStyle = getAttackStyleForFocus(focus, atkCap, strCap, defCap, attackLevel, strengthLevel, defenceLevel);\n\n    // desiredStyle is a widget child index (0=Accurate/atk, 1=Aggressive/str, 2=Defensive/def, 3=Controlled)\n    try {\n        var widget = Game.info.widget.getWidget(593, desiredStyle);\n        if (widget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(widget, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\nfunction attackWithRangedOrMagic() {\n    if (!currentTaskMonster) return;\n    if (!isPlayerIdle()) return;\n    var npcIds = currentTaskMonster.ids;\n    if (!npcIds || npcIds.length === 0) return;\n\n    var target = Game.info.npc.getNearest(npcIds);\n    if (!target || target.isDead()) return;\n\n    isExecuting = true;\n    actionCooldown = 3;\n    Utility.invokeLater(function() {\n        Game.interact.npc.attack(target);\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\nfunction handleSurvivalChecks() {\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // Emergency eat\n    if (currentHP <= Math.floor(maxHP * 0.4)) {\n        eatFood();\n        return;\n    }\n\n    // Prayer check\n    if (cfgVal(\"usePrayer\", false)) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer <= 10) {\n            drinkPrayerPot();\n            return;\n        }\n    }\n\n    // Dragon task antifire\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {\n            drinkAntifire();\n        }\n    }\n\n    // Poison monsters antipoison\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {\n            drinkAntipoison();\n        }\n    }\n\n    // Combat potion re-dose\n    if (ticksSinceCombatPot > 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk <= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr <= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n    }\n}\n\nfunction saveDeathLocation() {\n    var loc = getPlayerLocation();\n    // Death location should be the PREVIOUS location, not Lumbridge\n    // We track it from FIGHT_TASK\n    if (currentTaskMonster) {\n        deathLocation = {\n            x: currentTaskMonster.x,\n            y: currentTaskMonster.y,\n            plane: currentTaskMonster.plane || 0\n        };\n    } else {\n        deathLocation = null;\n    }\n}\n\nfunction withdrawPotionFromBank(potGroup, qty) {\n    for (var i = 0; i < potGroup.length; i++) {\n        try {\n            Game.interact.bank.withdrawItem(potGroup[i], BankWithdrawType.WITHDRAW_ALL, false);\n            return true;\n        } catch(e) {}\n    }\n    return false;\n}\n\n// =============================================================================\n// CORE STATE HANDLERS\n// =============================================================================\n\n// ---- STARTUP ----\nfunction handleStartup() {\n    botMsg(\"Auto Slayer Bot v24 starting up!\", \"SlayerBot\");\n    updateCachedStats();\n    retryCount = 0;\n    isExecuting = false;\n\n    // FIRST: Check for enchanted gem in inventory -- if missing, bank for it\n    var hasGem = Game.info.inventory.hasItem(4155, 1);\n    if (!hasGem) {\n        botMsg(\"No enchanted gem in inventory! Banking to get one FIRST.\", \"SlayerBot\");\n        needGemFromBank = true;\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Check if we already have a task from previous run\n    if (currentTaskName && killsLeft > 0) {\n        botMsg(\"Resuming existing task: \" + currentTaskName + \" (\" + killsLeft + \" left)\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        // Check gem for existing task BEFORE anything else\n        botMsg(\"Checking for existing slayer task...\", \"SlayerBot\");\n        state = STATES.CHECK_GEM;\n    }\n}\n\n// ---- CHECK_STATS ----\nfunction handleCheckStats() {\n    updateCachedStats();\n    botMsg(\"Stats - Cmb:\" + combatLevel + \" Slay:\" + slayerLevel + \" Atk:\" + attackLevel + \" Str:\" + strengthLevel + \" Def:\" + defenceLevel, \"SlayerBot\");\n    botMsg(\"Stats - Rng:\" + rangedLevel + \" Mag:\" + magicLevel + \" Herb:\" + herbloreLevel + \" Fletch:\" + fletchingLevel + \" Smith:\" + smithingLevel, \"SlayerBot\");\n\n    // Set attack style based on training focus\n    setAttackStyle();\n\n    // Go to master to get/check task\n    state = STATES.SELECT_MASTER;\n}\n\n\n// ---- CHECK_GEM (check enchanted gem or slayer helm for existing task) ----\nfunction handleCheckGem() {\n    // If we already know we have a task (e.g., from previous run), skip\n    if (currentTaskName && killsLeft > 0) {\n        botMsg(\"Already have task: \" + currentTaskName + \" (\" + killsLeft + \" left)\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // If we already tried gem check 2+ times, skip to master\n    if (gemCheckAttempts >= 2) {\n        botMsg(\"Gem check failed \" + gemCheckAttempts + \" times - skipping to master\", \"SlayerBot\");\n        gemCheckAttempts = 0;\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    gemCheckDone = false;\n    noTaskFromGem = false;\n    gemCheckAttempts++;\n\n    // Check for enchanted gem (4155) in inventory or slayer helmet equipped\n    var hasGem = Game.info.inventory.hasItem(4155, 1);\n    var hasHelm = false;\n    try {\n        hasHelm = Game.info.equipment.hasItem(11864, 1) || Game.info.equipment.hasItem(11865, 1);\n    } catch(e) {}\n\n    if (hasGem) {\n        botMsg(\"Found enchanted gem - checking task (attempt \" + gemCheckAttempts + \")...\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.actionItem(4155, 3, MenuAction.CC_OP);\n            isExecuting = false;\n        }, Utility.getDelay());\n        gemCheckTick = tickCounter;\n        state = STATES.WAIT_GEM_RESPONSE;\n    } else if (hasHelm) {\n        botMsg(\"Slayer helm equipped - can check task via helm\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n    } else {\n        botMsg(\"No gem in inventory - going to bank to grab one\", \"SlayerBot\");\n        needGemFromBank = true;\n\n        bankPhase = 0;\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- WAIT_GEM_RESPONSE ----\nfunction handleWaitGemResponse() {\n    // Wait up to 15 ticks for chat response from gem check\n    var elapsed = tickCounter - gemCheckTick;\n\n    if (gemCheckDone) {\n        // Chat handler set the task info\n        gemCheckAttempts = 0;\n        if (currentTaskName && killsLeft > 0) {\n            botMsg(\"GEM FOUND TASK: \" + currentTaskName + \" (\" + killsLeft + \" left) - skipping master!\", \"SlayerBot\");\n            updateCachedStats();\n            state = STATES.CHECK_SUPPLIES;\n        } else {\n            botMsg(\"Gem check: no active task. Getting stats then going to master.\", \"SlayerBot\");\n            state = STATES.CHECK_STATS;\n        }\n        return;\n    }\n\n    if (noTaskFromGem) {\n        botMsg(\"Gem confirms: NO active task. Getting stats then going to master.\", \"SlayerBot\");\n        state = STATES.CHECK_STATS;\n        return;\n    }\n\n    if (elapsed > 15) {\n        botMsg(\"Gem check timed out after 15 ticks - going to master\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n    }\n}\n\n// ---- SELECT_MASTER ----\nfunction handleSelectMaster() {\n    selectedMaster = selectMasterWithBoosting(combatLevel, slayerLevel);\n\n    if (!selectedMaster) {\n        botMsg(\"Could not select a slayer master! Using Turael.\", \"SlayerBot\");\n        selectedMaster = SLAYER_MASTERS.TURAEL;\n    }\n\n    botMsg(\"Selected master: \" + selectedMaster.name, \"SlayerBot\");\n    state = STATES.WALK_TO_MASTER;\n}\n\n// ---- WALK_TO_MASTER ----\nvar masterWalkCooldown = 0;\nfunction handleWalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (isNear(selectedMaster.location.x, selectedMaster.location.y, 10)) {\n        state = STATES.TALK_TO_MASTER;\n        retryCount = 0;\n        masterWalkCooldown = 0;\n        return;\n    }\n\n    if (masterWalkCooldown > 0) {\n        masterWalkCooldown--;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        var masterX = selectedMaster.location.x;\n        var masterY = selectedMaster.location.y;\n        var masterPlane = selectedMaster.location.plane || 0;\n        masterWalkCooldown = 10;\n        Utility.invokeLater(function
