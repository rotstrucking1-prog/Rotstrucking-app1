() {\n            PlayerHelper.webWalkTo(new WorldPoint(masterX, masterY, masterPlane));\n        }, Utility.getDelay());\n    }\n}\n\n// ---- TALK_TO_MASTER ----\nfunction handleTalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Find the master NPC\n    var masterNpc = Game.info.npc.getNearest([selectedMaster.npcId]);\n    if (!masterNpc) {\n        // Not close enough, keep walking\n        if (retryCount < maxRetries) {\n            retryCount++;\n            state = STATES.WALK_TO_MASTER;\n        } else {\n            botMsg(\"Cannot find master NPC after retries, resetting.\", \"SlayerBot\");\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        }\n        return;\n    }\n\n    taskReceived = false;\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.npc.action(masterNpc, MenuAction.NPC_SECOND_OPTION);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    state = STATES.WAIT_FOR_TASK;\n    waitTicks = 0;\n}\n\n// ---- WAIT_FOR_TASK ----\nfunction handleWaitForTask() {\n    waitTicks++;\n\n    if (taskReceived) {\n        state = STATES.READ_TASK;\n        waitTicks = 0;\n        return;\n    }\n\n    // Handle dialog continuation -- check ALL OSRS dialog widgets\n    try {\n        // === AL KHARID TOLL GATE === Pay 10gp option\n        // Widget 219 = \"Select an Option\" dialogue; child 1 = first option (\"Yes\")\n        var optionWidget = Game.info.widget.getWidget(219, 1);\n        if (optionWidget) {\n            isExecuting = true;\n            botMsg(\"[SlayerBot] Toll gate detected - paying 10gp\", \"Bot\");\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(optionWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n\n        // NPC dialog (Turael talking)\n        var dialogWidget = Game.info.widget.getWidget(231, 4);\n        if (dialogWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(dialogWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Player dialog continue\n        var continueWidget = Game.info.widget.getWidget(217, 4);\n        if (continueWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(continueWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Simple notification continue\n        var notifWidget = Game.info.widget.getWidget(229, 2);\n        if (notifWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(notifWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Level up / notification continue\n        var levelWidget = Game.info.widget.getWidget(233, 3);\n        if (levelWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.action(levelWidget, MenuAction.WIDGET_CONTINUE);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    } catch (e) {}\n\n    if (waitTicks > 30) {\n        botMsg(\"Task not received after 30 ticks, retrying talk.\", \"SlayerBot\");\n        waitTicks = 0;\n        retryCount++;\n        if (retryCount > maxRetries) {\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        } else {\n            state = STATES.TALK_TO_MASTER;\n        }\n    }\n}\n\n// ---- READ_TASK ----\nfunction handleReadTask() {\n    if (!currentTaskName || killsLeft <= 0) {\n        botMsg(\"No valid task found, returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    botMsg(\"Task: Kill \" + killsLeft + \" \" + currentTaskName, \"SlayerBot\");\n\n    // Look up monster data\n    currentTaskMonster = findMonster(currentTaskName);\n    if (!currentTaskMonster) {\n        botMsg(\"WARNING: Unknown monster '\" + currentTaskName + \"', returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Equip task bracelet (expeditious or slaughter)\n    equipTaskBracelet(currentTaskName);\n\n    // v24: Check if safespot is available and configured\n    var safespotData = null;\n    if (cfgVal(\"useSafespots\", false)) {\n        safespotData = hasSafeSpot(currentTaskName);\n    }\n    if (safespotData) {\n        usingSafespot = true;\n        botMsg(\"Safespot available for \" + currentTaskName + \"!\", \"SlayerBot\");\n    } else {\n        usingSafespot = false;\n    }\n\n    // Move to supply check\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- CHECK_SUPPLIES (TIER-AWARE) ----\nfunction handleCheckSupplies() {\n    missingItems = [];\n    needsRestock = false;\n\n    var diff = getTaskDifficulty();\n    var monName = currentTaskMonster ? currentTaskMonster.name : \"unknown\";\n    botMsg(\"Task: \" + monName + \" (\" + killsLeft + \" left) | Difficulty: \" + diff, \"SlayerBot\");\n\n    // 0. Check coins -- always carry at least 250 GP\n    var coinCount = Game.info.inventory.getItemCount(995);\n    if (coinCount < 250) {\n        missingItems.push({type: \"coins\", current: coinCount, needed: 250});\n        needsRestock = true;\n    }\n\n    // 1. Check enchanted gem -- only need it if we don't know our task\n    // Once task is known, gem can stay in bank until logout\n    if (!currentTaskName && !Game.info.inventory.hasItem(4155, 1)) {\n        missingItems.push({type: \"gem\", current: 0, needed: 1});\n        needsRestock = true;\n    }\n\n    // 2. Check food -- scaled by difficulty\n    var foodCount = countFood();\n    var desiredFood = getDesiredFoodCount();\n    if (foodCount < desiredFood) {\n        missingItems.push({type: \"food\", current: foodCount, needed: desiredFood});\n        needsRestock = true;\n    }\n\n    // 3. Prayer pots -- only MEDIUM+ tasks\n    var desiredPpots = getDesiredPrayerPotCount();\n    if (desiredPpots > 0) {\n        var ppotCount = countPrayerPots();\n        if (ppotCount < desiredPpots) {\n            missingItems.push({type: \"prayer_pot\", current: ppotCount, needed: desiredPpots});\n            needsRestock = true;\n        }\n    }\n\n    // 4. Combat potions -- only MEDIUM+ tasks\n    if (taskNeedsCombatPots()) {\n        var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||\n                           hasPotionInGroup(SUPER_ATTACK_POTS) ||\n                           hasPotionInGroup(ATTACK_POTS);\n        if (!hasCombatPot) {\n            missingItems.push({type: \"combat_pot\", current: 0, needed: 1});\n            needsRestock = true;\n        }\n    }\n\n    // 5. Arrows (ranged users or safespot)\n    if (cfgVal(\"useRanged\", false) || usingSafespot) {\n        var arrowCount = countArrows();\n        if (arrowCount < 100) {\n            missingItems.push({type: \"arrows\", current: arrowCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // 6. Runes (magic users)\n    if (cfgVal(\"useMagic\", false)) {\n        var runeCount = countRunes();\n        if (runeCount < 100) {\n            missingItems.push({type: \"runes\", current: runeCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // 7. Antifire potions (dragon tasks only -- always HARD+)\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        var hasAntifire = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(ANTIFIRE_POTS);\n        if (!hasAntifire) {\n            missingItems.push({type: \"antifire\", current: 0, needed: 2});\n            needsRestock = true;\n        }\n    }\n\n    // 8. Antipoison (poison tasks only)\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        var hasAntipois = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||\n                          hasPotionInGroup(ANTIVENOM_IDS) ||\n                          hasPotionInGroup(SUPER_ANTIPOISON_IDS);\n        if (!hasAntipois) {\n            missingItems.push({type: \"antipoison\", current: 0, needed: 1});\n            needsRestock = true;\n        }\n    }\n\n    // 9. Cannonballs -- only MEDIUM+ multicombat\n    if (taskNeedsCannon()) {\n        var cballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n        if (cballs < 200) {\n            missingItems.push({type: \"cannonballs\", current: cballs, needed: CANNON.MIN_CANNONBALLS});\n            needsRestock = true;\n        }\n    }\n\n    // 10. Barrows gear condition -- repair at 25%\n    var barrowsRepairNeeded = checkEquippedBarrowsCondition();\n    if (barrowsRepairNeeded.length > 0) {\n        for (var br = 0; br < barrowsRepairNeeded.length; br++) {\n            botMsg(\"[SlayerBot] WARNING: \" + barrowsRepairNeeded[br].piece +\n                \" is at \" + barrowsRepairNeeded[br].condition + \"% - repair needed!\", \"Bot\");\n        }\n        stateBeforeRepair = state;\n        repairPhase = \"walk_to_bob\";\n        state = STATES.REPAIR_BARROWS;\n        return;\n    }\n\n    // 11. Special finish items (gargoyle/rockslug/lizard)\n    if (cfgVal(\"specialFinish\", false) && currentTaskMonster) {\n        var mn = currentTaskMonster.name.toLowerCase();\n        if (mn.indexOf(\"gargoyle\") !== -1 && !Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n            missingItems.push({type: \"special\", itemId: ROCK_HAMMER_ID, name: \"rock_hammer\"});\n            needsRestock = true;\n        }\n        if ((mn.indexOf(\"rockslug\") !== -1 || mn.indexOf(\"lizard\") !== -1) && !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n            missingItems.push({type: \"special\", itemId: ICE_COOLER_ID, name: \"ice_cooler\"});\n            needsRestock = true;\n        }\n    }\n\n    if (needsRestock) {\n        var types = [];\n        for (var mi = 0; mi < missingItems.length; mi++) { types.push(missingItems[mi].type); }\n        botMsg(diff + \" task needs: \" + types.join(\", \"), \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n    } else {\n        botMsg(diff + \" task - supplies OK! Heading to \" + monName + \".\", \"SlayerBot\");\n        state = STATES.WALK_TO_TASK;\n    }\n}\n\n// ---- WALK_TO_BANK ----\n// SIMPLIFIED: openNearest(0, true) handles BOTH walking AND opening!\n// No more coordinate lists, distance checks, or bankTarget needed.\nfunction handleWalkToBank() {\n    // If bank is already open (player manually opened or openNearest succeeded)\n    if (Game.info.bank.isOpen()) {\n        state = STATES.BANK_SUPPLIES;\n        waitTicks = 0;\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        // Trip 1 (gem) or Trip 2 (supplies)?\n        if (!currentTaskName && needGemFromBank) {\n            botMsg(\"Bank open - Trip 1: getting gem\");\n            bankPhase = 1; // gem retrieval flow\n        } else {\n            botMsg(\"Bank open - Trip 2: supply run\");\n            bankPhase = 10; // main supply run\n        }\n        return;\n    }\n\n    // If still walking to bank, wait\n    if (PlayerHelper.isWebWalking()) return;\n\n    // Don't spam - wait for previous action to complete\n    if (isExecuting) return;\n\n    // Call openNearest(0, true) - this walks to AND opens the nearest bank!\n    // distance=0 means maximum range, prioritize=true means booth > chest > npc\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        try {\n            Game.interact.bank.openNearest(0, true);\n        } catch(e) {\n            botMsg(\"openNearest error: \" + e.message);\n        }\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\n// ---- BANK_SUPPLIES ----\n// ============================================================\n// BANK FLOW \u2014 Brad's exact spec:\n// Trip 1 (task unknown only): open \u2192 get gem \u2192 close \u2192 check gem\n// Trip 2 (main supply run):   open \u2192 deposit gem \u2192 resource check\n//   if good: withdraw all supplies \u2192 close \u2192 go kill\n//   if bad:  grab gather tools + 250gp \u2192 close \u2192 go gather\n// ALL decisions made WHILE BANK IS OPEN \u2014 never close to think\n// ============================================================\nvar bankPhase = 0;\nvar withdrawQueue = [];\nvar bankOpenAttemptTick = 0;\nvar gatherNeeded = [];\nvar gatherToolsToWithdraw = []; // tools needed to go gather missing resources\n\nfunction handleBankSupplies() {\n    if (isExecuting) return;\n\n    // ---- MANUAL BANK OVERRIDE: Brad opens bank himself ----\n    if (bankPhase === 0 && Game.info.bank.isOpen()) {\n        botMsg(\"Bank detected - starting supply run\");\n        bankPhase = 10; // jump to main supply run deposit phase\n        waitTicks = 0;\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        return;\n    }\n\n    // ========================================================\n    // TRIP 1: GEM RETRIEVAL (only when task is unknown)\n    // Phases 1-5\n    // ========================================================\n\n    // Phase 1: Open bank for gem\n    if (bankPhase === 1) {\n        if (Game.info.bank.isOpen()) {\n            if (!Game.info.bank.setupCorrectly()) return;\n            bankPhase = 2;\n            waitTicks = 0;\n            return;\n        }\n        // Not open yet \u2014 let WALK_TO_BANK handle opening\n        if (tickCounter - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = tickCounter;\n        Game.interact.bank.openNearest(0, true);\n        return;\n    }\n\n    // Phase 2: Withdraw gem\n    if (bankPhase === 2) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 1; return; }\n        waitTicks++;\n        if (waitTicks < 3) return; // settle\n        if (Game.info.bank.hasItem(4155, 1)) {\n            botMsg(\"Withdrawing gem...\");\n            withdrawBankItem(4155, 1);\n            needGemFromBank = false;\n            bankPhase = 3;\n            waitTicks = 0;\n        } else {\n            botMsg(\"No gem in bank - going to master without it\");\n            needGemFromBank = false;\n            bankPhase = 4; // close and go to master\n            waitTicks = 0;\n            postBankState = STATES.SELECT_MASTER;\n        }\n        return;\n    }\n\n    // Phase 3: Close bank after gem withdrawal (need to close to check gem)\n    if (bankPhase === 3) {\n        waitTicks++;\n        if (waitTicks < 3) return; // let withdrawal settle\n        if (Game.info.bank.isOpen()) {\n            Game.interact.bank.close();\n        }\n        bankPhase = 35;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 3.5: Wait for bank to close, then go check gem\n    if (bankPhase === 35) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return; // still closing\n        botMsg(\"Bank closed. Checking gem...\");\n        bankPhase = 0;\n        waitTicks = 0;\n        state = STATES.CHECK_GEM;\n        return;\n    }\n\n    // Phase 4: Close bank and go to postBankState (gem not found path)\n    if (bankPhase === 4) {\n        if (Game.info.bank.isOpen()) {\n            Game.interact.bank.close();\n        }\n        bankPhase = 5;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 5: Wait for close then transition\n    if (bankPhase === 5) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return;\n        var ns = postBankState || STATES.SELECT_MASTER;\n        postBankState = null;\n        bankPhase = 0;\n        waitTicks = 0;\n        state = ns;\n        return;\n    }\n\n    // ========================================================\n    // TRIP 2: MAIN SUPPLY RUN (task is known)\n    // Phases 10-19\n    // ========================================================\n\n    // Phase 10: Open bank for supply run\n    if (bankPhase === 10) {\n        if (Game.info.bank.isOpen()) {\n            if (!Game.info.bank.setupCorrectly()) return;\n            bankPhase = 11;\n            waitTicks = 0;\n            return;\n        }\n        if (tickCounter - bankOpenAttemptTick < 5) return;\n        bankOpenAttemptTick = tickCounter;\n        Game.interact.bank.openNearest(0, true);\n        return;\n    }\n\n    // Phase 11: Deposit everything (including gem if we have it)\n    if (bankPhase === 11) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        botMsg(\"Depositing all inventory...\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.depositAllInventory();\n            isExecuting = false;\n        }, Utility.getDelay());\n        bankPhase = 12;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 12: Wait for deposit to settle, then do RESOURCE CHECK while bank is open\n    if (bankPhase === 12) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        waitTicks++;\n        if (waitTicks < 4) return;\n        waitTicks = 0;\n\n        // ---- RESOURCE CHECK (bank is open \u2014 we can see what we have) ----\n        withdrawQueue = [];\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n\n        var diff = getTaskDifficulty();\n\n        // --- Food ---\n        var foodId = cfgVal(\"foodType\", 379);\n        if (typeof foodId === \"string\") {\n            var FOOD_MAP = {\n                \"shrimps\": 315, \"shrimp\": 315, \"anchovies\": 319,\n                \"trout\": 333, \"salmon\": 329, \"tuna\": 361,\n                \"lobster\": 379, \"swordfish\": 373,\n                \"monkfish\": 7946, \"shark\": 385,\n                \"manta ray\": 391, \"karambwan\": 3144,\n                \"anglerfish\": 13441\n            };\n            foodId = FOOD_MAP[foodId.toLowerCase()] || 379;\n        }\n        var desiredFood = getDesiredFoodCount();\n        if (desiredFood > 0) {\n            if (Game.info.bank.hasItem(foodId, 1)) {\n                withdrawQueue.push({ id: foodId, qty: desiredFood, label: \"Food x\" + desiredFood });\n            } else {\n                gatherNeeded.push(\"food\");\n                // Get full fishing plan: tool + secondary + location\n                var fishLvl = Client.getRealSkillLevels(Skill.FISHING);\n                var fishPlan = getFishingPlan(fishLvl);\n                if (fishPlan) {\n                    gatherFoodTier = fishPlan;\n                    botMsg(\"Fish plan: \" + fishPlan.name + \" (tool: \" + fishPlan.toolRequired + \", location: \" + JSON.stringify(fishPlan.gatherLocation) + \")\");\n                    // Withdraw fishing tool\n                    if (fishPlan.toolId && Game.info.bank.hasItem(fishPlan.toolId, 1)) {\n                        gatherToolsToWithdraw.push({ id: fishPlan.toolId, qty: 1, label: fishPlan.toolRequired });\n                    }\n                    // Withdraw secondary (feathers for fly fishing, etc.)\n                    if (fishPlan.secondaryId && fishPlan.secondaryNeeded) {\n                        if (Game.info.bank.hasItem(fishPlan.secondaryId, 1)) {\n                            gatherToolsToWithdraw.push({ id: fishPlan.secondaryId, qty: fishPlan.secondaryNeeded, label: \"Fishing secondary x\" + fishPlan.secondaryNeeded });\n                        }\n                    }\n                }\n            }\n        }\n\n        // --- Prayer pots ---\n        var desiredPpots = getDesiredPrayerPotCount();\n        if (desiredPpots > 0) {\n            withdrawQueue.push({ id: \"ppot\", qty: desiredPpots, label: \"Prayer pots\", potion: true, group: PRAYER_POTS });\n        }\n\n        // --- Combat pots ---\n        if (taskNeedsCombatPots()) {\n            withdrawQueue.push({ id: \"combatpot\", qty: 1, label: \"Combat pot\", potion: true, group: SUPER_COMBAT_POTS, fallback1: SUPER_ATTACK_POTS, fallback2: ATTACK_POTS });\n        }\n\n        // --- Arrows ---\n        if (cfgVal(\"useRanged\", false) || usingSafespot) {\n            var bestArrow = getBestArrows(rangedLevel);\n            if (bestArrow) {\n                if (Game.info.bank.hasItem(bestArrow.id, 1)) {\n                    withdrawQueue.push({ id: bestArrow.id, qty: 500, label: \"Arrows x500\" });\n                } else {\n                    gatherNeeded.push(\"arrows\");\n                }\n            }\n        }\n\n        // --- Runes ---\n        if (cfgVal(\"useMagic\", false)) {\n            var spell = getBestSpell(magicLevel);\n            if (spell) {\n                var runes = getRunesForSpell(spell.key);\n                if (runes) {\n                    var runeKeys = Object.keys(runes);\n                    for (var r = 0; r < runeKeys.length; r++) {\n                        var runeId = parseInt(runeKeys[r]);\n                        var runeQty = runes[runeKeys[r]] * 200;\n                        if (Game.info.bank.hasItem(runeId, 1)) {\n                            withdrawQueue.push({ id: runeId, qty: runeQty, label: \"Rune \" + runeId });\n                        } else {\n                            gatherNeeded.push(\"runes\");\n                        }\n                    }\n                }\n            }\n        }\n\n        // --- Antifire (dragons) ---\n        if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n            withdrawQueue.push({ id: \"antifire\", qty: 2, label: \"Antifire\", potion: true, group: SUPER_ANTIFIRE_POTS, fallback1: EXTENDED_ANTIFIRE_POTS, fallback2: ANTIFIRE_POTS });\n        }\n\n        // --- Antipoison ---\n        if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n            withdrawQueue.push({ id: \"antipoison\", qty: 1, label: \"Antipoison\", potion: true, group: SUPER_ANTIPOISON_IDS });\n        }\n\n        // --- Cannonballs ---\n        if (cfgVal(\"useCannon\", false) && shouldUseCannon(currentTaskMonster, true)) {\n            if (Game.info.bank.hasItem(CANNON.CANNONBALL, 1)) {\n                withdrawQueue.push({ id: CANNON.CANNONBALL, qty: CANNON.MIN_CANNONBALLS, label: \"Cannonballs\" });\n            } else {\n                gatherNeeded.push(\"cannonballs\");\n            }\n        }\n\n        // --- Special items (rock hammer, ice cooler) ---\n        if (cfgVal(\"specialFinish\", false) && currentTaskMonster) {\n            var monName = currentTaskMonster.name.toLowerCase();\n            if (monName.indexOf(\"gargoyle\") !== -1 && Game.info.bank.hasItem(ROCK_HAMMER_ID, 1)) {\n                withdrawQueue.push({ id: ROCK_HAMMER_ID, qty: 1, label: \"Rock hammer\" });\n            }\n            if ((monName.indexOf(\"rockslug\") !== -1 || monName.indexOf(\"lizard\") !== -1) && Game.info.bank.hasItem(ICE_COOLER_ID, 1)) {\n                withdrawQueue.push({ id: ICE_COOLER_ID, qty: 1, label: \"Ice cooler\" });\n            }\n        }\n\n        // --- Coins (always 250gp) ---\n        if (Game.info.bank.hasItem(995, 1)) {\n            withdrawQueue.push({ id: 995, qty: 250, label: \"250 GP\" });\n        }\n\n        // ---- DECISION (while bank is still open!) ----\n        if (gatherNeeded.length > 0) {\n            // Bank doesn't have everything \u2014 switch to gather plan\n            botMsg(\"Missing from bank: \" + gatherNeeded.join(\", \") + \" \u2014 prepping gather run\");\n            // Replace withdraw queue with JUST gather tools + coins\n            withdrawQueue = [];\n            // Add gather tools\n            for (var g = 0; g < gatherToolsToWithdraw.length; g++) {\n                withdrawQueue.push(gatherToolsToWithdraw[g]);\n            }\n            // Always bring 250gp for travel\n            if (Game.info.bank.hasItem(995, 1)) {\n                withdrawQueue.push({ id: 995, qty: 250, label: \"250 GP (travel)\" });\n            }\n            // Route to first gather need\n            var firstNeed = gatherNeeded[0];\n            if (firstNeed === \"food\") {\n                postBankState = STATES.GATHER_FOOD;\n            } else if (firstNeed === \"arrows\") {\n                postBankState = STATES.CRAFT_ARROWS;\n            } else if (firstNeed === \"runes\") {\n                postBankState = STATES.CRAFT_RUNES;\n            } else if (firstNeed === \"cannonballs\") {\n                postBankState = STATES.GATHER_CANNONBALLS;\n            } else {\n                postBankState = STATES.WALK_TO_GE;\n            }\n        } else {\n            // Bank has everything \u2014 going to task!\n            botMsg(\"All supplies available! Withdrawing \" + withdrawQueue.length + \" items\");\n            missingItems = [];\n            postBankState = STATES.WALK_TO_TASK;\n        }\n\n        bankPhase = 13;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 13: Process withdraw queue \u2014 one item per tick, 2-tick spacing\n    if (bankPhase === 13) {\n        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }\n        if (withdrawQueue.length === 0) {\n            // Done withdrawing \u2014 go to close phase\n            bankPhase = 14;\n            waitTicks = 0;\n            return;\n        }\n        waitTicks++;\n        if (waitTicks % 2 !== 0) return; // 2-tick spacing\n\n        var item = withdrawQueue[0];\n        withdrawQueue.splice(0, 1);\n        botMsg(\"Withdrawing: \" + item.label);\n\n        if (item.potion) {\n            if (!withdrawPotionFromBank(item.group, item.qty)) {\n                if (item.fallback1 && !withdrawPotionFromBank(item.fallback1, item.qty)) {\n                    if (item.fallback2) {\n                        withdrawPotionFromBank(item.fallback2, item.qty);\n                    }\n                }\n            }\n        } else {\n            withdrawBankItem(item.id, item.qty);\n        }\n        return;\n    }\n\n    // Phase 14: Settle after withdrawals (4 ticks)\n    if (bankPhase === 14) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        waitTicks = 0;\n        bankPhase = 15;\n        return;\n    }\n\n    // Phase 15: Close bank\n    if (bankPhase === 15) {\n        if (Game.info.bank.isOpen()) {\n            botMsg(\"Closing bank...\");\n            Game.interact.bank.close();\n        }\n        bankPhase = 16;\n        waitTicks = 0;\n        return;\n    }\n\n    // Phase 16: Wait for close, then GO\n    if (bankPhase === 16) {\n        waitTicks++;\n        if (waitTicks < 4) return;\n        if (Game.info.bank.isOpen()) return; // still closing\n        \n        var nextState = postBankState || STATES.CHECK_SUPPLIES;\n        postBankState = null;\n        gatherNeeded = [];\n        gatherToolsToWithdraw = [];\n        bankPhase = 0;\n        waitTicks = 0;\n        botMsg(\"Bank done -> \" + nextState);\n        state = nextState;\n        return;\n    }\n}\n\nfunction withdrawBankItem(itemId, qty) {\n    try {\n        // Safety: itemId MUST be a number -- bank API crashes on strings\n        if (typeof itemId === \"string\") {\n            botMsg(\"WITHDRAW ERROR: itemId is a string ('\" + itemId + \"') not a number! Skipping.\");\n            return;\n        }\n        itemId = parseInt(itemId);\n        if (isNaN(itemId) || itemId <= 0) {\n            botMsg(\"WITHDRAW ERROR: invalid itemId \" + itemId + \"! Skipping.\");\n            return;\n        }\n        // CORRECT DZ API: withdrawItem(id, BankWithdrawType, allowDuplicate)\n        // 2nd arg = BankWithdrawType enum (NOT a number!)\n        // 3rd arg = boolean allowDuplicate\n        var amount = qty || 1;\n        var wType;\n        if (amount <= 0) {\n            wType = BankWithdrawType.WITHDRAW_ALL;\n        } else if (amount === 1) {\n            wType = BankWithdrawType.WITHDRAW_ONE;\n        } else if (amount <= 5) {\n            wType = BankWithdrawType.WITHDRAW_FIVE;\n        } else if (amount <= 10) {\n            wType = BankWithdrawType.WITHDRAW_TEN;\n        } else {\n            wType = BankWithdrawType.WITHDRAW_ALL;\n        }\n        botMsg(\"Bank withdraw: item \" + itemId + \" x\" + amount + \" (type=\" + wType + \")\");\n        Game.interact.bank.withdrawItem(itemId, wType, false);\n    } catch(e) {\n        botMsg(\"Withdraw FAILED for item \" + itemId + \": \" + e);\n    }\n}\n\n// ---- WALK_TO_GE ----\nfunction handleWalkToGE() {\n    if (isNear(GE_LOCATION.x, GE_LOCATION.y, 10)) {\n        state = STATES.BUY_AT_GE;\n        retryCount = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(GE_LOCATION.x, GE_LOCATION.y, GE_LOCATION.plane));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- BUY_AT_GE ----\nfunction handleBuyAtGE() {\n    // GE purchasing is complex and depends on DZ APIs\n    // For now, log and skip to self-sufficient gathering\n    botMsg(\"GE purchasing not available in self-sufficient mode. Crafting instead.\", \"SlayerBot\");\n    if (cfgVal(\"selfSufficiency\", false)) {\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        state = STATES.IDLE;\n    }\n}\n\n// ---- WALK_TO_TASK ----\nfunction handleWalkToTask() {\n    if (!currentTaskMonster) {\n        botMsg(\"No task monster data, returning to master.\", \"SlayerBot\");\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Cannon setup -- ONLY in multicombat zones (never bring to single combat)\n    if (cfgVal(\"useCannon\", false) && !cannonPlaced && shouldUseCannon(currentTaskMonster, true)) {\n        if (Game.info.inventory.hasItem(CANNON.BASE, 1) && Game.info.inventory.hasItem(CANNON.CANNONBALL, 1)) {\n            if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n                botMsg(\"[SlayerBot] Multicombat zone -- setting up cannon\", \"Bot\");\n                state = STATES.SETUP_CANNON;\n                return;\n            }\n        }\n    }\n\n    if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n        // v24: Choose fight mode based on safespot\n        if (usingSafespot && cfgVal(\"useSafespots\", false)) {\n            state = STATES.SAFESPOT_FIGHT;\n        } else {\n            state = STATES.FIGHT_TASK;\n        }\n        retryCount = 0;\n        ticksSinceAntifire = 0;\n        ticksSinceAntipoison = 0;\n        ticksSinceCombatPot = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        var mx = currentTaskMonster.x;\n        var my = currentTaskMonster.y;\n        var mp = currentTaskMonster.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(mx, my, mp));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- FIGHT_TASK (major overhaul for v24) ----\nfunction handleFightTask() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Task complete check\n    if (killsLeft <= 0) {\n        botMsg(\"Task complete! Killed all \" + currentTaskName, \"SlayerBot\");\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // === PRIORITY 1: Death check ===\n    if (currentHP <= 0) {\n        saveDeathLocation();\n        state = STATES.HANDLE_DEATH;\n        return;\n    }\n\n    // === PRIORITY 2: Emergency teleport if critically low ===\n    if (currentHP <= EMERGENCY_HP_THRESHOLD && countFood() === 0) {\n        botMsg(\"CRITICAL HP with no food! Emergency retreat!\", \"SlayerBot\");\n        // Try to eat anything\n        if (!eatFood()) {\n            // Walk away from combat\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 3: Eat food ===\n    if (currentHP <= Math.floor(maxHP * 0.45)) {\n        if (countFood() > 0) {\n            eatFood();\n            return;\n        } else {\n            // Out of food -- bank\n            botMsg(\"Out of food, banking.\", \"SlayerBot\");\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 4: Drink prayer pot ===\n    if (cfgVal(\"usePrayer\", false)) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer <= 15) {\n            if (countPrayerPots() > 0) {\n                drinkPrayerPot();\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 5: Anti-fire check (dragon tasks) ===\n    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {\n            if (drinkAntifire()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 6: Anti-poison check ===\n    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {\n            if (drinkAntipoison()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 7: Combat potion re-dose ===\n    if (ticksSinceCombatPot > 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk <= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr <= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 8: Special attack ===\n    if (cfgVal(\"useSpecialAttack\", false)) {\n        var specPercent = 0;\n        try { specPercent = Client.getSpecialAttackPercent(); } catch(e) {}\n        if (specPercent >= 25) {\n            useSpecialAttack();\n        }\n    }\n\n    // === PRIORITY 9: Superior monster check ===\n    var superior = checkForSuperior();\n    if (superior) {\n        botMsg(\"SUPERIOR FOUND! Attacking superior.\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superior);\n            isExecuting = false;\n        }, Utility.getDelay());\n        actionCooldown = 3;\n        return;\n    }\n\n    // === PRIORITY 10: Special finish items ===\n    if (cfgVal(\"specialFinish\", false)) {\n        var finished = handleSpecialFinishCheck();\n        if (finished) return;\n    }\n\n    // === PRIORITY 11: Loot check ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // === PRIORITY 12: Clue scroll banking ===\n    if (Game.info.inventory.isFull() && hasClueScroll()) {\n        botMsg(\"Inventory full with clue scroll, banking.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // === PRIORITY 13: Bone burying ===\n    if (cfgVal(\"buryBones\", false) && !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b < ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var boneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(boneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 14: Cannon reload ===\n    if (cfgVal(\"useCannon\", false) && cannonPlaced) {\n        reloadCannon();\n    }\n\n    // === PRIORITY 15: Attack target ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var npcIds = currentTaskMonster.ids;\n        if (!npcIds || npcIds.length === 0) {\n            botMsg(\"No NPC IDs for \" + currentTaskName, \"SlayerBot\");\n            state = STATES.SELECT_MASTER;\n            return;\n        }\n\n        var target = Game.info.npc.getNearest(npcIds);\n        if (target && !target.isDead()) {\n            isExecuting = true;\n            actionCooldown = 3; // Wait 3 ticks before next action attempt\n            Utility.invokeLater(function() {\n                Game.interact.npc.attack(target);\n                isExecuting = false;\n            }, Utility.getDelay());\n        } else {\n            // No monster found -- might need to wait or move\n            if (stateTickCounter > 20 && !target) {\n                // Try walking closer to task center\n                if (!PlayerHelper.isWebWalking()) {\n                    var cx = currentTaskMonster.x;\n                    var cy = currentTaskMonster.y;\n                    var cp = currentTaskMonster.plane || 0;\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(cx, cy, cp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n            }\n        }\n    }\n}\n\nfunction handleSpecialFinishCheck() {\n    if (!currentTaskMonster) return false;\n    var monName = currentTaskMonster.name.toLowerCase();\n    var npcIds = currentTaskMonster.ids;\n\n    // Gargoyles: rock hammer when low HP\n    if (monName.indexOf(\"gargoyle\") !== -1 && Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n        var gargoyle = Game.info.npc.getNearest(npcIds);\n        if (gargoyle && gargoyle.getHealthRatio() > 0 && gargoyle.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                // Use rock hammer on gargoyle\n                Game.interact.inventory.useItemOnNpc(ROCK_HAMMER_ID, gargoyle);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Rockslugs: bag of salt when low HP\n    if (monName.indexOf(\"rockslug\") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var rockslug = Game.info.npc.getNearest(npcIds);\n        if (rockslug && rockslug.getHealthRatio() > 0 && rockslug.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, rockslug);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Desert lizards: ice cooler when low HP\n    if (monName.indexOf(\"lizard\") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var lizard = Game.info.npc.getNearest(npcIds);\n        if (lizard && lizard.getHealthRatio() > 0 && lizard.getHealthRatio() <= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, lizard);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    return false;\n}\n\nfunction reloadCannon() {\n    // Check cannonball count\n    var cballs = Game.info.inventory.getItemCount(2);\n    if (cballs <= 0) return;\n\n    // Try to find cannon object near us\n    try {\n        var cannonObj = Game.info.gameObject.getNearest([6]);\n        if (cannonObj) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(cannonObj, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\n// ---- SAFESPOT_FIGHT ----\nfunction handleSafespotFight() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (killsLeft <= 0) {\n        botMsg(\"Safespot task complete! Killed all \" + currentTaskName, \"SlayerBot\");\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var spot = hasSafeSpot(currentTaskMonster.name);\n    if (!spot) {\n        // Fallback to normal melee fight\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Move to safe tile if not there\n    if (!isNear(spot.safeX, spot.safeY, 2)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sx = spot.safeX;\n            var sy = spot.safeY;\n            var sp = spot.safePlane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sx, sy, sp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Activate prayer if needed\n    if (spot.prayAgainst) {\n        activateSpecificPrayer(spot.prayAgainst);\n    }\n\n    // Survival checks\n    handleSurvivalChecks();\n\n    // Check for superior (even in safespot)\n    var superiorNpc = checkForSuperior();\n    if (superiorNpc) {\n        botMsg(\"SUPERIOR in safespot! Attacking.\", \"SlayerBot\");\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superiorNpc);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Loot check\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // Bone burying\n    if (cfgVal(\"buryBones\", false) && !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b < ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var safeBoneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(safeBoneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // Supply interrupts\n    var fCount = countFood();\n    if (fCount <= 0) {\n        botMsg(\"Out of food in safespot, banking.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Arrow/rune supply interrupt\n    if (cfgVal(\"useRanged\", false) && countArrows() < 10) {\n        botMsg(\"Low on arrows, restocking.\", \"SlayerBot\");\n        if (cfgVal(\"selfSufficiency\", false)) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_ARROWS;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n    if (cfgVal(\"useMagic\", false) && countRunes() < 10) {\n        botMsg(\"Low on runes, restocking.\", \"SlayerBot\");\n        if (cfgVal(\"selfSufficiency\", false)) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_RUNES;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n\n    // Attack with ranged/magic from safe spot\n    if (!Client.getLocalPlayer().isInteracting()) {\n        attackWithRangedOrMagic();\n    }\n}\n\n// ---- EAT_FOOD ----\nfunction handleEatFood() {\n    if (eatFood()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        // No food, need to bank\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- DRINK_PRAYER ----\nfunction handleDrinkPrayer() {\n    if (drinkPrayerPot()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- LOOT_ITEMS ----\nfunction handleLootItems() {\n    if (Game.info.inventory.isFull()) {\n        // Inventory full -- bury bones or bank\n        if (cfgVal(\"buryBones\", false)) {\n            for (var i = 0; i < ALL_BONE_IDS.length; i++) {\n                if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n                    state = STATES.BURY_BONES;\n                    return;\n                }\n            }\n        }\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    if (!pickUpLoot()) {\n        // Nothing to loot, back to fight\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- BURY_BONES ----\nfunction handleBuryBones() {\n    var buried = false;\n    for (var i = 0; i < ALL_BONE_IDS.length; i++) {\n        if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n            var buryBoneId = ALL_BONE_IDS[i];\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(buryBoneId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            buried = true;\n            break;\n        }\n    }\n    if (!buried) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- SPECIAL_FINISH ----\nfunction handleSpecialFinish() {\n    // This state is entered when a monster needs a specific finishing item\n    var finished = handleSpecialFinishCheck();\n    if (!finished) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- TASK_COMPLETE ----\nfunction handleTaskComplete() {\n    tasksCompleted++;\n    totalKills = totalKills + (killsLeft <= 0 ? 0 : killsLeft);\n    botMsg(\"Task complete! Total tasks: \" + tasksCompleted + \" | Total kills: \" + totalKills, \"SlayerBot\");\n\n    // Reset task state\n    currentTaskName = \"\";\n    currentTaskMonster = null;\n    killsLeft = 0;\n    usingSafespot = false;\n    cannonPlaced = false;\n\n    // Reset potion timers\n    ticksSinceAntifire = 0;\n    ticksSinceAntipoison = 0;\n    ticksSinceCombatPot = 0;\n\n    // v24: Track Turael boosting (already incremented in selectMasterWithBoosting)\n\n    // Get next task\n    state = STATES.CHECK_STATS;\n}\n\n// ---- HANDLE_DEATH ----\nfunction handleDeath() {\n    botMsg(\"Handling death. Saving death location for recovery.\", \"SlayerBot\");\n    deathDetected = true;\n    saveDeathLocation();\n    state = STATES.RECOVER_GRAVE;\n}\n\n// ---- RECOVER_GRAVE ----\nfunction handleRecoverGrave() {\n    // After respawn in Lumbridge:\n    // 1. Bank and withdraw emergency food\n    // 2. Walk to death location\n    // 3. Collect items\n    // 4. Re-equip gear\n    // 5. Return to task\n\n    if (!deathLocation) {\n        botMsg(\"No death location saved, re-checking supplies.\", \"SlayerBot\");\n        deathDetected = false;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Phase 1: Get emergency food from bank\n    var foodCt = countFood();\n    if (foodCt < 3) {\n        // Need to bank first\n        if (!Game.info.bank.isOpen()) {\n            var bank = findNearestBank();\n            if (bank && isNear(bank.x, bank.y, 8)) {\n                _gt = tickCounter;\n                if (_gt - bankOpenAttemptTick < 5) return;\n                bankOpenAttemptTick = _gt;\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.bank.openNearest(0, true);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            } else if (bank) {\n                if (!PlayerHelper.isWebWalking()) {\n                    isExecuting = true;\n                    var rbx = bank.x;\n                    var rby = bank.y;\n                    var rbp = bank.plane || 0;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(rbx, rby, rbp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n                return;\n            }\n        } else {\n            // Bank is open, withdraw food\n            var emergFoodId = 379;\n            try { emergFoodId = cfgVal(\"foodType\", 379); } catch(e) {}\n            withdrawBankItem(emergFoodId, 5);\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.close();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    }\n\n    // Phase 2: Walk to death pile\n    if (!isNear(deathLocation.x, deathLocation.y, 5)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var dlx = deathLocation.x;\n            var dly = deathLocation.y;\n            var dlp = deathLocation.plane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(dlx, dly, dlp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Phase 3: At grave - pick up items from ground\n    if (pickUpLoot()) return;\n\n    // Phase 4: Done recovering, return to supply check\n    botMsg(\"Death recovery complete, resuming task.\", \"SlayerBot\");\n    deathLocation = null;\n    deathDetected = false;\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- HANDLE_LEVEL_UP ----\nfunction handleLevelUp() {\n    updateCachedStats();\n    botMsg(\"Level up detected! Updated stats.\", \"SlayerBot\");\n    levelUpDetected = false;\n    setAttackStyle();\n    state = STATES.FIGHT_TASK;\n}\n\n// ---- SETUP_CANNON ----\nfunction handleSetupCannon() {\n    if (!currentTaskMonster) {\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // SAFETY: Never place cannon in single-combat zones\n    if (isTaskSingleCombat(currentTaskMonster)) {\n        botMsg(\"[SlayerBot] Single combat zone -- skipping cannon\", \"Bot\");\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Check if we have cannon base\n    if (!Game.info.inventory.hasItem(CANNON.BASE, 1)) {\n        botMsg(\"No cannon base in inventory.\", \"SlayerBot\");\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Walk to monster area center\n    if (!isNear(currentTaskMonster.x, currentTaskMonster.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var canX = currentTaskMonster.x;\n            var canY = currentTaskMonster.y;\n            var canP = currentTaskMonster.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(canX, canY, canP));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Place cannon by using the base item\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.inventory.consumeItem(6);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    cannonPlaced = true;\n    var loc = getPlayerLocation();\n    cannonX = loc.x;\n    cannonY = loc.y;\n    botMsg(\"Cannon placed at \" + cannonX + \",\" + cannonY, \"SlayerBot\");\n    state = STATES.FIGHT_TASK;\n}\n\n// =============================================================================\n// SELF-SUFFICIENCY STATES (existing, enhanced for v24)\n// =============================================================================\n\n// ---- GATHER_FOOD ----\nfunction handleGatherFood() {\n    // ---- TIER-AWARE FOOD GATHERING ----\n    // Uses SS_FOOD_TIERS to pick the best food for player's level\n    // Checks for required tool BEFORE trying to gather\n    // Universal pattern: check tool -> walk -> gather -> cook -> bank -> recheck\n\n    var fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;\n    var cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;\n\n    // Pick best food tier for our levels\n    var bestTier = null;\n    for (var t = SS_FOOD_TIERS.length - 1; t >= 0; t--) {\n        var tier = SS_FOOD_TIERS[t];\n        if (fishLvl >= tier.minFishLevel && cookLvl >= tier.minCookLevel) {\n            bestTier = tier;\n            break;\n        }\n    }\n    if (!bestTier) {\n        bestTier = SS_FOOD_TIERS[0]; // Chicken fallback\n    }\n\n    // Only log once per gather session\n    if (!gatherFoodTier || gatherFoodTier.name !== bestTier.name) {\n        botMsg(\"Gathering: \" + bestTier.name + \" (tier \" + bestTier.tier + \")\", \"SlayerBot\");\n    }\n    gatherFoodTier = bestTier;\n\n    // ---- TOOL CHECK ----\n    // If this tier needs a tool, make sure we have it\n    if (bestTier.toolId) {\n        var hasTool = Game.info.inventory.getItemCount(bestTier.toolId) > 0;\n        if (!hasTool) {\n            botMsg(\"Need tool: \" + bestTier.toolRequired + \" (id \" + bestTier.toolId + \") - banking for it\", \"SlayerBot\");\n            // Set a flag so BANK_SUPPLIES knows to withdraw this tool\n            gatherToolNeeded = bestTier.toolId;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n    // If tier needs secondary (e.g., feathers for fly fishing)\n    if (bestTier.secondaryId) {\n        var hasSecondary = Game.info.inventory.getItemCount(bestTier.secondaryId) >= 10;\n        if (!hasSecondary) {\n            botMsg(\"Need secondary: id \" + bestTier.secondaryId + \" - banking for it\", \"SlayerBot\");\n            gatherToolNeeded = bestTier.secondaryId;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // ---- CHICKEN TIER = KILL, NOT FISH ----\n    if (bestTier.method === \"kill\") {\n        // Walk to chicken pen (10-tick cooldown)\n        var chickenLoc = bestTier.gatherLocation;\n        if (!isNear(chickenLoc.x, chickenLoc.y, 12)) {\n            if (tickCounter - walkCooldown < 10) return;\n            walkCooldown = tickCounter;\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(chickenLoc.x, chickenLoc.y, chickenLoc.plane || 0));\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Kill chickens and pick up raw chicken\n        if (isPlayerIdle()) {\n            var chicken = Game.info.npc.getNearest(bestTier.npcIds);\n            if (chicken) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(chicken);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n        // Pick up raw chicken from ground\n        var loot = Game.info.groundItem.getNearest([bestTier.rawItemId]);\n        if (loot && !Game.info.inventory.isFull()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.take(loot);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        if (Game.info.inventory.isFull()) {\n            state = STATES.COOK_FOOD;\n        }\n        return;\n    }\n\n    // ---- FISHING ----\n    var spotIds = bestTier.spotIds;\n    var gatherLoc = bestTier.gatherLocation;\n\n    // Walk to fishing spot (10-tick cooldown to prevent spam)\n    if (!isNear(gatherLoc.x, gatherLoc.y, 12)) {\n        if (tickCounter - walkCooldown < 10) return;\n        walkCooldown = tickCounter;\n        isExecuting = true;\n        var gx = gatherLoc.x;\n        var gy = gatherLoc.y;\n        var gp = gatherLoc.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(gx, gy, gp));\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Idle? Click nearest fishing spot. Spot moves/despawns = player goes idle = re-click.\n    if (isPlayerIdle()) {\n        var spot = Game.info.npc.getNearest(spotIds);\n        if (spot) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.action(spot, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Inventory full -> cook\n    if (Game.info.inventory.isFull()) {\n        gatherFoodCount = 28;\n        state = STATES.COOK_FOOD;\n    }\n}\n\n// ---- COOK_FOOD ----\nfunction handleCookFood() {\n    if (!gatherFoodTier) {\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Use tier's cook location if available, otherwise find nearest range\n    var rangeInfo = null;\n    if (gatherFoodTier && gatherFoodTier.cookLocation) {\n        rangeInfo = gatherFoodTier.cookLocation;\n    }\n    if (!rangeInfo) {\n        var rangeKeys = Object.keys(COOKING_RANGES);\n        for (var i = 0; i < rangeKeys.length; i++) {\n            rangeInfo = dbLookup(COOKING_RANGES, rangeKeys[i]);\n            if (rangeInfo) break;\n        }\n    }\n    if (!rangeInfo) {\n        // Default Lumbridge kitchen range\n        rangeInfo = {x: 3211, y: 3215, plane: 0, objectId: 114};\n    }\n\n    // Walk to range (10-tick cooldown)\n    if (!isNear(rangeInfo.x, rangeInfo.y, 8)) {\n        if (tickCounter - walkCooldown < 10) return;\n        walkCooldown = tickCounter;\n        isExecuting = true;\n        var crx = rangeInfo.x;\n        var cry = rangeInfo.y;\n        var crp = rangeInfo.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(crx, cry, crp));\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Check if we still have raw food (support both old rawId and new rawItemId)\n    var rawFoodId = gatherFoodTier.rawItemId || gatherFoodTier.rawId;\n    if (!rawFoodId || !Game.info.inventory.hasItem(rawFoodId, 1)) {\n        // All cooked or burned, bank and check supplies\n        botMsg(\"Cooking complete, banking food.\", \"SlayerBot\");\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Cook: use raw food on range\n    if (isPlayerIdle()) {\n        var rangeObj = Game.info.gameObject.getNearest([rangeInfo.objectId]);\n        if (rangeObj) {\n            isExecuting = true;\n            var rawId = rawFoodId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnGameObject(rawId, rangeObj);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_GEAR ----\nfunction handleGatherGear() {\n    // For melee gear: kill cows for hides, or mine ore for metal gear\n    if (!gatherGearTarget) {\n        // Determine what gear we need\n        var bestBody = getBestBody(defenceLevel);\n        var bestLegs = getBestLegs(defenceLevel);\n\n        // Check if we need leather or metal gear\n        if (defenceLevel < 20) {\n            // Leather gear -- kill cows for hides\n            gatherGearPhase = \"leather\";\n            leatherPhase = \"killing\";\n            state = STATES.GATHER_GEAR;\n        } else {\n            // Metal gear -- mine ore\n            gatherGearPhase = \"metal\";\n            state = STATES.MINE_ORE;\n        }\n        return;\n    }\n\n    if (gatherGearPhase === \"leather\") {\n        handleLeatherGathering();\n    } else if (gatherGearPhase === \"metal\") {\n        state = STATES.MINE_ORE;\n    }\n}\n\nfunction handleLeatherGathering() {\n    // Kill cows for cowhides\n    var cowNpcIds = [2791, 2793, 2795]; // Cow NPC IDs\n    var cowLocation = {x: 3253, y: 3271, plane: 0}; // Lumbridge cow field\n\n    if (leatherPhase === \"killing\") {\n        if (!isNear(cowLocation.x, cowLocation.y, 20)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(cowLocation.x, cowLocation.y, cowLocation.plane));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Pick up cowhides from ground\n        if (Game.info.inventory.isFull()) {\n            leatherPhase = \"tanning\";\n            state = STATES.TAN_HIDES;\n            return;\n        }\n\n        // Attack cow or pick up hide\n        if (!Client.getLocalPlayer().isInteracting()) {\n            // Check for hides on ground first\n            var hides = Game.info.groundItem.getAll();\n            if (hides) {\n                for (var h = 0; h < hides.length; h++) {\n                    if (hides[h].getId() === 1739) { // Cowhide\n                        isExecuting = true;\n                        var hideItem = hides[h];\n                        Utility.invokeLater(function() {\n                            Game.interact.groundItem.pickup(hideItem);\n                            isExecuting = false;\n                        }, Utility.getDelay());\n                        return;\n                    }\n                }\n            }\n\n            // Attack cow\n            if (isPlayerIdle()) {\n                var cow = Game.info.npc.getNearest(cowNpcIds);\n                if (cow && !cow.isDead()) {\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        Game.interact.npc.attack(cow);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n            }\n        }\n    }\n}\n\n// ---- TAN_HIDES ----\n\n// ---- CRAFT_GEAR ----\nfunction handleCraftGear() {\n    // Craft leather gear from tanned hides\n    // Requires needle (1733) and thread (1734)\n    var needleId = 1733;\n    var threadId = 1734;\n    var leatherId = 1741; // Leather\n\n    if (!Game.info.inventory.hasItem(leatherId, 1)) {\n        botMsg(\"Gear crafting complete, checking supplies.\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(needleId, 1) || !Game.info.inventory.hasItem(threadId, 1)) {\n        // Need to get crafting supplies from bank\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Use needle on leather to craft\n    if (isPlayerIdle()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(needleId, leatherId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- MINE_ORE ----\nfunction handleMineOre() {\n    // ---- PICKAXE CHECK ----\n    // Make sure we have the best pickaxe for our level before mining\n    var bestPick = getBestPickaxe(miningLevel);\n    if (bestPick) {\n        var hasAnyPickaxe = false;\n        for (var pp = 0; pp < PICKAXES.length; pp++) {\n            if (Game.info.inventory.getItemCount(PICKAXES[pp].id) > 0) {\n                hasAnyPickaxe = true;\n                break;\n            }\n        }\n        if (!hasAnyPickaxe) {\n            botMsg(\"No pickaxe in inventory - banking for one\", \"SlayerBot\");\n            gatherToolNeeded = bestPick.id;\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // Determine ore to mine based on smithing level\n    var oreData = null;\n    var mineSpot = null;\n\n    // Simple tier selection\n    if (miningLevel >= 55) {\n        oreData = {oreId: 447, name: \"mithril\"}; // Mithril ore\n    } else if (miningLevel >= 30) {\n        oreData = {oreId: 440, name: \"iron\"}; // Iron ore\n    } else if (miningLevel >= 15) {\n        oreData = {oreId: 436, name: \"copper\"}; // Copper ore\n    } else {\n        oreData = {oreId: 438, name: \"tin\"}; // Tin ore\n    }\n\n    // Find mining spot\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var m = 0; m < mineKeys.length; m++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[m]);\n        if (ms && ms.oreId === oreData.oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        // Default to Varrock East mine\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    // Walk to mine\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var mmx = mineSpot.x;\n            var mmy = mineSpot.y;\n            var mmp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(mmx, mmy, mmp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Mine ore\n    if (Game.info.inventory.isFull()) {\n        // Full, smelt\n        state = STATES.SMELT_ORE;\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMELT_ORE ----\nfunction handleSmeltOre() {\n    // Find nearest furnace\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i < furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469}; // Edgeville\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sfx = furnaceInfo.x;\n            var sfy = furnaceInfo.y;\n            var sfp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sfx, sfy, sfp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check if we still have ore\n    var hasOre = Game.info.inventory.hasItem(447, 1) || Game.info.inventory.hasItem(440, 1) ||\n                 Game.info.inventory.hasItem(436, 1) || Game.info.inventory.hasItem(438, 1);\n    if (!hasOre) {\n        state = STATES.SMITH_GEAR;\n        return;\n    }\n\n    // Smelt at furnace\n    if (isPlayerIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMITH_GEAR ----\nfunction handleSmithGear() {\n    // Find nearest anvil\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i < anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097}; // Varrock west\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sax = anvilInfo.x;\n            var say = anvilInfo.y;\n            var sap = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sax, say, sap));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check for bars\n    var hasBars = Game.info.inventory.hasItem(2353, 1) || Game.info.inventory.hasItem(2351, 1) ||\n                  Game.info.inventory.hasItem(2349, 1) || Game.info.inventory.hasItem(2355, 1);\n    if (!hasBars) {\n        botMsg(\"Smithing complete, returning to supplies.\", \"SlayerBot\");\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Smith at anvil\n    if (isPlayerIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_RANGED ----\nfunction handleGatherRanged() {\n    // Kill chickens for feathers to make arrows\n    var chickenLoc = null;\n    var chickenLocKeys = Object.keys(CHICKEN_LOCATIONS);\n    if (chickenLocKeys.length > 0) {\n        chickenLoc = dbLookup(CHICKEN_LOCATIONS, chickenLocKeys[0]);\n    }\n    if (!chickenLoc) {\n        chickenLoc = {x: 3235, y: 3295, plane: 0}; // Lumbridge\n    }\n\n    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var grcx = chickenLoc.x;\n            var grcy = chickenLoc.y;\n            var grcp = chickenLoc.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(grcx, grcy, grcp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        // Bank feathers then continue or move to arrow crafting\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Pick up feathers\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var gItems = null;\n        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}\n        if (gItems) {\n            for (var gi = 0; gi < gItems.length; gi++) {\n                if (gItems[gi].getId() === FEATHER_ID) {\n                    isExecuting = true;\n                    var featherItem = gItems[gi];\n                    Utility.invokeLater(function() {\n                        Game.interact.groundItem.pickup(featherItem);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n\n        // Kill chicken for feathers\n        if (isPlayerIdle()) {\n            var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);\n            if (chicken && !chicken.isDead()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(chicken);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n    }\n}\n\n// ---- WALK_TO_GATHER ----\nfunction handleWalkToGather() {\n    // Generic walk-to state used to get to gathering locations\n    // After arrival, transitions to the appropriate gathering state\n    if (gatherGearTarget) {\n        if (isNear(gatherGearTarget.x, gatherGearTarget.y, 10)) {\n            // Arrived at gathering destination\n            if (gatherGearPhase === \"leather\") {\n                state = STATES.GATHER_GEAR;\n            } else if (gatherGearPhase === \"metal\") {\n                state = STATES.MINE_ORE;\n            } else {\n                state = STATES.GATHER_FOOD;\n            }\n            return;\n        }\n\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var wgx = gatherGearTarget.x;\n            var wgy = gatherGearTarget.y;\n            var wgp = gatherGearTarget.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(wgx, wgy, wgp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// =============================================================================\n// NEW v24 STATES\n// =============================================================================\n\n// ---- CRAFT_ARROWS ----\n// Multi-phase arrow crafting: mine ore -> smelt -> smith heads -> feathers -> chop -> fletch shafts -> combine\nfunction handleCraftArrows() {\n    // Determine best tier\n    var tier = getBestArrowCraftingTier(smithingLevel, fletchingLevel, miningLevel);\n    if (!tier) {\n        botMsg(\"Cannot craft arrows at current levels (Smith:\" + smithingLevel + \" Fletch:\" + fletchingLevel + \" Mine:\" + miningLevel + \")\", \"SlayerBot\");\n        arrowCraftPhase = \"idle\";\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    arrowCraftTier = tier;\n\n    // Initialize phase if idle\n    if (arrowCraftPhase === \"idle\") {\n        arrowCraftPhase = \"check_stock\";\n        arrowCraftCount = 0;\n    }\n\n    switch (arrowCraftPhase) {\n        case \"check_stock\":\n            handleArrowCheckStock();\n            break;\n        case \"mine_ore\":\n            handleArrowMineOre();\n            break;\n        case \"smelt_bars\":\n            handleArrowSmeltBars();\n            break;\n        case \"smith_heads\":\n            handleArrowSmithHeads();\n            break;\n        case \"kill_chickens\":\n            handleArrowKillChickens();\n            break;\n        case \"chop_trees\":\n            handleArrowChopTrees();\n            break;\n        case \"fletch_shafts\":\n            handleArrowFletchShafts();\n            break;\n        case \"fletch_arrows\":\n            handleArrowFletchArrows();\n            break;\n        case \"done\":\n            handleArrowDone();\n            break;\n        default:\n            arrowCraftPhase = \"check_stock\";\n            break;\n    }\n}\n\nfunction handleArrowCheckStock() {\n    // Check if we have enough components to skip steps\n    var headId = arrowCraftTier.headId;\n    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);\n    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);\n    var headCount = Game.info.inventory.getItemCount(headId);\n\n    // Target: 500 arrows minimum\n    if (headCount >= 500 && shaftCount >= 500 && featherCount >= 500) {\n        arrowCraftPhase = \"fletch_arrows\";\n        return;\n    }\n\n    if (headCount < 500) {\n        // Need arrowheads: mine ore -> smelt -> smith\n        arrowCraftPhase = \"mine_ore\";\n    } else if (featherCount < 500) {\n        arrowCraftPhase = \"kill_chickens\";\n    } else if (shaftCount < 500) {\n        arrowCraftPhase = \"chop_trees\";\n    } else {\n        arrowCraftPhase = \"fletch_arrows\";\n    }\n}\n\nfunction handleArrowMineOre() {\n    var oreId = arrowCraftTier.oreId;\n    if (!oreId) {\n        // If tier uses iron, default\n        oreId = 440;\n    }\n\n    // Find mining spot\n    var mineSpot = null;\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var i = 0; i < mineKeys.length; i++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[i]);\n        if (ms && ms.oreId === oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var amx = mineSpot.x;\n            var amy = mineSpot.y;\n            var amp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(amx, amy, amp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        arrowCraftPhase = \"smelt_bars\";\n        return;\n    }\n\n    // Mine\n    if (isPlayerIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmeltBars() {\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i < furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469};\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var asx = furnaceInfo.x;\n            var asy = furnaceInfo.y;\n            var asp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(asx, asy, asp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var oreId = arrowCraftTier.oreId || 440;\n    if (!Game.info.inventory.hasItem(oreId, 1)) {\n        // Need coal for some ores\n        if (arrowCraftTier.needsCoal && Game.info.inventory.hasItem(COAL_ID, 1)) {\n            // Still smelting coal-based bars\n        } else {\n            arrowCraftPhase = \"smith_heads\";\n            return;\n        }\n    }\n\n    if (isPlayerIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmithHeads() {\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i < anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097};\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var ahx = anvilInfo.x;\n            var ahy = anvilInfo.y;\n            var ahp = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(ahx, ahy, ahp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var barId = arrowCraftTier.barId;\n    if (!barId) barId = 2351; // Iron bar default\n    if (!Game.info.inventory.hasItem(barId, 1)) {\n        // Check if we have enough heads\n        var headCount = Game.info.inventory.getItemCount(arrowCraftTier.headId);\n        if (headCount >= 100) {\n            // Check feathers next\n            var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);\n            if (featherCt < 500) {\n                arrowCraftPhase = \"kill_chickens\";\n            } else {\n                arrowCraftPhase = \"chop_trees\";\n            }\n        } else {\n            // Need more ore\n            arrowCraftPhase = \"mine_ore\";\n        }\n        return;\n    }\n\n    if (isPlayerIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n
