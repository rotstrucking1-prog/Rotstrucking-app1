        case STATES.TAKING_BREAK:
            handleTakingBreak();
            break;
        case STATES.OUTSIDE_SCHEDULE:
            handleOutsideSchedule();
            break;
        case STATES.REPAIR_BARROWS:
            handleRepairBarrows();
            break;
        case STATES.IDLE:
            // Do nothing -- idle until manually restarted or state changed
            break;
        default:
            botMsg(&quot;Unknown state: &quot; + state + &quot;, resetting.&quot;, &quot;SlayerBot&quot;);
            state = STATES.STARTUP;
            break;
    }
  } catch (err) {
    Game.sendGameMessage(&quot;[ROTS] ERROR in OnGameTick: &quot; + err, &quot;[ERR]&quot;);
    Game.sendGameMessage(&quot;[ROTS] State was: &quot; + state + &quot; | Tick: &quot; + tickCounter, &quot;[ERR]&quot;);
  }
}

// =============================================================================
// TASK DIFFICULTY CLASSIFIER -- determines supply needs by monster combat level
// TRIVIAL = ghosts/chickens/rats, EASY = goblins/skeletons, MEDIUM = giants,
// HARD = dragons/demons, BOSS = abyssal demons/gargoyles
// =============================================================================
function getTaskDifficulty() {
    if (!currentTaskMonster) return &quot;MEDIUM&quot;; // default safe
    var cmb = currentTaskMonster.combatLevel || 1;

    if (cmb &lt;= 25) return &quot;TRIVIAL&quot;;   // ghosts(19), chickens, rats, cows, goblins
    if (cmb &lt;= 60) return &quot;EASY&quot;;      // skeletons, zombies, hill giants
    if (cmb &lt;= 120) return &quot;MEDIUM&quot;;   // fire giants, moss giants, bloodveld
    if (cmb &lt;= 200) return &quot;HARD&quot;;     // dragons, greater demons, hellhounds
    return &quot;BOSS&quot;;                      // abyssal demons, gargoyles, kraken
}

// Returns how much food the player actually needs for this task
function getDesiredFoodCount() {
    var diff = getTaskDifficulty();
    var kl = killsLeft || 10;

    // Scale by difficulty AND kill count
    if (diff === &quot;TRIVIAL&quot;) {
        // Ghosts, chickens, etc - barely need food
        if (kl &lt;= 15) return 2;
        return 4;
    }
    if (diff === &quot;EASY&quot;) {
        if (kl &lt;= 20) return 4;
        return 6;
    }
    if (diff === &quot;MEDIUM&quot;) {
        if (kl &lt;= 15) return 8;
        return 12;
    }
    if (diff === &quot;HARD&quot;) {
        return 16; // dragons/demons hit hard
    }
    // BOSS
    return 20;
}

// Returns how many prayer pots needed (0 if task doesnt warrant it)
function getDesiredPrayerPotCount() {
    var diff = getTaskDifficulty();
    // TRIVIAL and EASY: never need prayer pots
    if (diff === &quot;TRIVIAL&quot; || diff === &quot;EASY&quot;) return 0;
    // MEDIUM: only if config says use prayer
    if (diff === &quot;MEDIUM&quot;) {
        if (!cfgVal(&quot;usePrayer&quot;, false)) return 0;
        return 1;
    }
    // HARD: always want prayer pots if available
    if (diff === &quot;HARD&quot;) return 2;
    // BOSS
    return 4;
}

// Does this task need combat potions?
function taskNeedsCombatPots() {
    var diff = getTaskDifficulty();
    // TRIVIAL and EASY: waste of potions
    if (diff === &quot;TRIVIAL&quot; || diff === &quot;EASY&quot;) return false;
    return true;
}

// Does this task warrant a cannon?
function taskNeedsCannon() {
    if (!cfgVal(&quot;useCannon&quot;, false)) return false;
    var diff = getTaskDifficulty();
    // TRIVIAL/EASY: absolute waste of cannonballs
    if (diff === &quot;TRIVIAL&quot; || diff === &quot;EASY&quot;) return false;
    // Only in multicombat
    if (!currentTaskMonster) return false;
    return shouldUseCannon(currentTaskMonster, true);
}

// Pick the best food tier player can actually fish/cook
function getBestFoodTierForPlayer() {
    var cookLvl = 1;
    var fishLvl = 1;
    try {
        cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;
        fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;
    } catch(e) {}

    // Walk the food tiers backwards to find best player can use
    var bestTier = null;
    for (var i = SS_FOOD_TIERS.length - 1; i &gt;= 0; i--) {
        var t = SS_FOOD_TIERS[i];
        if (fishLvl &gt;= t.minFishLevel &amp;&amp; cookLvl &gt;= t.minCookLevel) {
            // Skip quest-locked tiers player may not have
            if (t.questRequired) continue;
            bestTier = t;
            break;
        }
    }
    if (!bestTier) bestTier = SS_FOOD_TIERS[0]; // chicken fallback
    return bestTier;
}

function pickUpLoot() {
    var groundItems = null;
    try { groundItems = Game.info.groundItem.getAll(); } catch(e) { return false; }
    if (!groundItems || groundItems.length === 0) return false;

    var playerLoc = getPlayerLocation();

    for (var i = 0; i &lt; groundItems.length; i++) {
        var item = groundItems[i];
        var itemId = item.getId();

        // Distance check: only pick up items within 5 tiles
        var itemLoc = item.getWorldLocation();
        var dx = Math.abs(itemLoc.getX() - playerLoc.x);
        var dy = Math.abs(itemLoc.getY() - playerLoc.y);
        if (dx &gt; 5 || dy &gt; 5) continue;

        // Always pick up: bones, clue scrolls
        var isBone = ALL_BONE_IDS.indexOf(itemId) !== -1;
        var isClue = CLUE_SCROLLS.indexOf(itemId) !== -1;

        if (isBone &amp;&amp; cfgVal(&quot;buryBones&quot;, false)) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.pickup(item);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }

        if (isClue) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.pickup(item);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }

        // Pick up stackable/notable items
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.groundItem.pickup(item);
            isExecuting = false;
        }, Utility.getDelay());
        return true;
    }
    return false;
}

function attackWithRangedOrMagic() {
    if (!currentTaskMonster) return;
    if (!Client.getLocalPlayer().isIdle()) return;

    if (!npcIds || npcIds.length === 0) return;

function handleSurvivalChecks() {
    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);
    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);

    // Emergency eat
    if (currentHP &lt;= Math.floor(maxHP * 0.4)) {
        eatFood();
        return;
    }

    // Prayer check
    if (cfgVal(&quot;usePrayer&quot;, false)) {
        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);
        if (currentPrayer &lt;= 10) {
            drinkPrayerPot();
            return;
        }
    }

    // Dragon task antifire
    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {
        if (ticksSinceAntifire &gt; 550 || ticksSinceAntifire === 0) {
            drinkAntifire();
        }
    }

    // Poison monsters antipoison
    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {
        if (ticksSinceAntipoison &gt; 800 || ticksSinceAntipoison === 0) {
            drinkAntipoison();
        }
    }

    // Combat potion re-dose
    if (ticksSinceCombatPot &gt; 50) {
        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);
        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);
        if (boostedAtk &lt;= realAtk + 2) {
            if (drinkCombatPotion()) {
                ticksSinceCombatPot = 0;
            }
        }
        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);
        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);
        if (boostedStr &lt;= realStr + 2) {
            if (drinkStrengthPotion()) {
                ticksSinceCombatPot = 0;
            }
        }
    }
}

function saveDeathLocation() {

    if (currentTaskMonster) {

// ---- CHECK_GEM (check enchanted gem or slayer helm for existing task) ----
function handleCheckGem() {
    // If we already know we have a task (e.g., from previous run), skip
    if (currentTaskName &amp;&amp; killsLeft &gt; 0) {
        botMsg(&quot;Already have task: &quot; + currentTaskName + &quot; (&quot; + killsLeft + &quot; left)&quot;, &quot;SlayerBot&quot;);
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    gemCheckDone = false;
    noTaskFromGem = false;

    // Check for enchanted gem (4155) in inventory or slayer helmet equipped
    var hasGem = Game.info.inventory.hasItem(4155);
    var hasHelm = false;
    try {
        hasHelm = Game.info.equipment.hasItem(11864) || Game.info.equipment.hasItem(11865);
    } catch(e) {}

    if (hasGem) {
        botMsg(&quot;Found enchanted gem - using it to check task...&quot;, &quot;SlayerBot&quot;);
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.inventory.actionItem(4155, 3, MenuAction.CC_OP);
            isExecuting = false;
        }, Utility.getDelay());
        gemCheckTick = tickCounter;
        state = STATES.WAIT_GEM_RESPONSE;
    } else if (hasHelm) {
        // Helm is equipped - we cant interact with it via inventory
        // Just skip to master - theyll tell us if we have a task
        botMsg(&quot;Slayer helm equipped but no gem - going to master to check&quot;, &quot;SlayerBot&quot;);
        state = STATES.CHECK_STATS;
    } else {
        botMsg(&quot;No gem or helm found - checking stats then going to master&quot;, &quot;SlayerBot&quot;);
        state = STATES.CHECK_STATS;
    }
}

// ---- WAIT_GEM_RESPONSE ----
function handleWaitGemResponse() {
    // Wait up to 15 ticks for chat response from gem check
    var elapsed = tickCounter - gemCheckTick;

    if (gemCheckDone) {
        // Chat handler set the task info
        if (currentTaskName &amp;&amp; killsLeft &gt; 0) {
            botMsg(&quot;GEM FOUND TASK: &quot; + currentTaskName + &quot; (&quot; + killsLeft + &quot; left) - skipping master!&quot;, &quot;SlayerBot&quot;);
            updateCachedStats();
            state = STATES.CHECK_SUPPLIES;
        } else {
            botMsg(&quot;Gem check: no active task. Getting stats then going to master.&quot;, &quot;SlayerBot&quot;);
            state = STATES.CHECK_STATS;
        }
        return;
    }

    if (noTaskFromGem) {
        botMsg(&quot;Gem confirms: NO active task. Getting stats then going to master.&quot;, &quot;SlayerBot&quot;);
        state = STATES.CHECK_STATS;
        return;
    }

    if (elapsed &gt; 15) {
        botMsg(&quot;Gem check timed out after 15 ticks - going to check stats&quot;, &quot;SlayerBot&quot;);
        state = STATES.CHECK_STATS;
    }
}

// ---- SELECT_MASTER ----
function handleSelectMaster() {
    selectedMaster = selectMasterWithBoosting(combatLevel, slayerLevel);

    if (!selectedMaster) {
        botMsg(&quot;Could not select a slayer master! Using Turael.&quot;, &quot;SlayerBot&quot;);
        selectedMaster = SLAYER_MASTERS.TURAEL;
    }

    botMsg(&quot;Selected master: &quot; + selectedMaster.name, &quot;SlayerBot&quot;);
    state = STATES.WALK_TO_MASTER;
}

// ---- WALK_TO_MASTER ----
var masterWalkCooldown = 0;
function handleWalkToMaster() {
    if (!selectedMaster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    if (isNear(selectedMaster.location.x, selectedMaster.location.y, 10)) {
        state = STATES.TALK_TO_MASTER;
        retryCount = 0;
        masterWalkCooldown = 0;
        return;
    }

    if (masterWalkCooldown &gt; 0) {
        masterWalkCooldown--;
        return;
    }

    if (!PlayerHelper.isWebWalking()) {
        var masterX = selectedMaster.location.x;
        var masterY = selectedMaster.location.y;
        var masterPlane = selectedMaster.location.plane || 0;
        masterWalkCooldown = 10;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(masterX, masterY, masterPlane));
        }, Utility.getDelay());
    }
}

// ---- TALK_TO_MASTER ----
function handleTalkToMaster() {
    if (!selectedMaster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    // Find the master NPC
    var masterNpc = Game.info.npc.getNearest([selectedMaster.npcId]);
    if (!masterNpc) {
        // Not close enough, keep walking
        if (retryCount &lt; maxRetries) {
            retryCount++;
            state = STATES.WALK_TO_MASTER;
        } else {
            botMsg(&quot;Cannot find master NPC after retries, resetting.&quot;, &quot;SlayerBot&quot;);
            retryCount = 0;
            state = STATES.SELECT_MASTER;
        }
        return;
    }

    taskReceived = false;
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.npc.action(masterNpc, MenuAction.NPC_SECOND_OPTION);
        isExecuting = false;
    }, Utility.getDelay());

    state = STATES.WAIT_FOR_TASK;
    waitTicks = 0;
}

// ---- WAIT_FOR_TASK ----
function handleWaitForTask() {
    waitTicks++;

    if (taskReceived) {
        state = STATES.READ_TASK;
        waitTicks = 0;
        return;
    }

    // Handle dialog continuation -- check ALL OSRS dialog widgets
    try {
        // NPC dialog (Turael talking)
        var dialogWidget = Game.info.widget.getWidget(231, 4);
        if (dialogWidget) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.widget.action(dialogWidget, MenuAction.WIDGET_CONTINUE);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Player dialog continue
        var continueWidget = Game.info.widget.getWidget(217, 4);
        if (continueWidget) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.widget.action(continueWidget, MenuAction.WIDGET_CONTINUE);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Simple notification continue
        var notifWidget = Game.info.widget.getWidget(229, 2);
        if (notifWidget) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.widget.action(notifWidget, MenuAction.WIDGET_CONTINUE);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Level up / notification continue
        var levelWidget = Game.info.widget.getWidget(233, 3);
        if (levelWidget) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.widget.action(levelWidget, MenuAction.WIDGET_CONTINUE);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
    } catch (e) {}

    if (waitTicks &gt; 30) {
        botMsg(&quot;Task not received after 30 ticks, retrying talk.&quot;, &quot;SlayerBot&quot;);
        waitTicks = 0;
        retryCount++;
        if (retryCount &gt; maxRetries) {
            retryCount = 0;
            state = STATES.SELECT_MASTER;
        } else {
            state = STATES.TALK_TO_MASTER;
        }
    }
}

// ---- READ_TASK ----
function handleReadTask() {
    if (!currentTaskName || killsLeft &lt;= 0) {
        botMsg(&quot;No valid task found, returning to master.&quot;, &quot;SlayerBot&quot;);
        state = STATES.SELECT_MASTER;
        return;
    }

    botMsg(&quot;Task: Kill &quot; + killsLeft + &quot; &quot; + currentTaskName, &quot;SlayerBot&quot;);

    // Look up monster data
    currentTaskMonster = findMonster(currentTaskName);
    if (!currentTaskMonster) {
        botMsg(&quot;WARNING: Unknown monster &#x27;&quot; + currentTaskName + &quot;&#x27;, returning to master.&quot;, &quot;SlayerBot&quot;);
        state = STATES.SELECT_MASTER;
        return;
    }

    // v24: Equip task bracelet (expeditious or slaughter)
    equipTaskBracelet(currentTaskName);

    // v24: Check if safespot is available and configured
    var safespotData = null;
    if (cfgVal(&quot;useSafespots&quot;, false)) {
        safespotData = hasSafeSpot(currentTaskName);
    }
    if (safespotData) {
        usingSafespot = true;
        botMsg(&quot;Safespot available for &quot; + currentTaskName + &quot;!&quot;, &quot;SlayerBot&quot;);
    } else {
        usingSafespot = false;
    }

    // Move to supply check
    state = STATES.CHECK_SUPPLIES;
}

// ---- CHECK_SUPPLIES (TIER-AWARE) ----
function handleCheckSupplies() {
    missingItems = [];
    needsRestock = false;

    var diff = getTaskDifficulty();
    var monName = currentTaskMonster ? currentTaskMonster.name : &quot;unknown&quot;;
    botMsg(&quot;Task: &quot; + monName + &quot; (&quot; + killsLeft + &quot; left) | Difficulty: &quot; + diff, &quot;SlayerBot&quot;);

    // 0. Check coins -- always carry at least 250 GP
    var coinCount = Game.info.inventory.getItemCount(995);
    if (coinCount &lt; 250) {
        missingItems.push({type: &quot;coins&quot;, current: coinCount, needed: 250});
        needsRestock = true;
    }

    // 1. Check enchanted gem -- always need it
    if (!Game.info.inventory.hasItem(4155)) {
        missingItems.push({type: &quot;gem&quot;, current: 0, needed: 1});
        needsRestock = true;
    }

    // 2. Check food -- scaled by difficulty
    var foodCount = countFood();
    var desiredFood = getDesiredFoodCount();
    if (foodCount &lt; desiredFood) {
        missingItems.push({type: &quot;food&quot;, current: foodCount, needed: desiredFood});
        needsRestock = true;
    }

    // 3. Prayer pots -- only MEDIUM+ tasks
    var desiredPpots = getDesiredPrayerPotCount();
    if (desiredPpots &gt; 0) {
        var ppotCount = countPrayerPots();
        if (ppotCount &lt; desiredPpots) {
            missingItems.push({type: &quot;prayer_pot&quot;, current: ppotCount, needed: desiredPpots});
            needsRestock = true;
        }
    }

    // 4. Combat potions -- only MEDIUM+ tasks
    if (taskNeedsCombatPots()) {
        var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||
                           hasPotionInGroup(SUPER_ATTACK_POTS) ||
                           hasPotionInGroup(ATTACK_POTS);
        if (!hasCombatPot) {
            missingItems.push({type: &quot;combat_pot&quot;, current: 0, needed: 1});
            needsRestock = true;
        }
    }

    // 5. Arrows (ranged users or safespot)
    if (cfgVal(&quot;useRanged&quot;, false) || usingSafespot) {
        var arrowCount = countArrows();
        if (arrowCount &lt; 100) {
            missingItems.push({type: &quot;arrows&quot;, current: arrowCount, needed: 500});
            needsRestock = true;
        }
    }

    // 6. Runes (magic users)
    if (cfgVal(&quot;useMagic&quot;, false)) {
        var runeCount = countRunes();
        if (runeCount &lt; 100) {
            missingItems.push({type: &quot;runes&quot;, current: runeCount, needed: 500});
            needsRestock = true;
        }
    }

    // 7. Antifire potions (dragon tasks only -- always HARD+)
    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {
        var hasAntifire = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||
                          hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||
                          hasPotionInGroup(ANTIFIRE_POTS);
        if (!hasAntifire) {
            missingItems.push({type: &quot;antifire&quot;, current: 0, needed: 2});
            needsRestock = true;
        }
    }

    // 8. Antipoison (poison tasks only)
    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {
        var hasAntipois = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||
                          hasPotionInGroup(ANTIVENOM_IDS) ||
                          hasPotionInGroup(SUPER_ANTIPOISON_IDS);
        if (!hasAntipois) {
            missingItems.push({type: &quot;antipoison&quot;, current: 0, needed: 1});
            needsRestock = true;
        }
    }

    // 9. Cannonballs -- only MEDIUM+ multicombat
    if (taskNeedsCannon()) {
        var cballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);
        if (cballs &lt; 200) {
            missingItems.push({type: &quot;cannonballs&quot;, current: cballs, needed: CANNON.MIN_CANNONBALLS});
            needsRestock = true;
        }
    }

    // 10. Barrows gear condition -- repair at 25%
    var barrowsRepairNeeded = checkEquippedBarrowsCondition();
    if (barrowsRepairNeeded.length &gt; 0) {
        for (var br = 0; br &lt; barrowsRepairNeeded.length; br++) {
            botMsg(&quot;[SlayerBot] WARNING: &quot; + barrowsRepairNeeded[br].piece +
                &quot; is at &quot; + barrowsRepairNeeded[br].condition + &quot;% - repair needed!&quot;, &quot;Bot&quot;);
        }
        stateBeforeRepair = state;
        repairPhase = &quot;walk_to_bob&quot;;
        state = STATES.REPAIR_BARROWS;
        return;
    }

    // 11. Special finish items (gargoyle/rockslug/lizard)
    if (cfgVal(&quot;specialFinish&quot;, false) &amp;&amp; currentTaskMonster) {
        var mn = currentTaskMonster.name.toLowerCase();
        if (mn.indexOf(&quot;gargoyle&quot;) !== -1 &amp;&amp; !Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {
            missingItems.push({type: &quot;special&quot;, itemId: ROCK_HAMMER_ID, name: &quot;rock_hammer&quot;});
            needsRestock = true;
        }
        if ((mn.indexOf(&quot;rockslug&quot;) !== -1 || mn.indexOf(&quot;lizard&quot;) !== -1) &amp;&amp; !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
            missingItems.push({type: &quot;special&quot;, itemId: ICE_COOLER_ID, name: &quot;ice_cooler&quot;});
            needsRestock = true;
        }
    }

    if (needsRestock) {
        var types = [];
        for (var mi = 0; mi &lt; missingItems.length; mi++) { types.push(missingItems[mi].type); }
        botMsg(diff + &quot; task needs: &quot; + types.join(&quot;, &quot;), &quot;SlayerBot&quot;);
        bankTarget = null; state = STATES.WALK_TO_BANK;
    } else {
        botMsg(diff + &quot; task - supplies OK! Heading to &quot; + monName + &quot;.&quot;, &quot;SlayerBot&quot;);
        state = STATES.WALK_TO_TASK;
    }
}

// ---- WALK_TO_BANK ----
var walkCooldown = 0;
function handleWalkToBank() {
    // If player manually opened a bank, skip walking entirely!
    if (Game.info.bank.isOpen()) {
        botMsg(&quot;Bank detected open! Skipping walk.&quot;, &quot;SlayerBot&quot;);
        state = STATES.BANK_SUPPLIES;
        retryCount = 0;
        walkCooldown = 0;
        return;
    }

    // Only find nearest bank ONCE -- cache it in bankTarget
    if (!bankTarget) {
        var bank = findNearestBank();
        if (!bank) {
            botMsg(&quot;No bank found! Walk to ANY bank and open it.&quot;, &quot;SlayerBot&quot;);
            return;
        }
        bankTarget = bank;
        botMsg(&quot;Walking to: &quot; + bank.name, &quot;SlayerBot&quot;);
    }

    if (isNear(bankTarget.x, bankTarget.y, 5)) {
        state = STATES.BANK_SUPPLIES;
        retryCount = 0;
        walkCooldown = 0;
        return;
    }

    // Don&#x27;t spam webWalkTo - wait at least 10 ticks between calls
    if (walkCooldown &gt; 0) {
        walkCooldown--;
        return;
    }

    if (!PlayerHelper.isWebWalking()) {
        var bx = bankTarget.x;
        var by = bankTarget.y;
        var bp = bankTarget.plane || 0;
        walkCooldown = 10;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(bx, by, bp));
        }, Utility.getDelay());
    }
}

// ---- BANK_SUPPLIES ----
// bankPhase: 0=open, 1=deposit, 2=wait, 3=withdraw, 4=close, 5=check
var bankPhase = 0;
var withdrawQueue = [];
var bankOpenAttemptTick = 0;
function handleBankSupplies() {
    // Don&#x27;t re-enter while an async action is running
    if (isExecuting) return;

    // Reset withdraw queue on fresh entry to Phase 0
    if (bankPhase === 0) { withdrawQueue = []; }

    // MANUAL BANK OVERRIDE: if player already has bank open, jump to deposit
    if (bankPhase === 0 &amp;&amp; Game.info.bank.isOpen()) {
        botMsg(&quot;Bank detected (manual open) - depositing!&quot;, &quot;SlayerBot&quot;);
        bankPhase = 1;
    }

    // Phase 0: Open bank then wait for it to settle
    if (bankPhase === 0) {
        if (!Game.info.bank.isOpen()) {
            // Only attempt openNearest every 5 ticks to avoid spam
            gt = tickCounter;
            if (gt - bankOpenAttemptTick &lt; 5) return;
            bankOpenAttemptTick = gt;
            waitTicks = 0;
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest();
                isExecuting = false;
            }, Utility.getDelay());
        } else {
            // Bank is open - wait 2 ticks for widgets to load before doing anything
            waitTicks++;
            if (waitTicks &lt; 2) return;
            botMsg(&quot;Bank open and settled - depositing&quot;, &quot;SlayerBot&quot;);
            bankPhase = 1;
            waitTicks = 0;
        }
        return;
    }

    // Phase 1: Deposit all inventory
    if (bankPhase === 1) {
        if (!Game.info.bank.isOpen()) { bankPhase = 0; waitTicks = 0; return; }
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.depositAllInventory();
            isExecuting = false;
        }, Utility.getDelay());
        bankPhase = 2;
        waitTicks = 0;
        return;
    }

    // Phase 2: Wait for deposit to settle (3 ticks)
    if (bankPhase === 2) {
        if (!Game.info.bank.isOpen()) { bankPhase = 0; waitTicks = 0; return; }
        waitTicks++;
        if (waitTicks &lt; 3) return;
        waitTicks = 0;
        bankPhase = 3;
        return;
    }

    // Phase 3: Build withdraw queue (first tick), then withdraw ONE item per tick
    if (bankPhase === 3) {
        // === GEM PRIORITY: If we came here just for gem, withdraw it and go back to CHECK_GEM ===
        if (needGemFromBank) {
            botMsg(&quot;Withdrawing enchanted gem from bank...&quot;, &quot;SlayerBot&quot;);
            withdrawBankItem(4155, 1);
            needGemFromBank = false;
            bankPhase = 4; // close bank
            waitTicks = 0;
            return;
        }

        // First tick in Phase 3: build the withdrawal queue
        if (!withdrawQueue || withdrawQueue.length === 0) {
            withdrawQueue = [];

            // Enchanted gem if missing
            if (!Game.info.inventory.hasItem(4155)) {
                withdrawQueue.push({ id: 4155, qty: 1, label: &quot;Enchanted gem&quot; });
            }

            // Coins -- always carry at least 250 GP
            var currentCoins = Game.info.inventory.getItemCount(995);
            if (currentCoins &lt; 250) {
                var needed = 250 - currentCoins;
                withdrawQueue.push({ id: 995, qty: needed, label: &quot;Coins (&quot; + needed + &quot; GP)&quot; });
            }

            // Gather tool
            if (gatherToolNeeded &gt; 0) {
                withdrawQueue.push({ id: gatherToolNeeded, qty: 1, label: &quot;Gather tool &quot; + gatherToolNeeded });
                if (gatherToolNeeded === 314) {
                    withdrawQueue.push({ id: 314, qty: 200, label: &quot;Feathers&quot; });
                }
                gatherToolNeeded = 0;
            }

            // Food -- resolve name to ID if config returns a string
            var foodId = cfgVal(&quot;foodType&quot;, 379);
            if (typeof foodId === &quot;string&quot;) {
                var FOOD_NAME_TO_ID = {
                    &quot;shrimps&quot;: 315, &quot;shrimp&quot;: 315,
                    &quot;anchovies&quot;: 319, &quot;anchovy&quot;: 319,
                    &quot;trout&quot;: 333,
                    &quot;salmon&quot;: 329,
                    &quot;tuna&quot;: 361,
                    &quot;lobster&quot;: 379,
                    &quot;swordfish&quot;: 373,
                    &quot;monkfish&quot;: 7946,
                    &quot;shark&quot;: 385,
                    &quot;manta ray&quot;: 391, &quot;manta&quot;: 391,
                    &quot;dark crab&quot;: 11936,
                    &quot;karambwan&quot;: 3144,
                    &quot;anglerfish&quot;: 13441
                };
                var resolved = FOOD_NAME_TO_ID[foodId.toLowerCase()];
                if (resolved) {
                    botMsg(&quot;Resolved food name &#x27;&quot; + foodId + &quot;&#x27; to ID &quot; + resolved, &quot;SlayerBot&quot;);
                    foodId = resolved;
                } else {
                    botMsg(&quot;WARNING: Unknown food name &#x27;&quot; + foodId + &quot;&#x27;, defaulting to lobster (379)&quot;, &quot;SlayerBot&quot;);
                    foodId = 379;
                }
            }
            var desiredFood = getDesiredFoodCount();
            if (desiredFood &gt; 0) {
                withdrawQueue.push({ id: foodId, qty: desiredFood, label: &quot;Food x&quot; + desiredFood });
            }

            // Prayer pots
            var desiredPpots = getDesiredPrayerPotCount();
            if (desiredPpots &gt; 0) {
                withdrawQueue.push({ id: &quot;ppot&quot;, qty: desiredPpots, label: &quot;Prayer pots x&quot; + desiredPpots, potion: true, group: PRAYER_POTS });
            }

            // Combat pots
            if (taskNeedsCombatPots()) {
                withdrawQueue.push({ id: &quot;combatpot&quot;, qty: 1, label: &quot;Combat pot&quot;, potion: true, group: SUPER_COMBAT_POTS, fallback1: SUPER_ATTACK_POTS, fallback2: ATTACK_POTS });
            }

            // Arrows
            if (cfgVal(&quot;useRanged&quot;, false) || usingSafespot) {
                var bestArrow = getBestArrows(rangedLevel);
                if (bestArrow) {
                    withdrawQueue.push({ id: bestArrow.id, qty: 500, label: &quot;Arrows x500&quot; });
                }
            }

            // Runes
            if (cfgVal(&quot;useMagic&quot;, false)) {
                var spell = getBestSpell(magicLevel);
                if (spell) {
                    var runes = getRunesForSpell(spell.key);
                    if (runes) {
                        var runeKeys = Object.keys(runes);
                        for (var r = 0; r &lt; runeKeys.length; r++) {
                            var runeId = parseInt(runeKeys[r]);
                            var runeQty = runes[runeKeys[r]] * 200;
                            withdrawQueue.push({ id: runeId, qty: runeQty, label: &quot;Rune &quot; + runeId });
                        }
                    }
                }
            }

            // Antifire
            if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {
                withdrawQueue.push({ id: &quot;antifire&quot;, qty: 2, label: &quot;Antifire&quot;, potion: true, group: SUPER_ANTIFIRE_POTS, fallback1: EXTENDED_ANTIFIRE_POTS, fallback2: ANTIFIRE_POTS });
            }

            // Antipoison
            if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {
                withdrawQueue.push({ id: &quot;antipoison&quot;, qty: 1, label: &quot;Antipoison&quot;, potion: true, group: SUPER_ANTIPOISON_IDS });
            }

            // Cannonballs
            if (cfgVal(&quot;useCannon&quot;, false) &amp;&amp; shouldUseCannon(currentTaskMonster, true)) {
                withdrawQueue.push({ id: CANNON.CANNONBALL, qty: CANNON.MIN_CANNONBALLS, label: &quot;Cannonballs&quot; });
            }

            // Special items
            if (cfgVal(&quot;specialFinish&quot;, false) &amp;&amp; currentTaskMonster) {
                var monName = currentTaskMonster.name.toLowerCase();
                if (monName.indexOf(&quot;gargoyle&quot;) !== -1) {
                    withdrawQueue.push({ id: ROCK_HAMMER_ID, qty: 1, label: &quot;Rock hammer&quot; });
                }
                if (monName.indexOf(&quot;rockslug&quot;) !== -1 || monName.indexOf(&quot;lizard&quot;) !== -1) {
                    withdrawQueue.push({ id: ICE_COOLER_ID, qty: 1, label: &quot;Ice cooler&quot; });
                }
            }

            botMsg(&quot;Withdraw queue: &quot; + withdrawQueue.length + &quot; items to withdraw&quot;, &quot;SlayerBot&quot;);
            if (withdrawQueue.length === 0) {
                bankPhase = 4;
                waitTicks = 0;
            }
            return;
        }

        // Check bank is still open
        if (!Game.info.bank.isOpen()) {
            botMsg(&quot;Bank closed during withdrawals! Reopening...&quot;, &quot;SlayerBot&quot;);
            bankPhase = 0; waitTicks = 0; return;
        }
        // Wait 2 ticks between each withdrawal to let the previous one settle
        waitTicks++;
        if (waitTicks &lt; 2) return;
        waitTicks = 0;

        // Process ONE item from queue
        var item = withdrawQueue[0];
        withdrawQueue.splice(0, 1);
        botMsg(&quot;Withdrawing: &quot; + item.label, &quot;SlayerBot&quot;);

        if (item.potion) {
            // Potion withdrawal with fallbacks
            if (!withdrawPotionFromBank(item.group, item.qty)) {
                if (item.fallback1 &amp;&amp; !withdrawPotionFromBank(item.fallback1, item.qty)) {
                    if (item.fallback2) {
                        withdrawPotionFromBank(item.fallback2, item.qty);
                    }
                }
            }
        } else {
            withdrawBankItem(item.id, item.qty);
        }

        // If queue now empty, move to close
        if (withdrawQueue.length === 0) {
            bankPhase = 4;
            waitTicks = 0;
        }
        return;
    }

    // Phase 4: DECIDE next move BEFORE closing bank (bank still open)
    if (bankPhase === 4) {
        // === GEM REDIRECT: If we just got gem from bank, go check it now ===
        if (Game.info.inventory.hasItem(4155) &amp;&amp; !currentTaskName) {
            botMsg(&quot;Got gem! Will check task after closing bank.&quot;, &quot;SlayerBot&quot;);
            postBankState = STATES.CHECK_GEM;
            bankPhase = 5;
            waitTicks = 0;
            return;
        }

        // === FULL POST-BANK SUPPLY CHECK (TIER-AWARE) -- while bank is STILL OPEN ===
        var stillMissing = [];
        var diff = getTaskDifficulty();

        // Gem
        if (!Game.info.inventory.hasItem(4155)) {
            stillMissing.push(&quot;gem&quot;);
        }

        // Food
        if (countFood() &lt; getDesiredFoodCount()) {
            stillMissing.push(&quot;food&quot;);
        }

        // Prayer pots -- only if task warrants it
        var neededPpots = getDesiredPrayerPotCount();
        if (neededPpots &gt; 0 &amp;&amp; countPrayerPots() &lt; neededPpots) {
            stillMissing.push(&quot;prayer_pot&quot;);
        }

        // Combat pot -- only MEDIUM+
        if (taskNeedsCombatPots()) {
            var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||
                               hasPotionInGroup(SUPER_ATTACK_POTS) ||
                               hasPotionInGroup(ATTACK_POTS);
            if (!hasCombatPot) {
                stillMissing.push(&quot;combat_pot&quot;);
            }
        }

        // Arrows
        if (cfgVal(&quot;useRanged&quot;, false) || usingSafespot) {
            if (countArrows() &lt; 100) {
                stillMissing.push(&quot;arrows&quot;);
            }
        }

        // Runes
        if (cfgVal(&quot;useMagic&quot;, false)) {
            if (countRunes() &lt; 100) {
                stillMissing.push(&quot;runes&quot;);
            }
        }

        // Cannonballs -- only MEDIUM+ multicombat
        if (taskNeedsCannon()) {
            if (Game.info.inventory.getItemCount(CANNON.CANNONBALL) &lt; 200) {
                stillMissing.push(&quot;cannonballs&quot;);
            }
        }

        // Antifire (dragon)
        if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {
            var hasAF = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||
                        hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||
                        hasPotionInGroup(ANTIFIRE_POTS);
            if (!hasAF) {
                stillMissing.push(&quot;antifire&quot;);
            }
        }

        // Antipoison
        if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {
            var hasAP = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||
                        hasPotionInGroup(ANTIVENOM_IDS) ||
                        hasPotionInGroup(SUPER_ANTIPOISON_IDS);
            if (!hasAP) {
                stillMissing.push(&quot;antipoison&quot;);
            }
        }

        // Coins
        if (Game.info.inventory.getItemCount(995) &lt; 250) {
            stillMissing.push(&quot;coins&quot;);
        }

        if (stillMissing.length === 0) {
            botMsg(&quot;ALL supplies ready! Closing bank then heading to task.&quot;, &quot;SlayerBot&quot;);
            missingItems = [];
            postBankState = STATES.WALK_TO_TASK;
        } else {
            // Still missing -- route to correct gather sub-state
            var firstMissing = stillMissing[0];
            missingItems = stillMissing;
            botMsg(&quot;Still missing after bank: &quot; + stillMissing.join(&quot;, &quot;) + &quot; -- will gather &quot; + firstMissing, &quot;SlayerBot&quot;);

            if (firstMissing === &quot;gem&quot;) {
                // Gem only from slayer master, not gatherable
                postBankState = STATES.CHECK_STATS;
            } else if (firstMissing === &quot;food&quot;) {
                postBankState = STATES.GATHER_FOOD;
            } else if (firstMissing === &quot;prayer_pot&quot;) {
                brewTarget = &quot;prayer&quot;;
                postBankState = STATES.BREW_POTIONS;
            } else if (firstMissing === &quot;arrows&quot;) {
                postBankState = STATES.CRAFT_ARROWS;
            } else if (firstMissing === &quot;runes&quot;) {
                postBankState = STATES.CRAFT_RUNES;
            } else if (firstMissing === &quot;cannonballs&quot;) {
                postBankState = STATES.GATHER_CANNONBALLS;
            } else if (firstMissing === &quot;combat_pot&quot; || firstMissing === &quot;antifire&quot; || firstMissing === &quot;antipoison&quot;) {
                if (cfgVal(&quot;selfSufficiency&quot;, false)) {
                    brewTarget = firstMissing;
                    postBankState = STATES.BREW_POTIONS;
                } else {
                    postBankState = STATES.WALK_TO_GE;
                }
            } else {
                postBankState = STATES.WALK_TO_GE;
            }
        }

        bankPhase = 5;
        waitTicks = 0;
        return;
    }

    // Phase 5: Close bank
    if (bankPhase === 5) {
        if (Game.info.bank.isOpen()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.close();
                isExecuting = false;
            }, Utility.getDelay());
        }
        bankPhase = 6;
        waitTicks = 0;
        return;
    }

    // Phase 6: Wait for close, then transition to pre-decided state
    if (bankPhase === 6) {
        waitTicks++;
        if (waitTicks &lt; 4) return;
        waitTicks = 0;
        bankPhase = 0;

        // Transition to the state we decided in Phase 4
        var nextState = postBankState || STATES.CHECK_SUPPLIES;
        postBankState = null;
        botMsg(&quot;Bank closed. Next: &quot; + nextState, &quot;SlayerBot&quot;);
        state = nextState;
        return;
    }
}

function withdrawBankItem(itemId, qty) {
    try {
        // Safety: itemId MUST be a number -- bank API crashes on strings
        if (typeof itemId === &quot;string&quot;) {
            botMsg(&quot;WITHDRAW ERROR: itemId is a string (&#x27;&quot; + itemId + &quot;&#x27;) not a number! Skipping.&quot;, &quot;SlayerBot&quot;);
            return;
        }
        itemId = parseInt(itemId);
        if (isNaN(itemId) || itemId &lt;= 0) {
            botMsg(&quot;WITHDRAW ERROR: invalid itemId &quot; + itemId + &quot;! Skipping.&quot;, &quot;SlayerBot&quot;);
            return;
        }
        // Correct API: withdrawItem(itemId, amount, BankWithdrawType.ITEM)
        // amount = exact quantity to withdraw (any number)
        // BankWithdrawType.ITEM = withdraw as regular item (not noted)
        var amount = qty || 1;
        botMsg(&quot;Bank withdraw: item &quot; + itemId + &quot; x&quot; + amount, &quot;SlayerBot&quot;);
        Game.interact.bank.withdrawItem(itemId, amount, BankWithdrawType.ITEM);
    } catch(e) {
        botMsg(&quot;Withdraw FAILED for item &quot; + itemId + &quot;: &quot; + e, &quot;SlayerBot&quot;);
    }
}

// ---- WALK_TO_TASK ----
function handleWalkToTask() {
    if (!currentTaskMonster) {
        botMsg(&quot;No task monster data, returning to master.&quot;, &quot;SlayerBot&quot;);
        state = STATES.SELECT_MASTER;
        return;
    }

    // v24: Cannon setup -- ONLY in multicombat zones (never bring to single combat)
    if (cfgVal(&quot;useCannon&quot;, false) &amp;&amp; !cannonPlaced &amp;&amp; shouldUseCannon(currentTaskMonster, true)) {
        if (Game.info.inventory.hasItem(CANNON.BASE, 1) &amp;&amp; Game.info.inventory.hasItem(CANNON.CANNONBALL, 1)) {
            if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {
                botMsg(&quot;[SlayerBot] Multicombat zone -- setting up cannon&quot;, &quot;Bot&quot;);
                state = STATES.SETUP_CANNON;
                return;
            }
        }
    }

    if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {
        // v24: Choose fight mode based on safespot
        if (usingSafespot &amp;&amp; cfgVal(&quot;useSafespots&quot;, false)) {
            state = STATES.SAFESPOT_FIGHT;
        } else {
            state = STATES.FIGHT_TASK;
        }
        retryCount = 0;
        ticksSinceAntifire = 0;
        ticksSinceAntipoison = 0;
        ticksSinceCombatPot = 0;
        return;
    }

    if (!PlayerHelper.isWebWalking()) {
        isExecuting = true;
        var mx = currentTaskMonster.x;
        var my = currentTaskMonster.y;
        var mp = currentTaskMonster.plane || 0;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(mx, my, mp));
            isExecuting = false;
        }, Utility.getDelay());
    }
}

// ---- FIGHT_TASK (major overhaul for v24) ----
function handleFightTask() {
    if (!currentTaskMonster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    // Task complete check
    if (killsLeft &lt;= 0) {
        botMsg(&quot;Task complete! Killed all &quot; + currentTaskName, &quot;SlayerBot&quot;);
        state = STATES.TASK_COMPLETE;
        return;
    }

    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);
    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);

    // === PRIORITY 1: Death check ===
    if (currentHP &lt;= 0) {
        saveDeathLocation();
        state = STATES.HANDLE_DEATH;
        return;
    }

    // === PRIORITY 2: Emergency teleport if critically low ===
    if (currentHP &lt;= EMERGENCY_HP_THRESHOLD &amp;&amp; countFood() === 0) {
        botMsg(&quot;CRITICAL HP with no food! Emergency retreat!&quot;, &quot;SlayerBot&quot;);
        // Try to eat anything
        if (!eatFood()) {
            // Walk away from combat
            bankTarget = null; state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // === PRIORITY 3: Eat food ===
    if (currentHP &lt;= Math.floor(maxHP * 0.45)) {
        if (countFood() &gt; 0) {
            eatFood();
            return;
        } else {
            // Out of food -- bank
            botMsg(&quot;Out of food, banking.&quot;, &quot;SlayerBot&quot;);
            bankTarget = null; state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // === PRIORITY 4: Drink prayer pot ===
    if (cfgVal(&quot;usePrayer&quot;, false)) {
        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);
        if (currentPrayer &lt;= 15) {
            if (countPrayerPots() &gt; 0) {
                drinkPrayerPot();
                return;
            }
        }
    }

    // === PRIORITY 5: Anti-fire check (dragon tasks) ===
    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {
        if (ticksSinceAntifire &gt; 550 || ticksSinceAntifire === 0) {
            if (drinkAntifire()) {
                return;
            }
        }
    }

    // === PRIORITY 6: Anti-poison check ===
    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {
        if (ticksSinceAntipoison &gt; 800 || ticksSinceAntipoison === 0) {
            if (drinkAntipoison()) {
                return;
            }
        }
    }

    // === PRIORITY 7: Combat potion re-dose ===
    if (ticksSinceCombatPot &gt; 50) {
        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);
        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);
        if (boostedAtk &lt;= realAtk + 2) {
            if (drinkCombatPotion()) {
                ticksSinceCombatPot = 0;
                return;
            }
        }
        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);
        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);
        if (boostedStr &lt;= realStr + 2) {
            if (drinkStrengthPotion()) {
                ticksSinceCombatPot = 0;
                return;
            }
        }
    }

    // === PRIORITY 8: Special attack ===
    if (cfgVal(&quot;useSpecialAttack&quot;, false)) {
        var specPercent = 0;
        try { specPercent = Client.getSpecialAttackPercent(); } catch(e) {}
        if (specPercent &gt;= 25) {
            useSpecialAttack();
        }
    }

    // === PRIORITY 9: Superior monster check ===
    var superior = checkForSuperior();
    if (superior) {
        botMsg(&quot;SUPERIOR FOUND! Attacking superior.&quot;, &quot;SlayerBot&quot;);
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.npc.attack(superior);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // === PRIORITY 10: Special finish items ===
    if (cfgVal(&quot;specialFinish&quot;, false)) {
        var finished = handleSpecialFinishCheck();
        if (finished) return;
    }

    // === PRIORITY 11: Loot check ===
    if (!Client.getLocalPlayer().isInteracting()) {
        if (pickUpLoot()) return;
    }

    // === PRIORITY 12: Clue scroll banking ===
    if (Game.info.inventory.isFull() &amp;&amp; hasClueScroll()) {
        botMsg(&quot;Inventory full with clue scroll, banking.&quot;, &quot;SlayerBot&quot;);
        bankTarget = null; state = STATES.WALK_TO_BANK;
        return;
    }

    // === PRIORITY 13: Bone burying ===
    if (cfgVal(&quot;buryBones&quot;, false) &amp;&amp; !Client.getLocalPlayer().isInteracting()) {
        for (var b = 0; b &lt; ALL_BONE_IDS.length; b++) {
            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {
                var boneId = ALL_BONE_IDS[b];
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.inventory.consumeItem(boneId);
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            }
        }
    }

    // === PRIORITY 14: Cannon reload ===
    if (cfgVal(&quot;useCannon&quot;, false) &amp;&amp; cannonPlaced) {
        reloadCannon();
    }

    // === PRIORITY 15: Attack target ===
    if (!Client.getLocalPlayer().isInteracting()) {
        var npcIds = currentTaskMonster.ids;
        if (!npcIds || npcIds.length === 0) {
            botMsg(&quot;No NPC IDs for &quot; + currentTaskName, &quot;SlayerBot&quot;);
            state = STATES.SELECT_MASTER;
            return;
        }

        var target = Game.info.npc.getNearest(npcIds);
        if (target &amp;&amp; !target.isDead()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.npc.attack(target);
                isExecuting = false;
            }, Utility.getDelay());
        } else {
            // No monster found -- might need to wait or move
            if (stateTickCounter &gt; 20 &amp;&amp; !target) {
                // Try walking closer to task center
                if (!PlayerHelper.isWebWalking()) {
                    var cx = currentTaskMonster.x;
                    var cy = currentTaskMonster.y;
                    var cp = currentTaskMonster.plane || 0;
                    isExecuting = true;
                    Utility.invokeLater(function() {
                        PlayerHelper.webWalkTo(new WorldPoint(cx, cy, cp));
                        isExecuting = false;
                    }, Utility.getDelay());
                }
            }
        }
    }
}

function handleSpecialFinishCheck() {
    if (!currentTaskMonster) return false;
    var monName = currentTaskMonster.name.toLowerCase();
    var npcIds = currentTaskMonster.ids;

    // Gargoyles: rock hammer when low HP
    if (monName.indexOf(&quot;gargoyle&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {
        var gargoyle = Game.info.npc.getNearest(npcIds);
        if (gargoyle &amp;&amp; gargoyle.getHealthRatio() &gt; 0 &amp;&amp; gargoyle.getHealthRatio() &lt;= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                // Use rock hammer on gargoyle
                Game.interact.inventory.useItemOnNpc(ROCK_HAMMER_ID, gargoyle);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    // Rockslugs: bag of salt when low HP
    if (monName.indexOf(&quot;rockslug&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
        var rockslug = Game.info.npc.getNearest(npcIds);
        if (rockslug &amp;&amp; rockslug.getHealthRatio() &gt; 0 &amp;&amp; rockslug.getHealthRatio() &lt;= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, rockslug);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    // Desert lizards: ice cooler when low HP
    if (monName.indexOf(&quot;lizard&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
        var lizard = Game.info.npc.getNearest(npcIds);
        if (lizard &amp;&amp; lizard.getHealthRatio() &gt; 0 &amp;&amp; lizard.getHealthRatio() &lt;= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, lizard);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    return false;
}

function reloadCannon() {
    // Check cannonball count
    var cballs = Game.info.inventory.getItemCount(2);
    if (cballs &lt;= 0) return;

    // Try to find cannon object near us
    try {
        var cannonObj = Game.info.gameObject.getNearest([6]);
        if (cannonObj) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(cannonObj, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } catch(e) {}
}

// ---- SAFESPOT_FIGHT ----
function handleSafespotFight() {
    if (!currentTaskMonster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    if (killsLeft &lt;= 0) {
        botMsg(&quot;Safespot task complete! Killed all &quot; + currentTaskName, &quot;SlayerBot&quot;);
        state = STATES.TASK_COMPLETE;
        return;
    }

    var spot = hasSafeSpot(currentTaskMonster.name);
    if (!spot) {
        // Fallback to normal melee fight
        state = STATES.FIGHT_TASK;
        return;
    }

    // Move to safe tile if not there
    if (!isNear(spot.safeX, spot.safeY, 2)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var sx = spot.safeX;
            var sy = spot.safeY;
            var sp = spot.safePlane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(sx, sy, sp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Activate prayer if needed
    if (spot.prayAgainst) {
        activateSpecificPrayer(spot.prayAgainst);
    }

    // Survival checks
    handleSurvivalChecks();

    // Check for superior (even in safespot)
    var superiorNpc = checkForSuperior();
    if (superiorNpc) {
        botMsg(&quot;SUPERIOR in safespot! Attacking.&quot;, &quot;SlayerBot&quot;);
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.npc.attack(superiorNpc);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Loot check
    if (!Client.getLocalPlayer().isInteracting()) {
        if (pickUpLoot()) return;
    }

    // Bone burying
    if (cfgVal(&quot;buryBones&quot;, false) &amp;&amp; !Client.getLocalPlayer().isInteracting()) {
        for (var b = 0; b &lt; ALL_BONE_IDS.length; b++) {
            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {
                var safeBoneId = ALL_BONE_IDS[b];
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.inventory.consumeItem(safeBoneId);
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            }
        }
    }

    // Supply interrupts
    var fCount = countFood();
    if (fCount &lt;= 0) {
        botMsg(&quot;Out of food in safespot, banking.&quot;, &quot;SlayerBot&quot;);
        bankTarget = null; state = STATES.WALK_TO_BANK;
        return;
    }

    // Arrow/rune supply interrupt
    if (cfgVal(&quot;useRanged&quot;, false) &amp;&amp; countArrows() &lt; 10) {
        botMsg(&quot;Low on arrows, restocking.&quot;, &quot;SlayerBot&quot;);
        if (cfgVal(&quot;selfSufficiency&quot;, false)) {
            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;
            state = STATES.CRAFT_ARROWS;
        } else {
            bankTarget = null; state = STATES.WALK_TO_BANK;
        }
        return;
    }
    if (cfgVal(&quot;useMagic&quot;, false) &amp;&amp; countRunes() &lt; 10) {
        botMsg(&quot;Low on runes, restocking.&quot;, &quot;SlayerBot&quot;);
        if (cfgVal(&quot;selfSufficiency&quot;, false)) {
            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;
            state = STATES.CRAFT_RUNES;
        } else {
            bankTarget = null; state = STATES.WALK_TO_BANK;
        }
        return;
    }

    // Attack with ranged/magic from safe spot
    if (!Client.getLocalPlayer().isInteracting()) {
        attackWithRangedOrMagic();
    }
}

// ---- EAT_FOOD ----
function handleEatFood() {
    if (eatFood()) {
        state = STATES.FIGHT_TASK;
    } else {
        // No food, need to bank
        bankTarget = null; state = STATES.WALK_TO_BANK;
    }
}

// ---- DRINK_PRAYER ----
function handleDrinkPrayer() {
    if (drinkPrayerPot()) {
        state = STATES.FIGHT_TASK;
    } else {
        bankTarget = null; state = STATES.WALK_TO_BANK;
    }
}

// ---- LOOT_ITEMS ----
function handleLootItems() {
    if (Game.info.inventory.isFull()) {
        // Inventory full -- bury bones or bank
        if (cfgVal(&quot;buryBones&quot;, false)) {
            for (var i = 0; i &lt; ALL_BONE_IDS.length; i++) {
                if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {
                    state = STATES.BURY_BONES;
                    return;
                }
            }
        }
        bankTarget = null; state = STATES.WALK_TO_BANK;
        return;
    }

    if (!pickUpLoot()) {
        // Nothing to loot, back to fight
        state = STATES.FIGHT_TASK;
    }
}

// ---- BURY_BONES ----
function handleBuryBones() {
    var buried = false;
    for (var i = 0; i &lt; ALL_BONE_IDS.length; i++) {
        if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {
            var buryBoneId = ALL_BONE_IDS[i];
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(buryBoneId);
                isExecuting = false;
            }, Utility.getDelay());
            buried = true;
            break;
        }
    }
    if (!buried) {
        state = STATES.FIGHT_TASK;
    }
}

// ---- SPECIAL_FINISH ----
function handleSpecialFinish() {
    // This state is entered when a monster needs a specific finishing item
    var finished = handleSpecialFinishCheck();
    if (!finished) {
        state = STATES.FIGHT_TASK;
    }
}

// ---- TASK_COMPLETE ----
function handleTaskComplete() {
    tasksCompleted++;
    totalKills = totalKills + (killsLeft &lt;= 0 ? 0 : killsLeft);
    botMsg(&quot;Task complete! Total tasks: &quot; + tasksCompleted + &quot; | Total kills: &quot; + totalKills, &quot;SlayerBot&quot;);

    // Reset task state
    currentTaskName = &quot;&quot;;

// ---- RECOVER_GRAVE ----
function handleRecoverGrave() {
    // After respawn in Lumbridge:
    // 1. Bank and withdraw emergency food
    // 2. Walk to death location
    // 3. Collect items
    // 4. Re-equip gear
    // 5. Return to task

    if (!deathLocation) {
        botMsg(&quot;No death location saved, re-checking supplies.&quot;, &quot;SlayerBot&quot;);
        deathDetected = false;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Phase 1: Get emergency food from bank
    var foodCt = countFood();
    if (foodCt &lt; 3) {
        // Need to bank first
        if (!Game.info.bank.isOpen()) {
            var bank = findNearestBank();
            if (bank &amp;&amp; isNear(bank.x, bank.y, 8)) {
                _gt = tickCounter;
                if (_gt - bankOpenAttemptTick &lt; 5) return;
                bankOpenAttemptTick = _gt;
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.bank.openNearest();
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            } else if (bank) {
                if (!PlayerHelper.isWebWalking()) {
                    isExecuting = true;
                    var rbx = bank.x;
                    var rby = bank.y;
                    var rbp = bank.plane || 0;
                    Utility.invokeLater(function() {
                        PlayerHelper.webWalkTo(new WorldPoint(rbx, rby, rbp));
                        isExecuting = false;
                    }, Utility.getDelay());
                }
                return;
            }
        } else {
            // Bank is open, withdraw food
            var emergFoodId = 379;
            try { emergFoodId = cfgVal(&quot;foodType&quot;, 379); } catch(e) {}
            withdrawBankItem(emergFoodId, 5);
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.close();
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
    }

    // Phase 2: Walk to death pile
    if (!isNear(deathLocation.x, deathLocation.y, 5)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var dlx = deathLocation.x;
            var dly = deathLocation.y;
            var dlp = deathLocation.plane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(dlx, dly, dlp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Phase 3: At grave - pick up items from ground
    if (pickUpLoot()) return;

    // Phase 4: Done recovering, return to supply check
    botMsg(&quot;Death recovery complete, resuming task.&quot;, &quot;SlayerBot&quot;);
    deathLocation = null;
    deathDetected = false;
    state = STATES.CHECK_SUPPLIES;
}

// ---- GATHER_FOOD ----
function handleGatherFood() {
    // ---- TIER-AWARE FOOD GATHERING ----
    // Uses SS_FOOD_TIERS to pick the best food for player&#x27;s level
    // Checks for required tool BEFORE trying to gather
    // Universal pattern: check tool -&gt; walk -&gt; gather -&gt; cook -&gt; bank -&gt; recheck

    var fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;
    var cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;

    // Pick best food tier for our levels
    var bestTier = null;
    for (var t = SS_FOOD_TIERS.length - 1; t &gt;= 0; t--) {
        var tier = SS_FOOD_TIERS[t];
        if (fishLvl &gt;= tier.minFishLevel &amp;&amp; cookLvl &gt;= tier.minCookLevel) {
            bestTier = tier;
            break;
        }
    }
    if (!bestTier) {
        bestTier = SS_FOOD_TIERS[0]; // Chicken fallback
    }

    // Only log once per gather session
    if (!gatherFoodTier || gatherFoodTier.name !== bestTier.name) {
        botMsg(&quot;Gathering: &quot; + bestTier.name + &quot; (tier &quot; + bestTier.tier + &quot;)&quot;, &quot;SlayerBot&quot;);
    }
    gatherFoodTier = bestTier;

    // ---- TOOL CHECK ----
    // If this tier needs a tool, make sure we have it
    if (bestTier.toolId) {
        var hasTool = Game.info.inventory.getItemCount(bestTier.toolId) &gt; 0;
        if (!hasTool) {
            botMsg(&quot;Need tool: &quot; + bestTier.toolRequired + &quot; (id &quot; + bestTier.toolId + &quot;) - banking for it&quot;, &quot;SlayerBot&quot;);
            // Set a flag so BANK_SUPPLIES knows to withdraw this tool
            gatherToolNeeded = bestTier.toolId;
            bankTarget = null; state = STATES.WALK_TO_BANK;
            return;
        }
    }
    // If tier needs secondary (e.g., feathers for fly fishing)
    if (bestTier.secondaryId) {
        var hasSecondary = Game.info.inventory.getItemCount(bestTier.secondaryId) &gt;= 10;
        if (!hasSecondary) {
            botMsg(&quot;Need secondary: id &quot; + bestTier.secondaryId + &quot; - banking for it&quot;, &quot;SlayerBot&quot;);
            gatherToolNeeded = bestTier.secondaryId;
            bankTarget = null; state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // ---- CHICKEN TIER = KILL, NOT FISH ----
    if (bestTier.method === &quot;kill&quot;) {
        // Walk to chicken pen (10-tick cooldown)
        var chickenLoc = bestTier.gatherLocation;
        if (!isNear(chickenLoc.x, chickenLoc.y, 12)) {
            if (gameTick - walkCooldown &lt; 10) return;
            walkCooldown = gameTick;
            isExecuting = true;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(chickenLoc.x, chickenLoc.y, chickenLoc.plane || 0));
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Kill chickens and pick up raw chicken
        if (Client.getLocalPlayer().isIdle()) {
            var chicken = Game.info.npc.getNearest(bestTier.npcIds);
            if (chicken) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.npc.attack(chicken);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        }
        // Pick up raw chicken from ground
        var loot = Game.info.groundItem.getNearest([bestTier.rawItemId]);
        if (loot &amp;&amp; !Game.info.inventory.isFull()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.take(loot);
                isExecuting = false;
            }, Utility.getDelay());
        }
        if (Game.info.inventory.isFull()) {
            state = STATES.COOK_FOOD;
        }
        return;
    }

    // ---- FISHING ----
    var spotIds = bestTier.spotIds;
    var gatherLoc = bestTier.gatherLocation;

    // Walk to fishing spot (10-tick cooldown to prevent spam)
    if (!isNear(gatherLoc.x, gatherLoc.y, 12)) {
        if (gameTick - walkCooldown &lt; 10) return;
        walkCooldown = gameTick;
        isExecuting = true;
        var gx = gatherLoc.x;
        var gy = gatherLoc.y;
        var gp = gatherLoc.plane || 0;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(gx, gy, gp));
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Idle? Click nearest fishing spot. Spot moves/despawns = player goes idle = re-click.
    if (Client.getLocalPlayer().isIdle()) {
        var spot = Game.info.npc.getNearest(spotIds);
        if (spot) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.npc.action(spot, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }

    // Inventory full -&gt; cook
    if (Game.info.inventory.isFull()) {
        gatherFoodCount = 28;
        state = STATES.COOK_FOOD;
    }
}

// ---- MINE_ORE ----
function handleMineOre() {
    // ---- PICKAXE CHECK ----
    // Make sure we have the best pickaxe for our level before mining
    var bestPick = getBestPickaxe(miningLevel);
    if (bestPick) {
        var hasAnyPickaxe = false;
        for (var pp = 0; pp &lt; PICKAXES.length; pp++) {
            if (Game.info.inventory.getItemCount(PICKAXES[pp].id) &gt; 0) {
                hasAnyPickaxe = true;
                break;
            }
        }
        if (!hasAnyPickaxe) {
            botMsg(&quot;No pickaxe in inventory - banking for one&quot;, &quot;SlayerBot&quot;);
            gatherToolNeeded = bestPick.id;
            bankTarget = null; state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // Determine ore to mine based on smithing level
    var oreData = null;
    var mineSpot = null;

    // Simple tier selection
    if (miningLevel &gt;= 55) {
        oreData = {oreId: 447, name: &quot;mithril&quot;}; // Mithril ore
    } else if (miningLevel &gt;= 30) {
        oreData = {oreId: 440, name: &quot;iron&quot;}; // Iron ore
    } else if (miningLevel &gt;= 15) {
        oreData = {oreId: 436, name: &quot;copper&quot;}; // Copper ore
    } else {
        oreData = {oreId: 438, name: &quot;tin&quot;}; // Tin ore
    }

    // Find mining spot
    var mineKeys = Object.keys(MINING_SPOTS);
    for (var m = 0; m &lt; mineKeys.length; m++) {
        var ms = dbLookup(MINING_SPOTS, mineKeys[m]);
        if (ms &amp;&amp; ms.oreId === oreData.oreId) {
            mineSpot = ms;
            break;
        }
    }

    if (!mineSpot) {
        // Default to Varrock East mine
        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};
    }

    // Walk to mine
    if (!isNear(mineSpot.x, mineSpot.y, 10)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var mmx = mineSpot.x;
            var mmy = mineSpot.y;

                PlayerHelper.webWalkTo(new WorldPoint(mmx, mmy, mmp));
                isExecuting = false;

        return;
    }

    // Mine ore
    if (Game.info.inventory.isFull()) {

        state = STATES.SMELT_ORE;
        return;
    }

    if (Client.getLocalPlayer().isIdle()) {
        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);

            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());

// ---- CRAFT_ARROWS ----
// Multi-phase arrow crafting: mine ore -&gt; smelt -&gt; smith heads -&gt; feathers -&gt; chop -&gt; fletch shafts -&gt; combine
function handleCraftArrows() {
    // Determine best tier
    var tier = getBestArrowCraftingTier(smithingLevel, fletchingLevel, miningLevel);
    if (!tier) {
        botMsg(&quot;Cannot craft arrows at current levels (Smith:&quot; + smithingLevel + &quot; Fletch:&quot; + fletchingLevel + &quot; Mine:&quot; + miningLevel + &quot;)&quot;, &quot;SlayerBot&quot;);
        arrowCraftPhase = &quot;idle&quot;;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    arrowCraftTier = tier;

    // Initialize phase if idle
    if (arrowCraftPhase === &quot;idle&quot;) {
        arrowCraftPhase = &quot;check_stock&quot;;
        arrowCraftCount = 0;
    }

    switch (arrowCraftPhase) {
        case &quot;check_stock&quot;:
            handleArrowCheckStock();
            break;
        case &quot;mine_ore&quot;:
            handleArrowMineOre();
            break;
        case &quot;smelt_bars&quot;:
            handleArrowSmeltBars();
            break;
        case &quot;smith_heads&quot;:
            handleArrowSmithHeads();
            break;
        case &quot;kill_chickens&quot;:
            handleArrowKillChickens();
            break;
        case &quot;chop_trees&quot;:
            handleArrowChopTrees();
            break;
        case &quot;fletch_shafts&quot;:
            handleArrowFletchShafts();
            break;
        case &quot;fletch_arrows&quot;:
            handleArrowFletchArrows();
            break;
        case &quot;done&quot;:
            handleArrowDone();
            break;
        default:
            arrowCraftPhase = &quot;check_stock&quot;;
            break;
    }
}

function handleArrowCheckStock() {
    // Check if we have enough components to skip steps
    var headId = arrowCraftTier.headId;
    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);
    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);
    var headCount = Game.info.inventory.getItemCount(headId);

    // Target: 500 arrows minimum
    if (headCount &gt;= 500 &amp;&amp; shaftCount &gt;= 500 &amp;&amp; featherCount &gt;= 500) {
        arrowCraftPhase = &quot;fletch_arrows&quot;;
        return;
    }

    if (headCount &lt; 500) {
        // Need arrowheads: mine ore -&gt; smelt -&gt; smith
        arrowCraftPhase = &quot;mine_ore&quot;;
    } else if (featherCount &lt; 500) {
        arrowCraftPhase = &quot;kill_chickens&quot;;
    } else if (shaftCount &lt; 500) {
        arrowCraftPhase = &quot;chop_trees&quot;;
    } else {
        arrowCraftPhase = &quot;fletch_arrows&quot;;
    }
}

// ---- CRAFT_RUNES ----
// Pipeline: mine essence -&gt; walk to altar -&gt; craft -&gt; bank -&gt; repeat
function handleCraftRunes() {
    if (runecraftPhase === &quot;idle&quot;) {
        runecraftPhase = &quot;mine_essence&quot;;
        rcEssenceCount = 0;

        // Determine which runes we need
        neededRunes = [];
        var spell = getBestSpell(magicLevel);
        if (spell) {
            var runes = getRunesForSpell(spell.key);
            if (runes) {
                var runeKeys = Object.keys(runes);
                for (var i = 0; i &lt; runeKeys.length; i++) {
                    neededRunes.push({runeId: parseInt(runeKeys[i]), quantity: 1000});
                }
            }
        }
        if (neededRunes.length === 0) {
            // Default to fire runes
            neededRunes.push({runeId: 554, quantity: 1000}); // Fire runes
        }
    }

    switch (runecraftPhase) {
        case &quot;mine_essence&quot;:
            handleRCMineEssence();
            break;
        case &quot;walk_to_altar&quot;:
            handleRCWalkToAltar();
            break;
        case &quot;craft_runes&quot;:
            handleRCCraftRunes();
            break;
        case &quot;bank_runes&quot;:
            handleRCBankRunes();
            break;
        case &quot;check_stock&quot;:
            handleRCCheckStock();
            break;
        case &quot;done&quot;:
            handleRCDone();
            break;
        default:
            runecraftPhase = &quot;mine_essence&quot;;
            break;
    }
}

    var recipeKeys = Object.keys(POTION_RECIPES);
    for (var i = 0; i &lt; recipeKeys.length; i++) {
        var r = dbLookup(POTION_RECIPES, recipeKeys[i]);
        if (r &amp;&amp; recipeKeys[i].toLowerCase().indexOf(brewTarget.toLowerCase()) !== -1) {
            recipe = r;
            break;
        }
    }

    if (!recipe) {
        botMsg(&quot;Unknown brew target: &quot; + brewTarget, &quot;SlayerBot&quot;);
        brewPhase = &quot;idle&quot;;
        brewTarget = null;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Check herblore level requirement
    if (herbloreLevel &lt; recipe.level) {
        botMsg(&quot;Need herblore level &quot; + recipe.level + &quot; (have &quot; + herbloreLevel + &quot;) for &quot; + brewTarget, &quot;SlayerBot&quot;);
        herbloreTargetLevel = recipe.level;
        state = STATES.LEVEL_HERBLORE;
        return;
    }

    if (brewPhase === &quot;idle&quot;) {
        brewPhase = &quot;bank_supplies&quot;;
        brewCount = 0;
    }

    switch (brewPhase) {
        case &quot;bank_supplies&quot;:
            handleBrewBankSupplies(recipe);
            break;
        case &quot;clean_herbs&quot;:
            handleBrewCleanHerbs(recipe);
            break;
        case &quot;make_unfinished&quot;:
            handleBrewMakeUnfinished(recipe);
            break;
        case &quot;add_secondary&quot;:
            handleBrewAddSecondary(recipe);
            break;
        case &quot;bank_potions&quot;:
            handleBrewBankPotions();
            break;
        case &quot;done&quot;:
            handleBrewDone();
            break;
        default:

            break;
    }
