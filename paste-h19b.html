<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Fix10o hotfix19b - Ghost dot notation fix</title>
<style>
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;max-width:900px;margin:0 auto;padding:20px}
h1{color:#00d4ff;text-align:center}h2{color:#ff6b6b;border-bottom:2px solid #ff6b6b;padding-bottom:8px}
.info{background:#16213e;border-left:4px solid #00d4ff;padding:12px;margin:10px 0;border-radius:4px}
pre{background:#0d1117;padding:15px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.4;white-space:pre-wrap;word-wrap:break-word;max-height:600px;overflow-y:auto;position:relative}
.copy-btn{display:block;width:100%;padding:16px;font-size:20px;font-weight:bold;color:white;background:#0066ff;border:none;border-radius:8px;cursor:pointer;margin:10px 0 30px 0}
.copy-btn:hover{background:#0052cc}
.copy-btn:active{background:#004099}
</style></head><body>
<h1>Fix10o hotfix19b</h1>
<div class="info">Fix: MONSTER_DB["Ghost"] changed to MONSTER_DB.Ghost (dot notation for single-word key)</div>
<div class="info">Only MAIN changed this patch. CONFIG and UTILITIES same as hotfix19.</div>

<h2>MAIN</h2>
<button class="copy-btn" onclick="copyCode('main')">COPY MAIN CODE</button>
<pre id="main"></pre>

<script>
var mainCode = "";
fetch("slayer_MAIN.txt").then(function(r){return r.text()}).then(function(t){mainCode=t;document.getElementById("main").textContent=t});
function copyCode(id){
var t = id === "main" ? mainCode : "";
if(!t){alert("Code not loaded yet");return}
navigator.clipboard.writeText(t).then(function(){
var btn = document.querySelector(".copy-btn");
btn.textContent = "COPIED!";
btn.style.background = "#00cc44";
setTimeout(function(){btn.textContent="COPY MAIN CODE";btn.style.background="#0066ff"},2000);
});
}
</script></body></html>
