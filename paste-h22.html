function cfgVal(name, defaultVal) {
    try {
        if (!config || !config[name]) return defaultVal;
        var getter = config[name].getValue;
        if (!getter) return defaultVal;
        var v = getter.call(config[name]);
        if (v === null || v === undefined) return defaultVal;

            } catch(e2) {}
            return defaultVal;
        }
        return v;
    } catch(e) {
        return defaultVal;
    }
}

function getAccessibleBank() {
    // Pick closest ground-floor bank from FALLBACK_BANKS
    try {
        var pos = Client.getLocalPlayer().getWorldLocation();
        var px = pos.getX();
        var py = pos.getY();
        var best = null;
        var bestDist = 999999;
        for (var i = 0; i < FALLBACK_BANKS.length; i++) {
            var b = FALLBACK_BANKS[i];
            var dx = px - b.x;
            var dy = py - b.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < bestDist) {
                bestDist = dist;
                best = b;
            }
        }
        return best;
    } catch(e) {
        return FALLBACK_BANKS[0]; // Default to Al Kharid
    }
}

function checkBankStuck() {
    // Returns true if player is stuck (hasnt moved in ~17 ticks / 10 seconds)

        var pos = Client.getLocalPlayer().getWorldLocation();
        var px = pos.getX();
        var py = pos.getY();

            if (tickCounter - bankStuckTick >= 17) {
                bankStuckCount++;
                bankStuckTick = tickCounter; // reset timer
                botMsg("Stuck at bank attempt #" + bankStuckCount + " at (" + px + "," + py + ")", "SlayerBot");
                return true;
            }
        } else {
            // Player moved -- reset
            bankStuckX = px;
            bankStuckY = py;
            bankStuckTick = tickCounter;
            bankStuckCount = 0;
        }
    } catch(e) {}
    return false;
}

                stateBeforeBreak = state;
                state = STATES.OUTSIDE_SCHEDULE;
                outsideScheduleLogout = false;
                botMsg("[Schedule] Outside play hours -- stopping", "Bot");
                scheduleOverlay.setValue("Schedule: OUTSIDE HOURS");
            }
        } else {
            scheduleOverlay.setValue("Schedule: Active");
        }
    }

    // ================================================================
    // BREAK CHECK -- Time for a random human break?
    // ================================================================
    if (cfgVal("enableBreaks", false) && state !== STATES.TAKING_BREAK && state !== STATES.OUTSIDE_SCHEDULE) {
        // Initialize first break timer on session start
        if (!sessionStarted) {
            sessionStarted = true;
            ticksSinceLastBreak = 0;
            var initMin = cfgVal("minPlayMinutes", 30);
            var initMax = cfgVal("maxPlayMinutes", 120);
            nextBreakAtTick = calculateNextBreakDelay(initMin, initMax);
            breakOverlay.setValue("Break: in ~" + ticksToMinutes(nextBreakAtTick) + "m");
        }

        // Check if it is break time
        if (ticksSinceLastBreak >= nextBreakAtTick) {
            // Only break when safe -- not mid-combat or death
            var safeToBreak = (state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT &&
                state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE &&
                state !== STATES.EAT_FOOD && state !== STATES.DRINK_PRAYER);

            if (safeToBreak) {
                stateBeforeBreak = state;
                state = STATES.TAKING_BREAK;
                breakReason = getRandomBreakReason();
                var bMin = cfgVal("minBreakMinutes", 3);
                var bMax = cfgVal("maxBreakMinutes", 15);
                var duration = calculateBreakDuration(bMin, bMax);
                breakEndTick = tickCounter + duration;
                lastBreakDurationMins = ticksToMinutes(duration);
                totalBreaksTaken++;
                botMsg("[Break] " + breakReason + " (~" + lastBreakDurationMins + " min)", "Bot");
                breakOverlay.setValue("Break: " + breakReason + " (" + lastBreakDurationMins + "m)");
                return;
            }
        } else {
            // Update countdown overlay
            var remaining = nextBreakAtTick - ticksSinceLastBreak;
            if (tickCounter % 100 === 0) {
                breakOverlay.setValue("Break: in ~" + ticksToMinutes(remaining) + "m");
            }
        }
    }

    // Update cached stats every 10 ticks
    if (tickCounter % 10 === 0) {
        updateCachedStats();
    }

    // Update overlay
    updateOverlay();

    // Track state changes
    if (state !== lastState) {
        stateTickCounter = 0;
        lastState = state;
        botMsg("State -> " + state, "SlayerBot");
    }
    stateTickCounter++;

    // Stuck detection: if we are in a non-idle state for too long, reset
    if (stateTickCounter > 500 && state !== STATES.IDLE && state !== STATES.FIGHT_TASK && state !== STATES.SAFESPOT_FIGHT) {
        botMsg("Stuck in " + state + " for 500 ticks, resetting to CHECK_STATS", "SlayerBot");
        state = STATES.CHECK_STATS;
        stateTickCounter = 0;
        retryCount = 0;
    }

    // Death detection: check if we are at Lumbridge spawn
    if (state !== STATES.HANDLE_DEATH && state !== STATES.RECOVER_GRAVE && state !== STATES.STARTUP) {
        if (isAtDeathSpawn()) {
            if (state === STATES.FIGHT_TASK || state === STATES.SAFESPOT_FIGHT || state === STATES.WALK_TO_TASK) {
                botMsg("Death detected! Saving death location.", "SlayerBot");
                state = STATES.HANDLE_DEATH;
                return;
            }
        }
    }

    // Level up detection
    if (levelUpDetected) {
        levelUpDetected = false;
        updateCachedStats();
    }

    // =========================================================================
    // PERIODIC BARROWS REPAIR CHECK (every ~30 sec)
    // =========================================================================
    ticksSinceRepairCheck++;
    if (ticksSinceRepairCheck >= repairCheckInterval && state !== STATES.REPAIR_BARROWS &&
        state !== STATES.TAKING_BREAK && state !== STATES.OUTSIDE_SCHEDULE &&
        state !== STATES.STARTUP && state !== STATES.CHECK_STATS && state !== STATES.CHECK_GEM && state !== STATES.WAIT_GEM_RESPONSE) {
        ticksSinceRepairCheck = 0;
        var repairItems = checkEquippedBarrowsCondition();
        if (repairItems.length > 0) {
            botMsg("[SlayerBot] Barrows gear at 25%! Heading to Bob for repair.", "Bot");
            stateBeforeRepair = state;
            repairPhase = "walk_to_bob";
            state = STATES.REPAIR_BARROWS;
        }
    }

    // =========================================================================
    // STATE ROUTER
    // =========================================================================
    // GLOBAL GUARD: Never go to master if we have a valid task
    } // end of !debugActive schedule/break/stuck checks

    if (state === STATES.SELECT_MASTER && currentTaskName && killsLeft > 0) {
        botMsg("GUARD: Blocked false SELECT_MASTER -- still have " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
    }
    // GLOBAL GUARD 2: Never declare task complete if varbits say kills remain
    if (state === STATES.TASK_COMPLETE && killsLeft <= 0) {
        var guardKills = 0;
        try { guardKills = Game.getVarPlayerValue(394); } catch(eg) {}
        if (guardKills > 0) {
            killsLeft = guardKills;
            botMsg("GUARD: Task NOT complete -- varbits say " + guardKills + " kills remain", "SlayerBot");
            state = STATES.FIGHT_TASK;
        }
    }

    switch (state) {
        case STATES.STARTUP:
            handleStartup();
            break;
        case STATES.CHECK_STATS:
            handleCheckStats();
            break;
        case STATES.CHECK_GEM:
            handleCheckGem();
            break;
        case STATES.WAIT_GEM_RESPONSE:
            handleWaitGemResponse();
            break;
        case STATES.SELECT_MASTER:
            handleSelectMaster();
            break;
        case STATES.WALK_TO_MASTER:
            handleWalkToMaster();
            break;
        case STATES.TALK_TO_MASTER:
            handleTalkToMaster();
            break;
        case STATES.WAIT_FOR_TASK:
            handleWaitForTask();
            break;
        case STATES.READ_TASK:
            handleReadTask();
            break;
        case STATES.CHECK_SUPPLIES:
            handleCheckSupplies();
            break;
        case STATES.WALK_TO_BANK:
            handleWalkToBank();
            break;
        case STATES.BANK_SUPPLIES:
            handleBankSupplies();
            break;
        case STATES.WALK_TO_GE:
            handleWalkToGE();
            break;
        case STATES.BUY_AT_GE:
            handleBuyAtGE();
            break;
        case STATES.WALK_TO_TASK:
            handleWalkToTask();
            break;
        case STATES.FIGHT_TASK:
            handleFightTask();
            break;
        case STATES.SAFESPOT_FIGHT:
            handleSafespotFight();
            break;
        case STATES.SPECIAL_FINISH:
            handleSpecialFinish();
            break;
        case STATES.EAT_FOOD:
            handleEatFood();
            break;
        case STATES.DRINK_PRAYER:
            handleDrinkPrayer();
            break;
        case STATES.LOOT_ITEMS:
            handleLootItems();
            break;
        case STATES.BURY_BONES:
            handleBuryBones();
            break;
        case STATES.TASK_COMPLETE:
            handleTaskComplete();
            break;
        case STATES.HANDLE_DEATH:
            handleDeath();
            break;
        case STATES.HANDLE_LEVEL_UP:
            handleLevelUp();
            break;
        case STATES.GATHER_FOOD:
            handleGatherFood();
            break;
        case STATES.COOK_FOOD:
            handleCookFood();
            break;
        case STATES.GATHER_GEAR:
            handleGatherGear();
            break;
        case STATES.TAN_HIDES:
            handleTanHides();
            break;
        case STATES.CRAFT_GEAR:
            handleCraftGear();
            break;
        case STATES.MINE_ORE:
            handleMineOre();
            break;
        case STATES.SMELT_ORE:
            handleSmeltOre();
            break;
        case STATES.SMITH_GEAR:
            handleSmithGear();
            break;
        case STATES.GATHER_RANGED:
            handleGatherRanged();
            break;
        case STATES.WALK_TO_GATHER:
            handleWalkToGather();
            break;
        case STATES.CRAFT_ARROWS:
            handleCraftArrows();
            break;
        case STATES.CRAFT_RUNES:
            handleCraftRunes();
            break;
        case STATES.BREW_POTIONS:
            handleBrewPotions();
            break;
        case STATES.LEVEL_HERBLORE:
            handleLevelHerblore();
            break;
        case STATES.RECOVER_GRAVE:
            handleRecoverGrave();
            break;
        case STATES.SETUP_CANNON:
            handleSetupCannon();
            break;
        case STATES.GATHER_CANNONBALLS:
            handleGatherCannonballs();
            break;
        case STATES.TAKING_BREAK:
            handleTakingBreak();
            break;
        case STATES.OUTSIDE_SCHEDULE:
            handleOutsideSchedule();
            break;
        case STATES.REPAIR_BARROWS:
            handleRepairBarrows();
            break;
        case STATES.IDLE:
            // Do nothing -- idle until manually restarted or state changed
            break;
        case STATES.DEBUG_IDLE:
            handleDebugIdle();
            break;
        default:
            botMsg("Unknown state: " + state + ", resetting.", "SlayerBot");
            state = STATES.STARTUP;
            break;
    }
    // --- DEBUG RETURN INTERCEPTOR ---
    checkDebugReturn();
    debugWatchdog();
  } catch (err) {
    Game.sendGameMessage("[ROTS] ERROR in OnGameTick: " + err, "[ERR]");
    Game.sendGameMessage("[ROTS] State was: " + state + " | Tick: " + tickCounter, "[ERR]");
  }
}

// =============================================================================
// TASK DIFFICULTY CLASSIFIER -- determines supply needs by monster combat level
// TRIVIAL = ghosts/chickens/rats, EASY = goblins/skeletons, MEDIUM = giants,
// HARD = dragons/demons, BOSS = abyssal demons/gargoyles
// =============================================================================
function getTaskDifficulty() {
    if (!currentTaskMonster) return "MEDIUM"; // default safe
    var cmb = currentTaskMonster.combatLevel || 1;

    if (cmb <= 25) return "TRIVIAL";   // ghosts(19), chickens, rats, cows, goblins
    if (cmb <= 60) return "EASY";      // skeletons, zombies, hill giants
    if (cmb <= 120) return "MEDIUM";   // fire giants, moss giants, bloodveld
    if (cmb <= 200) return "HARD";     // dragons, greater demons, hellhounds
    return "BOSS";                      // abyssal demons, gargoyles, kraken
}

// Returns how much food the player actually needs for this task
function getDesiredFoodCount() {
    var diff = getTaskDifficulty();
    var kl = killsLeft || 10;
    var playerCmb = getCombatLevel();

    // LOW LEVEL OVERRIDE: at low combat, even trivial mobs hit hard
    // Brad: "need to take at least 15 food for tasks early on"
    if (playerCmb < 40) {
        // Low level: always bring 15 minimum
        if (diff === "TRIVIAL" || diff === "EASY") return 15;
        return 18; // medium+ at low level = bring more
    }
    if (playerCmb < 70) {
        // Mid level: still bring decent food
        if (diff === "TRIVIAL") return 8;
        if (diff === "EASY") return 10;
        if (diff === "MEDIUM") return 14;
        return 18;
    }

    // High level (70+): original scaling
    if (diff === "TRIVIAL") {
        if (kl <= 15) return 4;
        return 6;
    }
    if (diff === "EASY") {
        if (kl <= 20) return 6;
        return 8;
    }
    if (diff === "MEDIUM") {
        if (kl <= 15) return 10;
        return 14;
    }
    if (diff === "HARD") {
        return 18;
    }
    // BOSS
    return 22;
}

// Returns how many prayer pots needed (0 if task doesnt warrant it)
function getDesiredPrayerPotCount() {
    var diff = getTaskDifficulty();
    // TRIVIAL and EASY: never need prayer pots
    if (diff === "TRIVIAL" || diff === "EASY") return 0;
    // MEDIUM: only if config says use prayer
    if (diff === "MEDIUM") {
        if (!cfgVal("usePrayer", false)) return 0;
        return 1;
    }
    // HARD: always want prayer pots if available
    if (diff === "HARD") return 2;
    // BOSS
    return 4;
}

// Does this task need combat potions?
function taskNeedsCombatPots() {
    var diff = getTaskDifficulty();
    // TRIVIAL and EASY: waste of potions
    if (diff === "TRIVIAL" || diff === "EASY") return false;
    return true;
}

// Does this task warrant a cannon?
function taskNeedsCannon() {
    if (!cfgVal("useCannon", false)) return false;
    var diff = getTaskDifficulty();
    // TRIVIAL/EASY: absolute waste of cannonballs
    if (diff === "TRIVIAL" || diff === "EASY") return false;
    // Only in multicombat
    if (!currentTaskMonster) return false;
    return shouldUseCannon(currentTaskMonster, true);
}

// Pick the best food tier player can actually fish/cook
// Returns full fishing plan based on player's fishing + cooking level
// Uses SS_FOOD_TIERS to pick best fish, tool, secondary items, and location
function getFishingPlan(fishLvl) {
    var cookLvl = 1;
    try { cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1; } catch(e) {}
    var bestTier = null;
    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {
        var t = SS_FOOD_TIERS[i];
        if (t.method !== "fish") continue;
        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {
            bestTier = t;
            break;
        }
    }
    if (!bestTier) {
        // Fallback to shrimps (tier 1) - always available
        bestTier = SS_FOOD_TIERS[1];
    }
    return bestTier;
}

// Backward-compat wrapper: returns just the tool ID
function getBestFishingTool(fishLvl) {
    var plan = getFishingPlan(fishLvl);
    return plan ? plan.toolId : 303;
}

function getBestFoodTierForPlayer() {
    var cookLvl = 1;
    var fishLvl = 1;
    try {
        cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;
        fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;
    } catch(e) {}

    // Walk the food tiers backwards to find best player can use
    var bestTier = null;
    for (var i = SS_FOOD_TIERS.length - 1; i >= 0; i--) {
        var t = SS_FOOD_TIERS[i];
        if (fishLvl >= t.minFishLevel && cookLvl >= t.minCookLevel) {
            // Skip quest-locked tiers player may not have
            if (t.questRequired) continue;
            bestTier = t;
            break;
        }
    }
    if (!bestTier) bestTier = SS_FOOD_TIERS[0]; // chicken fallback
    return bestTier;
}

function needsArrows() {

function needsRunes() {

    if (!cfgVal("turaelBoosting", false)) {
        return selectBestMaster(cmb, slay, pref);

    turaelStreakCount++;
    if (turaelStreakCount % 10 === 0) {
        // 10th task: use highest master for bonus points
        botMsg("Turael boosting: using highest master (task #" + turaelStreakCount + ")", "SlayerBot");
        return selectBestMaster(cmb, slay, "Auto");
    } else {
        // Use Turael for quick easy tasks

        return SLAYER_MASTERS.TURAEL;
    }

function checkForSuperior() {
    if (!currentTaskMonster) return null;
    var superiorData = getSuperiorNpcId(currentTaskMonster.name);
    if (!superiorData) return null;
    var superior = Game.info.npc.getNearest([superiorData]);
    if (superior && !superior.isDead()) {
        return superior;
    }
    return null;
}

function pickUpLoot() {
    var groundItems = null;
    try { groundItems = Game.info.groundItem.getAll(); } catch(e) { return false; }
    if (!groundItems || groundItems.length === 0) return false;

    var playerLoc = getPlayerLocation();

    for (var i = 0; i < groundItems.length; i++) {
        var item = groundItems[i];
        var itemId = safeGetId(item);
        if (itemId === -1) continue;

        // Distance check: only pick up items within 5 tiles
        var itemLoc = null;
        try { itemLoc = item.getWorldLocation(); } catch(e) { continue; }
        if (!itemLoc) continue;
        var ilx = 0; var ily = 0;
        try { ilx = itemLoc.getX(); ily = itemLoc.getY(); } catch(e2) { continue; }
        var dx = Math.abs(ilx - playerLoc.x);
        var dy = Math.abs(ily - playerLoc.y);
        if (dx > 5 || dy > 5) continue;

        // Always pick up: bones, clue scrolls
        var isBone = ALL_BONE_IDS.indexOf(itemId) !== -1;
        var isClue = CLUE_SCROLLS.indexOf(itemId) !== -1;

        if (isBone && cfgVal("buryBones", false)) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.pickup(item);
                fightIdleTicks = 0;
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }

        if (isClue) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.pickup(item);
                fightIdleTicks = 0;
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }

        // Pick up stackable/notable items
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.groundItem.pickup(item);
            isExecuting = false;
        }, Utility.getDelay());
        return true;
    }
    return false;
}

function setAttackStyle() {
    var focus = "Shared";
    try { focus = cfgVal("trainingFocus", "balanced"); } catch(e) {}
    var atkCap = 99;
    var strCap = 99;
    var defCap = 99;

    try { strCap = cfgVal("strengthCap", 99); } catch(e) {}

}

function attackWithRangedOrMagic() {
    if (!currentTaskMonster) return;
    if (!isPlayerIdle()) return;
    var npcIds = currentTaskMonster.npcIds;
    if (!npcIds || npcIds.length === 0) return;

    var target = Game.info.npc.getNearest(npcIds);
    if (!target || target.isDead()) return;

    actionCooldown = 3;
    Utility.invokeLater(function() {

        isExecuting = false;

}

function handleSurvivalChecks() {
    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);
    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);

    // Emergency eat
    if (currentHP <= Math.floor(maxHP * 0.4)) {
        eatFood();
        return;
    }

    // Prayer check
    if (cfgVal("usePrayer", false)) {
        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);
        if (currentPrayer <= 10) {
            drinkPrayerPot();
            return;
        }
    }

    // Dragon task antifire
    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {
        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {
            drinkAntifire();
        }
    }

    // Poison monsters antipoison
    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {
        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {
            drinkAntipoison();
        }
    }

    // Combat potion re-dose
    if (ticksSinceCombatPot > 50) {
        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);
        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);
        if (boostedAtk <= realAtk + 2) {
            if (drinkCombatPotion()) {
                ticksSinceCombatPot = 0;
            }
        }
        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);
        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);
        if (boostedStr <= realStr + 2) {
            if (drinkStrengthPotion()) {
                ticksSinceCombatPot = 0;
            }
        }
    }
}

function saveDeathLocation() {

    if (currentTaskMonster) {

function readTaskFromVarbits() {
    try {
        var killCount = Game.getVarPlayerValue(394);  // SLAYER_COUNT
        var creatureId = Game.getVarPlayerValue(395);  // SLAYER_TARGET

        if (killCount > 0 && creatureId > 0) {
            killsLeft = killCount;
            botMsg("Varbit read: " + killCount + " kills left, creature ID " + creatureId, "SlayerBot");

            // Try to map creature ID to name
            if (SLAYER_CREATURE_MAP[creatureId]) {
                currentTaskName = SLAYER_CREATURE_MAP[creatureId];
                currentTaskMonster = findMonster(currentTaskName);
                if (currentTaskMonster) {
                    botMsg("VARBIT TASK FOUND: " + currentTaskName + " (" + killsLeft + " left) at (" + currentTaskMonster.location.x + "," + currentTaskMonster.location.y + ") - NO GEM NEEDED!", "SlayerBot");
                } else {
                    botMsg("VARBIT TASK: " + currentTaskName + " (" + killsLeft + " left) - WARNING: not in MONSTER_DB!", "SlayerBot");
                }
                return true;
            } else {
                botMsg("Creature ID " + creatureId + " not in map - need gem or master to identify", "SlayerBot");
                // We know kills remain but not the task name
                return false;
            }
        } else if (killCount === 0 || creatureId === 0) {
            botMsg("Varbit says NO active task (kills=" + killCount + ", creature=" + creatureId + ")", "SlayerBot");
            killsLeft = 0;
            currentTaskName = "";
            return false;
        }
    } catch(e) {
        botMsg("Varbit read failed: " + e + " - falling back to gem/master", "SlayerBot");
    }
    return false;
}

// ---- STARTUP ----
function handleStartup() {
    // --- DEBUG MODE CHECK ---
    if (cfgVal("debugMode", false) && !debugActive) {
        debugActive = true;
        debugTickCount = 0;
        botMsg("DEBUG MODE ENABLED -- bot will stand still", "DEBUG");
        botMsg("Type !help in chat to see available test commands", "DEBUG");
        if (statusOverlay) statusOverlay.setValue("Status: DEBUG MODE");
        if (debugOverlay) debugOverlay.setValue("DEBUG: Idle -- type !help");
        state = STATES.DEBUG_IDLE;
        return;
    }
    botMsg("Auto Slayer Bot v24-Fix10o starting up!", "SlayerBot");
    updateCachedStats();
    retryCount = 0;
    isExecuting = false;

    // STEP 1: Try reading task from varbits (instant -- no gem needed)
    var gotTaskFromVarbit = readTaskFromVarbits();

    if (gotTaskFromVarbit && currentTaskName && killsLeft > 0) {
        // Varbit gave us everything -- skip gem entirely!
        currentTaskMonster = findMonster(currentTaskName);
        botMsg("Task from varbit: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
        // Brad's shortcut: if already have food + gear equipped, skip bank entirely
        var startupFood = countFood();
        var startupHasWeapon = false;
        // Check if any melee weapon is equipped
        for (var wt = 0; wt < MELEE_WEAPONS.length; wt++) {
            if (Game.info.equipment.hasItem(MELEE_WEAPONS[wt].id)) {
                startupHasWeapon = true;
                break;
            }
        }
        if (startupFood >= 2 && startupHasWeapon && currentTaskMonster) {
            botMsg("Already have food (" + startupFood + ") + gear equipped -- going straight to task!", "SlayerBot");
            state = STATES.WALK_TO_TASK;
        } else {
            botMsg("Need supplies (food:" + startupFood + " weapon:" + startupHasWeapon + ") -- checking...", "SlayerBot");
            state = STATES.CHECK_SUPPLIES;
        }
        return;
    }

    // Varbit says kills > 0 but creature ID not in map -- need gem to identify
    if (killsLeft > 0 && !currentTaskName) {
        botMsg("Varbit shows " + killsLeft + " kills but unknown creature -- checking gem...", "SlayerBot");
        hasGem = Game.info.inventory.hasItem(4155, 1);
        if (hasGem) {
            state = STATES.CHECK_GEM;
        } else {
            botMsg("No gem either -- banking for gem to identify task", "SlayerBot");
            needGemFromBank = true;
            state = STATES.WALK_TO_BANK;
        }
        return;
    }

    // STEP 2: Varbit says NO task (kills = 0)
    // Skip gem check entirely -- go straight to master for new task!
    if (killsLeft === 0) {
        botMsg("No active task (varbit confirmed) -- going to master for new task!", "SlayerBot");
        state = STATES.CHECK_STATS;
        return;
    }

    // STEP 3: Fallback -- varbit read failed, try gem
    hasGem = Game.info.inventory.hasItem(4155, 1);
    if (hasGem) {
        botMsg("Varbit unavailable -- checking gem for task...", "SlayerBot");
        state = STATES.CHECK_GEM;
    } else {
        botMsg("No varbit, no gem -- going straight to master", "SlayerBot");
        state = STATES.CHECK_STATS;
    }
}

// ---- CHECK_STATS ----
function handleCheckStats() {
    updateCachedStats();
    botMsg("Stats - Cmb:" + combatLevel + " Slay:" + slayerLevel + " Atk:" + attackLevel + " Str:" + strengthLevel + " Def:" + defenceLevel, "SlayerBot");
    botMsg("Stats - Rng:" + rangedLevel + " Mag:" + magicLevel + " Herb:" + herbloreLevel + " Fletch:" + fletchingLevel + " Smith:" + smithingLevel, "SlayerBot");

    // Set attack style based on training focus
    setAttackStyle();

    // SAFETY: If we already have a valid task, do NOT go to master
    if (currentTaskName && killsLeft > 0) {
        botMsg("CHECK_STATS but still have task: " + currentTaskName + " (" + killsLeft + " left) -- resuming!", "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }
    // Try varbits one more time before going to master
    var recovered = readTaskFromVarbits();
    if (recovered && currentTaskName && killsLeft > 0) {
        botMsg("CHECK_STATS recovered task from varbits: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Genuinely no task -- go to master
    state = STATES.SELECT_MASTER;
}


// ---- CHECK_GEM (check enchanted gem or slayer helm for existing task) ----
function handleCheckGem() {
    // If we already know we have a task (e.g., from previous run), skip
    if (currentTaskName && killsLeft > 0) {
        if (!currentTaskMonster) currentTaskMonster = findMonster(currentTaskName);
        botMsg("Already have task: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // If we already tried gem check 2+ times, skip to master
    if (gemCheckAttempts >= 2) {
        botMsg("Gem check failed " + gemCheckAttempts + " times - trying varbits before master...", "SlayerBot");
        gemCheckAttempts = 0;
        // Last resort: try varbits
        var gotTask = readTaskFromVarbits();
        if (gotTask && currentTaskName && killsLeft > 0) {
            currentTaskMonster = findMonster(currentTaskName);
            botMsg("Varbits saved us! Task: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
            state = STATES.CHECK_SUPPLIES;
        } else {
            state = STATES.SELECT_MASTER;
        }
        return;
    }

    gemCheckDone = false;
    noTaskFromGem = false;
    gemCheckAttempts++;

    // Check for enchanted gem (4155) in inventory or slayer helmet equipped
    hasGem = Game.info.inventory.hasItem(4155, 1);
    var hasHelm = false;
    try {
        hasHelm = Game.info.equipment.hasItem(11864) || Game.info.equipment.hasItem(11865);
    } catch(e) {}

    if (hasGem) {
        botMsg("Found enchanted gem - checking task (attempt " + gemCheckAttempts + ")...", "SlayerBot");
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.inventory.actionItem(4155, 3, MenuAction.CC_OP);
            isExecuting = false;
        }, Utility.getDelay());
        gemCheckTick = tickCounter;
        state = STATES.WAIT_GEM_RESPONSE;
    } else if (hasHelm) {
        botMsg("Slayer helm equipped - can check task via helm", "SlayerBot");
        state = STATES.SELECT_MASTER;
    } else {
        botMsg("No gem in inventory - going to bank to grab one", "SlayerBot");
        needGemFromBank = true;

        bankPhase = 0;
        state = STATES.WALK_TO_BANK;
    }
}

// ---- WAIT_GEM_RESPONSE ----
function handleWaitGemResponse() {
    // Wait up to 15 ticks for chat response from gem check
    var elapsed = tickCounter - gemCheckTick;

    if (gemCheckDone) {
        // Chat handler set the task info
        gemCheckAttempts = 0;
        if (currentTaskName && killsLeft > 0) {
            currentTaskMonster = findMonster(currentTaskName);
            botMsg("GEM FOUND TASK: " + currentTaskName + " (" + killsLeft + " left) - skipping master!", "SlayerBot");
            updateCachedStats();
            state = STATES.CHECK_SUPPLIES;
        } else {
            botMsg("Gem check: no active task. Getting stats then going to master.", "SlayerBot");
            state = STATES.CHECK_STATS;
        }
        return;
    }

    if (noTaskFromGem) {
        botMsg("Gem confirms: NO active task. Getting stats then going to master.", "SlayerBot");
        state = STATES.CHECK_STATS;
        return;
    }

    if (elapsed > 15) {
        botMsg("Gem check timed out after 15 ticks - going to master", "SlayerBot");
        state = STATES.SELECT_MASTER;
    }
}

// ---- SELECT_MASTER ----
function handleSelectMaster() {
    selectedMaster = selectMasterWithBoosting(combatLevel, slayerLevel);

    if (!selectedMaster) {
        botMsg("Could not select a slayer master! Using Turael.", "SlayerBot");
        selectedMaster = SLAYER_MASTERS.TURAEL;

// ---- WALK_TO_MASTER ----
var masterWalkCooldown = 0;
function handleWalkToMaster() {
    if (!selectedMaster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    if (isNear(selectedMaster.location.x, selectedMaster.location.y, 10)) {
        state = STATES.TALK_TO_MASTER;
        retryCount = 0;
        masterWalkCooldown = 0;
        return;
    }

    if (masterWalkCooldown > 0) {
        masterWalkCooldown--;
        return;
    }

    if (!PlayerHelper.isWebWalking()) {
        var masterX = selectedMaster.location.x;
        var masterY = selectedMaster.location.y;
        var masterPlane = selectedMaster.location.plane || 0;
        masterWalkCooldown = 10;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(masterX, masterY, masterPlane));
        }, Utility.getDelay());
    }
}

// ---- TALK_TO_MASTER ----
function handleTalkToMaster() {
    if (!selectedMaster) {
        state = STATES.SELECT_MASTER;
        return;
    }

    // Find the master NPC
    var masterNpc = Game.info.npc.getNearest([selectedMaster.npcId]);
    if (!masterNpc) {
        // Not close enough, keep walking
        if (retryCount < maxRetries) {
            retryCount++;
            state = STATES.WALK_TO_MASTER;
        } else {
            botMsg("Cannot find master NPC after retries, resetting.", "SlayerBot");
            retryCount = 0;
            state = STATES.SELECT_MASTER;
        }
        return;
    }

    taskReceived = false;
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.npc.action(masterNpc, MenuAction.NPC_FIRST_OPTION);
        isExecuting = false;
    }, Utility.getDelay());

    state = STATES.WAIT_FOR_TASK;
    waitTicks = 0;
}

// ---- READ_TASK ----
function handleReadTask() {
    if (!currentTaskName || killsLeft <= 0) {
        botMsg("No valid task found, returning to master.", "SlayerBot");
        state = STATES.SELECT_MASTER;
        return;
    }

    botMsg("Task: Kill " + killsLeft + " " + currentTaskName, "SlayerBot");

    // Look up monster data
    currentTaskMonster = findMonster(currentTaskName);
    if (!currentTaskMonster) {
        botMsg("WARNING: Unknown monster '" + currentTaskName + "', returning to master.", "SlayerBot");
        state = STATES.SELECT_MASTER;
        return;
    }

    // v24: Equip task bracelet (expeditious or slaughter)
    equipTaskBracelet(currentTaskName);

    // v24: Check if safespot is available and configured
    var safespotData = null;
    if (cfgVal("useSafespots", false)) {
        safespotData = hasSafeSpot(currentTaskName);
    }
    if (safespotData) {
        usingSafespot = true;
        botMsg("Safespot available for " + currentTaskName + "!", "SlayerBot");
    } else {
        usingSafespot = false;
    }

    // Move to supply check
    state = STATES.CHECK_SUPPLIES;
}

// ---- CHECK_SUPPLIES (TIER-AWARE) ----
function handleCheckSupplies() {
    missingItems = [];
    needsRestock = false;

    var diff = getTaskDifficulty();
    var monName = currentTaskMonster ? currentTaskMonster.name : "unknown";
    botMsg("Task: " + monName + " (" + killsLeft + " left) | Difficulty: " + diff, "SlayerBot");

    // 0. Check coins -- always carry at least 250 GP
    var coinCount = Game.info.inventory.getItemCount(995);
    if (coinCount < 250) {
        missingItems.push({type: "coins", current: coinCount, needed: 250});
        needsRestock = true;
    }

    // 1. Check enchanted gem -- only need it if we don't know our task
    // Once task is known, gem can stay in bank until logout
    if (!currentTaskName && !Game.info.inventory.hasItem(4155, 1)) {
        missingItems.push({type: "gem", current: 0, needed: 1});
        needsRestock = true;
    }

    // 2. Check food -- scaled by difficulty
    var foodCount = countFood();
    var desiredFood = getDesiredFoodCount();
    if (foodCount < desiredFood) {
        missingItems.push({type: "food", current: foodCount, needed: desiredFood});
        needsRestock = true;
    }

    // 3. Prayer pots -- only MEDIUM+ tasks
    var desiredPpots = getDesiredPrayerPotCount();
    if (desiredPpots > 0) {
        var ppotCount = countPrayerPots();
        if (ppotCount < desiredPpots) {
            missingItems.push({type: "prayer_pot", current: ppotCount, needed: desiredPpots});
            needsRestock = true;
        }
    }

    // 4. Combat potions -- only MEDIUM+ tasks
    if (taskNeedsCombatPots()) {
        var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||
                           hasPotionInGroup(SUPER_ATTACK_POTS) ||
                           hasPotionInGroup(ATTACK_POTS);
        if (!hasCombatPot) {
            missingItems.push({type: "combat_pot", current: 0, needed: 1});
            needsRestock = true;
        }
    }

    // 5. Arrows (ranged users or safespot)
    if (cfgVal("useRanged", false) || usingSafespot) {
        var arrowCount = countArrows();
        if (arrowCount < 100) {
            missingItems.push({type: "arrows", current: arrowCount, needed: 500});
            needsRestock = true;
        }
    }

    // 6. Runes (magic users)
    if (cfgVal("useMagic", false)) {
        var runeCount = countRunes();
        if (runeCount < 100) {
            missingItems.push({type: "runes", current: runeCount, needed: 500});
            needsRestock = true;
        }
    }

    // 7. Antifire potions (dragon tasks only -- always HARD+)
    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {
        var hasAntifire = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||
                          hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||
                          hasPotionInGroup(ANTIFIRE_POTS);
        if (!hasAntifire) {
            missingItems.push({type: "antifire", current: 0, needed: 2});
            needsRestock = true;
        }
    }

    // 8. Antipoison (poison tasks only)
    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {
        var hasAntipois = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||
                          hasPotionInGroup(ANTIVENOM_IDS) ||
                          hasPotionInGroup(SUPER_ANTIPOISON_IDS);
        if (!hasAntipois) {
            missingItems.push({type: "antipoison", current: 0, needed: 1});
            needsRestock = true;
        }
    }

    // 9. Cannonballs -- only MEDIUM+ multicombat
    if (taskNeedsCannon()) {
        var cballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);
        if (cballs < 200) {
            missingItems.push({type: "cannonballs", current: cballs, needed: CANNON.MIN_CANNONBALLS});
            needsRestock = true;
        }
    }

    // 10. Barrows gear condition -- repair at 25%
    var barrowsRepairNeeded = checkEquippedBarrowsCondition();
    if (barrowsRepairNeeded.length > 0) {
        for (var br = 0; br < barrowsRepairNeeded.length; br++) {
            botMsg("[SlayerBot] WARNING: " + barrowsRepairNeeded[br].piece +
                " is at " + barrowsRepairNeeded[br].condition + "% - repair needed!", "Bot");
        }
        stateBeforeRepair = state;
        repairPhase = "walk_to_bob";
        state = STATES.REPAIR_BARROWS;
        return;
    }

    // 11. Special finish items (gargoyle/rockslug/lizard)
    if (cfgVal("specialFinish", false) && currentTaskMonster) {
        var mn = currentTaskMonster.name.toLowerCase();
        if (mn.indexOf("gargoyle") !== -1 && !Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {
            missingItems.push({type: "special", itemId: ROCK_HAMMER_ID, name: "rock_hammer"});
            needsRestock = true;
        }
        if ((mn.indexOf("rockslug") !== -1 || mn.indexOf("lizard") !== -1) && !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
            missingItems.push({type: "special", itemId: ICE_COOLER_ID, name: "ice_cooler"});
            needsRestock = true;
        }
    }

    // 12. Jewelry charge check - replace if at 1 charge or uncharged
    var activeJewelry = getActiveJewelryTypes();
    for (var ji = 0; ji < activeJewelry.length; ji++) {
        if (isJewelryLow(activeJewelry[ji])) {
            missingItems.push({type: "jewelry", jewelry: activeJewelry[ji], name: activeJewelry[ji].name});
            needsRestock = true;
            botMsg("[Jewelry] " + activeJewelry[ji].name + " is low on charges - need replacement!", "SlayerBot");
        }
    }

    if (needsRestock) {
        var types = [];
        for (var mi = 0; mi < missingItems.length; mi++) { types.push(missingItems[mi].type); }
        botMsg(diff + " task needs: " + types.join(", "), "SlayerBot");
        state = STATES.WALK_TO_BANK;
    } else {
        botMsg(diff + " task - supplies OK! Heading to " + monName + ".", "SlayerBot");
        state = STATES.WALK_TO_TASK;
    }
}

// ---- WALK_TO_BANK ----
// With stuck detection: if player cant reach bank in 10s, walk to fallback bank
function handleWalkToBank() {
    // If bank is already open -- success!
    if (Game.info.bank.isOpen()) {
        bankStuckCount = 0; // reset stuck counter
        state = STATES.BANK_SUPPLIES;
        waitTicks = 0;
        withdrawQueue = [];
        gatherNeeded = [];
        gatherToolsToWithdraw = [];
        if (!currentTaskName && needGemFromBank) {
            botMsg("Bank open - Trip 1: getting gem");
            bankPhase = 1;
        } else {
            botMsg("Bank open - Trip 2: supply run");
            bankPhase = 10;
        }
        return;
    }

    // If still walking, wait (but check stuck)
    if (PlayerHelper.isWebWalking()) {
        checkBankStuck();
        return;
    }

    if (isExecuting) {
        // Safety: auto-reset isExecuting after 10 ticks to prevent permanent lock
        isExecutingTimeout++;
        if (isExecutingTimeout >= 10) {
            botMsg("isExecuting stuck for 10 ticks - force reset", "SlayerBot");
            isExecuting = false;
            isExecutingTimeout = 0;
        }
        return;
    }
    isExecutingTimeout = 0;

    // STUCK CHECK: if stuck 2+ times (~20 sec no movement), walk to fallback bank
    if (checkBankStuck() && bankStuckCount >= 2) {
        var fallback = getAccessibleBank();
        if (fallback) {
            botMsg("Bank unreachable! Walking to " + fallback.name + " instead", "SlayerBot");
            bankStuckCount = 0;
            bankStuckTick = tickCounter;
            isExecuting = true;
            var fbx = fallback.x;
            var fby = fallback.y;
            var fbp = fallback.plane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(fbx, fby, fbp));
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
    }

    // LUMBRIDGE CHECK: if at Lumbridge spawn, dont try openNearest (bank is upstairs)
    if (isAtLumbridge()) {
        var alKharid = FALLBACK_BANKS[0]; // Al Kharid is closest ground-floor bank
        botMsg("At Lumbridge - walking to " + alKharid.name + " bank (ground floor)", "SlayerBot");
        isExecuting = true;
        var akx = alKharid.x;
        var aky = alKharid.y;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(akx, aky, 0));
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Normal path: openNearest handles walking + opening
    isExecuting = true;
    Utility.invokeLater(function() {
        try {
            Game.interact.bank.openNearest(0, true);
        } catch(e) {
            botMsg("openNearest error: " + e.message);
        }
        isExecuting = false;
    }, Utility.getDelay());
}

// ---- BANK_SUPPLIES ----
// ============================================================
// BANK FLOW -- Brad's exact spec:
// Trip 1 (task unknown only): open -> get gem -> close -> check gem
// Trip 2 (main supply run):   open -> deposit gem -> resource check
//   if good: withdraw all supplies -> close -> go kill
//   if bad:  grab gather tools + 250gp -> close -> go gather
// ALL decisions made WHILE BANK IS OPEN -- never close to think
// ============================================================
var bankPhase = 0;
var withdrawQueue = [];
var bankOpenAttemptTick = 0;
var bankStuckX = 0;
var bankStuckY = 0;
var bankStuckTick = 0;
var bankStuckCount = 0;
var bankBlacklistId = 0; // NPC/booth ID to avoid
var isExecutingTimeout = 0; // safety reset for isExecuting
var gatherNeeded = [];
var gatherToolsToWithdraw = []; // tools needed to go gather missing resources

function handleBankSupplies() {
    if (isExecuting) return;

    // ---- MANUAL BANK OVERRIDE: Brad opens bank himself ----
    if (bankPhase === 0 && Game.info.bank.isOpen()) {
        botMsg("Bank detected - starting supply run");
        bankPhase = 10; // jump to main supply run deposit phase
        waitTicks = 0;
        withdrawQueue = [];
        gatherNeeded = [];
        gatherToolsToWithdraw = [];
        return;
    }

    // ========================================================
    // TRIP 1: GEM RETRIEVAL (only when task is unknown)
    // Phases 1-5
    // ========================================================

    // Phase 1: Open bank for gem
    if (bankPhase === 1) {
        if (Game.info.bank.isOpen()) {
            if (!Game.info.bank.setupCorrectly()) return;
            bankPhase = 2;
            waitTicks = 0;
            return;
        }
        // Not open yet -- let WALK_TO_BANK handle opening
        if (tickCounter - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = tickCounter;
        Game.interact.bank.openNearest(0, true);
        return;
    }

    // Phase 2: Withdraw gem
    if (bankPhase === 2) {
        if (!Game.info.bank.isOpen()) { bankPhase = 1; return; }
        waitTicks++;
        if (waitTicks < 3) return; // settle
        if (Game.info.bank.hasItem(4155, 1)) {
            botMsg("Withdrawing gem...");
            withdrawBankItem(4155, 1);
            needGemFromBank = false;
            bankPhase = 3;
            waitTicks = 0;
        } else {
            botMsg("No gem in bank - going to master without it");
            needGemFromBank = false;
            bankPhase = 4; // close and go to master
            waitTicks = 0;
            postBankState = STATES.SELECT_MASTER;
        }
        return;
    }

    // Phase 3: Close bank after gem withdrawal (need to close to check gem)
    if (bankPhase === 3) {
        waitTicks++;
        if (waitTicks < 3) return; // let withdrawal settle
        if (Game.info.bank.isOpen()) {
            Game.interact.bank.close();
        }
        bankPhase = 35;
        waitTicks = 0;
        return;
    }

    // Phase 3.5: Wait for bank to close, then go check gem
    if (bankPhase === 35) {
        waitTicks++;
        if (waitTicks < 4) return;
        if (Game.info.bank.isOpen()) return; // still closing
        botMsg("Bank closed. Checking gem...");
        bankPhase = 0;
        waitTicks = 0;
        state = STATES.CHECK_GEM;
        return;
    }

    // Phase 4: Close bank and go to postBankState (gem not found path)
    if (bankPhase === 4) {
        if (Game.info.bank.isOpen()) {
            Game.interact.bank.close();
        }
        bankPhase = 45;  // check jewelry before final exit
        waitTicks = 0;
        return;
    }

    // Phase 5: Wait for close then transition
    // ---- JEWELRY REPLACEMENT (bankPhase 45) ----
    if (bankPhase === 45) {
        var activeJewelry = getActiveJewelryTypes();
        var jewelryHandled = false;
        for (var ji = 0; ji < activeJewelry.length; ji++) {
            var jDef = activeJewelry[ji];
            if (isJewelryLow(jDef)) {
                // Deposit the old low-charge jewelry first
                for (var li = 0; li < jDef.lowChargeIds.length; li++) {
                    if (Game.info.inventory.hasItem(jDef.lowChargeIds[li], 1)) {
                        Game.interact.bank.depositItem(jDef.lowChargeIds[li], BankDepositType.DEPOSIT_ALL);
                        botMsg("[Jewelry] Deposited low-charge " + jDef.name, "SlayerBot");
                        actionCooldown = 3;
                        return;
                    }
                }
                if (jDef.unchargedId && Game.info.inventory.hasItem(jDef.unchargedId, 1)) {
                    Game.interact.bank.depositItem(jDef.unchargedId, BankDepositType.DEPOSIT_ALL);
                    botMsg("[Jewelry] Deposited uncharged " + jDef.name, "SlayerBot");
                    actionCooldown = 3;
                    return;
                }
                // Now withdraw a charged replacement
                var replId = findBankReplacement(jDef);
                if (replId > 0) {
                    Game.interact.bank.withdrawItem(replId, BankWithdrawType.WITHDRAW_ONE, false);
                    botMsg("[Jewelry] Withdrew " + jDef.name + " replacement (id:" + replId + ")", "SlayerBot");
                    jewelryHandled = true;
                    actionCooldown = 3;
                    return;
                } else {
                    // No replacement in bank - will need to buy at GE
                    botMsg("[Jewelry] No " + jDef.name + " in bank - will buy at GE", "SlayerBot");
                    needGEJewelry = jDef;
                    jewelryHandled = true;
                }
            }
        }
        bankPhase = 5;
        if (!jewelryHandled) {
            actionCooldown = 2;
        }
        return;
    }

    if (bankPhase === 5) {
        waitTicks++;
        if (waitTicks < 4) return;
        if (Game.info.bank.isOpen()) return;
        var ns = postBankState;
        if (!ns) {
            if (currentTaskName) {
                ns = STATES.CHECK_SUPPLIES;
            } else {
                var bkCreature = Game.getVarPlayerValue(395);
                var bkKills = Game.getVarPlayerValue(394);
                if (bkCreature > 0 && bkKills > 0) {
                    var bkName = SLAYER_CREATURE_MAP[bkCreature];
                    if (bkName) {
                        currentTaskName = bkName;
                        currentTaskMonster = findMonster(bkName);
                        killsLeft = bkKills;
                        botMsg("Bank exit recovered task: " + bkName + " x" + bkKills);
                        ns = STATES.CHECK_SUPPLIES;
                    } else { ns = STATES.SELECT_MASTER; }
                } else { ns = STATES.SELECT_MASTER; }
            }
        }
        postBankState = null;
        bankPhase = 0;
        waitTicks = 0;
        state = ns;
        return;
    }

    // ========================================================
    // TRIP 2: MAIN SUPPLY RUN (task is known)
    // Phases 10-19
    // ========================================================

    // Phase 10: Open bank for supply run
    if (bankPhase === 10) {
        if (Game.info.bank.isOpen()) {
            if (!Game.info.bank.setupCorrectly()) return;
            bankPhase = 11;
            waitTicks = 0;
            return;
        }
        if (tickCounter - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = tickCounter;
        Game.interact.bank.openNearest(0, true);
        return;
    }

    // Phase 11: Deposit everything (including gem if we have it)
    if (bankPhase === 11) {
        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }
        botMsg("Depositing all inventory...");
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.depositAllInventory();
            isExecuting = false;
        }, Utility.getDelay());
        bankPhase = 12;
        waitTicks = 0;
        return;
    }

    // Phase 12: Wait for deposit to settle, then do RESOURCE CHECK while bank is open
    if (bankPhase === 12) {
        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }
        waitTicks++;
        if (waitTicks < 4) return;
        waitTicks = 0;

        // ---- RESOURCE CHECK (bank is open -- we can see what we have) ----
        withdrawQueue = [];
        gatherNeeded = [];
        gatherToolsToWithdraw = [];

        var diff = getTaskDifficulty();

        // --- Food ---
        var foodId = getFoodId();
        if (typeof foodId === "string") {
            var FOOD_MAP = {
                "shrimps": 315, "shrimp": 315, "anchovies": 319,
                "trout": 333, "salmon": 329, "tuna": 361,
                "lobster": 379, "swordfish": 373,
                "monkfish": 7946, "shark": 385,
                "manta ray": 391, "karambwan": 3144,
                "anglerfish": 13441
            };
            foodId = FOOD_MAP[foodId.toLowerCase()] || 379;
        }
        var desiredFood = getDesiredFoodCount();
        if (desiredFood > 0) {
            if (Game.info.bank.hasItem(foodId, 1)) {
                withdrawQueue.push({ id: foodId, qty: desiredFood, label: "Food x" + desiredFood });
            } else {
                gatherNeeded.push("food");
                // Get full fishing plan: tool + secondary + location
                var fishLvl = Client.getRealSkillLevels(Skill.FISHING);
                var fishPlan = getFishingPlan(fishLvl);
                if (fishPlan) {
                    gatherFoodTier = fishPlan;
                    botMsg("Fish plan: " + fishPlan.name + " (tool: " + fishPlan.toolRequired + ", location: " + JSON.stringify(fishPlan.gatherLocation) + ")");
                    // Withdraw fishing tool
                    if (fishPlan.toolId && Game.info.bank.hasItem(fishPlan.toolId, 1)) {
                        gatherToolsToWithdraw.push({ id: fishPlan.toolId, qty: 1, label: fishPlan.toolRequired });
                    }
                    // Withdraw secondary (feathers for fly fishing, etc.)
                    if (fishPlan.secondaryId && fishPlan.secondaryNeeded) {
                        if (Game.info.bank.hasItem(fishPlan.secondaryId, 1)) {
                            gatherToolsToWithdraw.push({ id: fishPlan.secondaryId, qty: fishPlan.secondaryNeeded, label: "Fishing secondary x" + fishPlan.secondaryNeeded });
                        }
                    }
                }
            }
        }

        // --- Prayer pots ---
        var desiredPpots = getDesiredPrayerPotCount();
        if (desiredPpots > 0) {
            withdrawQueue.push({ id: "ppot", qty: desiredPpots, label: "Prayer pots", potion: true, group: PRAYER_POTS });
        }

        // --- Combat pots ---
        if (taskNeedsCombatPots()) {
            withdrawQueue.push({ id: "combatpot", qty: 1, label: "Combat pot", potion: true, group: SUPER_COMBAT_POTS, fallback1: SUPER_ATTACK_POTS, fallback2: ATTACK_POTS });
        }

        // --- Arrows ---
        if (cfgVal("useRanged", false) || usingSafespot) {
            var bestArrow = getBestArrows(rangedLevel);
            if (bestArrow) {
                if (Game.info.bank.hasItem(bestArrow.id, 1)) {
                    withdrawQueue.push({ id: bestArrow.id, qty: 500, label: "Arrows x500" });
                } else {
                    gatherNeeded.push("arrows");
                }
            }
        }

        // --- Runes ---
        if (cfgVal("useMagic", false)) {
            var spell = getBestSpell(magicLevel);
            if (spell) {
                var runes = getRunesForSpell(spell.key);
                if (runes) {
                    var runeKeys = Object.keys(runes);
                    for (var r = 0; r < runeKeys.length; r++) {
                        var runeId = parseInt(runeKeys[r]);
                        var runeQty = runes[runeKeys[r]] * 200;
                        if (Game.info.bank.hasItem(runeId, 1)) {
                            withdrawQueue.push({ id: runeId, qty: runeQty, label: "Rune " + runeId });
                        } else {
                            gatherNeeded.push("runes");
                        }
                    }
                }
            }
        }

        // --- Antifire (dragons) ---
        if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {
            withdrawQueue.push({ id: "antifire", qty: 2, label: "Antifire", potion: true, group: SUPER_ANTIFIRE_POTS, fallback1: EXTENDED_ANTIFIRE_POTS, fallback2: ANTIFIRE_POTS });
        }

        // --- Antipoison ---
        if (currentTaskMonster && canPoison(currentTaskMonster.name)) {
            withdrawQueue.push({ id: "antipoison", qty: 1, label: "Antipoison", potion: true, group: SUPER_ANTIPOISON_IDS });
        }

        // --- Cannonballs ---
        if (cfgVal("useCannon", false) && shouldUseCannon(currentTaskMonster, true)) {
            if (Game.info.bank.hasItem(CANNON.CANNONBALL, 1)) {
                withdrawQueue.push({ id: CANNON.CANNONBALL, qty: CANNON.MIN_CANNONBALLS, label: "Cannonballs" });
            } else {
                gatherNeeded.push("cannonballs");
            }
        }

        // --- Special items (rock hammer, ice cooler) ---
        if (cfgVal("specialFinish", false) && currentTaskMonster) {
            var monName = currentTaskMonster.name.toLowerCase();
            if (monName.indexOf("gargoyle") !== -1 && Game.info.bank.hasItem(ROCK_HAMMER_ID, 1)) {
                withdrawQueue.push({ id: ROCK_HAMMER_ID, qty: 1, label: "Rock hammer" });
            }
            if ((monName.indexOf("rockslug") !== -1 || monName.indexOf("lizard") !== -1) && Game.info.bank.hasItem(ICE_COOLER_ID, 1)) {
                withdrawQueue.push({ id: ICE_COOLER_ID, qty: 1, label: "Ice cooler" });
            }
        }

        // --- Coins (always 250gp) ---
        if (Game.info.bank.hasItem(995, 1)) {
            withdrawQueue.push({ id: 995, qty: 250, label: "250 GP" });
        }

        // --- GEAR CHECK (Fix10m) --- Scan ALL tiers, grab best actually IN BANK ---
        var atkLvl = Client.getRealSkillLevels(Skill.ATTACK);
        var defLvl = Client.getRealSkillLevels(Skill.DEFENCE);

        // Helper: scan tier array, find best item in bank that player can use & doesn't have equipped
        var findBestInBank = function(tierArray, levelField, playerLevel) {
            for (var ti = 0; ti < tierArray.length; ti++) {
                var item = tierArray[ti];
                var reqLevel = item[levelField] || 1;
                if (playerLevel >= reqLevel) {
                    // Already equipped? Skip (we're good)
                    if (Game.info.equipment.hasItem(item.id)) return null;
                    // In bank? Grab it!
                    if (Game.info.bank.hasItem(item.id, 1)) return item;
                    // Not in bank -- try next tier down
                }
            }
            return null;
        };

        var gearWep = findBestInBank(MELEE_WEAPONS, "atkReq", atkLvl);
        if (gearWep) withdrawQueue.push({ id: gearWep.id, qty: 1, label: "Weapon: " + gearWep.name });

        var gearBod = findBestInBank(PLATEBODIES, "defReq", defLvl);
        if (gearBod) withdrawQueue.push({ id: gearBod.id, qty: 1, label: "Body: " + gearBod.name });

        var gearLeg = findBestInBank(PLATELEGS, "defReq", defLvl);
        if (gearLeg) withdrawQueue.push({ id: gearLeg.id, qty: 1, label: "Legs: " + gearLeg.name });

        var gearHelm = findBestInBank(HELMETS, "defReq", defLvl);
        if (gearHelm) withdrawQueue.push({ id: gearHelm.id, qty: 1, label: "Helm: " + gearHelm.name });

        var gearShld = findBestInBank(SHIELDS, "defReq", defLvl);
        if (gearShld) withdrawQueue.push({ id: gearShld.id, qty: 1, label: "Shield: " + gearShld.name });

        var gearBoot = findBestInBank(BOOTS, "defReq", defLvl);
        if (gearBoot) withdrawQueue.push({ id: gearBoot.id, qty: 1, label: "Boots: " + gearBoot.name });

        var gearGlv = findBestInBank(GLOVES, "defReq", defLvl);
        if (gearGlv) withdrawQueue.push({ id: gearGlv.id, qty: 1, label: "Gloves: " + gearGlv.name });

        botMsg("Gear scan: atk=" + atkLvl + " def=" + defLvl + " wep=" + (gearWep ? gearWep.name : "equipped/none") + " body=" + (gearBod ? gearBod.name : "equipped/none"));

        // ---- JEWELRY REPLACEMENT (hotfix18) ----
        var activeJwl = getActiveJewelryTypes();
        for (var jwi = 0; jwi < activeJwl.length; jwi++) {
            var jwDef = activeJwl[jwi];
            if (isJewelryLow(jwDef)) {
                var replJwl = findBankReplacement(jwDef);
                if (replJwl > 0) {
                    withdrawQueue.push({ id: replJwl, qty: 1, label: "Jewelry: " + jwDef.name });
                    botMsg("[Jewelry] Queued " + jwDef.name + " replacement (id:" + replJwl + ")");
                } else {
                    botMsg("[Jewelry] No " + jwDef.name + " in bank! Will need GE purchase.");
                    needGEJewelry = jwDef;
                }
            }
        }

        // ---- FIX10n: NO GEAR DETECTION -> BUY AT GE ----
        var hasGearInBank = (gearWep || gearBod || gearLeg || gearHelm || gearShld || gearBoot || gearGlv);
        if (!hasGearInBank) {
            // Check if player already has SOMETHING equipped
            var hasEquippedWep = false;
            var hasEquippedBod = false;
            for (var mwc = 0; mwc < MELEE_WEAPONS.length; mwc++) {
                if (Game.info.equipment.hasItem(MELEE_WEAPONS[mwc].id)) { hasEquippedWep = true; break; }
            }
            for (var pbc = 0; pbc < PLATEBODIES.length; pbc++) {
                if (Game.info.equipment.hasItem(PLATEBODIES[pbc].id)) { hasEquippedBod = true; break; }
            }
            if (!hasEquippedWep && !hasEquippedBod) {
                // NO gear in bank, NO gear equipped -> buy at GE!
                // Iron set costs ~2500gp with overpay for instant buy
                var IRON_SET = [
                    { id: 1323, name: "Iron scimitar", price: 500 },
                    { id: 1115, name: "Iron platebody", price: 700 },
                    { id: 1067, name: "Iron platelegs", price: 500 },
                    { id: 1153, name: "Iron full helm", price: 300 },
                    { id: 1191, name: "Iron kiteshield", price: 500 }
                ];
                var totalCost = 0;
                for (var ic = 0; ic < IRON_SET.length; ic++) totalCost += IRON_SET[ic].price;

                var bankGold = 0;
                try { bankGold = Game.info.bank.getItemCount(995); } catch(e) {}
                var invGold = 0;
                try { invGold = Game.info.inventory.getItemCount(995); } catch(e) {}
                var totalGold = bankGold + invGold;

                if (totalGold >= totalCost) {
                    botMsg("NO GEAR anywhere! Buying iron set from GE. Need " + totalCost + "gp, have " + totalGold + "gp");
                    geBuyList = IRON_SET;
                    geBuyIndex = 0;
                    geBuyPhase = 0;
                    // Withdraw enough gold + extra for travel
                    withdrawQueue = [];
                    if (bankGold >= totalCost + 500) {
                        Game.interact.bank.setCustomWithdrawQuantity(totalCost + 500);
                        withdrawQueue.push({ id: 995, qty: totalCost + 500, label: (totalCost + 500) + " GP for GE" });
                    } else {
                        withdrawQueue.push({ id: 995, qty: 0, label: "All GP", withdrawAll: true });
                    }
                    postBankState = STATES.WALK_TO_GE;
                    bankPhase = 13;
                    waitTicks = 0;
                    return;
                } else {
                    botMsg("NO gear and not enough GP! Have " + totalGold + "gp, need " + totalCost + "gp. Going with bare hands.");
                }
            }
        }

        // ---- DECISION (while bank is still open!) ----
        if (gatherNeeded.length > 0) {
            // Bank doesn't have everything -- switch to gather plan
            botMsg("Missing from bank: " + gatherNeeded.join(", ") + " -- prepping gather run");
            // Replace withdraw queue with JUST gather tools + coins
            withdrawQueue = [];
            // Add gather tools
            for (var g = 0; g < gatherToolsToWithdraw.length; g++) {
                withdrawQueue.push(gatherToolsToWithdraw[g]);
            }
            // Always bring 250gp for travel
            if (Game.info.bank.hasItem(995, 1)) {
                withdrawQueue.push({ id: 995, qty: 250, label: "250 GP (travel)" });
            }
            // Route to first gather need
            var firstNeed = gatherNeeded[0];
            if (firstNeed === "food") {
                postBankState = STATES.GATHER_FOOD;
            } else if (firstNeed === "arrows") {
                postBankState = STATES.CRAFT_ARROWS;
            } else if (firstNeed === "runes") {
                postBankState = STATES.CRAFT_RUNES;
            } else if (firstNeed === "cannonballs") {
                postBankState = STATES.GATHER_CANNONBALLS;
            } else {
                postBankState = STATES.WALK_TO_GE;
            }
        } else {
            // Bank has everything -- going to task!
            botMsg("All supplies available! Withdrawing " + withdrawQueue.length + " items");
            missingItems = [];
            postBankState = STATES.WALK_TO_TASK;
        }

        bankPhase = 13;
        waitTicks = 0;
        return;
    }

    // Phase 13: Process withdraw queue -- one item per tick, 2-tick spacing
    if (bankPhase === 13) {
        if (!Game.info.bank.isOpen()) { bankPhase = 10; return; }
        if (withdrawQueue.length === 0) {
            // Done withdrawing -- go to close phase
            bankPhase = 14;
            waitTicks = 0;
            return;
        }
        waitTicks++;
        if (waitTicks % 2 !== 0) return; // 2-tick spacing

        item = withdrawQueue[0];
        withdrawQueue.splice(0, 1);
        botMsg("Withdrawing: " + item.label);

        if (item.potion) {
            if (!withdrawPotionFromBank(item.group, item.qty)) {
                if (item.fallback1 && !withdrawPotionFromBank(item.fallback1, item.qty)) {
                    if (item.fallback2) {
                        withdrawPotionFromBank(item.fallback2, item.qty);
                    }
                }
            }
        } else if (item.withdrawAll) {
            // Fix10n: Withdraw all of this item (used for GP when buying gear)
            try {
                Game.interact.bank.withdrawItem(item.id, BankWithdrawType.WITHDRAW_ALL, false);
                botMsg("Withdrew ALL of item " + item.id);
            } catch(e) {
                botMsg("Withdraw ALL error: " + e);
            }
        } else {
            withdrawBankItem(item.id, item.qty);
        }
        return;
    }

    // Phase 14: Settle after withdrawals (4 ticks)
    if (bankPhase === 14) {
        waitTicks++;
        if (waitTicks < 4) return;
        waitTicks = 0;
        bankPhase = 145;
        return;
    }


    // Phase 145 (Fix10m): Equip any withdrawn gear items before closing bank
    if (bankPhase === 145) {
        // Close bank first so we can equip from inventory
        if (Game.info.bank.isOpen()) {
            Game.interact.bank.close();
            waitTicks = 0;
            return;
        }
        waitTicks++;
        if (waitTicks < 4) return;
        // Equip all gear in inventory
        // Equip anything equippable in inventory (scan all tier arrays)
        var allTierArrays = [MELEE_WEAPONS, PLATEBODIES, PLATELEGS, HELMETS, SHIELDS, BOOTS, GLOVES];
        var equipCount = 0;
        for (var ta = 0; ta < allTierArrays.length; ta++) {
            var tierArr = allTierArrays[ta];
            for (var ti2 = 0; ti2 < tierArr.length; ti2++) {
                var tItem = tierArr[ti2];
                if (tItem && tItem.id && Game.info.inventory.hasItem(tItem.id, 1)) {
                    try {
                        Game.interact.inventory.equipItem(tItem.id);
                        botMsg("Equipping: " + tItem.name + " (" + tItem.id + ")");
                        equipCount++;
                    } catch(e) {}
                    break; // Only equip best found per slot
                }
            }
        }
        if (equipCount === 0) botMsg("No gear in inventory to equip");
        // Move to walk phase
        var nextSt = postBankState || STATES.CHECK_SUPPLIES;
        postBankState = null;
        gatherNeeded = [];
        gatherToolsToWithdraw = [];
        bankPhase = 0;
        waitTicks = 0;
        botMsg("Gear equipped -> " + nextSt);
        state = nextSt;
        return;
    }

    // Phase 15: Close bank
    if (bankPhase === 15) {
        if (Game.info.bank.isOpen()) {
            botMsg("Closing bank...");
            Game.interact.bank.close();
        }
        bankPhase = 16;
        waitTicks = 0;
        return;
    }

    // Phase 16: Wait for close, then GO
    if (bankPhase === 16) {
        waitTicks++;
        if (waitTicks < 4) return;
        if (Game.info.bank.isOpen()) return; // still closing
        
        var nextState = postBankState || STATES.CHECK_SUPPLIES;
        postBankState = null;
        gatherNeeded = [];
        gatherToolsToWithdraw = [];
        bankPhase = 0;
        waitTicks = 0;
        botMsg("Bank done -> " + nextState);
        state = nextState;
        return;
    }
}

function withdrawBankItem(itemId, qty) {
    try {
        // Safety: itemId MUST be a number -- bank API crashes on strings
        if (typeof itemId === "string") {
            botMsg("WITHDRAW ERROR: itemId is a string ('" + itemId + "') not a number! Skipping.");
            return;
        }
        itemId = parseInt(itemId);
        if (isNaN(itemId) || itemId <= 0) {
            botMsg("WITHDRAW ERROR: invalid itemId " + itemId + "! Skipping.");
            return;
        }
        // CORRECT DZ API: withdrawItem(id, BankWithdrawType, allowDuplicate)
        // 2nd arg = BankWithdrawType enum (NOT a number!)
        // 3rd arg = boolean allowDuplicate
        var amount = qty || 1;
        var wType;
        if (amount <= 0) {
            wType = BankWithdrawType.WITHDRAW_ALL;
        } else if (amount === 1) {
            wType = BankWithdrawType.WITHDRAW_ONE;
        } else if (amount <= 5) {
            wType = BankWithdrawType.WITHDRAW_FIVE;
        } else if (amount <= 10) {
            wType = BankWithdrawType.WITHDRAW_TEN;
        } else {
            wType = BankWithdrawType.WITHDRAW_ALL;
        }
        botMsg("Bank withdraw: item " + itemId + " x" + amount + " (type=" + wType + ")");
        Game.interact.bank.withdrawItem(itemId, wType, false);
    } catch(e) {
        botMsg("Withdraw FAILED for item " + itemId + ": " + e);
    }
}
