// ---- WALK_TO_TASK ----
function handleWalkToTask() {
    if (!currentTaskMonster) {
        // Try to recover task from varbits before giving up
        var creatureId = Game.getVarPlayerValue(395);
        var killCount = Game.getVarPlayerValue(394);
        if (creatureId > 0 && killCount > 0) {
            var monName = SLAYER_CREATURE_MAP[creatureId];
            if (monName && findMonster(monName)) {
                killsLeft = killCount;
                noTaskRetryCount = 0;
                botMsg("Task recovered in WALK: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
            } else {
                noTaskRetryCount = (noTaskRetryCount || 0) + 1;
                if (noTaskRetryCount % 25 === 0) { botMsg("Walk task data missing x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
                return;
            }
        } else {
            noTaskRetryCount = (noTaskRetryCount || 0) + 1;
            if (noTaskRetryCount % 25 === 0) { botMsg("Walk no varbits x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
            return;
        }
    }

    var taskY = currentTaskMonster.location.y;
    var pLoc = Client.getLocalPlayer().getWorldLocation();
    var playerY = pLoc.getY();
    var playerX = pLoc.getX();
    var isUnderground = taskY >= 9000;
    var playerOnSurface = playerY < 9000;

    // --- WebWalker conflict guard ---
    // If DZ WebWalker is already actively pathing, do NOT issue any new commands.
    // Only check if we have arrived; otherwise let WebWalker finish uninterrupted.
    if (PlayerHelper.isWebWalking()) {
        // Check arrival even while walking
        if (!isUnderground || !playerOnSurface) {
            if (isNear(currentTaskMonster.location.x, currentTaskMonster.location.y, 15)) {
                if (usingSafespot && cfgVal("useSafespots", false)) {
                    state = STATES.SAFESPOT_FIGHT;
                } else {
                    state = STATES.FIGHT_TASK;
                }
                retryCount = 0;
                ticksSinceAntifire = 0;
                ticksSinceAntipoison = 0;
                ticksSinceCombatPot = 0;
                dungeonPhase = 0;
                botMsg("Arrived at task (while webwalking)", "SlayerBot");
            }
        }
        // Check if underground arrival during dungeon walk
        if (isUnderground && dungeonPhase === 2) {
            if (playerY >= 9000) {
                botMsg("Entered dungeon -- walking to task", "SlayerBot");
                dungeonPhase = 0;
            }
        }
        return;
    }

    // 45-second stuck detection -- if player hasnt moved in ~75 ticks, reset pathing
    // Skip during dungeon entrance phases -- player stands still while interacting
    if (dungeonPhase > 0) {
        walkStuckTick = 0;
        walkStuckX = -1;
        walkStuckY = -1;
    } else if (playerX === walkStuckX && playerY === walkStuckY) {
        walkStuckTick = walkStuckTick + 1;
        if (walkStuckTick >= 75) {
            botMsg("Stuck for 45 sec -- resetting path to task", "SlayerBot");
            walkStuckTick = 0;
            walkStuckX = -1;
            walkStuckY = -1;
            dungeonPhase = 0;
            isExecuting = false;
            // Force a fresh webwalk next tick
            return;
        }
    } else {
        // Player moved -- reset counter
        walkStuckX = playerX;
        walkStuckY = playerY;
        walkStuckTick = 0;
    }

    // --- Dungeon entrance handling ---
    if (isUnderground && playerOnSurface) {
        var locName = currentTaskMonster.locationName || "";
        var entrance = DUNGEON_ENTRANCES[locName] || null;
        if (!entrance) {
            // Try webwalk anyway -- some clients handle transitions
            isExecuting = true;
            Utility.invokeLater(function() {
                gatedWebWalk(currentTaskMonster.location.x, taskY, currentTaskMonster.location.plane || 0);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }

        // Phase 0: Walk to dungeon entrance on surface
        if (dungeonPhase === 0) {
            if (isNear(entrance.surfX, entrance.surfY, 8)) {
                botMsg("At " + entrance.desc + " -- checking entrance", "SlayerBot");
                dungeonPhase = 1;
                return;
            }
            isExecuting = true;
            Utility.invokeLater(function() {
                gatedWebWalk(entrance.surfX, entrance.surfY, 0);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }

        // Phase 1+2: Simple logic -- if open hole exists click it, else open the cover
        if (dungeonPhase >= 1) {
            if (actionCooldown > 0) return;
            // Check if we fell underground already
            var nowY = Client.getLocalPlayer().getWorldLocation().getY();
            if (nowY >= 9000) {
                botMsg("Entered dungeon -- walking to task", "SlayerBot");
                dungeonPhase = 0;
                return;
            }
            // 881 = CLOSED cover -- click it -- becomes 882
            // 882 = OPEN hole (stairs down) -- click it -- climb down
            var openHole = Game.info.gameObject.getNearest([882]);
            if (openHole) {
                botMsg("Open hole (882) -- climbing down", "SlayerBot");
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.interact(openHole, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
                actionCooldown = 10;
                dungeonPhase = 2;
                return;
            }
            // No open hole yet -- look for closed cover (881) -- click to open
            var closedCover = Game.info.gameObject.getNearest([881]);
            if (closedCover) {
                botMsg("Closed cover (881) -- opening it", "SlayerBot");
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.interact(closedCover, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
                actionCooldown = 6;
                return;
            }
            // Neither found -- try other entrance objects from table
            var entObj = null;
            var usedId = 0;
            for (var ei = 0; ei < entrance.objects.length; ei++) {
                if (entrance.objects[ei] === 881 || entrance.objects[ei] === 882) continue;
                entObj = Game.info.gameObject.getNearest([entrance.objects[ei]]);
                if (entObj) {
                    usedId = entrance.objects[ei];
                    break;
                }
            }
            if (entObj) {
                botMsg("Clicking entrance object " + usedId, "SlayerBot");
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.interact(entObj, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
                actionCooldown = 10;
                dungeonPhase = 2;
                return;
            }
            botMsg("No entrance objects found -- walking closer", "SlayerBot");
            dungeonPhase = 0;
            return;
        }
    }

    // --- Already underground or surface task -- normal walk ---
    // Reset dungeon phase when underground
    dungeonPhase = 0;

    // v24: Cannon setup -- ONLY in multicombat zones (never bring to single combat)
    if (cfgVal("useCannon", false) && !cannonPlaced && shouldUseCannon(currentTaskMonster, true)) {
        if (Game.info.inventory.hasItem(CANNON.BASE, 1) && Game.info.inventory.hasItem(CANNON.CANNONBALL, 1)) {
            if (isNear(currentTaskMonster.location.x, currentTaskMonster.location.y, 15)) {
                botMsg("[SlayerBot] Multicombat zone -- setting up cannon", "Bot");
                state = STATES.SETUP_CANNON;
                return;
            }
        }
    }

    if (isNear(currentTaskMonster.location.x, currentTaskMonster.location.y, 15)) {
        // v24: Choose fight mode based on safespot
        if (usingSafespot && cfgVal("useSafespots", false)) {
            state = STATES.SAFESPOT_FIGHT;
        } else {
            state = STATES.FIGHT_TASK;
        }
        retryCount = 0;
        ticksSinceAntifire = 0;
        ticksSinceAntipoison = 0;
        ticksSinceCombatPot = 0;
        return;
    }

    isExecuting = true;
    var mx = currentTaskMonster.location.x;
    var my = currentTaskMonster.location.y;
    var mp = currentTaskMonster.location.plane || 0;
    Utility.invokeLater(function() {
        gatedWebWalk(mx, my, mp);
        isExecuting = false;
    }, Utility.getDelay());
}

// ---- FIGHT_TASK (major overhaul for v24) ----
function handleFightTask() {
    // Fight idle timeout: if stuck for 15+ ticks, force state recovery
    fightIdleTicks++;
    if (fightIdleTicks > 15) {
        // Force re-read varbits and re-target
        var fKills = 0;
        try { fKills = Game.getVarPlayerValue(394); } catch(e) {}
        if (fKills > 0) {
            killsLeft = fKills;
            fightIdleTicks = 0;
            botMsg("Fight idle 15 ticks -- force re-target (kills: " + fKills + ")", "SlayerBot");
            // Clear any stale interaction
        } else if (fKills === 0) {
            killsLeft = 0;
            state = STATES.TASK_COMPLETE;
            fightIdleTicks = 0;
            return;
        }
    }
    if (!currentTaskMonster) {
        // Try to recover task from varbits before giving up
        var creatureId = Game.getVarPlayerValue(395);
        var killCount = Game.getVarPlayerValue(394);
        if (creatureId > 0 && killCount > 0) {
            var monName = SLAYER_CREATURE_MAP[creatureId];
            if (monName && findMonster(monName)) {
                killsLeft = killCount;
                noTaskRetryCount = 0;
                botMsg("Task recovered from varbits: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
            } else {
                noTaskRetryCount = (noTaskRetryCount || 0) + 1;
                if (noTaskRetryCount % 25 === 0) { botMsg("Fight task data missing x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
                return;
            }
        } else {
            noTaskRetryCount = (noTaskRetryCount || 0) + 1;
            if (noTaskRetryCount % 25 === 0) { botMsg("Fight no varbits x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
            return;
        }
    }

    // Task complete check -- verify with varbits before declaring complete
    if (killsLeft <= 0) {
        // Double-check varbits before declaring task complete
        var verifyKills = 0;
        try { verifyKills = Game.getVarPlayerValue(394); } catch(e2) {}
        if (verifyKills > 0) {
            killsLeft = verifyKills;
            botMsg("killsLeft was 0 but varbits say " + verifyKills + " -- restored!", "SlayerBot");
        } else {
            botMsg("Task complete! Killed all " + currentTaskName, "SlayerBot");
            state = STATES.TASK_COMPLETE;
            return;
        }
    }

    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);
    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);

    // === PRIORITY 1: Death check ===
    if (currentHP <= 0) {
        saveDeathLocation();
        state = STATES.HANDLE_DEATH;
        return;
    }

    // === PRIORITY 2: No food at all -- bank immediately regardless of HP ===
    if (countFood() === 0) {
        botMsg("No food left -- heading to bank", "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // === PRIORITY 3: Emergency -- critically low HP ===
    if (currentHP <= EMERGENCY_HP_THRESHOLD) {
        botMsg("Critical HP! Eating emergency food", "SlayerBot");
        eatFood();
        fightIdleTicks = 0;
        return;
    }

    // === PRIORITY 4: Eat food at 65% HP ===
    if (currentHP <= Math.floor(maxHP * 0.65)) {
        eatFood();
        fightIdleTicks = 0;
        return;
    }

    // === PRIORITY 4: Drink prayer pot ===
    if (cfgVal("usePrayer", false)) {
        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);
        if (currentPrayer <= 15) {
            if (countPrayerPots() > 0) {
                drinkPrayerPot();
                return;
            }
        }
    }

    // === PRIORITY 5: Anti-fire check (dragon tasks) ===
    if (currentTaskMonster && isDragonTask(currentTaskMonster.name)) {
        if (ticksSinceAntifire > 550 || ticksSinceAntifire === 0) {
            if (drinkAntifire()) {
                return;
            }
        }
    }

    // === PRIORITY 6: Anti-poison check ===
    if (currentTaskMonster && canPoison(currentTaskMonster.name)) {
        if (ticksSinceAntipoison > 800 || ticksSinceAntipoison === 0) {
            if (drinkAntipoison()) {
                return;
            }
        }
    }

    // === PRIORITY 7: Combat potion re-dose ===
    if (ticksSinceCombatPot > 50) {
        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);
        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);
        if (boostedAtk <= realAtk + 2) {
            if (drinkCombatPotion()) {
                ticksSinceCombatPot = 0;
                return;
            }
        }
        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);
        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);
        if (boostedStr <= realStr + 2) {
            if (drinkStrengthPotion()) {
                ticksSinceCombatPot = 0;
                return;
            }
        }
    }

    // === PRIORITY 8: Special attack ===
    if (cfgVal("useSpecialAttack", false)) {
        var specPercent = 0;
        try { specPercent = Client.getSpecialAttackPercent(); } catch(e) {}
        if (specPercent >= 25) {
            useSpecialAttack();
        }
    }

    // === PRIORITY 9: Superior monster check ===
    var superior = checkForSuperior();
    if (superior) {
        botMsg("SUPERIOR FOUND! Attacking superior.", "SlayerBot");
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.npc.attack(superior);
            isExecuting = false;
        }, Utility.getDelay());
        actionCooldown = 3;
        return;
    }

    // === PRIORITY 10: Special finish items ===
    if (cfgVal("specialFinish", false)) {
        var finished = handleSpecialFinishCheck();
        if (finished) return;
    }

    // === PRIORITY 11: Loot check ===
    if (!isInActiveCombat()) {
        if (pickUpLoot()) {
            fightIdleTicks = 0;  // We're actively looting
            return;
        }
    }

    // === PRIORITY 12: Clue scroll banking ===
    if (Game.info.inventory.isFull() && hasClueScroll()) {
        botMsg("Inventory full with clue scroll, banking.", "SlayerBot");
        state = STATES.WALK_TO_BANK;
        return;
    }

    // === PRIORITY 13: Bone burying ===
    if (cfgVal("buryBones", false) && !isInActiveCombat()) {
        fightIdleTicks = 0;  // We're doing something
        for (var b = 0; b < ALL_BONE_IDS.length; b++) {
            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {
                var boneId = ALL_BONE_IDS[b];
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.inventory.consumeItem(boneId);
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            }
        }
    }

    // === PRIORITY 14: Cannon reload ===
    if (cfgVal("useCannon", false) && cannonPlaced) {
        reloadCannon();
    }

    // === PRIORITY 15: Attack target ===
    if (!isInActiveCombat()) {
        var npcIds = currentTaskMonster.npcIds;
        if (!npcIds || npcIds.length === 0) {
            botMsg("No NPC IDs for " + currentTaskName, "SlayerBot");
            state = STATES.SELECT_MASTER;
            return;
        }

        var target = Game.info.npc.getNearest(npcIds);
        if (target && !target.isDead()) {
            isExecuting = true;
            actionCooldown = 3; // Wait 3 ticks before next action attempt
            Utility.invokeLater(function() {
                Game.interact.npc.attack(target);
                fightIdleTicks = 0;
                isExecuting = false;
            }, Utility.getDelay());
        } else {
            // No monster found -- might need to wait or move
            if (stateTickCounter > 20 && !target) {
                // Try walking closer to task center
                if (!PlayerHelper.isWebWalking()) {
                    var cx = currentTaskMonster.location.x;
                    var cy = currentTaskMonster.location.y;
                    var cp = currentTaskMonster.location.plane || 0;
                    isExecuting = true;
                    Utility.invokeLater(function() {
                        PlayerHelper.webWalkTo(new WorldPoint(cx, cy, cp));
                        isExecuting = false;
                    }, Utility.getDelay());
                }
            }
        }
    }
}

function handleSpecialFinishCheck() {
    if (!currentTaskMonster) return false;
    var monName = currentTaskMonster.name.toLowerCase();
    var npcIds = currentTaskMonster.npcIds;

    // Gargoyles: rock hammer when low HP
    if (monName.indexOf("gargoyle") !== -1 && Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {
        var gargoyle = Game.info.npc.getNearest(npcIds);
        if (gargoyle && gargoyle.getHealthRatio() > 0 && gargoyle.getHealthRatio() <= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                // Use rock hammer on gargoyle
                Game.interact.inventory.useItemOnNpc(ROCK_HAMMER_ID, gargoyle);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    // Rockslugs: bag of salt when low HP
    if (monName.indexOf("rockslug") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
        var rockslug = Game.info.npc.getNearest(npcIds);
        if (rockslug && rockslug.getHealthRatio() > 0 && rockslug.getHealthRatio() <= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, rockslug);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    // Desert lizards: ice cooler when low HP
    if (monName.indexOf("lizard") !== -1 && Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {
        var lizard = Game.info.npc.getNearest(npcIds);
        if (lizard && lizard.getHealthRatio() > 0 && lizard.getHealthRatio() <= 10) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, lizard);
                isExecuting = false;
            }, Utility.getDelay());
            return true;
        }
    }

    return false;
}

function reloadCannon() {
    // Check cannonball count
    var cballs = Game.info.inventory.getItemCount(2);
    if (cballs <= 0) return;

    // Try to find cannon object near us
    try {
        var cannonObj = Game.info.gameObject.getNearest([6]);
        if (cannonObj) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(cannonObj, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } catch(e) {}
}

// ---- SAFESPOT_FIGHT ----
function handleSafespotFight() {
    if (!currentTaskMonster) {
        var creatureId = Game.getVarPlayerValue(395);
        var killCount = Game.getVarPlayerValue(394);
        if (creatureId > 0 && killCount > 0) {
            var monName = SLAYER_CREATURE_MAP[creatureId];
            if (monName && findMonster(monName)) {
                killsLeft = killCount;
                noTaskRetryCount = 0;
                botMsg("Task recovered in SAFESPOT: " + currentTaskName + " (" + killsLeft + " left)", "SlayerBot");
            } else {
                noTaskRetryCount = (noTaskRetryCount || 0) + 1;
                if (noTaskRetryCount % 25 === 0) { botMsg("Safe task data missing x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
                return;
            }
        } else {
            noTaskRetryCount = (noTaskRetryCount || 0) + 1;
            if (noTaskRetryCount % 25 === 0) { botMsg("Safe no varbits x" + noTaskRetryCount + " -- still retrying", "SlayerBot"); }
            return;
        }
    }

    if (killsLeft <= 0) {
        botMsg("Safespot task complete! Killed all " + currentTaskName, "SlayerBot");
        state = STATES.TASK_COMPLETE;
        return;
    }

    var spot = hasSafeSpot(currentTaskMonster.name);
    if (!spot) {
        // Fallback to normal melee fight
        state = STATES.FIGHT_TASK;
        return;
    }

    // Move to safe tile if not there
    if (!isNear(spot.safeX, spot.safeY, 2)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var sx = spot.safeX;
            var sy = spot.safeY;
            var sp = spot.safePlane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(sx, sy, sp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Activate prayer if needed
    if (spot.prayAgainst) {
        activateSpecificPrayer(spot.prayAgainst);
    }

    // Survival checks
    handleSurvivalChecks();

    // Check for superior (even in safespot)
    var superiorNpc = checkForSuperior();
    if (superiorNpc) {
        botMsg("SUPERIOR in safespot! Attacking.", "SlayerBot");
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.npc.attack(superiorNpc);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Loot check
    if (!Client.getLocalPlayer().isInteracting()) {
        if (pickUpLoot()) return;
    }

    // Bone burying
    if (cfgVal("buryBones", false) && !Client.getLocalPlayer().isInteracting()) {
        for (var b = 0; b < ALL_BONE_IDS.length; b++) {
            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {
                var safeBoneId = ALL_BONE_IDS[b];
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.inventory.consumeItem(safeBoneId);
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            }
        }
    }

    // Supply interrupts
    var fCount = countFood();
    if (fCount <= 0) {
        botMsg("Out of food in safespot, banking.", "SlayerBot");
        state = STATES.WALK_TO_BANK;
        return;
    }

    // Arrow/rune supply interrupt
    if (cfgVal("useRanged", false) && countArrows() < 10) {
        botMsg("Low on arrows, restocking.", "SlayerBot");
        if (cfgVal("selfSufficiency", false)) {
            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;
            state = STATES.CRAFT_ARROWS;
        } else {
            state = STATES.WALK_TO_BANK;
        }
        return;
    }
    if (cfgVal("useMagic", false) && countRunes() < 10) {
        botMsg("Low on runes, restocking.", "SlayerBot");
        if (cfgVal("selfSufficiency", false)) {
            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;
            state = STATES.CRAFT_RUNES;
        } else {
            state = STATES.WALK_TO_BANK;
        }
        return;
    }

    // Attack with ranged/magic from safe spot
    if (!Client.getLocalPlayer().isInteracting()) {
        attackWithRangedOrMagic();
    }
}

        state = STATES.FIGHT_TASK;
    } else {
        // No food, need to bank
        state = STATES.WALK_TO_BANK;
    }
}

function handleDrinkPrayer() {

    }
}

// ---- LOOT_ITEMS ----
function handleLootItems() {
    if (Game.info.inventory.isFull()) {
        // Inventory full -- bury bones or bank
        if (cfgVal("buryBones", false)) {
            for (var i = 0; i < ALL_BONE_IDS.length; i++) {

// ---- BURY_BONES ----
function handleBuryBones() {
    var buried = false;
    for (var i = 0; i < ALL_BONE_IDS.length; i++) {
        if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {
            var buryBoneId = ALL_BONE_IDS[i];
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(buryBoneId);
                isExecuting = false;

        state = STATES.FIGHT_TASK;
    }
}

// ---- SPECIAL_FINISH ----
function handleSpecialFinish() {

    var finished = handleSpecialFinishCheck();
    if (!finished) {
        state = STATES.FIGHT_TASK;
    }
}

// ---- TASK_COMPLETE ----
function handleTaskComplete() {

    totalKills = totalKills + (killsLeft <= 0 ? 0 : killsLeft);
    botMsg("Task complete! Total tasks: " + tasksCompleted + " | Total kills: " + totalKills, "SlayerBot");

    currentTaskMonster = null;

    usingSafespot = false;
    cannonPlaced = false;

    // Reset potion timers
    ticksSinceAntifire = 0;
    ticksSinceAntipoison = 0;
    ticksSinceCombatPot = 0;

    // v24: Track Turael boosting (already incremented in selectMasterWithBoosting)

    state = STATES.CHECK_STATS;

// ---- HANDLE_DEATH ----
function handleDeath() {
    botMsg("Handling death. Saving death location for recovery.", "SlayerBot");
    deathDetected = true;
    saveDeathLocation();
    state = STATES.RECOVER_GRAVE;
}

// ---- RECOVER_GRAVE ----
function handleRecoverGrave() {
    // After death respawn (usually Lumbridge):
    // 1. Walk to accessible bank (NOT Lumbridge -- its upstairs!)
    // 2. Withdraw emergency food + gear
    // 3. Walk to death location to collect items
    // 4. Return to supply check -> resume task

    if (isExecuting) return;

    if (!deathLocation) {
        botMsg("No death location saved, re-checking supplies.", "SlayerBot");
        deathDetected = false;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Phase 1: Get emergency food from bank
    var foodCt = countFood();
    if (foodCt < 3) {
        if (!Game.info.bank.isOpen()) {
            // At Lumbridge? Walk to ground-floor bank first
            if (isAtLumbridge()) {
                if (PlayerHelper.isWebWalking()) return;
                var alKharid = FALLBACK_BANKS[0];
                botMsg("Death respawn at Lumbridge - walking to " + alKharid.name + " bank", "SlayerBot");
                isExecuting = true;
                var akx = alKharid.x;
                var aky = alKharid.y;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(akx, aky, 0));
                    isExecuting = false;
                }, Utility.getDelay());
                return;
            }
            // Not at Lumbridge -- try openNearest with stuck detection
            if (PlayerHelper.isWebWalking()) {
                checkBankStuck();
                return;
            }
            if (checkBankStuck() && bankStuckCount >= 2) {
                var fallback = getAccessibleBank();
                if (fallback) {
                    botMsg("Bank stuck! Walking to " + fallback.name, "SlayerBot");
                    bankStuckCount = 0;
                    isExecuting = true;
                    var fbx = fallback.x;
                    var fby = fallback.y;
                    Utility.invokeLater(function() {
                        PlayerHelper.webWalkTo(new WorldPoint(fbx, fby, 0));
                        isExecuting = false;
                    }, Utility.getDelay());
                    return;
                }
            }
            if (tickCounter - bankOpenAttemptTick < 5) return;
            bankOpenAttemptTick = tickCounter;
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest(0, true);
                isExecuting = false;
            }, Utility.getDelay());
            return;
        } else {
            // Bank is open! Withdraw emergency food
            bankStuckCount = 0;
            var emergFoodId = 379;
            try { emergFoodId = getFoodId(); } catch(e) {}
            if (Game.info.bank.hasItem(emergFoodId, 1)) {
                Game.interact.bank.withdrawItem(emergFoodId, BankWithdrawType.WITHDRAW_FIVE, false);
            }
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.close();
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
    }

    // Phase 2: Walk to death pile
    if (!isNear(deathLocation.x, deathLocation.y, 5)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var dlx = deathLocation.x;
            var dly = deathLocation.y;
            var dlp = deathLocation.plane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(dlx, dly, dlp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Phase 3: At grave -- pick up items from ground
    if (pickUpLoot()) return;

    // Phase 4: Done recovering -- go to full supply check
    botMsg("Death recovery complete, resuming task.", "SlayerBot");
    deathLocation = null;
    deathDetected = false;
    state = STATES.CHECK_SUPPLIES;
}

// ---- HANDLE_LEVEL_UP ----
function handleLevelUp() {
    updateCachedStats();
    botMsg("Level up detected! Updated stats.", "SlayerBot");
    levelUpDetected = false;
    setAttackStyle();
    state = STATES.FIGHT_TASK;
}

// ---- SETUP_CANNON ----
function handleSetupCannon() {
    if (!currentTaskMonster) {
        state = STATES.FIGHT_TASK;
        return;
    }

    // SAFETY: Never place cannon in single-combat zones
    if (isTaskSingleCombat(currentTaskMonster)) {
        botMsg("[SlayerBot] Single combat zone -- skipping cannon", "Bot");
        cannonPlaced = false;
        state = STATES.FIGHT_TASK;
        return;
    }

    // Check if we have cannon base
    if (!Game.info.inventory.hasItem(CANNON.BASE, 1)) {
        botMsg("No cannon base in inventory.", "SlayerBot");
        cannonPlaced = false;
        state = STATES.FIGHT_TASK;
        return;
    }

    // Walk to monster area center

// ---- GATHER_FOOD ----
function handleGatherFood() {
    // ---- TIER-AWARE FOOD GATHERING ----
    // Uses SS_FOOD_TIERS to pick the best food for player's level
    // Checks for required tool BEFORE trying to gather
    // Universal pattern: check tool -> walk -> gather -> cook -> bank -> recheck

    var fishLvl = Client.getRealSkillLevels(Skill.FISHING) || 1;
    var cookLvl = Client.getRealSkillLevels(Skill.COOKING) || 1;

    // Pick best food tier for our levels
    var bestTier = null;
    for (var t = SS_FOOD_TIERS.length - 1; t >= 0; t--) {
        var tier = SS_FOOD_TIERS[t];
        if (fishLvl >= tier.minFishLevel && cookLvl >= tier.minCookLevel) {
            bestTier = tier;
            break;
        }
    }
    if (!bestTier) {
        bestTier = SS_FOOD_TIERS[0]; // Chicken fallback
    }

    // Only log once per gather session
    if (!gatherFoodTier || gatherFoodTier.name !== bestTier.name) {
        botMsg("Gathering: " + bestTier.name + " (tier " + bestTier.tier + ")", "SlayerBot");
    }
    gatherFoodTier = bestTier;

    // ---- TOOL CHECK ----
    // If this tier needs a tool, make sure we have it
    if (bestTier.toolId) {
        var hasTool = Game.info.inventory.getItemCount(bestTier.toolId) > 0;
        if (!hasTool) {
            botMsg("Need tool: " + bestTier.toolRequired + " (id " + bestTier.toolId + ") - banking for it", "SlayerBot");
            // Set a flag so BANK_SUPPLIES knows to withdraw this tool
            gatherToolNeeded = bestTier.toolId;
            state = STATES.WALK_TO_BANK;
            return;
        }
    }
    // If tier needs secondary (e.g., feathers for fly fishing)
    if (bestTier.secondaryId) {
        var hasSecondary = Game.info.inventory.getItemCount(bestTier.secondaryId) >= 10;
        if (!hasSecondary) {
            botMsg("Need secondary: id " + bestTier.secondaryId + " - banking for it", "SlayerBot");
            gatherToolNeeded = bestTier.secondaryId;
            state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // ---- CHICKEN TIER = KILL, NOT FISH ----
    if (bestTier.method === "kill") {
        // Walk to chicken pen (10-tick cooldown)
        var chickenLoc = bestTier.gatherLocation;
        if (!isNear(chickenLoc.x, chickenLoc.y, 12)) {
            if (tickCounter - walkCooldown < 10) return;
            walkCooldown = tickCounter;
            isExecuting = true;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(chickenLoc.x, chickenLoc.y, chickenLoc.plane || 0));
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Kill chickens and pick up raw chicken
        if (isPlayerIdle()) {
            var chicken = Game.info.npc.getNearest(bestTier.npcIds);
            if (chicken) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.npc.attack(chicken);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        }
        // Pick up raw chicken from ground
        var loot = Game.info.groundItem.getNearest([bestTier.rawItemId]);
        if (loot && !Game.info.inventory.isFull()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.groundItem.take(loot);
                isExecuting = false;
            }, Utility.getDelay());
        }
        if (Game.info.inventory.isFull()) {
            state = STATES.COOK_FOOD;
        }
        return;
    }

    // ---- FISHING ----
    var spotIds = bestTier.spotIds;
    var gatherLoc = bestTier.gatherLocation;

    // Walk to fishing spot (10-tick cooldown to prevent spam)
    if (!isNear(gatherLoc.x, gatherLoc.y, 12)) {
        if (tickCounter - walkCooldown < 10) return;
        walkCooldown = tickCounter;
        isExecuting = true;
        var gx = gatherLoc.x;
        var gy = gatherLoc.y;
        var gp = gatherLoc.plane || 0;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(gx, gy, gp));
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Idle? Click nearest fishing spot. Spot moves/despawns = player goes idle = re-click.
    if (isPlayerIdle()) {
        var spot = Game.info.npc.getNearest(spotIds);
        if (spot) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.npc.action(spot, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }

    // Inventory full -> cook
    if (Game.info.inventory.isFull()) {
        gatherFoodCount = 28;
        state = STATES.COOK_FOOD;
    }
}

// ---- COOK_FOOD ----
function handleCookFood() {
    if (!gatherFoodTier) {
        state = STATES.CHECK_SUPPLIES;

    // Use tier's cook location if available, otherwise find nearest range
    var rangeInfo = null;
    if (gatherFoodTier && gatherFoodTier.cookLocation) {
        rangeInfo = gatherFoodTier.cookLocation;
    }
    if (!rangeInfo) {
        var rangeKeys = Object.keys(COOKING_RANGES);
        for (var i = 0; i < rangeKeys.length; i++) {
            rangeInfo = dbLookup(COOKING_RANGES, rangeKeys[i]);
            if (rangeInfo) break;
        }
    }
    if (!rangeInfo) {
        // Default Lumbridge kitchen range
        rangeInfo = {x: 3211, y: 3215, plane: 0, objectId: 114};
    }

    // Walk to range (10-tick cooldown)
    if (!isNear(rangeInfo.x, rangeInfo.y, 8)) {

        walkCooldown = tickCounter;
        isExecuting = true;
        var crx = rangeInfo.x;

        var crp = rangeInfo.plane || 0;
        Utility.invokeLater(function() {
            PlayerHelper.webWalkTo(new WorldPoint(crx, cry, crp));

        return;

    // Check if we still have raw food (support both old rawId and new rawItemId)
    var rawFoodId = gatherFoodTier.rawItemId || gatherFoodTier.rawId;

            }, Utility.getDelay());

function handleMineOre() {
    // ---- PICKAXE CHECK ----
    // Make sure we have the best pickaxe for our level before mining

    if (bestPick) {
        var hasAnyPickaxe = false;
        for (var pp = 0; pp < PICKAXES.length; pp++) {
            if (Game.info.inventory.getItemCount(PICKAXES[pp].id) > 0) {
                hasAnyPickaxe = true;
                break;

        if (!hasAnyPickaxe) {
            botMsg("No pickaxe in inventory - banking for one", "SlayerBot");
            gatherToolNeeded = bestPick.id;
            state = STATES.WALK_TO_BANK;
            return;
        }
    }

    // Determine ore to mine based on smithing level
    var oreData = null;
    var mineSpot = null;

    // Simple tier selection
    if (miningLevel >= 55) {
        oreData = {oreId: 447, name: "mithril"}; // Mithril ore
    } else if (miningLevel >= 30) {
        oreData = {oreId: 440, name: "iron"}; // Iron ore
    } else if (miningLevel >= 15) {
        oreData = {oreId: 436, name: "copper"}; // Copper ore
    } else {
        oreData = {oreId: 438, name: "tin"}; // Tin ore
    }

    // Find mining spot
    var mineKeys = Object.keys(MINING_SPOTS);
    for (var m = 0; m < mineKeys.length; m++) {
        var ms = dbLookup(MINING_SPOTS, mineKeys[m]);
        if (ms && ms.oreId === oreData.oreId) {
            mineSpot = ms;

    }

    if (!mineSpot) {
        // Default to Varrock East mine
        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};

    // Walk to mine
    if (!isNear(mineSpot.x, mineSpot.y, 10)) {

    // Mine ore

    if (isPlayerIdle()) {

            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);

// ---- CRAFT_ARROWS ----
// Multi-phase arrow crafting: mine ore -> smelt -> smith heads -> feathers -> chop -> fletch shafts -> combine
function handleCraftArrows() {
    // Determine best tier
    var tier = getBestArrowCraftingTier(smithingLevel, fletchingLevel, miningLevel);
    if (!tier) {
        botMsg("Cannot craft arrows at current levels (Smith:" + smithingLevel + " Fletch:" + fletchingLevel + " Mine:" + miningLevel + ")", "SlayerBot");
        arrowCraftPhase = "idle";
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    arrowCraftTier = tier;

    // Initialize phase if idle
    if (arrowCraftPhase === "idle") {
        arrowCraftPhase = "check_stock";
        arrowCraftCount = 0;
    }

    switch (arrowCraftPhase) {
        case "check_stock":
            handleArrowCheckStock();
            break;
        case "mine_ore":
            handleArrowMineOre();
            break;
        case "smelt_bars":
            handleArrowSmeltBars();
            break;
        case "smith_heads":
            handleArrowSmithHeads();
            break;
        case "kill_chickens":
            handleArrowKillChickens();
            break;
        case "chop_trees":
            handleArrowChopTrees();
            break;
        case "fletch_shafts":
            handleArrowFletchShafts();
            break;
        case "fletch_arrows":
            handleArrowFletchArrows();
            break;
        case "done":
            handleArrowDone();
            break;
        default:
            arrowCraftPhase = "check_stock";
            break;
    }
}

function handleArrowCheckStock() {
    // Check if we have enough components to skip steps
    var headId = arrowCraftTier.headId;
    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);
    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);
    var headCount = Game.info.inventory.getItemCount(headId);

    // Target: 500 arrows minimum
    if (headCount >= 500 && shaftCount >= 500 && featherCount >= 500) {
        arrowCraftPhase = "fletch_arrows";
        return;
    }

    if (headCount < 500) {
        // Need arrowheads: mine ore -> smelt -> smith
        arrowCraftPhase = "mine_ore";
    } else if (featherCount < 500) {
        arrowCraftPhase = "kill_chickens";
    } else if (shaftCount < 500) {
        arrowCraftPhase = "chop_trees";
    } else {
        arrowCraftPhase = "fletch_arrows";
    }
}

function handleArrowSmeltBars() {
    var furnaceInfo = null;
    var furnaceKeys = Object.keys(FURNACES);
    for (var i = 0; i < furnaceKeys.length; i++) {
        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);
        if (furnaceInfo) break;
    }
    if (!furnaceInfo) {
        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469};
    }

    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var asx = furnaceInfo.x;
            var asy = furnaceInfo.y;
            var asp = furnaceInfo.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(asx, asy, asp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    var oreId = arrowCraftTier.oreId || 440;
    if (!Game.info.inventory.hasItem(oreId, 1)) {
        // Need coal for some ores
        if (arrowCraftTier.needsCoal && Game.info.inventory.hasItem(COAL_ID, 1)) {
            // Still smelting coal-based bars
        } else {
            arrowCraftPhase = "smith_heads";
            return;
        }
    }

    if (isPlayerIdle()) {
        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);
        if (furnace) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }
}

function handleArrowSmithHeads() {
    var anvilInfo = null;
    var anvilKeys = Object.keys(ANVILS);
    for (var i = 0; i < anvilKeys.length; i++) {
        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);
        if (anvilInfo) break;
    }
    if (!anvilInfo) {
        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097};
    }

    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var ahx = anvilInfo.x;
            var ahy = anvilInfo.y;
            var ahp = anvilInfo.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(ahx, ahy, ahp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    var barId = arrowCraftTier.barId;
    if (!barId) barId = 2351; // Iron bar default
    if (!Game.info.inventory.hasItem(barId, 1)) {
        // Check if we have enough heads
        var headCount = Game.info.inventory.getItemCount(arrowCraftTier.headId);
        if (headCount >= 100) {
            // Check feathers next
            var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);
            if (featherCt < 500) {
                arrowCraftPhase = "kill_chickens";
            } else {
                arrowCraftPhase = "chop_trees";
            }
        } else {
            // Need more ore
            arrowCraftPhase = "mine_ore";
        }
        return;
    }

    if (isPlayerIdle()) {
        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);
        if (anvil) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }
}

function handleArrowKillChickens() {
    var chickenLoc = null;
    var clKeys = Object.keys(CHICKEN_LOCATIONS);
    if (clKeys.length > 0) {
        chickenLoc = dbLookup(CHICKEN_LOCATIONS, clKeys[0]);
    }
    if (!chickenLoc) {
        chickenLoc = {x: 3235, y: 3295, plane: 0};
    }

    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var ckx = chickenLoc.x;
            var cky = chickenLoc.y;
            var ckp = chickenLoc.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(ckx, cky, ckp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Check feather count
    var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);
    if (featherCt >= 600 || Game.info.inventory.isFull()) {
        // Bank feathers then move to next phase
        arrowCraftPhase = "chop_trees";
        return;
    }

    // Pick up feathers first
    if (!Client.getLocalPlayer().isInteracting()) {
        var gItems = null;
        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}
        if (gItems) {
            for (var gi = 0; gi < gItems.length; gi++) {
                if (safeGetId(gItems[gi]) === FEATHER_ID) {
                    isExecuting = true;
                    var fItem = gItems[gi];
                    Utility.invokeLater(function() {
                        Game.interact.groundItem.pickup(fItem);
                        isExecuting = false;
                    }, Utility.getDelay());
                    return;
                }
            }
        }

        // Kill chickens
        if (isPlayerIdle()) {
            var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);
            if (chicken && !chicken.isDead()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.npc.attack(chicken);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        }
    }
}

function handleArrowFletchShafts() {
    // Use knife on logs to make arrow shafts
    if (!Game.info.inventory.hasItem(KNIFE_ID, 1)) {
        // Need knife from bank
        state = STATES.WALK_TO_BANK;
        return;
    }

    if (!Game.info.inventory.hasItem(LOGS_ID, 1)) {
        // All logs fletched to shafts
        arrowCraftPhase = "fletch_arrows";
        return;
    }

    if (isPlayerIdle()) {
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.inventory.useItemOnItem(KNIFE_ID, LOGS_ID);
            isExecuting = false;
        }, Utility.getDelay());
    }
}

function handleArrowFletchArrows() {
    // Combine arrowheads + shafts, then attach feathers
    var headId = arrowCraftTier.headId;
    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);
    var headCount = Game.info.inventory.getItemCount(headId);
    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);

    // First: attach feathers to shafts = headless arrows (53)
    var headlessId = 53;
    var headlessCount = Game.info.inventory.getItemCount(headlessId);

    if (shaftCount > 0 && featherCount > 0) {
        // Make headless arrows
        if (isPlayerIdle()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnItem(ARROW_SHAFT_ID, FEATHER_ID);
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Then: attach heads to headless arrows = finished arrows
    if (headlessCount > 0 && headCount > 0) {
        if (isPlayerIdle()) {
            isExecuting = true;
            var hId = headId;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnItem(hId, headlessId);
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // All done or missing components
    var arrowId = arrowCraftTier.arrowId;
    var finalCount = Game.info.inventory.getItemCount(arrowId);
    botMsg("Arrow crafting complete. Made " + finalCount + " arrows.", "SlayerBot");
    arrowCraftPhase = "done";
}

function handleArrowDone() {
    arrowCraftPhase = "idle";
    arrowCraftCount = 0;
    // Equip arrows
    if (arrowCraftTier && arrowCraftTier.arrowId) {
        var arrowId = arrowCraftTier.arrowId;
        if (Game.info.inventory.hasItem(arrowId, 1)) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.inventory.equipItem(arrowId);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }

    // Return to check supplies
    if (stateBeforeInterrupt) {
        state = stateBeforeInterrupt;
        stateBeforeInterrupt = "";
    } else {
        state = STATES.CHECK_SUPPLIES;
    }
}

// ---- CRAFT_RUNES ----
// Pipeline: mine essence -> walk to altar -> craft -> bank -> repeat
function handleCraftRunes() {
    if (runecraftPhase === "idle") {
        runecraftPhase = "mine_essence";
        rcEssenceCount = 0;

        // Determine which runes we need
        neededRunes = [];
        var spell = getBestSpell(magicLevel);
        if (spell) {
            var runes = getRunesForSpell(spell.key);
            if (runes) {
                var runeKeys = Object.keys(runes);
                for (var i = 0; i < runeKeys.length; i++) {
                    neededRunes.push({runeId: parseInt(runeKeys[i]), quantity: 1000});
                }
            }
        }
        if (neededRunes.length === 0) {
            // Default to fire runes
            neededRunes.push({runeId: 554, quantity: 1000}); // Fire runes
        }
    }

    switch (runecraftPhase) {
        case "mine_essence":
            handleRCMineEssence();
            break;
        case "walk_to_altar":
            handleRCWalkToAltar();
            break;
        case "craft_runes":
            handleRCCraftRunes();
            break;
        case "bank_runes":
            handleRCBankRunes();
            break;
        case "check_stock":
            handleRCCheckStock();
            break;
        case "done":
            handleRCDone();
            break;
        default:
            runecraftPhase = "mine_essence";
            break;
    }
}

function handleRCMineEssence() {
    // Mine rune essence at Varrock mine
    // Aubury (NPC 11435) teleports you to the mine
    var auburyLoc = {x: 3253, y: 3401, plane: 0};
    var auburyNpcId = 11435;

    // Check if we're in the essence mine (plane changes)
    var loc = getPlayerLocation();
    var inMine = (loc.y > 5000); // Essence mine is in a different plane

    if (!inMine) {
        // Walk to Aubury
        if (!isNear(auburyLoc.x, auburyLoc.y, 5)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(auburyLoc.x, auburyLoc.y, auburyLoc.plane));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }

        // Teleport via Aubury
        var aubury = Game.info.npc.getNearest([auburyNpcId]);
        if (aubury) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.npc.action(aubury, MenuAction.NPC_SECOND_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // In the mine -- mine essence
    if (Game.info.inventory.isFull()) {
        // Full, go craft runes
        runecraftPhase = "walk_to_altar";
        return;
    }

    // Find rune essence rock
    var essRockIds = [7471]; // Rune essence rock
    if (isPlayerIdle()) {
        var essRock = Game.info.gameObject.getNearest(essRockIds);
        if (essRock) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(essRock, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }
}

function handleRCWalkToAltar() {
    // Determine altar based on needed runes
    var altarLoc = {x: 3313, y: 3254, plane: 0}; // Default: Air altar entrance
    var altarObjId = 34760; // Air altar object

    if (neededRunes.length > 0) {
        var runeId = neededRunes[0].runeId;
        if (runeId === 554) { // Fire runes
            altarLoc = {x: 3312, y: 3254, plane: 0};
            altarObjId = 34764;
        } else if (runeId === 555) { // Water runes
            altarLoc = {x: 3185, y: 3165, plane: 0};
            altarObjId = 34762;
        } else if (runeId === 556) { // Air runes
            altarLoc = {x: 3313, y: 3254, plane: 0};
            altarObjId = 34760;
        } else if (runeId === 557) { // Earth runes
            altarLoc = {x: 3305, y: 3472, plane: 0};
            altarObjId = 34763;
        } else if (runeId === 558) { // Mind runes
            altarLoc = {x: 2981, y: 3512, plane: 0};
            altarObjId = 34761;
        } else if (runeId === 559) { // Body runes
            altarLoc = {x: 3053, y: 3445, plane: 0};
            altarObjId = 34765;
        }
    }

    if (!isNear(altarLoc.x, altarLoc.y, 10)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var rax = altarLoc.x;
            var ray = altarLoc.y;
            var rap = altarLoc.plane;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(rax, ray, rap));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    // Enter altar (use mysterious ruins)
    var ruins = Game.info.gameObject.getNearest([altarObjId]);
    if (ruins) {
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.gameObject.interact(ruins, MenuAction.NPC_FIRST_OPTION);
            isExecuting = false;
        }, Utility.getDelay());
    }

    runecraftPhase = "craft_runes";
}

function handleRCCraftRunes() {
    // Look for the altar object inside the ruins
    var altarIds = [34760, 34761, 34762, 34763, 34764, 34765]; // Various altars

    // Check for essence
    var essId = 1436; // Rune essence
    if (runecraftingLevel >= 1) {
        essId = 7936; // Pure essence
    }

    if (!Game.info.inventory.hasItem(essId, 1) && !Game.info.inventory.hasItem(1436, 1)) {
        // No essence, bank
        runecraftPhase = "bank_runes";
        return;
    }

    if (isPlayerIdle()) {
        var altar = Game.info.gameObject.getNearest(altarIds);
        if (altar) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.gameObject.interact(altar, MenuAction.NPC_FIRST_OPTION);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }
}

function handleRCBankRunes() {
    // Walk to nearest bank and deposit runes, withdraw more essence
    var bank = findNearestBank();
    if (!bank) {
        runecraftPhase = "done";
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var rbkx = bank.x;
            var rbky = bank.y;
            var rbkp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(rbkx, rbky, rbkp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        _gt = tickCounter;
        if (_gt - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = _gt;
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest(0, true);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Deposit all, withdraw essence
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    runecraftPhase = "check_stock";
}

function handleRCCheckStock() {
    // Check if we have enough runes banked
    // Simplified: craft 3 inventories worth then done
    rcEssenceCount++;
    if (rcEssenceCount >= 3) {
        runecraftPhase = "done";
        return;
    }

    // Withdraw more essence
    var essId = 7936; // Pure essence
    withdrawBankItem(essId, 28);

    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.close();
        isExecuting = false;
    }, Utility.getDelay());

    runecraftPhase = "walk_to_altar";
}

function handleRCDone() {
    runecraftPhase = "idle";
    rcEssenceCount = 0;
    neededRunes = [];
    botMsg("Runecrafting session complete.", "SlayerBot");

    if (stateBeforeInterrupt) {
        state = stateBeforeInterrupt;
        stateBeforeInterrupt = "";
    } else {
        state = STATES.CHECK_SUPPLIES;
    }
}

// ---- BREW_POTIONS ----
function handleBrewPotions() {
    if (!brewTarget) {
        botMsg("No brew target set, returning to supplies.", "SlayerBot");
        brewPhase = "idle";
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Look up the recipe
    var recipe = null;
    var recipeKeys = Object.keys(POTION_RECIPES);
    for (var i = 0; i < recipeKeys.length; i++) {
        var r = dbLookup(POTION_RECIPES, recipeKeys[i]);
        if (r && recipeKeys[i].toLowerCase().indexOf(brewTarget.toLowerCase()) !== -1) {
            recipe = r;
            break;
        }
    }

    if (!recipe) {
        botMsg("Unknown brew target: " + brewTarget, "SlayerBot");
        brewPhase = "idle";
        brewTarget = null;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Check herblore level requirement
    if (herbloreLevel < recipe.level) {
        botMsg("Need herblore level " + recipe.level + " (have " + herbloreLevel + ") for " + brewTarget, "SlayerBot");
        herbloreTargetLevel = recipe.level;
        state = STATES.LEVEL_HERBLORE;
        return;
    }

    if (brewPhase === "idle") {
        brewPhase = "bank_supplies";
        brewCount = 0;
    }

    switch (brewPhase) {
        case "bank_supplies":
            handleBrewBankSupplies(recipe);
            break;
        case "clean_herbs":
            handleBrewCleanHerbs(recipe);
            break;
        case "make_unfinished":
            handleBrewMakeUnfinished(recipe);
            break;
        case "add_secondary":
            handleBrewAddSecondary(recipe);
            break;
        case "bank_potions":
            handleBrewBankPotions();
            break;
        case "done":
            handleBrewDone();
            break;
        default:
            brewPhase = "bank_supplies";
            break;
    }
}

function handleBrewBankSupplies(recipe) {
    var bank = findNearestBank();
    if (!bank) {
        brewPhase = "done";
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var bbx = bank.x;
            var bby = bank.y;
            var bbp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(bbx, bby, bbp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        _gt = tickCounter;
        if (_gt - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = _gt;
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest(0, true);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Deposit all
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    // Withdraw herbs, vials, and secondaries
    if (recipe.grimyHerbId) {
        withdrawBankItem(recipe.grimyHerbId, 14);
    }
    withdrawBankItem(VIAL_OF_WATER, 14);
    if (recipe.secondaryId) {
        withdrawBankItem(recipe.secondaryId, 14);
    }

    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.close();
        isExecuting = false;
    }, Utility.getDelay());

    brewPhase = "clean_herbs";
}

function handleBrewCleanHerbs(recipe) {
    if (!recipe.grimyHerbId) {
        brewPhase = "make_unfinished";
        return;
    }

    // Clean grimy herbs by clicking them
    if (Game.info.inventory.hasItem(recipe.grimyHerbId, 1)) {
        if (isPlayerIdle()) {
            isExecuting = true;
            var herbId = recipe.grimyHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(herbId);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } else {
        brewPhase = "make_unfinished";
    }
}

function handleBrewMakeUnfinished(recipe) {
    // Use clean herb on vial of water
    if (!recipe.cleanHerbId) {
        brewPhase = "add_secondary";
        return;
    }

    if (!Game.info.inventory.hasItem(recipe.cleanHerbId, 1) || !Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {
        brewPhase = "add_secondary";
        return;
    }

    if (isPlayerIdle()) {
        isExecuting = true;
        var clnId = recipe.cleanHerbId;
        Utility.invokeLater(function() {
            Game.interact.inventory.useItemOnItem(clnId, VIAL_OF_WATER);
            isExecuting = false;
        }, Utility.getDelay());
    }
}

function handleBrewAddSecondary(recipe) {
    // Use secondary ingredient on unfinished potion
    if (!recipe.unfinishedId || !recipe.secondaryId) {
        brewPhase = "bank_potions";
        return;
    }

    if (!Game.info.inventory.hasItem(recipe.unfinishedId, 1) || !Game.info.inventory.hasItem(recipe.secondaryId, 1)) {
        brewPhase = "bank_potions";
        return;
    }

    if (isPlayerIdle()) {
        isExecuting = true;
        var unfId = recipe.unfinishedId;
        var secId = recipe.secondaryId;
        Utility.invokeLater(function() {
            Game.interact.inventory.useItemOnItem(unfId, secId);
            isExecuting = false;
        }, Utility.getDelay());
    }
}

function handleBrewBankPotions() {
    var bank = findNearestBank();
    if (!bank) {
        brewPhase = "done";
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var bpx = bank.x;
            var bpy = bank.y;
            var bpp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(bpx, bpy, bpp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        _gt = tickCounter;
        if (_gt - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = _gt;
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest(0, true);
            isExecuting = false;
        }, Utility.getDelay());

function handleBrewDone() {
    botMsg("Potion brewing session complete (" + brewTarget + ").", "SlayerBot");
    brewPhase = "idle";
    brewTarget = null;
    brewCount = 0;

    if (stateBeforeInterrupt) {
        state = stateBeforeInterrupt;
        stateBeforeInterrupt = "";
    } else {
        state = STATES.CHECK_SUPPLIES;
    }
}

// ---- LEVEL_HERBLORE ----
function handleLevelHerblore() {
    // Make the highest level potion we CAN make until we reach herbloreTargetLevel

    if (herbloreLevel >= herbloreTargetLevel) {
        botMsg("Herblore level " + herbloreLevel + " reached! Returning to brewing.", "SlayerBot");
        state = STATES.BREW_POTIONS;
        return;
    }

    // Find the highest recipe we can make
    var bestRecipe = null;
    var bestLevel = 0;
    var recipeKeys = Object.keys(POTION_RECIPES);
    for (var i = 0; i < recipeKeys.length; i++) {
        var rec = dbLookup(POTION_RECIPES, recipeKeys[i]);
        if (rec && rec.level <= herbloreLevel && rec.level > bestLevel) {
            bestLevel = rec.level;
            bestRecipe = rec;
        }
    }

    if (!bestRecipe) {
        botMsg("Cannot find a potion to make at herblore " + herbloreLevel, "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Bank, withdraw ingredients, make potions, repeat
    var bank = findNearestBank();
    if (!bank) {
        state = STATES.IDLE;
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var lhx = bank.x;
            var lhy = bank.y;
            var lhp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(lhx, lhy, lhp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        _gt = tickCounter;
        if (_gt - bankOpenAttemptTick < 5) return;
        bankOpenAttemptTick = _gt;
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest(0, true);
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Deposit, withdraw herbs + vials
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    if (bestRecipe.grimyHerbId) {
        withdrawBankItem(bestRecipe.grimyHerbId, 14);
    }
    withdrawBankItem(VIAL_OF_WATER, 14);

    // Clean herbs and make potions inline
    if (bestRecipe.grimyHerbId && Game.info.inventory.hasItem(bestRecipe.grimyHerbId, 1)) {
        if (isPlayerIdle()) {
            isExecuting = true;
            var gHerbId = bestRecipe.grimyHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(gHerbId);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } else if (bestRecipe.cleanHerbId && Game.info.inventory.hasItem(bestRecipe.cleanHerbId, 1) && Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {
        if (isPlayerIdle()) {
            isExecuting = true;
            var cHerbId = bestRecipe.cleanHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnItem(cHerbId, VIAL_OF_WATER);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }

    // Check for level up
    updateCachedStats();
}

function handleDebugIdle() {
    // First tick -- one clean message
    if (debugTickCount === 0) {
        botMsg("DEBUG MODE -- select test in Config panel", "DEBUG");
        if (debugOverlay) debugOverlay.setValue("DEBUG: Idle -- pick test in Config");
    }
    debugTickCount++;

    // Check if user selected a test and toggled Start Test
    var selectedRaw = cfgVal("debugTest", "none");
    var selectedTest = (typeof selectedRaw === "string") ? selectedRaw : "none";
    var startFlag = cfgVal("debugStartTest", false);

    if (startFlag && selectedTest !== "none") {
        // Reset the start flag immediately so it does not re-trigger
        cfgSet("debugStartTest", false);
        botMsg("Starting test: " + selectedTest, "DEBUG");
        if (debugOverlay) debugOverlay.setValue("DEBUG: Running " + selectedTest);
        startDebugTest(selectedTest);
    }
}

function startDebugTest(testKey) {
    var test = DEBUG_TESTS[testKey];
    if (!test) {
        botMsg("Unknown test: " + testKey + " -- type !help for list", "DEBUG");
        return;
    }

    // Handle info-only tests (no state change)
    if (test.setup === "varbits") {
        runVarbitDump();
        return;
    }
    if (test.setup === "status") {
        runStatusDump();
        return;
    }
    if (test.setup === "jewelry") {
        needJewelryReplace = true;
        botMsg("Jewelry test -- forcing jewelry replace check on next bank visit", "DEBUG");
    }
    if (test.setup === "dungeon") {
        // Force dungeon entry by setting task to Varrock Sewers ghosts
        if (!currentTaskMonster || !currentTaskMonster.underground) {
            currentTaskMonster = MONSTER_DB.Ghost;
            currentTaskName = "Ghost";
            killsLeft = 10;
            botMsg("Dungeon test -- set task to Ghost (Varrock Sewers)", "DEBUG");
        }
        dungeonPhase = 0;
    }

    // Check prerequisites
    if ((testKey === "walk" || testKey === "fight" || testKey === "task" || testKey === "safespot") && !currentTaskMonster) {
        // Try reading from varbits first
        var dbgCreature = 0;
        try { dbgCreature = Game.getVarPlayerValue(395); } catch(e) {}
        if (dbgCreature > 0) {
            var dbgName = SLAYER_CREATURE_MAP[dbgCreature];
            if (dbgName && MONSTER_DB[dbgName]) {
                currentTaskMonster = MONSTER_DB[dbgName];
                currentTaskName = dbgName;
                try { killsLeft = Game.getVarPlayerValue(394); } catch(e2) { killsLeft = 99; }
                botMsg("Recovered task from varbits: " + currentTaskName + " x" + killsLeft, "DEBUG");
            }
        }
        if (!currentTaskMonster) {
            botMsg("No task assigned! Use !master first to get a task, or !varbits to check.", "DEBUG");
            return;
        }
    }

    if (testKey === "ge") {
        botMsg("GE test -- bot will walk to GE. Use !supplies first if gear is needed.", "DEBUG");
    }

    // Build allowed states array
    var allowed = [];
    var stateNames = test.states;
    for (var si = 0; si < stateNames.length; si++) {
        allowed.push(STATES[stateNames[si]]);
    }

    debugTestName = test.name;
    debugAllowedStates = allowed;
    debugTickLimit = 0;
    debugTickCount = 0;
    // Reset watchdog
    debugWatchProgressTick = 0;
    debugWatchLastState = "";
    debugWatchLastX = 0;
    debugWatchLastY = 0;
    debugWatchBankOpened = false;
    debugWatchKillCount = 0;
    debugWatchWarnings = 0;

    // Reset relevant phase vars
    bankPhase = 0;

    botMsg("===== STARTING TEST: " + test.name + " =====", "DEBUG");
    if (debugOverlay) debugOverlay.setValue("DEBUG: " + test.name);
    if (currentStateOverlay) currentStateOverlay.setValue("State: " + test.entry);

    state = STATES[test.entry];
}

    if (!debugActive) return false;
    if (msg.charAt(0) !== "!") return false;

    var cmd = msg.substring(1).toLowerCase();
    var spIdx = cmd.indexOf(" ");
    if (spIdx !== -1) cmd = cmd.substring(0, spIdx);

    // Emergency controls only -- all test selection is via Config panel
    if (cmd === "stop") {

        cfgSet("debugStartTest", false);
        cfgSet("debugTest", "none");
