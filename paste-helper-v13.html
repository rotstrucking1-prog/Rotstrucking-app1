<!DOCTYPE html><html><head><meta charset="utf-8"><title>DZ Paste Helper v13</title>
<style>body{background:#1a1a2e;color:#eee;font-family:Arial;text-align:center;padding:20px}
h1{color:#00ff88}h2{color:#ff6b6b}
button{padding:15px 30px;margin:10px;font-size:18px;border:none;border-radius:8px;cursor:pointer;color:#fff}
.util{background:#0ea5e9}.main{background:#10b981}.config{background:#f97316}.commit{background:#8b5cf6}
.status{color:#ffd700;margin:5px}</style></head><body>
<h1>DZ Slayer Bot v13 Paste Helper</h1>
<h2>v13: Unique var names (k1-k5) to fix 5 redeclaration errors</h2>
<p>CONFIG: 37 lines | UTILITIES: 5634 lines | MAIN: 1486 lines</p>
<hr>
<button class="config" onclick="copyFile('config')">Copy CONFIG (37 lines)</button><br>
<div id="config-status" class="status"></div>
<button class="util" onclick="copyFile('utilities')">Copy UTILITIES (5634 lines)</button><br>
<div id="utilities-status" class="status"></div>
<button class="main" onclick="copyFile('main')">Copy MAIN (1486 lines)</button><br>
<div id="main-status" class="status"></div>
<hr>
<button class="commit" onclick="copyCommit()">Copy Commit Msg</button>
<div id="commit-status" class="status"></div>
<script>
var SHA = "011016c2c67a35c3cdc0fabb7c5d858b13eaee46";
var BASE = "https://raw.githubusercontent.com/rotstrucking1-prog/Rotstrucking-app1/" + SHA + "/";
var FILES = {
  config: "slayer_CONFIG.txt",
  utilities: "slayer_UTILITIES.txt",
  main: "slayer_MAIN.txt"
};
function copyFile(which) {
  var url = BASE + FILES[which] + "?t=" + Date.now();
  var el = document.getElementById(which + "-status");
  el.textContent = "Fetching from commit " + SHA.substring(0,8) + "...";
  fetch(url).then(function(r){return r.text()}).then(function(txt){
    return navigator.clipboard.writeText(txt).then(function(){
      var lines = txt.split("\n").length;
      el.textContent = "Copied! " + lines + " lines at " + new Date().toLocaleTimeString();
    });
  }).catch(function(e){el.textContent="ERROR: "+e});
}
function copyCommit() {
  navigator.clipboard.writeText("slayer bot v13").then(function(){
    document.getElementById("commit-status").textContent = "Copied: 'slayer bot v13'";
  });
}
</script></body></html>
