<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Paste Helper - CONFIG v24</title>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 5px; margin: 10px; }
button:hover { background: #1177bb; }
#status { margin-top: 20px; font-size: 16px; }
.success { color: #4ec9b0; }
.error { color: #f44747; }
h1 { color: #569cd6; }
p { color: #9cdcfe; }
</style>
</head>
<body>
<h1>Slayer Bot v24 - CONFIG Tab</h1>
<p>Click "Copy to Clipboard" then switch to DZ editor, select all (Ctrl+A), paste (Ctrl+V)</p>
<button onclick="copyCode()">Copy to Clipboard</button>
<div id="status"></div>
<script>
var code = "// ============================================================\n// DeadZone Auto Slayer Bot v24 -- CONFIG\n// Version: 24.0\n// ============================================================\n\n// ------------------------------------------------------------\n// Combat Group\n// ------------------------------------------------------------\n\nvar foodType = ConfigItem.createList(\n    &quot;foodType&quot;, &quot;Combat&quot;, &quot;Food Type&quot;,\n    &quot;Type of food to eat during combat&quot;,\n    [&quot;Shrimps&quot;, &quot;Trout&quot;, &quot;Salmon&quot;, &quot;Lobster&quot;, &quot;Swordfish&quot;, &quot;Monkfish&quot;, &quot;Shark&quot;, &quot;Manta Ray&quot;],\n    &quot;Lobster&quot;\n);\n\nvar eatPercent = ConfigItem.createInteger(\n    &quot;eatPercent&quot;, &quot;Combat&quot;, &quot;Eat at HP %&quot;,\n    &quot;HP percentage threshold to eat food at&quot;,\n    50\n);\n\nvar usePrayer = ConfigItem.createBoolean(\n    &quot;usePrayer&quot;, &quot;Combat&quot;, &quot;Use Protection Prayers&quot;,\n    &quot;Automatically activate protection prayers based on monster attack style&quot;,\n    true\n);\n\nvar useSpecialAttack = ConfigItem.createBoolean(\n    &quot;useSpecialAttack&quot;, &quot;Combat&quot;, &quot;Use Special Attack&quot;,\n    &quot;Use special attack weapon when spec energy is available&quot;,\n    true\n);\n\nvar trainingFocus = ConfigItem.createList(\n    &quot;trainingFocus&quot;, &quot;Combat&quot;, &quot;Training Focus&quot;,\n    &quot;Which combat stat to prioritize when selecting attack style&quot;,\n    [&quot;Balanced&quot;, &quot;Attack&quot;, &quot;Strength&quot;, &quot;Defence&quot;],\n    &quot;Balanced&quot;\n);\n\nvar attackCap = ConfigItem.createInteger(\n    &quot;attackCap&quot;, &quot;Combat&quot;, &quot;Attack Level Cap&quot;,\n    &quot;Maximum Attack level to train to (0 = no cap)&quot;,\n    0\n);\n\nvar strengthCap = ConfigItem.createInteger(\n    &quot;strengthCap&quot;, &quot;Combat&quot;, &quot;Strength Level Cap&quot;,\n    &quot;Maximum Strength level to train to (0 = no cap)&quot;,\n    0\n);\n\nvar defenceCap = ConfigItem.createInteger(\n    &quot;defenceCap&quot;, &quot;Combat&quot;, &quot;Defence Level Cap&quot;,\n    &quot;Maximum Defence level to train to (0 = no cap)&quot;,\n    0\n);\n\n// ------------------------------------------------------------\n// Loot Group\n// ------------------------------------------------------------\n\nvar lootEnabled = ConfigItem.createBoolean(\n    &quot;lootEnabled&quot;, &quot;Loot&quot;, &quot;Pick Up Loot&quot;,\n    &quot;Enable automatic looting of monster drops&quot;,\n    true\n);\n\nvar lootMinValue = ConfigItem.createInteger(\n    &quot;lootMinValue&quot;, &quot;Loot&quot;, &quot;Minimum Loot Value (GP)&quot;,\n    &quot;Only pick up items worth at least this many GP&quot;,\n    250\n);\n\nvar buryBones = ConfigItem.createBoolean(\n    &quot;buryBones&quot;, &quot;Loot&quot;, &quot;Bury Bones&quot;,\n    &quot;Automatically bury bones dropped by killed monsters&quot;,\n    true\n);\n\nvar collectClues = ConfigItem.createBoolean(\n    &quot;collectClues&quot;, &quot;Loot&quot;, &quot;Collect Clue Scrolls&quot;,\n    &quot;Pick up clue scrolls and bank them for later&quot;,\n    true\n);\n\n// ------------------------------------------------------------\n// Slayer Group\n// ------------------------------------------------------------\n\nvar masterPreference = ConfigItem.createList(\n    &quot;masterPreference&quot;, &quot;Slayer&quot;, &quot;Slayer Master&quot;,\n    &quot;Preferred slayer master (Auto picks highest available)&quot;,\n    [&quot;Auto&quot;, &quot;Turael&quot;, &quot;Mazchna&quot;, &quot;Vannaka&quot;, &quot;Chaeldar&quot;, &quot;Konar&quot;, &quot;Nieve&quot;, &quot;Duradel&quot;],\n    &quot;Auto&quot;\n);\n\nvar turaelBoosting = ConfigItem.createBoolean(\n    &quot;turaelBoosting&quot;, &quot;Slayer&quot;, &quot;Turael Boosting&quot;,\n    &quot;Complete 9 tasks at Turael then get 10th from highest master for bonus points&quot;,\n    false\n);\n\n// ------------------------------------------------------------\n// Supplies Group\n// ------------------------------------------------------------\n\nvar useGE = ConfigItem.createBoolean(\n    &quot;useGE&quot;, &quot;Supplies&quot;, &quot;Use Grand Exchange&quot;,\n    &quot;Buy supplies from the Grand Exchange when needed&quot;,\n    true\n);\n\nvar selfSufficiency = ConfigItem.createBoolean(\n    &quot;selfSufficiency&quot;, &quot;Supplies&quot;, &quot;Self Sufficiency Mode&quot;,\n    &quot;Gather supplies by hand when GP is insufficient to buy&quot;,\n    true\n);\n\nvar minArrowStock = ConfigItem.createInteger(\n    &quot;minArrowStock&quot;, &quot;Supplies&quot;, &quot;Min Arrow Stock&quot;,\n    &quot;Minimum arrows to craft or buy before returning to slayer task&quot;,\n    1000\n);\n\nvar minRuneStock = ConfigItem.createInteger(\n    &quot;minRuneStock&quot;, &quot;Supplies&quot;, &quot;Min Rune Stock&quot;,\n    &quot;Minimum runes to craft or buy before returning to slayer task&quot;,\n    1000\n);\n\n// ------------------------------------------------------------\n// Advanced Group\n// ------------------------------------------------------------\n\nvar useSafespots = ConfigItem.createBoolean(\n    &quot;useSafespots&quot;, &quot;Advanced&quot;, &quot;Use Safe Spots&quot;,\n    &quot;Use known safe spots when available for ranged or magic attacks&quot;,\n    true\n);\n\nvar useCannon = ConfigItem.createBoolean(\n    &quot;useCannon&quot;, &quot;Advanced&quot;, &quot;Use Dwarf Cannon&quot;,\n    &quot;Deploy dwarf multicannon in multicombat areas to speed up tasks&quot;,\n    false\n);\n\nvar antifireMode = ConfigItem.createList(\n    &quot;antifireMode&quot;, &quot;Advanced&quot;, &quot;Antifire Mode&quot;,\n    &quot;Auto drinks antifire potions for dragon tasks; Always Off disables&quot;,\n    [&quot;Auto&quot;, &quot;Always Off&quot;],\n    &quot;Auto&quot;\n);\n\n// ------------------------------------------------------------\n// Overlay Items\n// ------------------------------------------------------------\n\nvar statusOverlay = OverlayItem.create2d(&quot;status&quot;, &quot;Status: Initializing...&quot;, true, 0);\nvar taskOverlay = OverlayItem.create2d(&quot;task&quot;, &quot;Task: None&quot;, true, 1);\nvar killsLeftOverlay = OverlayItem.create2d(&quot;killsLeft&quot;, &quot;Kills Left: 0&quot;, true, 2);\nvar tasksCompletedOverlay = OverlayItem.create2d(&quot;tasksCompleted&quot;, &quot;Tasks Done: 0&quot;, true, 3);\nvar slayerMasterOverlay = OverlayItem.create2d(&quot;slayerMaster&quot;, &quot;Master: None&quot;, true, 4);\nvar slayerPointsOverlay = OverlayItem.create2d(&quot;slayerPoints&quot;, &quot;Points: 0&quot;, true, 5);\nvar currentStateOverlay = OverlayItem.create2d(&quot;currentState&quot;, &quot;State: STARTUP&quot;, true, 6);\n";
function copyCode() {
    var decoded = code.replace(/\\n/g, "\n").replace(/\\'/g, "'").replace(/\\"/g, '"');
    navigator.clipboard.writeText(decoded).then(function() {
        document.getElementById("status").innerHTML = '<span class="success">Copied! ' + decoded.length + ' chars. Now switch to DZ and paste.</span>';
    }).catch(function(err) {
        document.getElementById("status").innerHTML = '<span class="error">Copy failed: ' + err + '</span>';
    });
}
</script>
</body>
</html>
