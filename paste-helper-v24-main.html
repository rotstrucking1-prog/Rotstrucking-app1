 = currentTaskMonster.y;\n            var canP = currentTaskMonster.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(canX, canY, canP));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Place cannon by using the base item\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.inventory.consumeItem(6);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    cannonPlaced = true;\n    var loc = getPlayerLocation();\n    cannonX = loc.x;\n    cannonY = loc.y;\n    Game.sendGameMessage(&quot;Cannon placed at &quot; + cannonX + &quot;,&quot; + cannonY, &quot;SlayerBot&quot;);\n    state = STATES.FIGHT_TASK;\n}\n\n// =============================================================================\n// SELF-SUFFICIENCY STATES (existing, enhanced for v24)\n// =============================================================================\n\n// ---- GATHER_FOOD ----\nfunction handleGatherFood() {\n    // Determine best fish for our level\n    var fishData = getBestFishForLevel(fishingLevel);\n    if (!fishData) {\n        Game.sendGameMessage(&quot;Cannot determine fish for level &quot; + fishingLevel, &quot;SlayerBot&quot;);\n        state = STATES.IDLE;\n        return;\n    }\n\n    gatherFoodTier = fishData;\n    var spotInfo = null;\n    // Find fishing spot from FISHING_SPOTS\n    var spotKeys = Object.keys(FISHING_SPOTS);\n    for (var i = 0; i &lt; spotKeys.length; i++) {\n        var fs = dbLookup(FISHING_SPOTS, spotKeys[i]);\n        if (fs &amp;&amp; fs.fishId === fishData.rawId) {\n            spotInfo = fs;\n            break;\n        }\n    }\n\n    if (!spotInfo) {\n        // Default to shrimps at Lumbridge\n        spotInfo = {x: 3243, y: 3156, plane: 0, npcId: 1525, action: &quot;small_net&quot;};\n    }\n\n    // Walk to fishing spot\n    if (!isNear(spotInfo.x, spotInfo.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var fsx = spotInfo.x;\n            var fsy = spotInfo.y;\n            var fsp = spotInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(fsx, fsy, fsp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Fish\n    if (!Client.getLocalPlayer().isInteracting() &amp;&amp; Client.getLocalPlayer().isIdle()) {\n        var fishingSpot = Game.info.npc.getNearest([spotInfo.npcId]);\n        if (fishingSpot) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.action(fishingSpot, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Check if inventory is full\n    if (Game.info.inventory.isFull()) {\n        gatherFoodCount = 28;\n        state = STATES.COOK_FOOD;\n    }\n}\n\n// ---- COOK_FOOD ----\nfunction handleCookFood() {\n    if (!gatherFoodTier) {\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Find nearest cooking range\n    var rangeInfo = null;\n    var rangeKeys = Object.keys(COOKING_RANGES);\n    for (var i = 0; i &lt; rangeKeys.length; i++) {\n        rangeInfo = dbLookup(COOKING_RANGES, rangeKeys[i]);\n        if (rangeInfo) break;\n    }\n\n    if (!rangeInfo) {\n        // Default Lumbridge kitchen range\n        rangeInfo = {x: 3211, y: 3215, plane: 0, objectId: 114};\n    }\n\n    // Walk to range\n    if (!isNear(rangeInfo.x, rangeInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var crx = rangeInfo.x;\n            var cry = rangeInfo.y;\n            var crp = rangeInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(crx, cry, crp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check if we still have raw fish\n    if (!Game.info.inventory.hasItem(gatherFoodTier.rawId, 1)) {\n        // All cooked or burned, bank and check supplies\n        Game.sendGameMessage(&quot;Cooking complete, banking food.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Cook: use raw fish on range\n    if (Client.getLocalPlayer().isIdle()) {\n        var rangeObj = Game.info.gameObject.getNearest([rangeInfo.objectId]);\n        if (rangeObj) {\n            isExecuting = true;\n            var rawId = gatherFoodTier.rawId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnGameObject(rawId, rangeObj);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_GEAR ----\nfunction handleGatherGear() {\n    // For melee gear: kill cows for hides, or mine ore for metal gear\n    if (!gatherGearTarget) {\n        // Determine what gear we need\n        var bestBody = getBestBody(defenceLevel);\n        var bestLegs = getBestLegs(defenceLevel);\n\n        // Check if we need leather or metal gear\n        if (defenceLevel &lt; 20) {\n            // Leather gear -- kill cows for hides\n            gatherGearPhase = &quot;leather&quot;;\n            leatherPhase = &quot;killing&quot;;\n            state = STATES.GATHER_GEAR;\n        } else {\n            // Metal gear -- mine ore\n            gatherGearPhase = &quot;metal&quot;;\n            state = STATES.MINE_ORE;\n        }\n        return;\n    }\n\n    if (gatherGearPhase === &quot;leather&quot;) {\n        handleLeatherGathering();\n    } else if (gatherGearPhase === &quot;metal&quot;) {\n        state = STATES.MINE_ORE;\n    }\n}\n\nfunction handleLeatherGathering() {\n    // Kill cows for cowhides\n    var cowNpcIds = [2791, 2793, 2795]; // Cow NPC IDs\n    var cowLocation = {x: 3253, y: 3271, plane: 0}; // Lumbridge cow field\n\n    if (leatherPhase === &quot;killing&quot;) {\n        if (!isNear(cowLocation.x, cowLocation.y, 20)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(cowLocation.x, cowLocation.y, cowLocation.plane));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Pick up cowhides from ground\n        if (Game.info.inventory.isFull()) {\n            leatherPhase = &quot;tanning&quot;;\n            state = STATES.TAN_HIDES;\n            return;\n        }\n\n        // Attack cow or pick up hide\n        if (!Client.getLocalPlayer().isInteracting()) {\n            // Check for hides on ground first\n            var hides = Game.info.groundItem.getAll();\n            if (hides) {\n                for (var h = 0; h &lt; hides.length; h++) {\n                    if (hides[h].getId() === 1739) { // Cowhide\n                        isExecuting = true;\n                        var hideItem = hides[h];\n                        Utility.invokeLater(function() {\n                            Game.interact.groundItem.pickup(hideItem);\n                            isExecuting = false;\n                        }, Utility.getDelay());\n                        return;\n                    }\n                }\n            }\n\n            // Attack cow\n            var cow = Game.info.npc.getNearest(cowNpcIds);\n            if (cow &amp;&amp; !cow.isDead()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.npc.attack(cow);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n    }\n}\n\n// ---- TAN_HIDES ----\n\n// ---- CRAFT_GEAR ----\nfunction handleCraftGear() {\n    // Craft leather gear from tanned hides\n    // Requires needle (1733) and thread (1734)\n    var needleId = 1733;\n    var threadId = 1734;\n    var leatherId = 1741; // Leather\n\n    if (!Game.info.inventory.hasItem(leatherId, 1)) {\n        Game.sendGameMessage(&quot;Gear crafting complete, checking supplies.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(needleId, 1) || !Game.info.inventory.hasItem(threadId, 1)) {\n        // Need to get crafting supplies from bank\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Use needle on leather to craft\n    if (Client.getLocalPlayer().isIdle()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(needleId, leatherId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- MINE_ORE ----\nfunction handleMineOre() {\n    // Determine ore to mine based on smithing level\n    var oreData = null;\n    var mineSpot = null;\n\n    // Simple tier selection\n    if (miningLevel &gt;= 55) {\n        oreData = {oreId: 447, name: &quot;mithril&quot;}; // Mithril ore\n    } else if (miningLevel &gt;= 30) {\n        oreData = {oreId: 440, name: &quot;iron&quot;}; // Iron ore\n    } else if (miningLevel &gt;= 15) {\n        oreData = {oreId: 436, name: &quot;copper&quot;}; // Copper ore\n    } else {\n        oreData = {oreId: 438, name: &quot;tin&quot;}; // Tin ore\n    }\n\n    // Find mining spot\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var m = 0; m &lt; mineKeys.length; m++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[m]);\n        if (ms &amp;&amp; ms.oreId === oreData.oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        // Default to Varrock East mine\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    // Walk to mine\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var mmx = mineSpot.x;\n            var mmy = mineSpot.y;\n            var mmp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(mmx, mmy, mmp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Mine ore\n    if (Game.info.inventory.isFull()) {\n        // Full, smelt\n        state = STATES.SMELT_ORE;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMELT_ORE ----\nfunction handleSmeltOre() {\n    // Find nearest furnace\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i &lt; furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469}; // Edgeville\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sfx = furnaceInfo.x;\n            var sfy = furnaceInfo.y;\n            var sfp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sfx, sfy, sfp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check if we still have ore\n    var hasOre = Game.info.inventory.hasItem(447, 1) || Game.info.inventory.hasItem(440, 1) ||\n                 Game.info.inventory.hasItem(436, 1) || Game.info.inventory.hasItem(438, 1);\n    if (!hasOre) {\n        state = STATES.SMITH_GEAR;\n        return;\n    }\n\n    // Smelt at furnace\n    if (Client.getLocalPlayer().isIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- SMITH_GEAR ----\nfunction handleSmithGear() {\n    // Find nearest anvil\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i &lt; anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097}; // Varrock west\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sax = anvilInfo.x;\n            var say = anvilInfo.y;\n            var sap = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sax, say, sap));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check for bars\n    var hasBars = Game.info.inventory.hasItem(2353, 1) || Game.info.inventory.hasItem(2351, 1) ||\n                  Game.info.inventory.hasItem(2349, 1) || Game.info.inventory.hasItem(2355, 1);\n    if (!hasBars) {\n        Game.sendGameMessage(&quot;Smithing complete, returning to supplies.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Smith at anvil\n    if (Client.getLocalPlayer().isIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- GATHER_RANGED ----\nfunction handleGatherRanged() {\n    // Kill chickens for feathers to make arrows\n    var chickenLoc = null;\n    var chickenLocKeys = Object.keys(CHICKEN_LOCATIONS);\n    if (chickenLocKeys.length &gt; 0) {\n        chickenLoc = dbLookup(CHICKEN_LOCATIONS, chickenLocKeys[0]);\n    }\n    if (!chickenLoc) {\n        chickenLoc = {x: 3235, y: 3295, plane: 0}; // Lumbridge\n    }\n\n    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var grcx = chickenLoc.x;\n            var grcy = chickenLoc.y;\n            var grcp = chickenLoc.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(grcx, grcy, grcp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        // Bank feathers then continue or move to arrow crafting\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Pick up feathers\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var gItems = null;\n        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}\n        if (gItems) {\n            for (var gi = 0; gi &lt; gItems.length; gi++) {\n                if (gItems[gi].getId() === FEATHER_ID) {\n                    isExecuting = true;\n                    var featherItem = gItems[gi];\n                    Utility.invokeLater(function() {\n                        Game.interact.groundItem.pickup(featherItem);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n\n        // Kill chicken for feathers\n        var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);\n        if (chicken &amp;&amp; !chicken.isDead()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.attack(chicken);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\n// ---- WALK_TO_GATHER ----\nfunction handleWalkToGather() {\n    // Generic walk-to state used to get to gathering locations\n    // After arrival, transitions to the appropriate gathering state\n    if (gatherGearTarget) {\n        if (isNear(gatherGearTarget.x, gatherGearTarget.y, 10)) {\n            // Arrived at gathering destination\n            if (gatherGearPhase === &quot;leather&quot;) {\n                state = STATES.GATHER_GEAR;\n            } else if (gatherGearPhase === &quot;metal&quot;) {\n                state = STATES.MINE_ORE;\n            } else {\n                state = STATES.GATHER_FOOD;\n            }\n            return;\n        }\n\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var wgx = gatherGearTarget.x;\n            var wgy = gatherGearTarget.y;\n            var wgp = gatherGearTarget.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(wgx, wgy, wgp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// =============================================================================\n// NEW v24 STATES\n// =============================================================================\n\n// ---- CRAFT_ARROWS ----\n// Multi-phase arrow crafting: mine ore -&gt; smelt -&gt; smith heads -&gt; feathers -&gt; chop -&gt; fletch shafts -&gt; combine\nfunction handleCraftArrows() {\n    // Determine best tier\n    var tier = getBestArrowCraftingTier(smithingLevel, fletchingLevel, miningLevel);\n    if (!tier) {\n        Game.sendGameMessage(&quot;Cannot craft arrows at current levels (Smith:&quot; + smithingLevel + &quot; Fletch:&quot; + fletchingLevel + &quot; Mine:&quot; + miningLevel + &quot;)&quot;, &quot;SlayerBot&quot;);\n        arrowCraftPhase = &quot;idle&quot;;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    arrowCraftTier = tier;\n\n    // Initialize phase if idle\n    if (arrowCraftPhase === &quot;idle&quot;) {\n        arrowCraftPhase = &quot;check_stock&quot;;\n        arrowCraftCount = 0;\n    }\n\n    switch (arrowCraftPhase) {\n        case &quot;check_stock&quot;:\n            handleArrowCheckStock();\n            break;\n        case &quot;mine_ore&quot;:\n            handleArrowMineOre();\n            break;\n        case &quot;smelt_bars&quot;:\n            handleArrowSmeltBars();\n            break;\n        case &quot;smith_heads&quot;:\n            handleArrowSmithHeads();\n            break;\n        case &quot;kill_chickens&quot;:\n            handleArrowKillChickens();\n            break;\n        case &quot;chop_trees&quot;:\n            handleArrowChopTrees();\n            break;\n        case &quot;fletch_shafts&quot;:\n            handleArrowFletchShafts();\n            break;\n        case &quot;fletch_arrows&quot;:\n            handleArrowFletchArrows();\n            break;\n        case &quot;done&quot;:\n            handleArrowDone();\n            break;\n        default:\n            arrowCraftPhase = &quot;check_stock&quot;;\n            break;\n    }\n}\n\nfunction handleArrowCheckStock() {\n    // Check if we have enough components to skip steps\n    var headId = arrowCraftTier.headId;\n    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);\n    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);\n    var headCount = Game.info.inventory.getItemCount(headId);\n\n    // Target: 500 arrows minimum\n    if (headCount &gt;= 500 &amp;&amp; shaftCount &gt;= 500 &amp;&amp; featherCount &gt;= 500) {\n        arrowCraftPhase = &quot;fletch_arrows&quot;;\n        return;\n    }\n\n    if (headCount &lt; 500) {\n        // Need arrowheads: mine ore -&gt; smelt -&gt; smith\n        arrowCraftPhase = &quot;mine_ore&quot;;\n    } else if (featherCount &lt; 500) {\n        arrowCraftPhase = &quot;kill_chickens&quot;;\n    } else if (shaftCount &lt; 500) {\n        arrowCraftPhase = &quot;chop_trees&quot;;\n    } else {\n        arrowCraftPhase = &quot;fletch_arrows&quot;;\n    }\n}\n\nfunction handleArrowMineOre() {\n    var oreId = arrowCraftTier.oreId;\n    if (!oreId) {\n        // If tier uses iron, default\n        oreId = 440;\n    }\n\n    // Find mining spot\n    var mineSpot = null;\n    var mineKeys = Object.keys(MINING_SPOTS);\n    for (var i = 0; i &lt; mineKeys.length; i++) {\n        var ms = dbLookup(MINING_SPOTS, mineKeys[i]);\n        if (ms &amp;&amp; ms.oreId === oreId) {\n            mineSpot = ms;\n            break;\n        }\n    }\n\n    if (!mineSpot) {\n        mineSpot = {x: 3285, y: 3365, plane: 0, rockId: 11360};\n    }\n\n    if (!isNear(mineSpot.x, mineSpot.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var amx = mineSpot.x;\n            var amy = mineSpot.y;\n            var amp = mineSpot.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(amx, amy, amp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (Game.info.inventory.isFull()) {\n        arrowCraftPhase = &quot;smelt_bars&quot;;\n        return;\n    }\n\n    // Mine\n    if (Client.getLocalPlayer().isIdle()) {\n        var rock = Game.info.gameObject.getNearest([mineSpot.rockId]);\n        if (rock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(rock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmeltBars() {\n    var furnaceInfo = null;\n    var furnaceKeys = Object.keys(FURNACES);\n    for (var i = 0; i &lt; furnaceKeys.length; i++) {\n        furnaceInfo = dbLookup(FURNACES, furnaceKeys[i]);\n        if (furnaceInfo) break;\n    }\n    if (!furnaceInfo) {\n        furnaceInfo = {x: 3109, y: 3499, plane: 0, objectId: 16469};\n    }\n\n    if (!isNear(furnaceInfo.x, furnaceInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var asx = furnaceInfo.x;\n            var asy = furnaceInfo.y;\n            var asp = furnaceInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(asx, asy, asp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var oreId = arrowCraftTier.oreId || 440;\n    if (!Game.info.inventory.hasItem(oreId, 1)) {\n        // Need coal for some ores\n        if (arrowCraftTier.needsCoal &amp;&amp; Game.info.inventory.hasItem(COAL_ID, 1)) {\n            // Still smelting coal-based bars\n        } else {\n            arrowCraftPhase = &quot;smith_heads&quot;;\n            return;\n        }\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        var furnace = Game.info.gameObject.getNearest([furnaceInfo.objectId]);\n        if (furnace) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(furnace, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowSmithHeads() {\n    var anvilInfo = null;\n    var anvilKeys = Object.keys(ANVILS);\n    for (var i = 0; i &lt; anvilKeys.length; i++) {\n        anvilInfo = dbLookup(ANVILS, anvilKeys[i]);\n        if (anvilInfo) break;\n    }\n    if (!anvilInfo) {\n        anvilInfo = {x: 3188, y: 3427, plane: 0, objectId: 2097};\n    }\n\n    if (!isNear(anvilInfo.x, anvilInfo.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var ahx = anvilInfo.x;\n            var ahy = anvilInfo.y;\n            var ahp = anvilInfo.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(ahx, ahy, ahp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    var barId = arrowCraftTier.barId;\n    if (!barId) barId = 2351; // Iron bar default\n    if (!Game.info.inventory.hasItem(barId, 1)) {\n        // Check if we have enough heads\n        var headCount = Game.info.inventory.getItemCount(arrowCraftTier.headId);\n        if (headCount &gt;= 100) {\n            // Check feathers next\n            var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);\n            if (featherCt &lt; 500) {\n                arrowCraftPhase = &quot;kill_chickens&quot;;\n            } else {\n                arrowCraftPhase = &quot;chop_trees&quot;;\n            }\n        } else {\n            // Need more ore\n            arrowCraftPhase = &quot;mine_ore&quot;;\n        }\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        var anvil = Game.info.gameObject.getNearest([anvilInfo.objectId]);\n        if (anvil) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(anvil, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowKillChickens() {\n    var chickenLoc = null;\n    var clKeys = Object.keys(CHICKEN_LOCATIONS);\n    if (clKeys.length &gt; 0) {\n        chickenLoc = dbLookup(CHICKEN_LOCATIONS, clKeys[0]);\n    }\n    if (!chickenLoc) {\n        chickenLoc = {x: 3235, y: 3295, plane: 0};\n    }\n\n    if (!isNear(chickenLoc.x, chickenLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var ckx = chickenLoc.x;\n            var cky = chickenLoc.y;\n            var ckp = chickenLoc.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(ckx, cky, ckp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check feather count\n    var featherCt = Game.info.inventory.getItemCount(FEATHER_ID);\n    if (featherCt &gt;= 600 || Game.info.inventory.isFull()) {\n        // Bank feathers then move to next phase\n        arrowCraftPhase = &quot;chop_trees&quot;;\n        return;\n    }\n\n    // Pick up feathers first\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var gItems = null;\n        try { gItems = Game.info.groundItem.getAll(); } catch(e) {}\n        if (gItems) {\n            for (var gi = 0; gi &lt; gItems.length; gi++) {\n                if (gItems[gi].getId() === FEATHER_ID) {\n                    isExecuting = true;\n                    var fItem = gItems[gi];\n                    Utility.invokeLater(function() {\n                        Game.interact.groundItem.pickup(fItem);\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n\n        // Kill chickens\n        var chicken = Game.info.npc.getNearest(CHICKEN_NPC_IDS);\n        if (chicken &amp;&amp; !chicken.isDead()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.attack(chicken);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowChopTrees() {\n    // Chop normal trees for logs to make arrow shafts\n    var treeLoc = {x: 3196, y: 3224, plane: 0}; // Near Lumbridge\n\n    if (!isNear(treeLoc.x, treeLoc.y, 15)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(treeLoc.x, treeLoc.y, treeLoc.plane));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Check log count\n    var logCount = Game.info.inventory.getItemCount(LOGS_ID);\n    if (logCount &gt;= 20 || Game.info.inventory.isFull()) {\n        arrowCraftPhase = &quot;fletch_shafts&quot;;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        // Find a tree\n        var tree = Game.info.gameObject.getNearest(TREE_IDS);\n        if (tree) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(tree, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleArrowFletchShafts() {\n    // Use knife on logs to make arrow shafts\n    if (!Game.info.inventory.hasItem(KNIFE_ID, 1)) {\n        // Need knife from bank\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(LOGS_ID, 1)) {\n        // All logs fletched to shafts\n        arrowCraftPhase = &quot;fletch_arrows&quot;;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(KNIFE_ID, LOGS_ID);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleArrowFletchArrows() {\n    // Combine arrowheads + shafts, then attach feathers\n    var headId = arrowCraftTier.headId;\n    var shaftCount = Game.info.inventory.getItemCount(ARROW_SHAFT_ID);\n    var headCount = Game.info.inventory.getItemCount(headId);\n    var featherCount = Game.info.inventory.getItemCount(FEATHER_ID);\n\n    // First: attach feathers to shafts = headless arrows (53)\n    var headlessId = 53;\n    var headlessCount = Game.info.inventory.getItemCount(headlessId);\n\n    if (shaftCount &gt; 0 &amp;&amp; featherCount &gt; 0) {\n        // Make headless arrows\n        if (Client.getLocalPlayer().isIdle()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(ARROW_SHAFT_ID, FEATHER_ID);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Then: attach heads to headless arrows = finished arrows\n    if (headlessCount &gt; 0 &amp;&amp; headCount &gt; 0) {\n        if (Client.getLocalPlayer().isIdle()) {\n            isExecuting = true;\n            var hId = headId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(hId, headlessId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // All done or missing components\n    var arrowId = arrowCraftTier.arrowId;\n    var finalCount = Game.info.inventory.getItemCount(arrowId);\n    Game.sendGameMessage(&quot;Arrow crafting complete. Made &quot; + finalCount + &quot; arrows.&quot;, &quot;SlayerBot&quot;);\n    arrowCraftPhase = &quot;done&quot;;\n}\n\nfunction handleArrowDone() {\n    arrowCraftPhase = &quot;idle&quot;;\n    arrowCraftCount = 0;\n    // Equip arrows\n    if (arrowCraftTier &amp;&amp; arrowCraftTier.arrowId) {\n        var arrowId = arrowCraftTier.arrowId;\n        if (Game.info.inventory.hasItem(arrowId, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(arrowId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Return to check supplies\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = &quot;&quot;;\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- CRAFT_RUNES ----\n// Pipeline: mine essence -&gt; walk to altar -&gt; craft -&gt; bank -&gt; repeat\nfunction handleCraftRunes() {\n    if (runecraftPhase === &quot;idle&quot;) {\n        runecraftPhase = &quot;mine_essence&quot;;\n        rcEssenceCount = 0;\n\n        // Determine which runes we need\n        neededRunes = [];\n        var spell = getBestSpell(magicLevel);\n        if (spell) {\n            var runes = getRunesForSpell(spell.key);\n            if (runes) {\n                var runeKeys = Object.keys(runes);\n                for (var i = 0; i &lt; runeKeys.length; i++) {\n                    neededRunes.push({runeId: parseInt(runeKeys[i]), quantity: 1000});\n                }\n            }\n        }\n        if (neededRunes.length === 0) {\n            // Default to fire runes\n            neededRunes.push({runeId: 554, quantity: 1000}); // Fire runes\n        }\n    }\n\n    switch (runecraftPhase) {\n        case &quot;mine_essence&quot;:\n            handleRCMineEssence();\n            break;\n        case &quot;walk_to_altar&quot;:\n            handleRCWalkToAltar();\n            break;\n        case &quot;craft_runes&quot;:\n            handleRCCraftRunes();\n            break;\n        case &quot;bank_runes&quot;:\n            handleRCBankRunes();\n            break;\n        case &quot;check_stock&quot;:\n            handleRCCheckStock();\n            break;\n        case &quot;done&quot;:\n            handleRCDone();\n            break;\n        default:\n            runecraftPhase = &quot;mine_essence&quot;;\n            break;\n    }\n}\n\nfunction handleRCMineEssence() {\n    // Mine rune essence at Varrock mine\n    // Aubury (NPC 11435) teleports you to the mine\n    var auburyLoc = {x: 3253, y: 3401, plane: 0};\n    var auburyNpcId = 11435;\n\n    // Check if we&#x27;re in the essence mine (plane changes)\n    var loc = getPlayerLocation();\n    var inMine = (loc.y &gt; 5000); // Essence mine is in a different plane\n\n    if (!inMine) {\n        // Walk to Aubury\n        if (!isNear(auburyLoc.x, auburyLoc.y, 5)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(auburyLoc.x, auburyLoc.y, auburyLoc.plane));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Teleport via Aubury\n        var aubury = Game.info.npc.getNearest([auburyNpcId]);\n        if (aubury) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.action(aubury, MenuAction.NPC_SECOND_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // In the mine -- mine essence\n    if (Game.info.inventory.isFull()) {\n        // Full, go craft runes\n        runecraftPhase = &quot;walk_to_altar&quot;;\n        return;\n    }\n\n    // Find rune essence rock\n    var essRockIds = [7471]; // Rune essence rock\n    if (Client.getLocalPlayer().isIdle()) {\n        var essRock = Game.info.gameObject.getNearest(essRockIds);\n        if (essRock) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(essRock, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleRCWalkToAltar() {\n    // Determine altar based on needed runes\n    var altarLoc = {x: 3313, y: 3254, plane: 0}; // Default: Air altar entrance\n    var altarObjId = 34760; // Air altar object\n\n    if (neededRunes.length &gt; 0) {\n        var runeId = neededRunes[0].runeId;\n        if (runeId === 554) { // Fire runes\n            altarLoc = {x: 3312, y: 3254, plane: 0};\n            altarObjId = 34764;\n        } else if (runeId === 555) { // Water runes\n            altarLoc = {x: 3185, y: 3165, plane: 0};\n            altarObjId = 34762;\n        } else if (runeId === 556) { // Air runes\n            altarLoc = {x: 3313, y: 3254, plane: 0};\n            altarObjId = 34760;\n        } else if (runeId === 557) { // Earth runes\n            altarLoc = {x: 3305, y: 3472, plane: 0};\n            altarObjId = 34763;\n        } else if (runeId === 558) { // Mind runes\n            altarLoc = {x: 2981, y: 3512, plane: 0};\n            altarObjId = 34761;\n        } else if (runeId === 559) { // Body runes\n            altarLoc = {x: 3053, y: 3445, plane: 0};\n            altarObjId = 34765;\n        }\n    }\n\n    if (!isNear(altarLoc.x, altarLoc.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var rax = altarLoc.x;\n            var ray = altarLoc.y;\n            var rap = altarLoc.plane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(rax, ray, rap));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Enter altar (use mysterious ruins)\n    var ruins = Game.info.gameObject.getNearest([altarObjId]);\n    if (ruins) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.gameObject.interact(ruins, MenuAction.NPC_FIRST_OPTION);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n\n    runecraftPhase = &quot;craft_runes&quot;;\n}\n\nfunction handleRCCraftRunes() {\n    // Look for the altar object inside the ruins\n    var altarIds = [34760, 34761, 34762, 34763, 34764, 34765]; // Various altars\n\n    // Check for essence\n    var essId = 1436; // Rune essence\n    if (runecraftingLevel &gt;= 1) {\n        essId = 7936; // Pure essence\n    }\n\n    if (!Game.info.inventory.hasItem(essId, 1) &amp;&amp; !Game.info.inventory.hasItem(1436, 1)) {\n        // No essence, bank\n        runecraftPhase = &quot;bank_runes&quot;;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        var altar = Game.info.gameObject.getNearest(altarIds);\n        if (altar) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(altar, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction handleRCBankRunes() {\n    // Walk to nearest bank and deposit runes, withdraw more essence\n    var bank = findNearestBank();\n    if (!bank) {\n        runecraftPhase = &quot;done&quot;;\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var rbkx = bank.x;\n            var rbky = bank.y;\n            var rbkp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(rbkx, rbky, rbkp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest();\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit all, withdraw essence\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    runecraftPhase = &quot;check_stock&quot;;\n}\n\nfunction handleRCCheckStock() {\n    // Check if we have enough runes banked\n    // Simplified: craft 3 inventories worth then done\n    rcEssenceCount++;\n    if (rcEssenceCount &gt;= 3) {\n        runecraftPhase = &quot;done&quot;;\n        return;\n    }\n\n    // Withdraw more essence\n    var essId = 7936; // Pure essence\n    withdrawBankItem(essId, 28);\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.close();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    runecraftPhase = &quot;walk_to_altar&quot;;\n}\n\nfunction handleRCDone() {\n    runecraftPhase = &quot;idle&quot;;\n    rcEssenceCount = 0;\n    neededRunes = [];\n    Game.sendGameMessage(&quot;Runecrafting session complete.&quot;, &quot;SlayerBot&quot;);\n\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = &quot;&quot;;\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- BREW_POTIONS ----\nfunction handleBrewPotions() {\n    if (!brewTarget) {\n        Game.sendGameMessage(&quot;No brew target set, returning to supplies.&quot;, &quot;SlayerBot&quot;);\n        brewPhase = &quot;idle&quot;;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Look up the recipe\n    var recipe = null;\n    var recipeKeys = Object.keys(POTION_RECIPES);\n    for (var i = 0; i &lt; recipeKeys.length; i++) {\n        var r = dbLookup(POTION_RECIPES, recipeKeys[i]);\n        if (r &amp;&amp; recipeKeys[i].toLowerCase().indexOf(brewTarget.toLowerCase()) !== -1) {\n            recipe = r;\n            break;\n        }\n    }\n\n    if (!recipe) {\n        Game.sendGameMessage(&quot;Unknown brew target: &quot; + brewTarget, &quot;SlayerBot&quot;);\n        brewPhase = &quot;idle&quot;;\n        brewTarget = null;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Check herblore level requirement\n    if (herbloreLevel &lt; recipe.level) {\n        Game.sendGameMessage(&quot;Need herblore level &quot; + recipe.level + &quot; (have &quot; + herbloreLevel + &quot;) for &quot; + brewTarget, &quot;SlayerBot&quot;);\n        herbloreTargetLevel = recipe.level;\n        state = STATES.LEVEL_HERBLORE;\n        return;\n    }\n\n    if (brewPhase === &quot;idle&quot;) {\n        brewPhase = &quot;bank_supplies&quot;;\n        brewCount = 0;\n    }\n\n    switch (brewPhase) {\n        case &quot;bank_supplies&quot;:\n            handleBrewBankSupplies(recipe);\n            break;\n        case &quot;clean_herbs&quot;:\n            handleBrewCleanHerbs(recipe);\n            break;\n        case &quot;make_unfinished&quot;:\n            handleBrewMakeUnfinished(recipe);\n            break;\n        case &quot;add_secondary&quot;:\n            handleBrewAddSecondary(recipe);\n            break;\n        case &quot;bank_potions&quot;:\n            handleBrewBankPotions();\n            break;\n        case &quot;done&quot;:\n            handleBrewDone();\n            break;\n        default:\n            brewPhase = &quot;bank_supplies&quot;;\n            break;\n    }\n}\n\nfunction handleBrewBankSupplies(recipe) {\n    var bank = findNearestBank();\n    if (!bank) {\n        brewPhase = &quot;done&quot;;\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var bbx = bank.x;\n            var bby = bank.y;\n            var bbp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(bbx, bby, bbp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest();\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit all\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    // Withdraw herbs, vials, and secondaries\n    if (recipe.grimyHerbId) {\n        withdrawBankItem(recipe.grimyHerbId, 14);\n    }\n    withdrawBankItem(VIAL_OF_WATER, 14);\n    if (recipe.secondaryId) {\n        withdrawBankItem(recipe.secondaryId, 14);\n    }\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.close();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    brewPhase = &quot;clean_herbs&quot;;\n}\n\nfunction handleBrewCleanHerbs(recipe) {\n    if (!recipe.grimyHerbId) {\n        brewPhase = &quot;make_unfinished&quot;;\n        return;\n    }\n\n    // Clean grimy herbs by clicking them\n    if (Game.info.inventory.hasItem(recipe.grimyHerbId, 1)) {\n        if (Client.getLocalPlayer().isIdle()) {\n            isExecuting = true;\n            var herbId = recipe.grimyHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(herbId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else {\n        brewPhase = &quot;make_unfinished&quot;;\n    }\n}\n\nfunction handleBrewMakeUnfinished(recipe) {\n    // Use clean herb on vial of water\n    if (!recipe.cleanHerbId) {\n        brewPhase = &quot;add_secondary&quot;;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(recipe.cleanHerbId, 1) || !Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {\n        brewPhase = &quot;add_secondary&quot;;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        isExecuting = true;\n        var clnId = recipe.cleanHerbId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(clnId, VIAL_OF_WATER);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleBrewAddSecondary(recipe) {\n    // Use secondary ingredient on unfinished potion\n    if (!recipe.unfinishedId || !recipe.secondaryId) {\n        brewPhase = &quot;bank_potions&quot;;\n        return;\n    }\n\n    if (!Game.info.inventory.hasItem(recipe.unfinishedId, 1) || !Game.info.inventory.hasItem(recipe.secondaryId, 1)) {\n        brewPhase = &quot;bank_potions&quot;;\n        return;\n    }\n\n    if (Client.getLocalPlayer().isIdle()) {\n        isExecuting = true;\n        var unfId = recipe.unfinishedId;\n        var secId = recipe.secondaryId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.useItemOnItem(unfId, secId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction handleBrewBankPotions() {\n    var bank = findNearestBank();\n    if (!bank) {\n        brewPhase = &quot;done&quot;;\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var bpx = bank.x;\n            var bpy = bank.y;\n            var bpp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(bpx, bpy, bpp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest();\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    brewCount++;\n    if (brewCount &gt;= 3) {\n        brewPhase = &quot;done&quot;;\n    } else {\n        brewPhase = &quot;bank_supplies&quot;;\n    }\n}\n\nfunction handleBrewDone() {\n    Game.sendGameMessage(&quot;Potion brewing session complete (&quot; + brewTarget + &quot;).&quot;, &quot;SlayerBot&quot;);\n    brewPhase = &quot;idle&quot;;\n    brewTarget = null;\n    brewCount = 0;\n\n    if (stateBeforeInterrupt) {\n        state = stateBeforeInterrupt;\n        stateBeforeInterrupt = &quot;&quot;;\n    } else {\n        state = STATES.CHECK_SUPPLIES;\n    }\n}\n\n// ---- LEVEL_HERBLORE ----\nfunction handleLevelHerblore() {\n    // Make the highest level potion we CAN make until we reach herbloreTargetLevel\n\n    if (herbloreLevel &gt;= herbloreTargetLevel) {\n        Game.sendGameMessage(&quot;Herblore level &quot; + herbloreLevel + &quot; reached! Returning to brewing.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.BREW_POTIONS;\n        return;\n    }\n\n    // Find the highest recipe we can make\n    var bestRecipe = null;\n    var bestLevel = 0;\n    var recipeKeys = Object.keys(POTION_RECIPES);\n    for (var i = 0; i &lt; recipeKeys.length; i++) {\n        var rec = dbLookup(POTION_RECIPES, recipeKeys[i]);\n        if (rec &amp;&amp; rec.level &lt;= herbloreLevel &amp;&amp; rec.level &gt; bestLevel) {\n            bestLevel = rec.level;\n            bestRecipe = rec;\n        }\n    }\n\n    if (!bestRecipe) {\n        Game.sendGameMessage(&quot;Cannot find a potion to make at herblore &quot; + herbloreLevel, &quot;SlayerBot&quot;);\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Bank, withdraw ingredients, make potions, repeat\n    var bank = findNearestBank();\n    if (!bank) {\n        state = STATES.IDLE;\n        return;\n    }\n\n    if (!isNear(bank.x, bank.y, 8)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var lhx = bank.x;\n            var lhy = bank.y;\n            var lhp = bank.plane || 0;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(lhx, lhy, lhp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    if (!Game.info.bank.isOpen()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest();\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit, withdraw herbs + vials\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    if (bestRecipe.grimyHerbId) {\n        withdrawBankItem(bestRecipe.grimyHerbId, 14);\n    }\n    withdrawBankItem(VIAL_OF_WATER, 14);\n\n    // Clean herbs and make potions inline\n    if (bestRecipe.grimyHerbId &amp;&amp; Game.info.inventory.hasItem(bestRecipe.grimyHerbId, 1)) {\n        if (Client.getLocalPlayer().isIdle()) {\n            isExecuting = true;\n            var gHerbId = bestRecipe.grimyHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(gHerbId);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else if (bestRecipe.cleanHerbId &amp;&amp; Game.info.inventory.hasItem(bestRecipe.cleanHerbId, 1) &amp;&amp; Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {\n        if (Client.getLocalPlayer().isIdle()) {\n            isExecuting = true;\n            var cHerbId = bestRecipe.cleanHerbId;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnItem(cHerbId, VIAL_OF_WATER);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n\n    // Check for level up\n    updateCachedStats();\n}\n\n// =============================================================================\n// OnChatMessage -- Intercepts chat messages to detect tasks, kills, deaths\n// =============================================================================\nfunction OnChatMessage(chatMsg) {\n    if (!chatMsg) return;\n    var rawText = &quot;&quot;;\n    if (typeof chatMsg === &quot;string&quot;) {\n        rawText = chatMsg;\n    } else if (chatMsg.getMessage) {\n        rawText = chatMsg.getMessage();\n    } else if (chatMsg.message) {\n        rawText = chatMsg.message;\n    }\n    if (!rawText || rawText.length === 0) return;\n    var message = rawText;\n    var msg = rawText.toLowerCase();\n\n    // Detect task assignment\n    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {\n        if (msg.indexOf(TASK_CHAT_PATTERNS[p]) !== -1) {\n            parseTaskFromMessage(message);\n            taskReceived = true;\n            return;\n        }\n    }\n\n    // Detect kill count (e.g., &quot;You have completed your task! You killed 120 monsters.&quot;)\n    if (msg.indexOf(&quot;you have completed your task&quot;) !== -1) {\n        killsLeft = 0;\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    // Detect single kill (monster death message or XP drop)\n    if (msg.indexOf(&quot;your slayer assignment&quot;) !== -1 &amp;&amp; msg.indexOf(&quot;more to go&quot;) !== -1) {\n        // Parse kills remaining\n        var remaining = parseKillsRemaining(msg);\n        if (remaining &gt;= 0) {\n            killsLeft = remaining;\n        }\n        return;\n    }\n\n    // Detect superior spawn\n    if (msg.indexOf(&quot;a superior foe has appeared&quot;) !== -1) {\n        Game.sendGameMessage(&quot;Superior monster spawned!&quot;, &quot;SlayerBot&quot;);\n        return;\n    }\n\n    // Detect death\n    if (msg.indexOf(&quot;oh dear, you are dead&quot;) !== -1) {\n        deathDetected = true;\n        return;\n    }\n\n    // Detect level up\n    if (msg.indexOf(&quot;congratulations, you just advanced&quot;) !== -1) {\n        levelUpDetected = true;\n        return;\n    }\n\n    // Detect task streaks\n    if (msg.indexOf(&quot;you&#x27;ve completed&quot;) !== -1 &amp;&amp; msg.indexOf(&quot;in a row&quot;) !== -1) {\n        // Task streak notification\n        Game.sendGameMessage(&quot;Task streak tracked!&quot;, &quot;SlayerBot&quot;);\n        return;\n    }\n}\n\nfunction parseTaskFromMessage(message) {\n    // Parse: &quot;Your new task is to kill 135 Blue Dragons.&quot;\n    var msg = message;\n    var lower = msg.toLowerCase();\n\n    // Find the pattern\n    var idx = -1;\n    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {\n        idx = lower.indexOf(TASK_CHAT_PATTERNS[p]);\n        if (idx !== -1) {\n            idx = idx + TASK_CHAT_PATTERNS[p].length;\n            break;\n        }\n    }\n\n    if (idx === -1) return;\n\n    // Extract the rest: &quot; 135 Blue Dragons.&quot;\n    var rest = msg.substring(idx).trim();\n    // Remove trailing period\n    if (rest.slice(-1) === &quot;.&quot;) {\n        rest = rest.substring(0, rest.length - 1);\n    }\n\n    // Parse number and name\n    var parts = rest.split(&quot; &quot;);\n    if (parts.length &lt; 2) return;\n\n    var count = parseInt(parts[0]);\n    if (isNaN(count)) return;\n\n    var monsterName = parts.slice(1).join(&quot; &quot;);\n\n    killsLeft = count;\n    currentTaskName = monsterName;\n    totalKills = totalKills + count;\n\n    Game.sendGameMessage(&quot;Parsed task: &quot; + count + &quot; x &quot; + monsterName, &quot;SlayerBot&quot;);\n}\n\nfunction parseKillsRemaining(msg) {\n    // Parse: &quot;...120 more to go.&quot;\n    var idx = msg.indexOf(&quot;more to go&quot;);\n    if (idx === -1) return -1;\n\n    // Work backwards to find the number\n    var numStr = &quot;&quot;;\n    var i = idx - 1;\n    while (i &gt;= 0 &amp;&amp; msg.charAt(i) === &quot; &quot;) i--;\n    while (i &gt;= 0 &amp;&amp; msg.charAt(i) &gt;= &quot;0&quot; &amp;&amp; msg.charAt(i) &lt;= &quot;9&quot;) {\n        numStr = msg.charAt(i) + numStr;\n        i--;\n    }\n\n    var num = parseInt(numStr);\n    if (isNaN(num)) return -1;\n    return num;\n}\n\n// =============================================================================\n// NPC LOOT APPEARED -- Track kills when NPC dies (more reliable than chat)\n// =============================================================================\nfunction OnNPCLootAppeared(npc) {\n    if (!currentTaskMonster || !npc) return;\n\n    var npcId = -1;\n    try {\n        npcId = npc.getId();\n    } catch (e) {\n        return;\n    }\n\n    // Check if this NPC is our task\n    var isTask = false;\n    if (currentTaskMonster.npcIds) {\n        for (var i = 0; i &lt; currentTaskMonster.npcIds.length; i++) {\n            if (currentTaskMonster.npcIds[i] === npcId) {\n                isTask = true;\n                break;\n            }\n        }\n    }\n\n    // Also check superior monster IDs\n    if (!isTask) {\n        var superiorData = getSuperiorNpcId(currentTaskMonster.name);\n        if (superiorData &amp;&amp; superiorData === npcId) {\n            isTask = true;\n        }\n    }\n\n    if (isTask) {\n        killsLeft--;\n        totalKills++;\n        if (overlay &amp;&amp; overlay.killsLeft) overlay.killsLeft.setValue(&quot;Kills Left: &quot; + Math.max(0, killsLeft));\n        Game.sendGameMessage(&quot;Kill tracked! &quot; + killsLeft + &quot; &quot; + currentTaskMonster.name + &quot; remaining. Total kills: &quot; + totalKills, &quot;SlayerBot&quot;);\n\n        if (killsLeft &lt;= 0) {\n            Game.sendGameMessage(&quot;All kills complete!&quot;, &quot;SlayerBot&quot;);\n            state = STATES.TASK_COMPLETE;\n        }\n    }\n}\n\n// ===========================================================================\n// CANNONBALL GATHERING SYSTEM\n// Mine iron + coal -&gt; smelt steel bars -&gt; smith cannonballs at furnace\n// NOTE: Do NOT bring cannon to single-combat zones!\n// ===========================================================================\nvar gatherCballState = &quot;CHECK&quot;;\nvar gatherCballTarget = 1000;\n\nfunction handleGatherCannonballs() {\n    if (isExecuting) return;\n\n    // Check smithing level\n    var smithLvl = Client.getRealSkillLevel(Skill.SMITHING);\n    var miningLvl = Client.getRealSkillLevel(Skill.MINING);\n\n    if (smithLvl &lt; CANNONBALL_CRAFT.smithLevel) {\n        Game.sendGameMessage(&quot;[SlayerBot] Need 35 Smithing to make cannonballs. Current: &quot; + smithLvl, &quot;Bot&quot;);\n        // Fall back to buying from GE if possible\n        gatherCballState = &quot;BUY_GE&quot;;\n    }\n\n    var cballCount = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n    if (cballCount &gt;= gatherCballTarget) {\n        Game.sendGameMessage(&quot;[SlayerBot] Have &quot; + cballCount + &quot; cannonballs -- returning to task&quot;, &quot;Bot&quot;);\n        gatherCballState = &quot;CHECK&quot;;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    if (gatherCballState === &quot;CHECK&quot;) {\n        // Figure out what we need\n        var barsInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n        var ironInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n        var hasMould = Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1);\n\n        if (barsInInv &gt;= 10) {\n            // Have steel bars -- go smith cannonballs\n            if (!hasMould) {\n                gatherCballState = &quot;GET_MOULD&quot;;\n            } else {\n                gatherCballState = &quot;SMITH_CBALLS&quot;;\n            }\n        } else if (ironInInv &gt; 0 &amp;&amp; coalInInv &gt;= (ironInInv * 2)) {\n            // Have ores -- go smelt\n            gatherCballState = &quot;SMELT_BARS&quot;;\n        } else {\n            // Need to bank for supplies or mine\n            gatherCballState = &quot;BANK_SUPPLIES&quot;;\n        }\n        return;\n    }\n\n    if (gatherCballState === &quot;BANK_SUPPLIES&quot;) {\n        if (!Game.info.bank.isOpen()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.openNearest();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        // Deposit inventory\n        Game.interact.bank.depositAllInventory();\n        // Withdraw ammo mould\n        if (!Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {\n            withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);\n        }\n        // Try to withdraw steel bars from bank\n        withdrawBankItem(CANNONBALL_CRAFT.steelBar, 27);\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            var barsGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n            if (barsGot &gt;= 5) {\n                Game.interact.bank.close();\n                gatherCballState = &quot;SMITH_CBALLS&quot;;\n            } else {\n                // No steel bars in bank -- try to withdraw ores\n                withdrawBankItem(CANNONBALL_CRAFT.ironOre, 9);\n                withdrawBankItem(CANNONBALL_CRAFT.coal, 18);\n                var ironGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n                if (ironGot &gt;= 3) {\n                    Game.interact.bank.close();\n                    gatherCballState = &quot;SMELT_BARS&quot;;\n                } else {\n                    // Nothing in bank -- need to mine\n                    Game.interact.bank.close();\n                    Game.sendGameMessage(&quot;[SlayerBot] No steel bars or ores in bank -- mining iron and coal&quot;, &quot;Bot&quot;);\n                    gatherCballState = &quot;MINE_ORES&quot;;\n                }\n            }\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    if (gatherCballState === &quot;MINE_ORES&quot;) {\n        // Walk to Al Kharid mine (has both iron and coal rocks nearby)\n        var minePos = SS_LOCATIONS.AL_KHARID_MINE;\n        if (!isNear(minePos.x, minePos.y, 15)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(minePos.x, minePos.y, minePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        var ironCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n\n        // Need 2 coal per iron for steel bars. Mine ~9 iron + 18 coal per trip\n        if (ironCount &lt; 9) {\n            // Mine iron\n            var ironRock = Game.info.gameObject.getNearest(SS_OBJECTS.IRON_ROCK);\n            if (ironRock &amp;&amp; PlayerHelper.isPlayerIdle()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(ironRock, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (coalCount &lt; (ironCount * 2)) {\n            // Mine coal\n            var coalRock = Game.info.gameObject.getNearest(SS_OBJECTS.COAL_ROCK);\n            if (coalRock &amp;&amp; PlayerHelper.isPlayerIdle()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(coalRock, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else {\n            // Have enough ores for a trip -- go smelt\n            gatherCballState = &quot;SMELT_BARS&quot;;\n        }\n\n        // Full inventory -- bank or smelt\n        if (Game.info.inventory.isFull()) {\n            if (ironCount &gt;= 5 &amp;&amp; coalCount &gt;= (ironCount * 2)) {\n                gatherCballState = &quot;SMELT_BARS&quot;;\n            } else {\n                gatherCballState = &quot;BANK_SUPPLIES&quot;;\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === &quot;SMELT_BARS&quot;) {\n        // Walk to Al Kharid furnace\n        var furnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;\n        if (!isNear(furnacePos.x, furnacePos.y, 10)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(furnacePos.x, furnacePos.y, furnacePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Smelt at furnace\n        var ironInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);\n        var coalInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);\n        if (ironInv &gt; 0 &amp;&amp; coalInv &gt;= 2 &amp;&amp; PlayerHelper.isPlayerIdle()) {\n            var furnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);\n            if (furnace) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.gameObject.action(furnace, MenuAction.GAME_OBJECT_FIRST_OPTION);\n                    Game.sendGameMessage(&quot;[SlayerBot] Smelting steel bars for cannonballs&quot;, &quot;Bot&quot;);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (ironInv &lt;= 0 || coalInv &lt; 2) {\n            // Done smelting -- check steel bar count\n            var steelBars = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n            if (steelBars &gt;= 5) {\n                gatherCballState = &quot;SMITH_CBALLS&quot;;\n            } else {\n                // Need more ores\n                gatherCballState = &quot;BANK_SUPPLIES&quot;;\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === &quot;SMITH_CBALLS&quot;) {\n        // Walk to Al Kharid furnace (cannonballs are smithed at furnace, not anvil)\n        var smFurnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;\n        if (!isNear(smFurnacePos.x, smFurnacePos.y, 10)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(smFurnacePos.x, smFurnacePos.y, smFurnacePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n\n        // Smith cannonballs: use steel bar on furnace with ammo mould in inventory\n        var steelCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);\n        if (steelCount &gt; 0 &amp;&amp; Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1) &amp;&amp; PlayerHelper.isPlayerIdle()) {\n            var smFurnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);\n            if (smFurnace) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    // Use steel bar on furnace to smith cannonballs\n                    Game.interact.inventory.useItemOnObject(CANNONBALL_CRAFT.steelBar, smFurnace);\n                    Game.sendGameMessage(&quot;[SlayerBot] Smithing cannonballs (&quot; + steelCount + &quot; bars left)&quot;, &quot;Bot&quot;);\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        } else if (steelCount &lt;= 0) {\n            // All bars used -- check cannonball count\n            var newCballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n            Game.sendGameMessage(&quot;[SlayerBot] Smithed cannonballs. Total: &quot; + newCballs, &quot;Bot&quot;);\n            if (newCballs &gt;= gatherCballTarget) {\n                gatherCballState = &quot;CHECK&quot;;\n                state = STATES.CHECK_SUPPLIES;\n            } else {\n                // Need more -- bank and get more bars/ores\n                gatherCballState = &quot;BANK_SUPPLIES&quot;;\n            }\n        }\n        return;\n    }\n\n    if (gatherCballState === &quot;GET_MOULD&quot;) {\n        // Buy ammo mould from Nulodion at Dwarf Mines or GE\n        // Simplest: try to withdraw from bank first\n        if (!Game.info.bank.isOpen()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.openNearest();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.close();\n            if (Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {\n                gatherCballState = &quot;CHECK&quot;;\n            } else {\n                Game.sendGameMessage(&quot;[SlayerBot] No ammo mould in bank -- trying GE&quot;, &quot;Bot&quot;);\n                gatherCballState = &quot;BUY_GE&quot;;\n            }\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    if (gatherCballState === &quot;BUY_GE&quot;) {\n        // Walk to GE and buy cannonballs directly if we have GP\n        var gePos = SS_LOCATIONS.GRAND_EXCHANGE;\n        if (!isNear(gePos.x, gePos.y, 15)) {\n            if (!PlayerHelper.isWebWalking()) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    PlayerHelper.webWalkTo(new WorldPoint(gePos.x, gePos.y, gePos.z || 0));\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n            return;\n        }\n        Game.sendGameMessage(&quot;[SlayerBot] At GE -- buy cannonballs manually or level Smithing to 35&quot;, &quot;Bot&quot;);\n        gatherCballState = &quot;CHECK&quot;;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n}\n\n// =============================================================================\n// TAKING_BREAK -- Human-like break handler\n// =============================================================================\nfunction handleTakingBreak() {\n    config.currentStateOverlay.setValue(&quot;State: BREAK (&quot; + breakReason + &quot;)&quot;);\n\n    // Check if break is over\n    if (tickCounter &gt;= breakEndTick) {\n        Game.sendGameMessage(&quot;[Break] Break over! Resuming play.&quot;, &quot;Bot&quot;);\n\n        // Reset break timer for next break\n        ticksSinceLastBreak = 0;\n        var playMin = config.minPlayMinutes.getValue();\n        var playMax = config.maxPlayMinutes.getValue();\n        nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);\n        breakScheduled = false;\n\n        config.breakOverlay.setValue(&quot;Break: in ~&quot; + ticksToMinutes(nextBreakAtTick) + &quot;m&quot;);\n\n        // Return to previous state\n        state = stateBeforeBreak;\n        return;\n    }\n\n    // During break: random idle actions every ~30 ticks to mimic AFK player\n    if (tickCounter % 30 === 0) {\n        var action = getRandomIdleAction();\n        if (action === &quot;camera_rotate&quot;) {\n            // Just a cosmetic log -- DZ handles camera\n            // Real players sometimes move camera while AFK\n        } else if (action === &quot;open_stats&quot;) {\n            // Some players tab through interfaces while AFK\n        } else if (action === &quot;open_inventory&quot;) {\n            // Open inventory tab\n        }\n        // Most of the time: do nothing (standing idle)\n    }\n\n    // Random mouse micro-movements every ~100 ticks\n    // This is just a status update -- DZ does not detect idle kicks\n    if (tickCounter % 100 === 0) {\n        var timeLeft = ticksToMinutes(breakEndTick - tickCounter);\n        config.breakOverlay.setValue(&quot;Break: &quot; + breakReason + &quot; (~&quot; + timeLeft + &quot;m left)&quot;);\n    }\n}\n\n// =============================================================================\n// OUTSIDE_SCHEDULE -- Handles being outside play hours\n// =============================================================================\nfunction handleOutsideSchedule() {\n    config.currentStateOverlay.setValue(&quot;State: OUTSIDE SCHEDULE&quot;);\n\n    // Check if we are back in schedule\n    if (config.enableSchedule.getValue()) {\n        var schedStart = config.startHour.getValue();\n        var schedEnd = config.endHour.getValue();\n        if (isWithinSchedule(schedStart, schedEnd)) {\n            Game.sendGameMessage(&quot;[Schedule] Back within play hours! Resuming.&quot;, &quot;Bot&quot;);\n            config.scheduleOverlay.setValue(&quot;Schedule: Active&quot;);\n\n            // Reset break timer for the new session\n            ticksSinceLastBreak = 0;\n            var playMin = config.minPlayMinutes.getValue();\n            var playMax = config.maxPlayMinutes.getValue();\n            nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);\n            sessionStarted = true;\n\n            // Return to previous state\n            state = stateBeforeBreak;\n            return;\n        }\n    }\n\n    // If not logged out yet, walk to a bank and log out\n    if (!outsideScheduleLogout) {\n        // Bank inventory first to save all loot\n        if (!Game.info.bank.isOpen()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.openNearest();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n\n        // Deposit everything\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.depositAllInventory();\n            isExecuting = false;\n        }, Utility.getDelay());\n\n        Utility.invokeLater(function() {\n            Game.interact.bank.close();\n        }, Utility.getDelay());\n\n        outsideScheduleLogout = true;\n        Game.sendGameMessage(&quot;[Schedule] Banked items. Waiting for play hours to resume.&quot;, &quot;Bot&quot;);\n        config.scheduleOverlay.setValue(&quot;Schedule: WAITING (banked items)&quot;);\n        return;\n    }\n\n    // Already banked -- just idle and wait for schedule to resume\n    // Check every ~200 ticks (2 minutes)\n    if (tickCounter % 200 === 0) {\n        var hour = getCurrentHour();\n        config.scheduleOverlay.setValue(&quot;Schedule: OFF (hour &quot; + hour + &quot;) waiting...&quot;);\n    }\n}\n";
function copyCode() {
    var decoded = code.replace(/\\n/g, "\n").replace(/\\'/g, "'").replace(/\\"/g, '"');
    navigator.clipboard.writeText(decoded).then(function() {
        document.getElementById("status").innerHTML = '<span class="success">Copied! ' + decoded.length + ' chars. Now switch to DZ and paste.</span>';
    }).catch(function(err) {
        document.getElementById("status").innerHTML = '<span class="error">Copy failed: ' + err + '</span>';
    });
}
