<h1>Slayer Bot v24 - MAIN Tab</h1>

<div id="status"></div>
<script>
var code = "// =============================================================================\n// AUTO SLAYER BOT v24 -- MAIN STATE MACHINE\n// =============================================================================\n// The brain of the slayer bot. Implements a full autonomous state machine that:\n//   1. Selects the best slayer master based on combat/slayer levels\n//   2. Walks to master, gets a task assignment\n//   3. Banks for supplies (food, potions, special items, gear)\n//   4. Walks to monster location and fights until task is complete\n//   5. Handles special kill mechanics, loot, bones, prayer\n//   6. Self-sufficiency: crafts arrows, brews potions, runecrafts\n//   7. Advanced combat: safespots, superiors, bracelets, cannon\n//   8. Loops forever -- completing task after task\n// =============================================================================\n\n// -----------------------------------------------------------------------------\n// STATE DEFINITIONS\n// -----------------------------------------------------------------------------\nvar STATES = {\n    // === CORE SLAYER LOOP ===\n    STARTUP: &quot;STARTUP&quot;,\n    CHECK_STATS: &quot;CHECK_STATS&quot;,\n    SELECT_MASTER: &quot;SELECT_MASTER&quot;,\n    WALK_TO_MASTER: &quot;WALK_TO_MASTER&quot;,\n    TALK_TO_MASTER: &quot;TALK_TO_MASTER&quot;,\n    WAIT_FOR_TASK: &quot;WAIT_FOR_TASK&quot;,\n    READ_TASK: &quot;READ_TASK&quot;,\n    CHECK_SUPPLIES: &quot;CHECK_SUPPLIES&quot;,\n    WALK_TO_BANK: &quot;WALK_TO_BANK&quot;,\n    BANK_SUPPLIES: &quot;BANK_SUPPLIES&quot;,\n    WALK_TO_GE: &quot;WALK_TO_GE&quot;,\n    BUY_AT_GE: &quot;BUY_AT_GE&quot;,\n    WALK_TO_TASK: &quot;WALK_TO_TASK&quot;,\n    FIGHT_TASK: &quot;FIGHT_TASK&quot;,\n    SPECIAL_FINISH: &quot;SPECIAL_FINISH&quot;,\n    EAT_FOOD: &quot;EAT_FOOD&quot;,\n    DRINK_PRAYER: &quot;DRINK_PRAYER&quot;,\n    LOOT_ITEMS: &quot;LOOT_ITEMS&quot;,\n    BURY_BONES: &quot;BURY_BONES&quot;,\n    TASK_COMPLETE: &quot;TASK_COMPLETE&quot;,\n    HANDLE_DEATH: &quot;HANDLE_DEATH&quot;,\n    HANDLE_LEVEL_UP: &quot;HANDLE_LEVEL_UP&quot;,\n\n    // === SELF-SUFFICIENCY (existing) ===\n    GATHER_FOOD: &quot;GATHER_FOOD&quot;,\n    COOK_FOOD: &quot;COOK_FOOD&quot;,\n    GATHER_GEAR: &quot;GATHER_GEAR&quot;,\n    TAN_HIDES: &quot;TAN_HIDES&quot;,\n    CRAFT_GEAR: &quot;CRAFT_GEAR&quot;,\n    MINE_ORE: &quot;MINE_ORE&quot;,\n    SMELT_ORE: &quot;SMELT_ORE&quot;,\n    SMITH_GEAR: &quot;SMITH_GEAR&quot;,\n    GATHER_RANGED: &quot;GATHER_RANGED&quot;,\n    WALK_TO_GATHER: &quot;WALK_TO_GATHER&quot;,\n\n    // === NEW v24 STATES ===\n    CRAFT_ARROWS: &quot;CRAFT_ARROWS&quot;,\n    CRAFT_RUNES: &quot;CRAFT_RUNES&quot;,\n    BREW_POTIONS: &quot;BREW_POTIONS&quot;,\n    LEVEL_HERBLORE: &quot;LEVEL_HERBLORE&quot;,\n    SAFESPOT_FIGHT: &quot;SAFESPOT_FIGHT&quot;,\n    RECOVER_GRAVE: &quot;RECOVER_GRAVE&quot;,\n    SETUP_CANNON: &quot;SETUP_CANNON&quot;,\n    GATHER_CANNONBALLS: &quot;GATHER_CANNONBALLS&quot;,\n\n    // === SCHEDULE + BREAK STATES ===\n    TAKING_BREAK: &quot;TAKING_BREAK&quot;,\n    OUTSIDE_SCHEDULE: &quot;OUTSIDE_SCHEDULE&quot;,\n\n    IDLE: &quot;IDLE&quot;\n};\n\n// -----------------------------------------------------------------------------\n// BOT STATE VARIABLES\n// -----------------------------------------------------------------------------\nvar state = STATES.STARTUP;\nvar isExecuting = false;\nvar tickCounter = 0;\nvar stateTickCounter = 0;\nvar lastState = &quot;&quot;;\n\n// Task info\nvar currentTaskName = &quot;&quot;;\nvar currentTaskMonster = null;\nvar killsLeft = 0;\nvar totalKills = 0;\nvar tasksCompleted = 0;\nvar taskReceived = false;\n\n// Master info\nvar selectedMaster = null;\n\n// Player stats (cached)\nvar combatLevel = 0;\nvar slayerLevel = 0;\nvar attackLevel = 0;\nvar strengthLevel = 0;\nvar defenceLevel = 0;\nvar hitpointsLevel = 0;\nvar prayerLevel = 0;\nvar rangedLevel = 0;\nvar magicLevel = 0;\nvar herbloreLevel = 0;\nvar fletchingLevel = 0;\nvar smithingLevel = 0;\nvar miningLevel = 0;\nvar runecraftingLevel = 0;\nvar fishingLevel = 0;\nvar cookingLevel = 0;\n\n// Banking\nvar bankTarget = null;\nvar needsRestock = false;\nvar missingItems = [];\n\n// Timeouts\nvar stateTimeout = 0;\nvar waitTicks = 0;\nvar retryCount = 0;\nvar maxRetries = 3;\n\n// Loot tracking\nvar lootQueue = [];\n\n// Death detection\nvar previousHP = 0;\nvar deathDetected = false;\nvar deathLocation = null;\n\n// Level up handling\nvar levelUpDetected = false;\n\n// v24: Turael boosting\nvar turaelStreakCount = 0;\n\n// v24: Combat boost monitoring\nvar ticksSinceAntifire = 0;\nvar ticksSinceAntipoison = 0;\nvar ticksSinceCombatPot = 0;\n\n// v24: Cannon\nvar cannonPlaced = false;\nvar cannonX = 0;\nvar cannonY = 0;\n\n// v24: Arrow crafting\nvar arrowCraftPhase = &quot;idle&quot;;\nvar arrowCraftTier = null;\nvar arrowCraftCount = 0;\n\n// v24: Runecrafting\nvar runecraftPhase = &quot;idle&quot;;\nvar neededRunes = [];\nvar rcEssenceCount = 0;\n\n// v24: Potion brewing\nvar brewPhase = &quot;idle&quot;;\nvar brewTarget = null;\nvar brewCount = 0;\n\n// v24: Herblore leveling\nvar herbloreTargetLevel = 0;\n\n// v24: Safespot\nvar usingSafespot = false;\n\n// v24: Previous state for supply interrupts\nvar stateBeforeInterrupt = &quot;&quot;;\nvar interruptReturnState = &quot;&quot;;\n\n// v24: Schedule + Break system\nvar ticksSinceLastBreak = 0;\nvar nextBreakAtTick = 0;\nvar breakEndTick = 0;\nvar breakReason = &quot;&quot;;\nvar stateBeforeBreak = &quot;&quot;;\nvar breakScheduled = false;\nvar outsideScheduleLogout = false;\nvar sessionStarted = false;\nvar totalBreaksTaken = 0;\nvar lastBreakDurationMins = 0;\n\n// v24: Self-sufficiency vars (shared with UTILITIES)\nvar gatherBankPhase = 0;\n\n// -----------------------------------------------------------------------------\n// CONFIG ITEMS (declared in DZ config panel)\n// -----------------------------------------------------------------------------\n// config.masterPreference       -- &quot;Auto&quot;, &quot;Turael&quot;, &quot;Krystilia&quot;, etc.\n// config.foodType               -- Food item ID to use\n// config.minFood                -- Minimum food for tasks (default: 8)\n// config.usePrayer              -- Boolean: use protection prayers\n// config.buryBones              -- Boolean: bury bones from kills\n// config.lootMinValue           -- Minimum loot GP value (default: 250)\n// config.specialFinish          -- Boolean: use spec items (rock hammer, ice cooler)\n// config.trainingFocus          -- &quot;Attack&quot;, &quot;Strength&quot;, &quot;Defence&quot;, &quot;Shared&quot;\n// config.attackCap              -- Max attack level before switching\n// config.strengthCap            -- Max strength level before switching\n// config.defenceCap             -- Max defence level before switching\n// config.selfSufficient         -- Boolean: craft own gear/food/supplies\n// config.useSpecialAttack       -- Boolean: use special attack weapon\n// config.turaelBoosting         -- Boolean: use Turael boosting strategy\n// config.useCannon              -- Boolean: use dwarf multicannon\n// config.useSafespots           -- Boolean: use safespots when available\n// config.useRanged              -- Boolean: allow ranged combat\n// config.useMagic               -- Boolean: allow magic combat\n\n// -----------------------------------------------------------------------------\n// OVERLAY ITEMS (displayed on DZ overlay panel)\n// -----------------------------------------------------------------------------\n// overlay.botState              -- Current state display\n// overlay.taskInfo              -- Current task and kills left\n// overlay.masterInfo            -- Selected slayer master\n// overlay.combatInfo            -- Combat style + stats\n// overlay.killCount             -- Total kills across all tasks\n// overlay.taskCount             -- Tasks completed\n// overlay.runtime               -- How long bot has been running\n// overlay.supplyInfo            -- Supply status\n\n// -------- Bone IDs --------\n\n// -------- Food healing lookup --------\nvar FOOD_HEALING = {};\nFOOD_HEALING[315] = 4;    // Shrimps\nFOOD_HEALING[325] = 5;    // Sardine\nFOOD_HEALING[329] = 7;    // Salmon\nFOOD_HEALING[333] = 9;    // Trout\nFOOD_HEALING[365] = 11;   // Bass\nFOOD_HEALING[379] = 12;   // Lobster\nFOOD_HEALING[373] = 16;   // Swordfish\nFOOD_HEALING[385] = 20;   // Shark\nFOOD_HEALING[7946] = 16;  // Monkfish\n\n// -------- Potion IDs (dose 1-4 groups) --------\nvar SUPER_COMBAT_POTS = [12695, 12697, 12699, 12701];\nvar SUPER_ATTACK_POTS = [2436, 2438, 2440, 2442];\nvar SUPER_STRENGTH_POTS = [2440, 2442, 2444, 2446];\nvar ATTACK_POTS = [2428, 2430, 2432, 2434];\nvar STRENGTH_POTS = [113, 115, 117, 119];\nvar PRAYER_POTS = [2434, 139, 141, 143];\nvar ANTIFIRE_POTS = [2452, 2454, 2456, 2458];\nvar EXTENDED_ANTIFIRE_POTS = [11951, 11953, 11955, 11957];\nvar SUPER_ANTIFIRE_POTS = [21978, 21981, 21984, 21987];\nvar SUPER_RESTORE_POTS = [3024, 3026, 3028, 3030];\nvar RANGING_POTS = [2444, 169, 171, 173];\nvar MAGIC_POTS = [3040, 3042, 3044, 3046];\n\n// -------- Antipoison arrays from UTILITIES --------\n// ANTIVENOM_IDS, ANTIVENOM_PLUS_IDS, SUPER_ANTIPOISON_IDS are in UTILITIES\n\n// -------- Special finish items --------\nvar ROCK_HAMMER_ID = 4162;\nvar ICE_COOLER_ID = 6696;\nvar MIRROR_SHIELD_ID = 4156;\nvar LEAF_BLADED_SPEAR_ID = 4158;\nvar LEAF_BLADED_SWORD_ID = 11902;\nvar LEAF_BLADED_BAXE_ID = 20727;\nvar FUNGICIDE_SPRAY_ID = 7421;\nvar WITCHWOOD_ICON_ID = 8923;\n\n// -------- Spec weapon sets --------\nvar DDS_ID = 5698;\n\n// -------- Poisoning monsters --------\nvar POISON_MONSTERS = [\n    &quot;aberrant spectre&quot;, &quot;cave crawler&quot;, &quot;jungle horror&quot;, &quot;poison spider&quot;,\n    &quot;cave horror&quot;, &quot;kalphite&quot;, &quot;scorpion&quot;, &quot;tribesman&quot;, &quot;fever spider&quot;,\n    &quot;infernal mage&quot;, &quot;dust devil&quot;\n];\n\n// -------- Dragon tasks --------\nvar DRAGON_TASKS = [\n    &quot;blue dragon&quot;, &quot;green dragon&quot;, &quot;red dragon&quot;, &quot;black dragon&quot;,\n    &quot;bronze dragon&quot;, &quot;iron dragon&quot;, &quot;steel dragon&quot;, &quot;mithril dragon&quot;,\n    &quot;adamant dragon&quot;, &quot;rune dragon&quot;, &quot;skeletal wyvern&quot;, &quot;fossil island wyvern&quot;\n];\n\n// -------- Tasks needing special items to finish --------\nvar GARGOYLE_IDS = [412, 413];\nvar ROCKSLUG_IDS = [421, 422];\nvar DESERT_LIZARD_IDS = [458, 459, 460, 461];\nvar ZYGOMITE_IDS = [537, 1024];\n\n// -------- Task names for detecting current task --------\nvar TASK_CHAT_PATTERNS = [\n    &quot;your new task is to kill&quot;,\n    &quot;you are currently assigned to kill&quot;,\n    &quot;you&#x27;re currently assigned to kill&quot;\n];\n\n// -------- Lumbridge spawn --------\nvar LUMBRIDGE_SPAWN = {x: 3222, y: 3218, plane: 0};\n\n// -------- Emergency teleport threshold --------\nvar EMERGENCY_HP_THRESHOLD = 10;\n\n// -------- GE location --------\nvar GE_LOCATION = {x: 3165, y: 3487, plane: 0};\n\n// =============================================================================\n// OnGameTick -- Called every game tick (~600ms). Core dispatch loop.\n// =============================================================================\nfunction OnGameTick() {\n    tickCounter++;\n    ticksSinceLastBreak++;\n    ticksSinceAntifire++;\n    ticksSinceAntipoison++;\n    ticksSinceCombatPot++;\n\n    if (isExecuting) {\n        stateTimeout++;\n        if (stateTimeout &gt; 30) {\n            isExecuting = false;\n            stateTimeout = 0;\n            Game.sendGameMessage(&quot;State timeout - resetting execution lock&quot;, &quot;SlayerBot&quot;);\n        }\n        return;\n    }\n\n    // ================================================================\n    // SCHEDULE CHECK -- Are we within play hours?\n    // ================================================================\n    if (config.enableSchedule.getValue()) {\n        var schedStart = config.startHour.getValue();\n        var schedEnd = config.endHour.getValue();\n        if (!isWithinSchedule(schedStart, schedEnd)) {\n            if (state !== STATES.OUTSIDE_SCHEDULE &amp;&amp; state !== STATES.TAKING_BREAK) {\n                stateBeforeBreak = state;\n                state = STATES.OUTSIDE_SCHEDULE;\n                outsideScheduleLogout = false;\n                Game.sendGameMessage(&quot;[Schedule] Outside play hours -- stopping&quot;, &quot;Bot&quot;);\n                config.scheduleOverlay.setValue(&quot;Schedule: OUTSIDE HOURS&quot;);\n            }\n        } else {\n            config.scheduleOverlay.setValue(&quot;Schedule: Active&quot;);\n        }\n    }\n\n    // ================================================================\n    // BREAK CHECK -- Time for a random human break?\n    // ================================================================\n    if (config.enableBreaks.getValue() &amp;&amp; state !== STATES.TAKING_BREAK &amp;&amp; state !== STATES.OUTSIDE_SCHEDULE) {\n        // Initialize first break timer on session start\n        if (!sessionStarted) {\n            sessionStarted = true;\n            ticksSinceLastBreak = 0;\n            var initMin = config.minPlayMinutes.getValue();\n            var initMax = config.maxPlayMinutes.getValue();\n            nextBreakAtTick = calculateNextBreakDelay(initMin, initMax);\n            config.breakOverlay.setValue(&quot;Break: in ~&quot; + ticksToMinutes(nextBreakAtTick) + &quot;m&quot;);\n        }\n\n        // Check if it is break time\n        if (ticksSinceLastBreak &gt;= nextBreakAtTick) {\n            // Only break when safe -- not mid-combat or death\n            var safeToBreak = (state !== STATES.FIGHT_TASK &amp;&amp; state !== STATES.SAFESPOT_FIGHT &amp;&amp;\n                state !== STATES.HANDLE_DEATH &amp;&amp; state !== STATES.RECOVER_GRAVE &amp;&amp;\n                state !== STATES.EAT_FOOD &amp;&amp; state !== STATES.DRINK_PRAYER);\n\n            if (safeToBreak) {\n                stateBeforeBreak = state;\n                state = STATES.TAKING_BREAK;\n                breakReason = getRandomBreakReason();\n                var bMin = config.minBreakMinutes.getValue();\n                var bMax = config.maxBreakMinutes.getValue();\n                var duration = calculateBreakDuration(bMin, bMax);\n                breakEndTick = tickCounter + duration;\n                lastBreakDurationMins = ticksToMinutes(duration);\n                totalBreaksTaken++;\n                Game.sendGameMessage(&quot;[Break] &quot; + breakReason + &quot; (~&quot; + lastBreakDurationMins + &quot; min)&quot;, &quot;Bot&quot;);\n                config.breakOverlay.setValue(&quot;Break: &quot; + breakReason + &quot; (&quot; + lastBreakDurationMins + &quot;m)&quot;);\n                return;\n            }\n        } else {\n            // Update countdown overlay\n            var remaining = nextBreakAtTick - ticksSinceLastBreak;\n            if (tickCounter % 100 === 0) {\n                config.breakOverlay.setValue(&quot;Break: in ~&quot; + ticksToMinutes(remaining) + &quot;m&quot;);\n            }\n        }\n    }\n\n    // Update cached stats every 10 ticks\n    if (tickCounter % 10 === 0) {\n        updateCachedStats();\n    }\n\n    // Update overlay\n    updateOverlay();\n\n    // Track state changes\n    if (state !== lastState) {\n        stateTickCounter = 0;\n        lastState = state;\n        Game.sendGameMessage(&quot;State -&gt; &quot; + state, &quot;SlayerBot&quot;);\n    }\n    stateTickCounter++;\n\n    // Stuck detection: if we are in a non-idle state for too long, reset\n    if (stateTickCounter &gt; 500 &amp;&amp; state !== STATES.IDLE &amp;&amp; state !== STATES.FIGHT_TASK &amp;&amp; state !== STATES.SAFESPOT_FIGHT) {\n        Game.sendGameMessage(&quot;Stuck in &quot; + state + &quot; for 500 ticks, resetting to CHECK_STATS&quot;, &quot;SlayerBot&quot;);\n        state = STATES.CHECK_STATS;\n        stateTickCounter = 0;\n        retryCount = 0;\n    }\n\n    // Death detection: check if we are at Lumbridge spawn\n    if (state !== STATES.HANDLE_DEATH &amp;&amp; state !== STATES.RECOVER_GRAVE &amp;&amp; state !== STATES.STARTUP) {\n        if (isAtDeathSpawn()) {\n            if (state === STATES.FIGHT_TASK || state === STATES.SAFESPOT_FIGHT || state === STATES.WALK_TO_TASK) {\n                Game.sendGameMessage(&quot;Death detected! Saving death location.&quot;, &quot;SlayerBot&quot;);\n                state = STATES.HANDLE_DEATH;\n                return;\n            }\n        }\n    }\n\n    // Level up detection\n    if (levelUpDetected) {\n        levelUpDetected = false;\n        updateCachedStats();\n    }\n\n    // =========================================================================\n    // STATE ROUTER\n    // =========================================================================\n    switch (state) {\n        case STATES.STARTUP:\n            handleStartup();\n            break;\n        case STATES.CHECK_STATS:\n            handleCheckStats();\n            break;\n        case STATES.SELECT_MASTER:\n            handleSelectMaster();\n            break;\n        case STATES.WALK_TO_MASTER:\n            handleWalkToMaster();\n            break;\n        case STATES.TALK_TO_MASTER:\n            handleTalkToMaster();\n            break;\n        case STATES.WAIT_FOR_TASK:\n            handleWaitForTask();\n            break;\n        case STATES.READ_TASK:\n            handleReadTask();\n            break;\n        case STATES.CHECK_SUPPLIES:\n            handleCheckSupplies();\n            break;\n        case STATES.WALK_TO_BANK:\n            handleWalkToBank();\n            break;\n        case STATES.BANK_SUPPLIES:\n            handleBankSupplies();\n            break;\n        case STATES.WALK_TO_GE:\n            handleWalkToGE();\n            break;\n        case STATES.BUY_AT_GE:\n            handleBuyAtGE();\n            break;\n        case STATES.WALK_TO_TASK:\n            handleWalkToTask();\n            break;\n        case STATES.FIGHT_TASK:\n            handleFightTask();\n            break;\n        case STATES.SAFESPOT_FIGHT:\n            handleSafespotFight();\n            break;\n        case STATES.SPECIAL_FINISH:\n            handleSpecialFinish();\n            break;\n        case STATES.EAT_FOOD:\n            handleEatFood();\n            break;\n        case STATES.DRINK_PRAYER:\n            handleDrinkPrayer();\n            break;\n        case STATES.LOOT_ITEMS:\n            handleLootItems();\n            break;\n        case STATES.BURY_BONES:\n            handleBuryBones();\n            break;\n        case STATES.TASK_COMPLETE:\n            handleTaskComplete();\n            break;\n        case STATES.HANDLE_DEATH:\n            handleDeath();\n            break;\n        case STATES.HANDLE_LEVEL_UP:\n            handleLevelUp();\n            break;\n        case STATES.GATHER_FOOD:\n            handleGatherFood();\n            break;\n        case STATES.COOK_FOOD:\n            handleCookFood();\n            break;\n        case STATES.GATHER_GEAR:\n            handleGatherGear();\n            break;\n        case STATES.TAN_HIDES:\n            handleTanHides();\n            break;\n        case STATES.CRAFT_GEAR:\n            handleCraftGear();\n            break;\n        case STATES.MINE_ORE:\n            handleMineOre();\n            break;\n        case STATES.SMELT_ORE:\n            handleSmeltOre();\n            break;\n        case STATES.SMITH_GEAR:\n            handleSmithGear();\n            break;\n        case STATES.GATHER_RANGED:\n            handleGatherRanged();\n            break;\n        case STATES.WALK_TO_GATHER:\n            handleWalkToGather();\n            break;\n        case STATES.CRAFT_ARROWS:\n            handleCraftArrows();\n            break;\n        case STATES.CRAFT_RUNES:\n            handleCraftRunes();\n            break;\n        case STATES.BREW_POTIONS:\n            handleBrewPotions();\n            break;\n        case STATES.LEVEL_HERBLORE:\n            handleLevelHerblore();\n            break;\n        case STATES.RECOVER_GRAVE:\n            handleRecoverGrave();\n            break;\n        case STATES.SETUP_CANNON:\n            handleSetupCannon();\n            break;\n        case STATES.GATHER_CANNONBALLS:\n            handleGatherCannonballs();\n            break;\n        case STATES.TAKING_BREAK:\n            handleTakingBreak();\n            break;\n        case STATES.OUTSIDE_SCHEDULE:\n            handleOutsideSchedule();\n            break;\n        case STATES.IDLE:\n            // Do nothing -- idle until manually restarted or state changed\n            break;\n        default:\n            Game.sendGameMessage(&quot;Unknown state: &quot; + state + &quot;, resetting.&quot;, &quot;SlayerBot&quot;);\n            state = STATES.STARTUP;\n            break;\n    }\n}\n\n// =============================================================================\n// OnShutdown -- Called when the bot is stopped.\n// =============================================================================\nfunction OnShutdown() {\n    Game.sendGameMessage(&quot;Slayer Bot v24 shutting down. Tasks: &quot; + tasksCompleted + &quot; | Kills: &quot; + totalKills, &quot;SlayerBot&quot;);\n}\n\n// =============================================================================\n// UTILITY HELPERS\n// =============================================================================\n\nfunction updateCachedStats() {\n    combatLevel = getCombatLevel();\n    slayerLevel = Client.getRealSkillLevels(Skill.SLAYER);\n    attackLevel = Client.getRealSkillLevels(Skill.ATTACK);\n    strengthLevel = Client.getRealSkillLevels(Skill.STRENGTH);\n    defenceLevel = Client.getRealSkillLevels(Skill.DEFENCE);\n    hitpointsLevel = Client.getRealSkillLevels(Skill.HITPOINTS);\n    prayerLevel = Client.getRealSkillLevels(Skill.PRAYER);\n    rangedLevel = Client.getRealSkillLevels(Skill.RANGED);\n    magicLevel = Client.getRealSkillLevels(Skill.MAGIC);\n    herbloreLevel = Client.getRealSkillLevels(Skill.HERBLORE);\n    fletchingLevel = Client.getRealSkillLevels(Skill.FLETCHING);\n    smithingLevel = Client.getRealSkillLevels(Skill.SMITHING);\n    miningLevel = Client.getRealSkillLevels(Skill.MINING);\n    runecraftingLevel = Client.getRealSkillLevels(Skill.RUNECRAFT);\n    fishingLevel = Client.getRealSkillLevels(Skill.FISHING);\n    cookingLevel = Client.getRealSkillLevels(Skill.COOKING);\n}\n\nfunction updateOverlay() {\n    try {\n        overlay.botState.setValue(&quot;State: &quot; + state);\n        if (currentTaskName &amp;&amp; killsLeft &gt; 0) {\n            overlay.taskInfo.setValue(&quot;Task: &quot; + currentTaskName + &quot; (&quot; + killsLeft + &quot; left)&quot;);\n        } else {\n            overlay.taskInfo.setValue(&quot;Task: None&quot;);\n        }\n        if (selectedMaster) {\n            overlay.masterInfo.setValue(&quot;Master: &quot; + selectedMaster.name);\n        } else {\n            overlay.masterInfo.setValue(&quot;Master: None&quot;);\n        }\n        overlay.combatInfo.setValue(&quot;Cmb: &quot; + combatLevel + &quot; | Slay: &quot; + slayerLevel);\n        overlay.killCount.setValue(&quot;Kills: &quot; + totalKills);\n        overlay.taskCount.setValue(&quot;Tasks: &quot; + tasksCompleted);\n        var mins = Math.floor(tickCounter / 100);\n        overlay.runtime.setValue(&quot;Runtime: ~&quot; + mins + &quot;m&quot;);\n        overlay.supplyInfo.setValue(&quot;Food: &quot; + countFood() + &quot; | PPots: &quot; + countPrayerPots());\n    } catch (e) {\n        // Overlay might not be available\n    }\n}\n\nfunction isDragonTask(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i &lt; DRAGON_TASKS.length; i++) {\n        if (lower.indexOf(DRAGON_TASKS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction canPoison(name) {\n    if (!name) return false;\n    var lower = name.toLowerCase();\n    for (var i = 0; i &lt; POISON_MONSTERS.length; i++) {\n        if (lower.indexOf(POISON_MONSTERS[i]) !== -1) return true;\n    }\n    return false;\n}\n\nfunction getPlayerLocation() {\n    var loc = Client.getLocalPlayer().getWorldLocation();\n    return {x: loc.getX(), y: loc.getY(), plane: loc.getPlane()};\n}\n\nfunction hasClueScroll() {\n    for (var i = 0; i &lt; CLUE_SCROLLS.length; i++) {\n        if (Game.info.inventory.hasItem(CLUE_SCROLLS[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction hasPotionInGroup(potGroup) {\n    for (var i = 0; i &lt; potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) return true;\n    }\n    return false;\n}\n\nfunction drinkPotionFromGroup(potGroup) {\n    for (var i = 0; i &lt; potGroup.length; i++) {\n        if (Game.info.inventory.hasItem(potGroup[i], 1)) {\n            isExecuting = true;\n            var potId = potGroup[i];\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(potId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkCombatPotion() {\n    // Try super combat first, then super attack\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_ATTACK_POTS)) return true;\n    if (drinkPotionFromGroup(ATTACK_POTS)) return true;\n    return false;\n}\n\nfunction drinkStrengthPotion() {\n    if (drinkPotionFromGroup(SUPER_COMBAT_POTS)) return true;\n    if (drinkPotionFromGroup(SUPER_STRENGTH_POTS)) return true;\n    if (drinkPotionFromGroup(STRENGTH_POTS)) return true;\n    return false;\n}\n\nfunction drinkAntifire() {\n    if (drinkPotionFromGroup(SUPER_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(EXTENDED_ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    if (drinkPotionFromGroup(ANTIFIRE_POTS)) { ticksSinceAntifire = 0; return true; }\n    return false;\n}\n\nfunction drinkAntipoison() {\n    // From UTILITIES: ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS\n    var groups = [ANTIVENOM_PLUS_IDS, ANTIVENOM_IDS, SUPER_ANTIPOISON_IDS];\n    for (var g = 0; g &lt; groups.length; g++) {\n        if (drinkPotionFromGroup(groups[g])) {\n            ticksSinceAntipoison = 0;\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkRangingPotion() {\n    return drinkPotionFromGroup(RANGING_POTS);\n}\n\nfunction drinkMagicPotion() {\n    return drinkPotionFromGroup(MAGIC_POTS);\n}\n\nfunction eatFood() {\n    // Try the configured food first, then any known food\n    var foodId = 0;\n    try {\n        foodId = config.foodType.getValue();\n    } catch (e) {\n        foodId = 379; // Default lobster\n    }\n    if (Game.info.inventory.hasItem(foodId, 1)) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.consumeItem(foodId);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    // Try any known food\n    var foodKeys = Object.keys(FOOD_HEALING);\n    for (var i = 0; i &lt; foodKeys.length; i++) {\n        var fid = parseInt(foodKeys[i]);\n        if (Game.info.inventory.hasItem(fid, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(fid);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\nfunction drinkPrayerPot() {\n    if (drinkPotionFromGroup(SUPER_RESTORE_POTS)) return true;\n    if (drinkPotionFromGroup(PRAYER_POTS)) return true;\n    return false;\n}\n\nfunction useSpecialAttack() {\n    var specPercent = 0;\n    try { specPercent = Client.getSpecialAttackPercent(); } catch(e) { return; }\n    if (specPercent &lt; 25) return;\n\n    // Check if we have a spec weapon\n    var specWeaponId = DDS_ID;\n    var specKeys = Object.keys(SPEC_WEAPONS);\n    for (var i = 0; i &lt; specKeys.length; i++) {\n        var sw = dbLookup(SPEC_WEAPONS, specKeys[i]);\n        if (Game.info.inventory.hasItem(sw.id, 1)) {\n            specWeaponId = sw.id;\n            break;\n        }\n    }\n\n    if (Game.info.inventory.hasItem(specWeaponId, 1)) {\n        isExecuting = true;\n        var weapId = specWeaponId;\n        Utility.invokeLater(function() {\n            Game.interact.inventory.equipItem(weapId);\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\nfunction activatePrayer(monsterName) {\n    if (!config.usePrayer.getValue()) return;\n    // Activate protection prayer based on monster type\n    // Most slayer monsters use melee; some use ranged/magic\n    try {\n        var prayerWidget = Game.info.widget.getWidget(541, 22); // Protect from Melee\n        if (prayerWidget) {\n            // Prayer already handled via prayer flicking -- just ensure protect melee is on\n        }\n    } catch(e) {}\n}\n\nfunction activateSpecificPrayer(prayerName) {\n    if (!prayerName) return;\n    try {\n        var prayerData = dbLookup(PRAYERS, prayerName);\n        if (prayerData) {\n            var widget = Game.info.widget.getWidget(541, prayerData.widgetChild);\n            if (widget) {\n                // Activate the prayer widget\n            }\n        }\n    } catch(e) {}\n}\n\nfunction getDesiredFoodCount() {\n    var minFood = 8;\n    try { minFood = config.minFood.getValue(); } catch(e) {}\n    return minFood;\n}\n\nfunction getDesiredPrayerPotCount() {\n    if (!config.usePrayer.getValue()) return 0;\n    return 2;\n}\n\nfunction needsArrows() {\n    if (!config.useRanged.getValue()) return false;\n    var count = countArrows();\n    return count &lt; 50;\n}\n\nfunction needsRunes() {\n    if (!config.useMagic.getValue()) return false;\n    var count = countRunes();\n    return count &lt; 50;\n}\n\nfunction selectMasterWithBoosting(cmb, slay) {\n    var pref = &quot;Auto&quot;;\n    try { pref = config.masterPreference.getValue(); } catch(e) {}\n\n    if (!config.turaelBoosting.getValue()) {\n        return selectBestMaster(cmb, slay, pref);\n    }\n\n    turaelStreakCount++;\n    if (turaelStreakCount % 10 === 0) {\n        // 10th task: use highest master for bonus points\n        Game.sendGameMessage(&quot;Turael boosting: using highest master (task #&quot; + turaelStreakCount + &quot;)&quot;, &quot;SlayerBot&quot;);\n        return selectBestMaster(cmb, slay, &quot;Auto&quot;);\n    } else {\n        // Use Turael for quick easy tasks\n        Game.sendGameMessage(&quot;Turael boosting: using Turael (task #&quot; + turaelStreakCount + &quot;)&quot;, &quot;SlayerBot&quot;);\n        return SLAYER_MASTERS.TURAEL;\n    }\n}\n\nfunction equipTaskBracelet(taskName) {\n    var quality = getTaskQuality(taskName);\n    if (quality === &quot;good&quot;) {\n        if (Game.info.inventory.hasItem(BRACELET_SLAUGHTER.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_SLAUGHTER.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } else if (quality === &quot;bad&quot;) {\n        if (Game.info.inventory.hasItem(BRACELET_EXPEDITIOUS.id, 1)) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.equipItem(BRACELET_EXPEDITIOUS.id);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    }\n}\n\nfunction checkForSuperior() {\n    if (!currentTaskMonster) return null;\n    var superiorData = getSuperiorNpcId(currentTaskMonster.name);\n    if (!superiorData) return null;\n    var superior = Game.info.npc.getNearest([superiorData]);\n    if (superior &amp;&amp; !superior.isDead()) {\n        return superior;\n    }\n    return null;\n}\n\nfunction pickUpLoot() {\n    var groundItems = null;\n    try { groundItems = Game.info.groundItem.getAll(); } catch(e) { return false; }\n    if (!groundItems || groundItems.length === 0) return false;\n\n    var playerLoc = getPlayerLocation();\n\n    for (var i = 0; i &lt; groundItems.length; i++) {\n        var item = groundItems[i];\n        var itemId = item.getId();\n\n        // Distance check: only pick up items within 5 tiles\n        var itemLoc = item.getWorldLocation();\n        var dx = Math.abs(itemLoc.getX() - playerLoc.x);\n        var dy = Math.abs(itemLoc.getY() - playerLoc.y);\n        if (dx &gt; 5 || dy &gt; 5) continue;\n\n        // Always pick up: bones, clue scrolls\n        var isBone = ALL_BONE_IDS.indexOf(itemId) !== -1;\n        var isClue = CLUE_SCROLLS.indexOf(itemId) !== -1;\n\n        if (isBone &amp;&amp; config.buryBones.getValue()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        if (isClue) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.groundItem.pickup(item);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n\n        // Pick up stackable/notable items\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.groundItem.pickup(item);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return true;\n    }\n    return false;\n}\n\nfunction setAttackStyle() {\n    var focus = &quot;Shared&quot;;\n    try { focus = config.trainingFocus.getValue(); } catch(e) {}\n    var atkCap = 99;\n    var strCap = 99;\n    var defCap = 99;\n    try { atkCap = config.attackCap.getValue(); } catch(e) {}\n    try { strCap = config.strengthCap.getValue(); } catch(e) {}\n    try { defCap = config.defenceCap.getValue(); } catch(e) {}\n\n    var desiredStyle = getAttackStyleForFocus(focus, atkCap, strCap, defCap, attackLevel, strengthLevel, defenceLevel);\n\n    // desiredStyle is a widget child index (0=Accurate/atk, 1=Aggressive/str, 2=Defensive/def, 3=Controlled)\n    try {\n        var widget = Game.info.widget.getWidget(593, desiredStyle);\n        if (widget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.interact(widget, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\nfunction attackWithRangedOrMagic() {\n    if (!currentTaskMonster) return;\n    var npcIds = currentTaskMonster.ids;\n    if (!npcIds || npcIds.length === 0) return;\n\n    var target = Game.info.npc.getNearest(npcIds);\n    if (!target || target.isDead()) return;\n\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.npc.attack(target);\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\nfunction handleSurvivalChecks() {\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // Emergency eat\n    if (currentHP &lt;= Math.floor(maxHP * 0.4)) {\n        eatFood();\n        return;\n    }\n\n    // Prayer check\n    if (config.usePrayer.getValue()) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer &lt;= 10) {\n            drinkPrayerPot();\n            return;\n        }\n    }\n\n    // Dragon task antifire\n    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire &gt; 550 || ticksSinceAntifire === 0) {\n            drinkAntifire();\n        }\n    }\n\n    // Poison monsters antipoison\n    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison &gt; 800 || ticksSinceAntipoison === 0) {\n            drinkAntipoison();\n        }\n    }\n\n    // Combat potion re-dose\n    if (ticksSinceCombatPot &gt; 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk &lt;= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr &lt;= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n            }\n        }\n    }\n}\n\nfunction saveDeathLocation() {\n    var loc = getPlayerLocation();\n    // Death location should be the PREVIOUS location, not Lumbridge\n    // We track it from FIGHT_TASK\n    if (currentTaskMonster) {\n        deathLocation = {\n            x: currentTaskMonster.x,\n            y: currentTaskMonster.y,\n            plane: currentTaskMonster.plane || 0\n        };\n    } else {\n        deathLocation = null;\n    }\n}\n\nfunction withdrawPotionFromBank(potGroup, qty) {\n    for (var i = 0; i &lt; potGroup.length; i++) {\n        try {\n            Game.interact.bank.withdrawItem(potGroup[i], BankWithdrawType.WITHDRAW_ALL, false);\n            return true;\n        } catch(e) {}\n    }\n    return false;\n}\n\n// =============================================================================\n// CORE STATE HANDLERS\n// =============================================================================\n\n// ---- STARTUP ----\nfunction handleStartup() {\n    Game.sendGameMessage(&quot;Auto Slayer Bot v24 starting up!&quot;, &quot;SlayerBot&quot;);\n    updateCachedStats();\n    retryCount = 0;\n    isExecuting = false;\n\n    // Check if we already have a task assigned\n    // If the bot was restarted mid-task, skip to CHECK_SUPPLIES\n    if (currentTaskName &amp;&amp; killsLeft &gt; 0) {\n        Game.sendGameMessage(&quot;Resuming existing task: &quot; + currentTaskName + &quot; (&quot; + killsLeft + &quot; left)&quot;, &quot;SlayerBot&quot;);\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        state = STATES.CHECK_STATS;\n    }\n}\n\n// ---- CHECK_STATS ----\nfunction handleCheckStats() {\n    updateCachedStats();\n    Game.sendGameMessage(&quot;Stats - Cmb:&quot; + combatLevel + &quot; Slay:&quot; + slayerLevel + &quot; Atk:&quot; + attackLevel + &quot; Str:&quot; + strengthLevel + &quot; Def:&quot; + defenceLevel, &quot;SlayerBot&quot;);\n    Game.sendGameMessage(&quot;Stats - Rng:&quot; + rangedLevel + &quot; Mag:&quot; + magicLevel + &quot; Herb:&quot; + herbloreLevel + &quot; Fletch:&quot; + fletchingLevel + &quot; Smith:&quot; + smithingLevel, &quot;SlayerBot&quot;);\n\n    // Set attack style based on training focus\n    setAttackStyle();\n\n    state = STATES.SELECT_MASTER;\n}\n\n// ---- SELECT_MASTER ----\nfunction handleSelectMaster() {\n    selectedMaster = selectMasterWithBoosting(combatLevel, slayerLevel);\n\n    if (!selectedMaster) {\n        Game.sendGameMessage(&quot;Could not select a slayer master! Using Turael.&quot;, &quot;SlayerBot&quot;);\n        selectedMaster = SLAYER_MASTERS.TURAEL;\n    }\n\n    Game.sendGameMessage(&quot;Selected master: &quot; + selectedMaster.name, &quot;SlayerBot&quot;);\n    state = STATES.WALK_TO_MASTER;\n}\n\n// ---- WALK_TO_MASTER ----\nfunction handleWalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (isNear(selectedMaster.x, selectedMaster.y, 10)) {\n        state = STATES.TALK_TO_MASTER;\n        retryCount = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        var masterX = selectedMaster.x;\n        var masterY = selectedMaster.y;\n        var masterPlane = selectedMaster.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(masterX, masterY, masterPlane));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- TALK_TO_MASTER ----\nfunction handleTalkToMaster() {\n    if (!selectedMaster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Find the master NPC\n    var masterNpc = Game.info.npc.getNearest([selectedMaster.npcId]);\n    if (!masterNpc) {\n        // Not close enough, keep walking\n        if (retryCount &lt; maxRetries) {\n            retryCount++;\n            state = STATES.WALK_TO_MASTER;\n        } else {\n            Game.sendGameMessage(&quot;Cannot find master NPC after retries, resetting.&quot;, &quot;SlayerBot&quot;);\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        }\n        return;\n    }\n\n    taskReceived = false;\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.npc.action(masterNpc, MenuAction.NPC_SECOND_OPTION);\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    state = STATES.WAIT_FOR_TASK;\n    waitTicks = 0;\n}\n\n// ---- WAIT_FOR_TASK ----\nfunction handleWaitForTask() {\n    waitTicks++;\n\n    if (taskReceived) {\n        state = STATES.READ_TASK;\n        waitTicks = 0;\n        return;\n    }\n\n    // Handle dialog continuation\n    try {\n        var dialogWidget = Game.info.widget.getWidget(231, 4);\n        if (dialogWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.interact(dialogWidget, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n        var continueWidget = Game.info.widget.getWidget(217, 4);\n        if (continueWidget) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.widget.interact(continueWidget, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    } catch (e) {}\n\n    if (waitTicks &gt; 30) {\n        Game.sendGameMessage(&quot;Task not received after 30 ticks, retrying talk.&quot;, &quot;SlayerBot&quot;);\n        waitTicks = 0;\n        retryCount++;\n        if (retryCount &gt; maxRetries) {\n            retryCount = 0;\n            state = STATES.SELECT_MASTER;\n        } else {\n            state = STATES.TALK_TO_MASTER;\n        }\n    }\n}\n\n// ---- READ_TASK ----\nfunction handleReadTask() {\n    if (!currentTaskName || killsLeft &lt;= 0) {\n        Game.sendGameMessage(&quot;No valid task found, returning to master.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    Game.sendGameMessage(&quot;Task: Kill &quot; + killsLeft + &quot; &quot; + currentTaskName, &quot;SlayerBot&quot;);\n\n    // Look up monster data\n    currentTaskMonster = findMonster(currentTaskName);\n    if (!currentTaskMonster) {\n        Game.sendGameMessage(&quot;WARNING: Unknown monster &#x27;&quot; + currentTaskName + &quot;&#x27;, returning to master.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Equip task bracelet (expeditious or slaughter)\n    equipTaskBracelet(currentTaskName);\n\n    // v24: Check if safespot is available and configured\n    var safespotData = null;\n    if (config.useSafespots.getValue()) {\n        safespotData = hasSafeSpot(currentTaskName);\n    }\n    if (safespotData) {\n        usingSafespot = true;\n        Game.sendGameMessage(&quot;Safespot available for &quot; + currentTaskName + &quot;!&quot;, &quot;SlayerBot&quot;);\n    } else {\n        usingSafespot = false;\n    }\n\n    // Move to supply check\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- CHECK_SUPPLIES ----\nfunction handleCheckSupplies() {\n    missingItems = [];\n    needsRestock = false;\n\n    // Check food\n    var foodCount = countFood();\n    var desiredFood = getDesiredFoodCount();\n    if (foodCount &lt; desiredFood) {\n        missingItems.push({type: &quot;food&quot;, current: foodCount, needed: desiredFood});\n        needsRestock = true;\n    }\n\n    // Check prayer pots\n    if (config.usePrayer.getValue()) {\n        var ppotCount = countPrayerPots();\n        var desiredPpots = getDesiredPrayerPotCount();\n        if (ppotCount &lt; desiredPpots) {\n            missingItems.push({type: &quot;prayer_pot&quot;, current: ppotCount, needed: desiredPpots});\n            needsRestock = true;\n        }\n    }\n\n    // v24: Check arrows (ranged users or safespot with ranged)\n    if (config.useRanged.getValue() || usingSafespot) {\n        var arrowCount = countArrows();\n        if (arrowCount &lt; 100) {\n            missingItems.push({type: &quot;arrows&quot;, current: arrowCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // v24: Check runes (magic users)\n    if (config.useMagic.getValue()) {\n        var runeCount = countRunes();\n        if (runeCount &lt; 100) {\n            missingItems.push({type: &quot;runes&quot;, current: runeCount, needed: 500});\n            needsRestock = true;\n        }\n    }\n\n    // v24: Check antifire potions (dragon tasks)\n    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {\n        var hasAntifire = hasPotionInGroup(SUPER_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(EXTENDED_ANTIFIRE_POTS) ||\n                          hasPotionInGroup(ANTIFIRE_POTS);\n        if (!hasAntifire) {\n            missingItems.push({type: &quot;antifire&quot;, current: 0, needed: 2});\n            needsRestock = true;\n        }\n    }\n\n    // v24: Check antipoison (poisoning tasks)\n    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {\n        var hasAntipois = hasPotionInGroup(ANTIVENOM_PLUS_IDS) ||\n                          hasPotionInGroup(ANTIVENOM_IDS) ||\n                          hasPotionInGroup(SUPER_ANTIPOISON_IDS);\n        if (!hasAntipois) {\n            missingItems.push({type: &quot;antipoison&quot;, current: 0, needed: 1});\n            needsRestock = true;\n        }\n    }\n\n    // v24: Check combat potions\n    var hasCombatPot = hasPotionInGroup(SUPER_COMBAT_POTS) ||\n                       hasPotionInGroup(SUPER_ATTACK_POTS) ||\n                       hasPotionInGroup(ATTACK_POTS);\n    if (!hasCombatPot) {\n        missingItems.push({type: &quot;combat_pot&quot;, current: 0, needed: 1});\n        needsRestock = true;\n    }\n\n    // v24: Check cannonballs (only for multicombat tasks)\n    if (config.useCannon.getValue() &amp;&amp; shouldUseCannon(currentTaskMonster, true)) {\n        var cballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);\n        if (cballs &lt; 200) {\n            missingItems.push({type: &quot;cannonballs&quot;, current: cballs, needed: CANNON.MIN_CANNONBALLS});\n            needsRestock = true;\n        }\n    }\n\n    // Check special finish items\n    if (config.specialFinish.getValue() &amp;&amp; currentTaskMonster) {\n        var monName = currentTaskMonster.name.toLowerCase();\n        if (monName.indexOf(&quot;gargoyle&quot;) !== -1 &amp;&amp; !Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n            missingItems.push({type: &quot;special&quot;, itemId: ROCK_HAMMER_ID, name: &quot;rock_hammer&quot;});\n            needsRestock = true;\n        }\n        if (monName.indexOf(&quot;rockslug&quot;) !== -1 &amp;&amp; !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n            missingItems.push({type: &quot;special&quot;, itemId: ICE_COOLER_ID, name: &quot;ice_cooler&quot;});\n            needsRestock = true;\n        }\n        if (monName.indexOf(&quot;lizard&quot;) !== -1 &amp;&amp; !Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n            missingItems.push({type: &quot;special&quot;, itemId: ICE_COOLER_ID, name: &quot;ice_cooler&quot;});\n            needsRestock = true;\n        }\n    }\n\n    if (needsRestock) {\n        Game.sendGameMessage(&quot;Need restock: &quot; + missingItems.length + &quot; item type(s) missing&quot;, &quot;SlayerBot&quot;);\n        state = STATES.WALK_TO_BANK;\n    } else {\n        Game.sendGameMessage(&quot;Supplies OK, heading to task.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.WALK_TO_TASK;\n    }\n}\n\n// ---- WALK_TO_BANK ----\nfunction handleWalkToBank() {\n    var bank = findNearestBank();\n    if (!bank) {\n        Game.sendGameMessage(&quot;No bank found!&quot;, &quot;SlayerBot&quot;);\n        state = STATES.IDLE;\n        return;\n    }\n\n    bankTarget = bank;\n\n    if (isNear(bank.x, bank.y, 8)) {\n        state = STATES.BANK_SUPPLIES;\n        retryCount = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        var bx = bank.x;\n        var by = bank.y;\n        var bp = bank.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(bx, by, bp));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- BANK_SUPPLIES ----\nfunction handleBankSupplies() {\n    // Open bank if not open\n    if (!Game.info.bank.isOpen()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.bank.openNearest();\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Deposit all first\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.depositAllInventory();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    // Wait a tick then withdraw\n    waitTicks++;\n    if (waitTicks &lt; 3) return;\n    waitTicks = 0;\n\n    var withdrawDone = true;\n\n    for (var i = 0; i &lt; missingItems.length; i++) {\n        var item = missingItems[i];\n\n        if (item.type === &quot;food&quot;) {\n            var foodId = 379;\n            try { foodId = config.foodType.getValue(); } catch(e) {}\n            withdrawBankItem(foodId, item.needed);\n        } else if (item.type === &quot;prayer_pot&quot;) {\n            withdrawPotionFromBank(PRAYER_POTS, item.needed);\n        } else if (item.type === &quot;arrows&quot;) {\n            var bestArrow = getBestArrows(rangedLevel);\n            if (bestArrow) {\n                withdrawBankItem(bestArrow.id, item.needed);\n            } else {\n                // Need to craft arrows\n                if (config.selfSufficient.getValue()) {\n                    stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n                    state = STATES.CRAFT_ARROWS;\n                    Game.interact.bank.close();\n                    return;\n                }\n            }\n        } else if (item.type === &quot;runes&quot;) {\n            // Try to withdraw runes from bank\n            var spell = getBestSpell(magicLevel);\n            if (spell) {\n                var runes = getRunesForSpell(spell.key);\n                if (runes) {\n                    var runeKeys = Object.keys(runes);\n                    for (var r = 0; r &lt; runeKeys.length; r++) {\n                        var runeId = parseInt(runeKeys[r]);\n                        var runeQty = runes[runeKeys[r]] * 200;\n                        withdrawBankItem(runeId, runeQty);\n                    }\n                }\n            }\n            // If we don&#x27;t have enough, craft runes\n            if (config.selfSufficient.getValue() &amp;&amp; countRunes() &lt; 50) {\n                stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n                state = STATES.CRAFT_RUNES;\n                Game.interact.bank.close();\n                return;\n            }\n        } else if (item.type === &quot;antifire&quot;) {\n            if (!withdrawPotionFromBank(SUPER_ANTIFIRE_POTS, item.needed)) {\n                if (!withdrawPotionFromBank(EXTENDED_ANTIFIRE_POTS, item.needed)) {\n                    if (!withdrawPotionFromBank(ANTIFIRE_POTS, item.needed)) {\n                        if (config.selfSufficient.getValue()) {\n                            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n                            brewTarget = &quot;antifire&quot;;\n                            state = STATES.BREW_POTIONS;\n                            Game.interact.bank.close();\n                            return;\n                        }\n                    }\n                }\n            }\n        } else if (item.type === &quot;antipoison&quot;) {\n            if (!withdrawPotionFromBank(SUPER_ANTIPOISON_IDS, item.needed)) {\n                if (config.selfSufficient.getValue()) {\n                    stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n                    brewTarget = &quot;superantipoison&quot;;\n                    state = STATES.BREW_POTIONS;\n                    Game.interact.bank.close();\n                    return;\n                }\n            }\n        } else if (item.type === &quot;combat_pot&quot;) {\n            if (!withdrawPotionFromBank(SUPER_COMBAT_POTS, 1)) {\n                if (!withdrawPotionFromBank(SUPER_ATTACK_POTS, 1)) {\n                    if (!withdrawPotionFromBank(ATTACK_POTS, 1)) {\n                        if (config.selfSufficient.getValue()) {\n                            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n                            brewTarget = &quot;supercombat&quot;;\n                            state = STATES.BREW_POTIONS;\n                            Game.interact.bank.close();\n                            return;\n                        }\n                    }\n                }\n            }\n        } else if (item.type === &quot;cannonballs&quot;) {\n            // Try to withdraw from bank first\n            var bankCballs = withdrawBankItem(CANNON.CANNONBALL, item.needed);\n            // If bank has fewer than needed, enter cannonball gathering state\n            if (Game.info.inventory.getItemCount(CANNON.CANNONBALL) &lt; 200) {\n                Game.sendGameMessage(&quot;[SlayerBot] Low cannonballs in bank -- going to smith more&quot;, &quot;Bot&quot;);\n                state = STATES.GATHER_CANNONBALLS;\n                return;\n            }\n        } else if (item.type === &quot;special&quot;) {\n            withdrawBankItem(item.itemId, 1);\n        }\n    }\n\n    // Close bank and re-check\n    isExecuting = true;\n    Utility.invokeLater(function() {\n        Game.interact.bank.close();\n        isExecuting = false;\n    }, Utility.getDelay());\n\n    missingItems = [];\n    state = STATES.CHECK_SUPPLIES;\n}\n\nfunction withdrawBankItem(itemId, qty) {\n    try {\n        // Use appropriate withdraw type based on quantity\n        var wType = BankWithdrawType.WITHDRAW_ALL;\n        if (qty === 1) { wType = BankWithdrawType.WITHDRAW_ONE; }\n        else if (qty === 5) { wType = BankWithdrawType.WITHDRAW_FIVE; }\n        else if (qty === 10) { wType = BankWithdrawType.WITHDRAW_TEN; }\n        Game.interact.bank.withdrawItem(itemId, wType, false);\n    } catch(e) {}\n}\n\n// ---- WALK_TO_GE ----\nfunction handleWalkToGE() {\n    if (isNear(GE_LOCATION.x, GE_LOCATION.y, 10)) {\n        state = STATES.BUY_AT_GE;\n        retryCount = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(GE_LOCATION.x, GE_LOCATION.y, GE_LOCATION.plane));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- BUY_AT_GE ----\nfunction handleBuyAtGE() {\n    // GE purchasing is complex and depends on DZ APIs\n    // For now, log and skip to self-sufficient gathering\n    Game.sendGameMessage(&quot;GE purchasing not available in self-sufficient mode. Crafting instead.&quot;, &quot;SlayerBot&quot;);\n    if (config.selfSufficient.getValue()) {\n        state = STATES.CHECK_SUPPLIES;\n    } else {\n        state = STATES.IDLE;\n    }\n}\n\n// ---- WALK_TO_TASK ----\nfunction handleWalkToTask() {\n    if (!currentTaskMonster) {\n        Game.sendGameMessage(&quot;No task monster data, returning to master.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // v24: Cannon setup -- ONLY in multicombat zones (never bring to single combat)\n    if (config.useCannon.getValue() &amp;&amp; !cannonPlaced &amp;&amp; shouldUseCannon(currentTaskMonster, true)) {\n        if (Game.info.inventory.hasItem(CANNON.BASE, 1) &amp;&amp; Game.info.inventory.hasItem(CANNON.CANNONBALL, 1)) {\n            if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n                Game.sendGameMessage(&quot;[SlayerBot] Multicombat zone -- setting up cannon&quot;, &quot;Bot&quot;);\n                state = STATES.SETUP_CANNON;\n                return;\n            }\n        }\n    }\n\n    if (isNear(currentTaskMonster.x, currentTaskMonster.y, 15)) {\n        // v24: Choose fight mode based on safespot\n        if (usingSafespot &amp;&amp; config.useSafespots.getValue()) {\n            state = STATES.SAFESPOT_FIGHT;\n        } else {\n            state = STATES.FIGHT_TASK;\n        }\n        retryCount = 0;\n        ticksSinceAntifire = 0;\n        ticksSinceAntipoison = 0;\n        ticksSinceCombatPot = 0;\n        return;\n    }\n\n    if (!PlayerHelper.isWebWalking()) {\n        isExecuting = true;\n        var mx = currentTaskMonster.x;\n        var my = currentTaskMonster.y;\n        var mp = currentTaskMonster.plane || 0;\n        Utility.invokeLater(function() {\n            PlayerHelper.webWalkTo(new WorldPoint(mx, my, mp));\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n// ---- FIGHT_TASK (major overhaul for v24) ----\nfunction handleFightTask() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    // Task complete check\n    if (killsLeft &lt;= 0) {\n        Game.sendGameMessage(&quot;Task complete! Killed all &quot; + currentTaskName, &quot;SlayerBot&quot;);\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n    var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n\n    // === PRIORITY 1: Death check ===\n    if (currentHP &lt;= 0) {\n        saveDeathLocation();\n        state = STATES.HANDLE_DEATH;\n        return;\n    }\n\n    // === PRIORITY 2: Emergency teleport if critically low ===\n    if (currentHP &lt;= EMERGENCY_HP_THRESHOLD &amp;&amp; countFood() === 0) {\n        Game.sendGameMessage(&quot;CRITICAL HP with no food! Emergency retreat!&quot;, &quot;SlayerBot&quot;);\n        // Try to eat anything\n        if (!eatFood()) {\n            // Walk away from combat\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 3: Eat food ===\n    if (currentHP &lt;= Math.floor(maxHP * 0.45)) {\n        if (countFood() &gt; 0) {\n            eatFood();\n            return;\n        } else {\n            // Out of food -- bank\n            Game.sendGameMessage(&quot;Out of food, banking.&quot;, &quot;SlayerBot&quot;);\n            state = STATES.WALK_TO_BANK;\n            return;\n        }\n    }\n\n    // === PRIORITY 4: Drink prayer pot ===\n    if (config.usePrayer.getValue()) {\n        var currentPrayer = Client.getBoostedSkillLevels(Skill.PRAYER);\n        if (currentPrayer &lt;= 15) {\n            if (countPrayerPots() &gt; 0) {\n                drinkPrayerPot();\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 5: Anti-fire check (dragon tasks) ===\n    if (currentTaskMonster &amp;&amp; isDragonTask(currentTaskMonster.name)) {\n        if (ticksSinceAntifire &gt; 550 || ticksSinceAntifire === 0) {\n            if (drinkAntifire()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 6: Anti-poison check ===\n    if (currentTaskMonster &amp;&amp; canPoison(currentTaskMonster.name)) {\n        if (ticksSinceAntipoison &gt; 800 || ticksSinceAntipoison === 0) {\n            if (drinkAntipoison()) {\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 7: Combat potion re-dose ===\n    if (ticksSinceCombatPot &gt; 50) {\n        var boostedAtk = Client.getBoostedSkillLevels(Skill.ATTACK);\n        var realAtk = Client.getRealSkillLevels(Skill.ATTACK);\n        if (boostedAtk &lt;= realAtk + 2) {\n            if (drinkCombatPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n        var boostedStr = Client.getBoostedSkillLevels(Skill.STRENGTH);\n        var realStr = Client.getRealSkillLevels(Skill.STRENGTH);\n        if (boostedStr &lt;= realStr + 2) {\n            if (drinkStrengthPotion()) {\n                ticksSinceCombatPot = 0;\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 8: Special attack ===\n    if (config.useSpecialAttack.getValue()) {\n        var specPercent = 0;\n        try { specPercent = Client.getSpecialAttackPercent(); } catch(e) {}\n        if (specPercent &gt;= 25) {\n            useSpecialAttack();\n        }\n    }\n\n    // === PRIORITY 9: Superior monster check ===\n    var superior = checkForSuperior();\n    if (superior) {\n        Game.sendGameMessage(&quot;SUPERIOR FOUND! Attacking superior.&quot;, &quot;SlayerBot&quot;);\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superior);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // === PRIORITY 10: Special finish items ===\n    if (config.specialFinish.getValue()) {\n        var finished = handleSpecialFinishCheck();\n        if (finished) return;\n    }\n\n    // === PRIORITY 11: Loot check ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // === PRIORITY 12: Clue scroll banking ===\n    if (Game.info.inventory.isFull() &amp;&amp; hasClueScroll()) {\n        Game.sendGameMessage(&quot;Inventory full with clue scroll, banking.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // === PRIORITY 13: Bone burying ===\n    if (config.buryBones.getValue() &amp;&amp; !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b &lt; ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var boneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(boneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // === PRIORITY 14: Cannon reload ===\n    if (config.useCannon.getValue() &amp;&amp; cannonPlaced) {\n        reloadCannon();\n    }\n\n    // === PRIORITY 15: Attack target ===\n    if (!Client.getLocalPlayer().isInteracting()) {\n        var npcIds = currentTaskMonster.ids;\n        if (!npcIds || npcIds.length === 0) {\n            Game.sendGameMessage(&quot;No NPC IDs for &quot; + currentTaskName, &quot;SlayerBot&quot;);\n            state = STATES.SELECT_MASTER;\n            return;\n        }\n\n        var target = Game.info.npc.getNearest(npcIds);\n        if (target &amp;&amp; !target.isDead()) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.npc.attack(target);\n                isExecuting = false;\n            }, Utility.getDelay());\n        } else {\n            // No monster found -- might need to wait or move\n            if (stateTickCounter &gt; 20 &amp;&amp; !target) {\n                // Try walking closer to task center\n                if (!PlayerHelper.isWebWalking()) {\n                    var cx = currentTaskMonster.x;\n                    var cy = currentTaskMonster.y;\n                    var cp = currentTaskMonster.plane || 0;\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(cx, cy, cp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n            }\n        }\n    }\n}\n\nfunction handleSpecialFinishCheck() {\n    if (!currentTaskMonster) return false;\n    var monName = currentTaskMonster.name.toLowerCase();\n    var npcIds = currentTaskMonster.ids;\n\n    // Gargoyles: rock hammer when low HP\n    if (monName.indexOf(&quot;gargoyle&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ROCK_HAMMER_ID, 1)) {\n        var gargoyle = Game.info.npc.getNearest(npcIds);\n        if (gargoyle &amp;&amp; gargoyle.getHealthRatio() &gt; 0 &amp;&amp; gargoyle.getHealthRatio() &lt;= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                // Use rock hammer on gargoyle\n                Game.interact.inventory.useItemOnNpc(ROCK_HAMMER_ID, gargoyle);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Rockslugs: bag of salt when low HP\n    if (monName.indexOf(&quot;rockslug&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var rockslug = Game.info.npc.getNearest(npcIds);\n        if (rockslug &amp;&amp; rockslug.getHealthRatio() &gt; 0 &amp;&amp; rockslug.getHealthRatio() &lt;= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, rockslug);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    // Desert lizards: ice cooler when low HP\n    if (monName.indexOf(&quot;lizard&quot;) !== -1 &amp;&amp; Game.info.inventory.hasItem(ICE_COOLER_ID, 1)) {\n        var lizard = Game.info.npc.getNearest(npcIds);\n        if (lizard &amp;&amp; lizard.getHealthRatio() &gt; 0 &amp;&amp; lizard.getHealthRatio() &lt;= 10) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.useItemOnNpc(ICE_COOLER_ID, lizard);\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n\n    return false;\n}\n\nfunction reloadCannon() {\n    // Check cannonball count\n    var cballs = Game.info.inventory.getItemCount(2);\n    if (cballs &lt;= 0) return;\n\n    // Try to find cannon object near us\n    try {\n        var cannonObj = Game.info.gameObject.getNearest([6]);\n        if (cannonObj) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.gameObject.interact(cannonObj, MenuAction.NPC_FIRST_OPTION);\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n    } catch(e) {}\n}\n\n// ---- SAFESPOT_FIGHT ----\nfunction handleSafespotFight() {\n    if (!currentTaskMonster) {\n        state = STATES.SELECT_MASTER;\n        return;\n    }\n\n    if (killsLeft &lt;= 0) {\n        Game.sendGameMessage(&quot;Safespot task complete! Killed all &quot; + currentTaskName, &quot;SlayerBot&quot;);\n        state = STATES.TASK_COMPLETE;\n        return;\n    }\n\n    var spot = hasSafeSpot(currentTaskMonster.name);\n    if (!spot) {\n        // Fallback to normal melee fight\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Move to safe tile if not there\n    if (!isNear(spot.safeX, spot.safeY, 2)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var sx = spot.safeX;\n            var sy = spot.safeY;\n            var sp = spot.safePlane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(sx, sy, sp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Activate prayer if needed\n    if (spot.prayAgainst) {\n        activateSpecificPrayer(spot.prayAgainst);\n    }\n\n    // Survival checks\n    handleSurvivalChecks();\n\n    // Check for superior (even in safespot)\n    var superiorNpc = checkForSuperior();\n    if (superiorNpc) {\n        Game.sendGameMessage(&quot;SUPERIOR in safespot! Attacking.&quot;, &quot;SlayerBot&quot;);\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            Game.interact.npc.attack(superiorNpc);\n            isExecuting = false;\n        }, Utility.getDelay());\n        return;\n    }\n\n    // Loot check\n    if (!Client.getLocalPlayer().isInteracting()) {\n        if (pickUpLoot()) return;\n    }\n\n    // Bone burying\n    if (config.buryBones.getValue() &amp;&amp; !Client.getLocalPlayer().isInteracting()) {\n        for (var b = 0; b &lt; ALL_BONE_IDS.length; b++) {\n            if (Game.info.inventory.hasItem(ALL_BONE_IDS[b], 1)) {\n                var safeBoneId = ALL_BONE_IDS[b];\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.inventory.consumeItem(safeBoneId);\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            }\n        }\n    }\n\n    // Supply interrupts\n    var fCount = countFood();\n    if (fCount &lt;= 0) {\n        Game.sendGameMessage(&quot;Out of food in safespot, banking.&quot;, &quot;SlayerBot&quot;);\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    // Arrow/rune supply interrupt\n    if (config.useRanged.getValue() &amp;&amp; countArrows() &lt; 10) {\n        Game.sendGameMessage(&quot;Low on arrows, restocking.&quot;, &quot;SlayerBot&quot;);\n        if (config.selfSufficient.getValue()) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_ARROWS;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n    if (config.useMagic.getValue() &amp;&amp; countRunes() &lt; 10) {\n        Game.sendGameMessage(&quot;Low on runes, restocking.&quot;, &quot;SlayerBot&quot;);\n        if (config.selfSufficient.getValue()) {\n            stateBeforeInterrupt = STATES.CHECK_SUPPLIES;\n            state = STATES.CRAFT_RUNES;\n        } else {\n            state = STATES.WALK_TO_BANK;\n        }\n        return;\n    }\n\n    // Attack with ranged/magic from safe spot\n    if (!Client.getLocalPlayer().isInteracting()) {\n        attackWithRangedOrMagic();\n    }\n}\n\n// ---- EAT_FOOD ----\nfunction handleEatFood() {\n    if (eatFood()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        // No food, need to bank\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- DRINK_PRAYER ----\nfunction handleDrinkPrayer() {\n    if (drinkPrayerPot()) {\n        state = STATES.FIGHT_TASK;\n    } else {\n        state = STATES.WALK_TO_BANK;\n    }\n}\n\n// ---- LOOT_ITEMS ----\nfunction handleLootItems() {\n    if (Game.info.inventory.isFull()) {\n        // Inventory full -- bury bones or bank\n        if (config.buryBones.getValue()) {\n            for (var i = 0; i &lt; ALL_BONE_IDS.length; i++) {\n                if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n                    state = STATES.BURY_BONES;\n                    return;\n                }\n            }\n        }\n        state = STATES.WALK_TO_BANK;\n        return;\n    }\n\n    if (!pickUpLoot()) {\n        // Nothing to loot, back to fight\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- BURY_BONES ----\nfunction handleBuryBones() {\n    var buried = false;\n    for (var i = 0; i &lt; ALL_BONE_IDS.length; i++) {\n        if (Game.info.inventory.hasItem(ALL_BONE_IDS[i], 1)) {\n            var buryBoneId = ALL_BONE_IDS[i];\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.inventory.consumeItem(buryBoneId);\n                isExecuting = false;\n            }, Utility.getDelay());\n            buried = true;\n            break;\n        }\n    }\n    if (!buried) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- SPECIAL_FINISH ----\nfunction handleSpecialFinish() {\n    // This state is entered when a monster needs a specific finishing item\n    var finished = handleSpecialFinishCheck();\n    if (!finished) {\n        state = STATES.FIGHT_TASK;\n    }\n}\n\n// ---- TASK_COMPLETE ----\nfunction handleTaskComplete() {\n    tasksCompleted++;\n    totalKills = totalKills + (killsLeft &lt;= 0 ? 0 : killsLeft);\n    Game.sendGameMessage(&quot;Task complete! Total tasks: &quot; + tasksCompleted + &quot; | Total kills: &quot; + totalKills, &quot;SlayerBot&quot;);\n\n    // Reset task state\n    currentTaskName = &quot;&quot;;\n    currentTaskMonster = null;\n    killsLeft = 0;\n    usingSafespot = false;\n    cannonPlaced = false;\n\n    // Reset potion timers\n    ticksSinceAntifire = 0;\n    ticksSinceAntipoison = 0;\n    ticksSinceCombatPot = 0;\n\n    // v24: Track Turael boosting (already incremented in selectMasterWithBoosting)\n\n    // Get next task\n    state = STATES.CHECK_STATS;\n}\n\n// ---- HANDLE_DEATH ----\nfunction handleDeath() {\n    Game.sendGameMessage(&quot;Handling death. Saving death location for recovery.&quot;, &quot;SlayerBot&quot;);\n    deathDetected = true;\n    saveDeathLocation();\n    state = STATES.RECOVER_GRAVE;\n}\n\n// ---- RECOVER_GRAVE ----\nfunction handleRecoverGrave() {\n    // After respawn in Lumbridge:\n    // 1. Bank and withdraw emergency food\n    // 2. Walk to death location\n    // 3. Collect items\n    // 4. Re-equip gear\n    // 5. Return to task\n\n    if (!deathLocation) {\n        Game.sendGameMessage(&quot;No death location saved, re-checking supplies.&quot;, &quot;SlayerBot&quot;);\n        deathDetected = false;\n        state = STATES.CHECK_SUPPLIES;\n        return;\n    }\n\n    // Phase 1: Get emergency food from bank\n    var foodCt = countFood();\n    if (foodCt &lt; 3) {\n        // Need to bank first\n        if (!Game.info.bank.isOpen()) {\n            var bank = findNearestBank();\n            if (bank &amp;&amp; isNear(bank.x, bank.y, 8)) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    Game.interact.bank.openNearest();\n                    isExecuting = false;\n                }, Utility.getDelay());\n                return;\n            } else if (bank) {\n                if (!PlayerHelper.isWebWalking()) {\n                    isExecuting = true;\n                    var rbx = bank.x;\n                    var rby = bank.y;\n                    var rbp = bank.plane || 0;\n                    Utility.invokeLater(function() {\n                        PlayerHelper.webWalkTo(new WorldPoint(rbx, rby, rbp));\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                }\n                return;\n            }\n        } else {\n            // Bank is open, withdraw food\n            var emergFoodId = 379;\n            try { emergFoodId = config.foodType.getValue(); } catch(e) {}\n            withdrawBankItem(emergFoodId, 5);\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                Game.interact.bank.close();\n                isExecuting = false;\n            }, Utility.getDelay());\n            return;\n        }\n    }\n\n    // Phase 2: Walk to death pile\n    if (!isNear(deathLocation.x, deathLocation.y, 5)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var dlx = deathLocation.x;\n            var dly = deathLocation.y;\n            var dlp = deathLocation.plane;\n            Utility.invokeLater(function() {\n                PlayerHelper.webWalkTo(new WorldPoint(dlx, dly, dlp));\n                isExecuting = false;\n            }, Utility.getDelay());\n        }\n        return;\n    }\n\n    // Phase 3: At grave - pick up items from ground\n    if (pickUpLoot()) return;\n\n    // Phase 4: Done recovering, return to supply check\n    Game.sendGameMessage(&quot;Death recovery complete, resuming task.&quot;, &quot;SlayerBot&quot;);\n    deathLocation = null;\n    deathDetected = false;\n    state = STATES.CHECK_SUPPLIES;\n}\n\n// ---- HANDLE_LEVEL_UP ----\nfunction handleLevelUp() {\n    updateCachedStats();\n    Game.sendGameMessage(&quot;Level up detected! Updated stats.&quot;, &quot;SlayerBot&quot;);\n    levelUpDetected = false;\n    setAttackStyle();\n    state = STATES.FIGHT_TASK;\n}\n\n// ---- SETUP_CANNON ----\nfunction handleSetupCannon() {\n    if (!currentTaskMonster) {\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // SAFETY: Never place cannon in single-combat zones\n    if (isTaskSingleCombat(currentTaskMonster)) {\n        Game.sendGameMessage(&quot;[SlayerBot] Single combat zone -- skipping cannon&quot;, &quot;Bot&quot;);\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Check if we have cannon base\n    if (!Game.info.inventory.hasItem(CANNON.BASE, 1)) {\n        Game.sendGameMessage(&quot;No cannon base in inventory.&quot;, &quot;SlayerBot&quot;);\n        cannonPlaced = false;\n        state = STATES.FIGHT_TASK;\n        return;\n    }\n\n    // Walk to monster area center\n    if (!isNear(currentTaskMonster.x, currentTaskMonster.y, 10)) {\n        if (!PlayerHelper.isWebWalking()) {\n            isExecuting = true;\n            var canX = currentTaskMonster.x;\n            var canY
