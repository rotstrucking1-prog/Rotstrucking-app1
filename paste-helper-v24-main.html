// ---- BREW_POTIONS ----
function handleBrewPotions() {
    if (!brewTarget) {
        Game.sendGameMessage("No brew target set, returning to supplies.", "SlayerBot");
        brewPhase = "idle";
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Look up the recipe
    var recipe = null;
    var recipeKeys = Object.keys(POTION_RECIPES);
    for (var i = 0; i &lt; recipeKeys.length; i++) {
        var r = dbLookup(POTION_RECIPES, recipeKeys[i]);
        if (r &amp;&amp; recipeKeys[i].toLowerCase().indexOf(brewTarget.toLowerCase()) !== -1) {
            recipe = r;
            break;
        }
    }

    if (!recipe) {
        Game.sendGameMessage("Unknown brew target: " + brewTarget, "SlayerBot");
        brewPhase = "idle";
        brewTarget = null;
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Check herblore level requirement
    if (herbloreLevel &lt; recipe.level) {
        Game.sendGameMessage("Need herblore level " + recipe.level + " (have " + herbloreLevel + ") for " + brewTarget, "SlayerBot");
        herbloreTargetLevel = recipe.level;
        state = STATES.LEVEL_HERBLORE;
        return;
    }

    if (brewPhase === "idle") {
        brewPhase = "bank_supplies";
        brewCount = 0;
    }

    switch (brewPhase) {
        case "bank_supplies":
            handleBrewBankSupplies(recipe);
            break;
        case "clean_herbs":
            handleBrewCleanHerbs(recipe);
            break;
        case "make_unfinished":
            handleBrewMakeUnfinished(recipe);
            break;
        case "add_secondary":
            handleBrewAddSecondary(recipe);
            break;
        case "bank_potions":
            handleBrewBankPotions();
            break;
        case "done":
            handleBrewDone();
            break;
        default:
            brewPhase = "bank_supplies";
            break;
    }
}

function handleBrewBankSupplies(recipe) {
    var bank = findNearestBank();
    if (!bank) {
        brewPhase = "done";
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var bbx = bank.x;
            var bby = bank.y;
            var bbp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(bbx, bby, bbp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest();
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Deposit all
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    // Withdraw herbs, vials, and secondaries
    if (recipe.grimyHerbId) {
        withdrawBankItem(recipe.grimyHerbId, 14);
    }
    withdrawBankItem(VIAL_OF_WATER, 14);
    if (recipe.secondaryId) {
        withdrawBankItem(recipe.secondaryId, 14);
    }

    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.close();
        isExecuting = false;
    }, Utility.getDelay());

    brewPhase = "clean_herbs";
}

function handleBrewCleanHerbs(recipe) {
    if (!recipe.grimyHerbId) {
        brewPhase = "make_unfinished";
        return;
    }

    // Clean grimy herbs by clicking them
    if (Game.info.inventory.hasItem(recipe.grimyHerbId, 1)) {
        if (Client.getLocalPlayer().isIdle()) {
            isExecuting = true;
            var herbId = recipe.grimyHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(herbId);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } else {
        brewPhase = "make_unfinished";
    }
}

function handleBrewMakeUnfinished(recipe) {
    // Use clean herb on vial of water
    if (!recipe.cleanHerbId) {
        brewPhase = "add_secondary";
        return;
    }

    if (!Game.info.inventory.hasItem(recipe.cleanHerbId, 1) || !Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {
        brewPhase = "add_secondary";
        return;
    }

    if (Client.getLocalPlayer().isIdle()) {
        isExecuting = true;
        var clnId = recipe.cleanHerbId;
        Utility.invokeLater(function() {
            Game.interact.inventory.useItemOnItem(clnId, VIAL_OF_WATER);
            isExecuting = false;
        }, Utility.getDelay());
    }
}

function handleBrewAddSecondary(recipe) {
    // Use secondary ingredient on unfinished potion
    if (!recipe.unfinishedId || !recipe.secondaryId) {
        brewPhase = "bank_potions";
        return;
    }

    if (!Game.info.inventory.hasItem(recipe.unfinishedId, 1) || !Game.info.inventory.hasItem(recipe.secondaryId, 1)) {
        brewPhase = "bank_potions";
        return;
    }

    if (Client.getLocalPlayer().isIdle()) {
        isExecuting = true;
        var unfId = recipe.unfinishedId;
        var secId = recipe.secondaryId;
        Utility.invokeLater(function() {
            Game.interact.inventory.useItemOnItem(unfId, secId);
            isExecuting = false;
        }, Utility.getDelay());
    }
}

function handleBrewBankPotions() {
    var bank = findNearestBank();
    if (!bank) {
        brewPhase = "done";
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var bpx = bank.x;
            var bpy = bank.y;
            var bpp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(bpx, bpy, bpp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest();
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    brewCount++;
    if (brewCount &gt;= 3) {
        brewPhase = "done";
    } else {
        brewPhase = "bank_supplies";
    }
}

function handleBrewDone() {
    Game.sendGameMessage("Potion brewing session complete (" + brewTarget + ").", "SlayerBot");
    brewPhase = "idle";
    brewTarget = null;
    brewCount = 0;

    if (stateBeforeInterrupt) {
        state = stateBeforeInterrupt;
        stateBeforeInterrupt = "";
    } else {
        state = STATES.CHECK_SUPPLIES;
    }
}

// ---- LEVEL_HERBLORE ----
function handleLevelHerblore() {
    // Make the highest level potion we CAN make until we reach herbloreTargetLevel

    if (herbloreLevel &gt;= herbloreTargetLevel) {
        Game.sendGameMessage("Herblore level " + herbloreLevel + " reached! Returning to brewing.", "SlayerBot");
        state = STATES.BREW_POTIONS;
        return;
    }

    // Find the highest recipe we can make
    var bestRecipe = null;
    var bestLevel = 0;
    var recipeKeys = Object.keys(POTION_RECIPES);
    for (var i = 0; i &lt; recipeKeys.length; i++) {
        var rec = dbLookup(POTION_RECIPES, recipeKeys[i]);
        if (rec &amp;&amp; rec.level &lt;= herbloreLevel &amp;&amp; rec.level &gt; bestLevel) {
            bestLevel = rec.level;
            bestRecipe = rec;
        }
    }

    if (!bestRecipe) {
        Game.sendGameMessage("Cannot find a potion to make at herblore " + herbloreLevel, "SlayerBot");
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    // Bank, withdraw ingredients, make potions, repeat
    var bank = findNearestBank();
    if (!bank) {
        state = STATES.IDLE;
        return;
    }

    if (!isNear(bank.x, bank.y, 8)) {
        if (!PlayerHelper.isWebWalking()) {
            isExecuting = true;
            var lhx = bank.x;
            var lhy = bank.y;
            var lhp = bank.plane || 0;
            Utility.invokeLater(function() {
                PlayerHelper.webWalkTo(new WorldPoint(lhx, lhy, lhp));
                isExecuting = false;
            }, Utility.getDelay());
        }
        return;
    }

    if (!Game.info.bank.isOpen()) {
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.openNearest();
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    // Deposit, withdraw herbs + vials
    isExecuting = true;
    Utility.invokeLater(function() {
        Game.interact.bank.depositAllInventory();
        isExecuting = false;
    }, Utility.getDelay());

    if (bestRecipe.grimyHerbId) {
        withdrawBankItem(bestRecipe.grimyHerbId, 14);
    }
    withdrawBankItem(VIAL_OF_WATER, 14);

    // Clean herbs and make potions inline
    if (bestRecipe.grimyHerbId &amp;&amp; Game.info.inventory.hasItem(bestRecipe.grimyHerbId, 1)) {
        if (Client.getLocalPlayer().isIdle()) {
            isExecuting = true;
            var gHerbId = bestRecipe.grimyHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.consumeItem(gHerbId);
                isExecuting = false;
            }, Utility.getDelay());
        }
    } else if (bestRecipe.cleanHerbId &amp;&amp; Game.info.inventory.hasItem(bestRecipe.cleanHerbId, 1) &amp;&amp; Game.info.inventory.hasItem(VIAL_OF_WATER, 1)) {
        if (Client.getLocalPlayer().isIdle()) {
            isExecuting = true;
            var cHerbId = bestRecipe.cleanHerbId;
            Utility.invokeLater(function() {
                Game.interact.inventory.useItemOnItem(cHerbId, VIAL_OF_WATER);
                isExecuting = false;
            }, Utility.getDelay());
        }
    }

    // Check for level up
    updateCachedStats();
}

// =============================================================================
// OnChatMessage -- Intercepts chat messages to detect tasks, kills, deaths
// =============================================================================
function OnChatMessage(chatMsg) {
    if (!chatMsg) return;
    var rawText = "";
    if (typeof chatMsg === "string") {
        rawText = chatMsg;
    } else if (chatMsg.getMessage) {
        rawText = chatMsg.getMessage();
    } else if (chatMsg.message) {
        rawText = chatMsg.message;
    }
    if (!rawText || rawText.length === 0) return;
    // Strip OSRS color/formatting tags like &lt;col=ff0000&gt; &lt;/col&gt; &lt;br&gt; etc
    var cleanText = rawText;
    var tStart = cleanText.indexOf("&lt;");
    while (tStart !== -1) {
        var tEnd = cleanText.indexOf("&gt;", tStart);
        if (tEnd !== -1) {
            cleanText = cleanText.substring(0, tStart) + cleanText.substring(tEnd + 1);
        } else {
            break;
        }
        tStart = cleanText.indexOf("&lt;");
    }
    var message = cleanText;
    var msg = cleanText.toLowerCase();

    // Detect gem response: "You're assigned to kill [monster]; only [N] more to go"
    // This has DIFFERENT format than task assignment - name first, then count
    if (msg.indexOf("assigned to kill") !== -1 &amp;&amp; msg.indexOf("more to go") !== -1) {
        var killIdx = msg.indexOf("assigned to kill") + "assigned to kill".length;
        // Monster name is between "kill " and ";"
        var semiIdx = msg.indexOf(";", killIdx);
        if (semiIdx === -1) semiIdx = msg.indexOf(",", killIdx);
        var gemMonster = "";
        if (semiIdx !== -1) {
            gemMonster = message.substring(killIdx, semiIdx).trim();
        }
        // Count is after "only " before " more" - extract digits robustly
        var onlyIdx = msg.indexOf("only ");
        if (onlyIdx !== -1) {
            var numStr = "";
            for (var gc = onlyIdx + 5; gc &lt; msg.length; gc++) {
                var ch = msg.charAt(gc);
                if (ch &gt;= "0" &amp;&amp; ch &lt;= "9") {
                    numStr = numStr + ch;
                } else if (numStr.length &gt; 0) {
                    break;
                }
            }
            if (numStr.length &gt; 0) {
                var gemCount = parseInt(numStr);
                if (!isNaN(gemCount)) {
                    killsLeft = gemCount;
                }
            }
        }
        if (gemMonster) {
            currentTaskName = gemMonster;
        }
        Game.sendGameMessage("RAW GEM MSG: " + msg, "SlayerBot");
        Game.sendGameMessage("GEM DETECTED TASK: " + currentTaskName + " x" + killsLeft, "SlayerBot");
        taskReceived = true;
        gemCheckDone = true;
        return;
    }

    // Detect task assignment from master: "Your new task is to kill [N] [monster]"
    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {
        if (msg.indexOf(TASK_CHAT_PATTERNS[p]) !== -1) {
            parseTaskFromMessage(message);
            taskReceived = true;
            gemCheckDone = true;
            return;
        }
    }

    // Detect gem check response - no task
    if (msg.indexOf("you do not currently have") !== -1 || 
        msg.indexOf("you need something new") !== -1 ||
        msg.indexOf("please check back later") !== -1 ||
        msg.indexOf("you don't currently have") !== -1 ||
        msg.indexOf("you currently don't have a task") !== -1 ||
        msg.indexOf("you have no task") !== -1) {
        noTaskFromGem = true;
        gemCheckDone = true;
        return;
    }

    // If we got a task from gem check, mark it
    if (state === STATES.WAIT_GEM_RESPONSE &amp;&amp; taskReceived) {
        gemCheckDone = true;
        return;
    }

    // Detect kill count (e.g., "You have completed your task! You killed 120 monsters.")
    if (msg.indexOf("you have completed your task") !== -1) {
        killsLeft = 0;
        state = STATES.TASK_COMPLETE;
        return;
    }

    // Detect single kill (monster death message or XP drop)
    if (msg.indexOf("your slayer assignment") !== -1 &amp;&amp; msg.indexOf("more to go") !== -1) {
        // Parse kills remaining
        var remaining = parseKillsRemaining(msg);
        if (remaining &gt;= 0) {
            killsLeft = remaining;
        }
        return;
    }

    // Detect superior spawn
    if (msg.indexOf("a superior foe has appeared") !== -1) {
        Game.sendGameMessage("Superior monster spawned!", "SlayerBot");
        return;
    }

    // Detect death
    if (msg.indexOf("oh dear, you are dead") !== -1) {
        deathDetected = true;
        return;
    }

    // Detect level up
    if (msg.indexOf("congratulations, you just advanced") !== -1) {
        levelUpDetected = true;
        return;
    }

    // Detect task streaks
    if (msg.indexOf("you've completed") !== -1 &amp;&amp; msg.indexOf("in a row") !== -1) {
        // Task streak notification
        Game.sendGameMessage("Task streak tracked!", "SlayerBot");
        return;
    }
}

function parseTaskFromMessage(message) {
    // Parse: "Your new task is to kill 135 Blue Dragons."
    var msg = message;
    var lower = msg.toLowerCase();

    // Find the pattern
    var idx = -1;
    for (var p = 0; p &lt; TASK_CHAT_PATTERNS.length; p++) {
        idx = lower.indexOf(TASK_CHAT_PATTERNS[p]);
        if (idx !== -1) {
            idx = idx + TASK_CHAT_PATTERNS[p].length;
            break;
        }
    }

    if (idx === -1) return;

    // Extract the rest: " 135 Blue Dragons."
    var rest = msg.substring(idx).trim();
    // Remove trailing period
    if (rest.slice(-1) === ".") {
        rest = rest.substring(0, rest.length - 1);
    }

    // Parse number and name
    var parts = rest.split(" ");
    if (parts.length &lt; 2) return;

    var count = parseInt(parts[0]);
    if (isNaN(count)) return;

    var monsterName = parts.slice(1).join(" ");

    killsLeft = count;
    currentTaskName = monsterName;
    totalKills = totalKills + count;

    Game.sendGameMessage("Parsed task: " + count + " x " + monsterName, "SlayerBot");
}

function parseKillsRemaining(msg) {
    // Parse: "...120 more to go."
    var idx = msg.indexOf("more to go");
    if (idx === -1) return -1;

    // Work backwards to find the number
    var numStr = "";
    var i = idx - 1;
    while (i &gt;= 0 &amp;&amp; msg.charAt(i) === " ") i--;
    while (i &gt;= 0 &amp;&amp; msg.charAt(i) &gt;= "0" &amp;&amp; msg.charAt(i) &lt;= "9") {
        numStr = msg.charAt(i) + numStr;
        i--;
    }

    var num = parseInt(numStr);
    if (isNaN(num)) return -1;
    return num;
}

// =============================================================================
// NPC LOOT APPEARED -- Track kills when NPC dies (more reliable than chat)
// =============================================================================
function OnNPCLootAppeared(npc) {
    if (!currentTaskMonster || !npc) return;

    var npcId = -1;
    try {
        npcId = npc.getId();
    } catch (e) {
        return;
    }

    // Check if this NPC is our task
    var isTask = false;
    if (currentTaskMonster.npcIds) {
        for (var i = 0; i &lt; currentTaskMonster.npcIds.length; i++) {
            if (currentTaskMonster.npcIds[i] === npcId) {
                isTask = true;
                break;
            }
        }
    }

    // Also check superior monster IDs
    if (!isTask) {
        var superiorData = getSuperiorNpcId(currentTaskMonster.name);
        if (superiorData &amp;&amp; superiorData === npcId) {
            isTask = true;
        }
    }

    if (isTask) {
        killsLeft--;
        totalKills++;
        if (killsLeftOverlay) killsLeftOverlay.setValue("Kills Left: " + Math.max(0, killsLeft));
        Game.sendGameMessage("Kill tracked! " + killsLeft + " " + currentTaskMonster.name + " remaining. Total kills: " + totalKills, "SlayerBot");

        if (killsLeft &lt;= 0) {
            Game.sendGameMessage("All kills complete!", "SlayerBot");
            state = STATES.TASK_COMPLETE;
        }
    }
}

// ===========================================================================
// CANNONBALL GATHERING SYSTEM
// Mine iron + coal -&gt; smelt steel bars -&gt; smith cannonballs at furnace
// NOTE: Do NOT bring cannon to single-combat zones!
// ===========================================================================
var gatherCballState = "CHECK";
var gatherCballTarget = 1000;

function handleGatherCannonballs() {
    if (isExecuting) return;

    // Check smithing level
    var smithLvl = Client.getRealSkillLevel(Skill.SMITHING);
    var miningLvl = Client.getRealSkillLevel(Skill.MINING);

    if (smithLvl &lt; CANNONBALL_CRAFT.smithLevel) {
        Game.sendGameMessage("[SlayerBot] Need 35 Smithing to make cannonballs. Current: " + smithLvl, "Bot");
        // Fall back to buying from GE if possible
        gatherCballState = "BUY_GE";
    }

    var cballCount = Game.info.inventory.getItemCount(CANNON.CANNONBALL);
    if (cballCount &gt;= gatherCballTarget) {
        Game.sendGameMessage("[SlayerBot] Have " + cballCount + " cannonballs -- returning to task", "Bot");
        gatherCballState = "CHECK";
        state = STATES.CHECK_SUPPLIES;
        return;
    }

    if (gatherCballState === "CHECK") {
        // Figure out what we need
        var barsInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
        var ironInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
        var coalInInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);
        var hasMould = Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1);

        if (barsInInv &gt;= 10) {
            // Have steel bars -- go smith cannonballs
            if (!hasMould) {
                gatherCballState = "GET_MOULD";
            } else {
                gatherCballState = "SMITH_CBALLS";
            }
        } else if (ironInInv &gt; 0 &amp;&amp; coalInInv &gt;= (ironInInv * 2)) {
            // Have ores -- go smelt
            gatherCballState = "SMELT_BARS";
        } else {
            // Need to bank for supplies or mine
            gatherCballState = "BANK_SUPPLIES";
        }
        return;
    }

    if (gatherCballState === "BANK_SUPPLIES") {
        if (!Game.info.bank.isOpen()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest();
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        // Deposit inventory
        Game.interact.bank.depositAllInventory();
        // Withdraw ammo mould
        if (!Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {
            withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);
        }
        // Try to withdraw steel bars from bank
        withdrawBankItem(CANNONBALL_CRAFT.steelBar, 27);
        isExecuting = true;
        Utility.invokeLater(function() {
            var barsGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
            if (barsGot &gt;= 5) {
                Game.interact.bank.close();
                gatherCballState = "SMITH_CBALLS";
            } else {
                // No steel bars in bank -- try to withdraw ores
                withdrawBankItem(CANNONBALL_CRAFT.ironOre, 9);
                withdrawBankItem(CANNONBALL_CRAFT.coal, 18);
                var ironGot = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
                if (ironGot &gt;= 3) {
                    Game.interact.bank.close();
                    gatherCballState = "SMELT_BARS";
                } else {
                    // Nothing in bank -- need to mine
                    Game.interact.bank.close();
                    Game.sendGameMessage("[SlayerBot] No steel bars or ores in bank -- mining iron and coal", "Bot");
                    gatherCballState = "MINE_ORES";
                }
            }
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    if (gatherCballState === "MINE_ORES") {
        // Walk to Al Kharid mine (has both iron and coal rocks nearby)
        var minePos = SS_LOCATIONS.AL_KHARID_MINE;
        if (!isNear(minePos.x, minePos.y, 15)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(minePos.x, minePos.y, minePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }

        var ironCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
        var coalCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);

        // Need 2 coal per iron for steel bars. Mine ~9 iron + 18 coal per trip
        if (ironCount &lt; 9) {
            // Mine iron
            var ironRock = Game.info.gameObject.getNearest(SS_OBJECTS.IRON_ROCK);
            if (ironRock &amp;&amp; PlayerHelper.isPlayerIdle()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(ironRock, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else if (coalCount &lt; (ironCount * 2)) {
            // Mine coal
            var coalRock = Game.info.gameObject.getNearest(SS_OBJECTS.COAL_ROCK);
            if (coalRock &amp;&amp; PlayerHelper.isPlayerIdle()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(coalRock, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else {
            // Have enough ores for a trip -- go smelt
            gatherCballState = "SMELT_BARS";
        }

        // Full inventory -- bank or smelt
        if (Game.info.inventory.isFull()) {
            if (ironCount &gt;= 5 &amp;&amp; coalCount &gt;= (ironCount * 2)) {
                gatherCballState = "SMELT_BARS";
            } else {
                gatherCballState = "BANK_SUPPLIES";
            }
        }
        return;
    }

    if (gatherCballState === "SMELT_BARS") {
        // Walk to Al Kharid furnace
        var furnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;
        if (!isNear(furnacePos.x, furnacePos.y, 10)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(furnacePos.x, furnacePos.y, furnacePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }

        // Smelt at furnace
        var ironInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.ironOre);
        var coalInv = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.coal);
        if (ironInv &gt; 0 &amp;&amp; coalInv &gt;= 2 &amp;&amp; PlayerHelper.isPlayerIdle()) {
            var furnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);
            if (furnace) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    Game.interact.gameObject.action(furnace, MenuAction.GAME_OBJECT_FIRST_OPTION);
                    Game.sendGameMessage("[SlayerBot] Smelting steel bars for cannonballs", "Bot");
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else if (ironInv &lt;= 0 || coalInv &lt; 2) {
            // Done smelting -- check steel bar count
            var steelBars = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
            if (steelBars &gt;= 5) {
                gatherCballState = "SMITH_CBALLS";
            } else {
                // Need more ores
                gatherCballState = "BANK_SUPPLIES";
            }
        }
        return;
    }

    if (gatherCballState === "SMITH_CBALLS") {
        // Walk to Al Kharid furnace (cannonballs are smithed at furnace, not anvil)
        var smFurnacePos = SS_LOCATIONS.AL_KHARID_FURNACE;
        if (!isNear(smFurnacePos.x, smFurnacePos.y, 10)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(smFurnacePos.x, smFurnacePos.y, smFurnacePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }

        // Smith cannonballs: use steel bar on furnace with ammo mould in inventory
        var steelCount = Game.info.inventory.getItemCount(CANNONBALL_CRAFT.steelBar);
        if (steelCount &gt; 0 &amp;&amp; Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1) &amp;&amp; PlayerHelper.isPlayerIdle()) {
            var smFurnace = Game.info.gameObject.getNearest([SS_OBJECTS.FURNACE]);
            if (smFurnace) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    // Use steel bar on furnace to smith cannonballs
                    Game.interact.inventory.useItemOnObject(CANNONBALL_CRAFT.steelBar, smFurnace);
                    Game.sendGameMessage("[SlayerBot] Smithing cannonballs (" + steelCount + " bars left)", "Bot");
                    isExecuting = false;
                }, Utility.getDelay());
            }
        } else if (steelCount &lt;= 0) {
            // All bars used -- check cannonball count
            var newCballs = Game.info.inventory.getItemCount(CANNON.CANNONBALL);
            Game.sendGameMessage("[SlayerBot] Smithed cannonballs. Total: " + newCballs, "Bot");
            if (newCballs &gt;= gatherCballTarget) {
                gatherCballState = "CHECK";
                state = STATES.CHECK_SUPPLIES;
            } else {
                // Need more -- bank and get more bars/ores
                gatherCballState = "BANK_SUPPLIES";
            }
        }
        return;
    }

    if (gatherCballState === "GET_MOULD") {
        // Buy ammo mould from Nulodion at Dwarf Mines or GE
        // Simplest: try to withdraw from bank first
        if (!Game.info.bank.isOpen()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest();
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }
        withdrawBankItem(CANNONBALL_CRAFT.ammoMould, 1);
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.close();
            if (Game.info.inventory.hasItem(CANNONBALL_CRAFT.ammoMould, 1)) {
                gatherCballState = "CHECK";
            } else {
                Game.sendGameMessage("[SlayerBot] No ammo mould in bank -- trying GE", "Bot");
                gatherCballState = "BUY_GE";
            }
            isExecuting = false;
        }, Utility.getDelay());
        return;
    }

    if (gatherCballState === "BUY_GE") {
        // Walk to GE and buy cannonballs directly if we have GP
        var gePos = SS_LOCATIONS.GRAND_EXCHANGE;
        if (!isNear(gePos.x, gePos.y, 15)) {
            if (!PlayerHelper.isWebWalking()) {
                isExecuting = true;
                Utility.invokeLater(function() {
                    PlayerHelper.webWalkTo(new WorldPoint(gePos.x, gePos.y, gePos.z || 0));
                    isExecuting = false;
                }, Utility.getDelay());
            }
            return;
        }
        Game.sendGameMessage("[SlayerBot] At GE -- buy cannonballs manually or level Smithing to 35", "Bot");
        gatherCballState = "CHECK";
        state = STATES.CHECK_SUPPLIES;
        return;
    }
}

// =============================================================================
// TAKING_BREAK -- Human-like break handler
// =============================================================================
function handleTakingBreak() {
    currentStateOverlay.setValue("State: BREAK (" + breakReason + ")");

    // Check if break is over
    if (tickCounter &gt;= breakEndTick) {
        Game.sendGameMessage("[Break] Break over! Resuming play.", "Bot");

        // Reset break timer for next break
        ticksSinceLastBreak = 0;
        var playMin = config.minPlayMinutes.getValue();
        var playMax = config.maxPlayMinutes.getValue();
        nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);
        breakScheduled = false;

        breakOverlay.setValue("Break: in ~" + ticksToMinutes(nextBreakAtTick) + "m");

        // Return to previous state
        state = stateBeforeBreak;
        return;
    }

    // During break: random idle actions every ~30 ticks to mimic AFK player
    if (tickCounter % 30 === 0) {
        var action = getRandomIdleAction();
        if (action === "camera_rotate") {
            // Just a cosmetic log -- DZ handles camera
            // Real players sometimes move camera while AFK
        } else if (action === "open_stats") {
            // Some players tab through interfaces while AFK
        } else if (action === "open_inventory") {
            // Open inventory tab
        }
        // Most of the time: do nothing (standing idle)
    }

    // Random mouse micro-movements every ~100 ticks
    // This is just a status update -- DZ does not detect idle kicks
    if (tickCounter % 100 === 0) {
        var timeLeft = ticksToMinutes(breakEndTick - tickCounter);
        breakOverlay.setValue("Break: " + breakReason + " (~" + timeLeft + "m left)");
    }
}

// =============================================================================
// OUTSIDE_SCHEDULE -- Handles being outside play hours
// =============================================================================
function handleOutsideSchedule() {
    currentStateOverlay.setValue("State: OUTSIDE SCHEDULE");

    // Check if we are back in schedule
    if (config.enableSchedule.getValue()) {
        var schedStart = config.startHour.getValue();
        var schedEnd = config.endHour.getValue();
        if (isWithinSchedule(schedStart, schedEnd)) {
            Game.sendGameMessage("[Schedule] Back within play hours! Resuming.", "Bot");
            scheduleOverlay.setValue("Schedule: Active");

            // Reset break timer for the new session
            ticksSinceLastBreak = 0;
            var playMin = config.minPlayMinutes.getValue();
            var playMax = config.maxPlayMinutes.getValue();
            nextBreakAtTick = calculateNextBreakDelay(playMin, playMax);
            sessionStarted = true;

            // Return to previous state
            state = stateBeforeBreak;
            return;
        }
    }

    // If not logged out yet, walk to a bank and log out
    if (!outsideScheduleLogout) {
        // Bank inventory first to save all loot
        if (!Game.info.bank.isOpen()) {
            isExecuting = true;
            Utility.invokeLater(function() {
                Game.interact.bank.openNearest();
                isExecuting = false;
            }, Utility.getDelay());
            return;
        }

        // Deposit everything
        isExecuting = true;
        Utility.invokeLater(function() {
            Game.interact.bank.depositAllInventory();
            isExecuting = false;
        }, Utility.getDelay());

        Utility.invokeLater(function() {
            Game.interact.bank.close();
        }, Utility.getDelay());

        outsideScheduleLogout = true;
        Game.sendGameMessage("[Schedule] Banked items. Waiting for play hours to resume.", "Bot");
        scheduleOverlay.setValue("Schedule: WAITING (banked items)");
        return;
    }

    // Already banked -- just idle and wait for schedule to resume
    // Check every ~200 ticks (2 minutes)
    if (tickCounter % 200 === 0) {
        var hour = getCurrentHour();
        scheduleOverlay.setValue("Schedule: OFF (hour " + hour + ") waiting...");
    }
}

// =============================================================================
// REPAIR BARROWS GEAR -- Walk to Bob's Axes in Lumbridge, repair at 25%
// =============================================================================
function handleRepairBarrows() {
    switch (repairPhase) {
        case "walk_to_bob":
            // Check if we have coins for repair (Barrows repair costs ~50k-120k GP)
            if (!Game.info.inventory.hasItem(COINS_ID)) {
                // Try to get coins from bank first
                if (!Game.info.bank.isOpen()) {
                    Game.interact.bank.openNearest();
                    return;
                }
                try {
                    Game.interact.bank.withdrawItem(COINS_ID, BankWithdrawType.WITHDRAW_ALL, false);
                    Game.sendGameMessage("[SlayerBot] Withdrew coins for Barrows repair.", "Bot");
                } catch (e) {
                    Game.sendGameMessage("[SlayerBot] WARNING: No coins for repair! Skipping.", "Bot");
                    state = stateBeforeRepair;
                    return;
                }
                Game.interact.bank.close();
                return;
            }

            // Walk to Bob's Axes in Lumbridge
            var pos = Client.getLocalPlayer().getWorldLocation();
            var bobLoc = BOB_AXES_LOCATION;
            if (Math.abs(pos.getX() - bobLoc.x) &lt;= 5 &amp;&amp; Math.abs(pos.getY() - bobLoc.y) &lt;= 5) {
                repairPhase = "talk_to_bob";
                Game.sendGameMessage("[SlayerBot] Arrived at Bob's Axes.", "Bot");
            } else {
                PlayerHelper.webWalkTo(new WorldPoint(bobLoc.x, bobLoc.y, bobLoc.z));
                Game.sendGameMessage("[SlayerBot] Walking to Bob's Axes in Lumbridge...", "Bot");
            }
            break;

        case "talk_to_bob":
            // Find Bob NPC
            var bob = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
            if (!bob) {
                Game.sendGameMessage("[SlayerBot] Can't find Bob! Walking closer.", "Bot");
                PlayerHelper.webWalkTo(new WorldPoint(BOB_AXES_LOCATION.x, BOB_AXES_LOCATION.y, BOB_AXES_LOCATION.z));
                return;
            }
            // Trade with Bob (second menu option: Talk-to / Trade)
            Game.interact.npc.action(bob, MenuAction.NPC_SECOND_OPTION);
            repairPhase = "wait_for_shop";
            break;

        case "wait_for_shop":
            // Wait for repair interface to open (takes a tick or two)
            // The repair uses "Trade" option which opens shop
            // For Barrows: right-click item in inventory -&gt; "Use" on Bob
            // Actually, Bob's repair: Talk -&gt; "I'd like to trade" -&gt; Use broken item on Bob
            // Simpler approach: use items on Bob directly
            repairPhase = "repair_items";
            break;

        case "repair_items":
            // Find all barrows items that need repair in inventory
            var repairNeeded = checkEquippedBarrowsCondition();
            if (repairNeeded.length === 0) {
                // Check inventory too
                var invRepairNeeded = false;
                for (var slot = 0; slot &lt; 28; slot++) {
                    // This would require iterating inventory -- for now check known barrows IDs
                }
                Game.sendGameMessage("[SlayerBot] All Barrows gear repaired! Returning to task.", "Bot");
                repairPhase = "done";
                return;
            }

            // For equipped items: unequip first, then use on Bob
            // For now, use the NPC_FIRST_OPTION (Talk-to) which offers repair dialogue
            var bob2 = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
            if (!bob2) {
                repairPhase = "walk_to_bob";
                return;
            }

            // Use the repair option through dialogue
            // Bob offers: "Shall I repair that for you?" when you use a broken item on him
            // Use actionItem to "Use" barrows piece, then click on Bob
            var itemToRepair = repairNeeded[0];
            try {
                // Use the broken item on Bob via inventory action
                Game.interact.inventory.useItem(itemToRepair.itemId, MenuAction.WIDGET_TARGET);
                Utility.invokeLater(function() {
                    var bobNpc = Game.info.npc.getNearest([BOB_AXES_NPC_ID]);
                    if (bobNpc) {
                        Game.interact.npc.action(bobNpc, MenuAction.NPC_FIRST_OPTION);
                    }
                }, Utility.getDelay());
                Game.sendGameMessage("[SlayerBot] Repairing " + itemToRepair.piece + "...", "Bot");
            } catch (e) {
                Game.sendGameMessage("[SlayerBot] Repair error: " + e + ". Trying dialogue method.", "Bot");
                // Fallback: talk to Bob
                Game.interact.npc.action(bob2, MenuAction.NPC_FIRST_OPTION);
            }
            repairPhase = "wait_repair_done";
            break;

        case "wait_repair_done":
            // Check if the item was repaired (ID should change from 25% to 100%)
            var stillBroken = checkEquippedBarrowsCondition();
            if (stillBroken.length &gt; 0) {
                // Still items to repair -- cycle back
                repairPhase = "repair_items";
            } else {
                repairPhase = "done";
            }
            break;

        case "done":
            Game.sendGameMessage("[SlayerBot] Barrows repair complete! Returning to previous task.", "Bot");
            state = stateBeforeRepair;
            repairPhase = "walk_to_bob";
            break;

        default:
            repairPhase = "walk_to_bob";
            break;
    }
}
