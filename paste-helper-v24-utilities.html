e.sendGameMessage(&quot;[SlayerBot][RI] Withdrew tool: &quot; + toolId, &quot;Bot&quot;);\n        } catch(e) {}\n        isExecuting = false;\n    }, Utility.getDelay());\n}\n\n/**\n * buyFromShop -- Buy an item from a shop NPC\n */\nfunction buyFromShop(npcId, itemId, quantity) {\n    if (isExecuting) return;\n\n    var npc = Game.info.npc.getNearest([npcId]);\n    if (npc) {\n        isExecuting = true;\n        Utility.invokeLater(function() {\n            try {\n                Game.interact.npc.action(npc, MenuAction.NPC_FIRST_OPTION); // Trade NPC\n                Game.sendGameMessage(&quot;[SlayerBot][RI] Opening shop with NPC &quot; + npcId, &quot;Bot&quot;);\n            } catch(e) {}\n            isExecuting = false;\n        }, Utility.getDelay());\n    }\n}\n\n/**\n * autoEatIfNeeded -- Eat food when HP is low\n */\nfunction autoEatIfNeeded() {\n    try {\n        var currentHP = Client.getBoostedSkillLevels(Skill.HITPOINTS);\n        var maxHP = Client.getRealSkillLevels(Skill.HITPOINTS);\n        if (currentHP &lt; maxHP * 0.4) {\n            // Find food in inventory and eat\n            var foodIds = [\n                SS_ITEMS.COOKED_ANGLERFISH, SS_ITEMS.COOKED_SHARK, SS_ITEMS.COOKED_MONKFISH,\n                SS_ITEMS.COOKED_SWORDFISH, SS_ITEMS.COOKED_LOBSTER, SS_ITEMS.COOKED_TUNA,\n                SS_ITEMS.COOKED_SALMON, SS_ITEMS.COOKED_TROUT, SS_ITEMS.COOKED_SHRIMPS,\n                SS_ITEMS.COOKED_CHICKEN, SS_ITEMS.COOKED_MEAT\n            ];\n            for (var i = 0; i &lt; foodIds.length; i++) {\n                if (Game.info.inventory.getItemCount(foodIds[i]) &gt; 0) {\n                    Game.interact.inventory.consumeItem(foodIds[i]);\n                    Game.sendGameMessage(&quot;[SlayerBot][RI] Eating food (HP: &quot; + currentHP + &quot;/&quot; + maxHP + &quot;)&quot;, &quot;Bot&quot;);\n                    return true;\n                }\n            }\n        }\n    } catch(e) {}\n    return false;\n}\n\n/**\n * ssPickUpValuableLoot -- Always pick up valuable items\n */\nfunction ssPickUpValuableLoot() {\n    if (isExecuting) return false;\n\n    var groundItems = Game.info.groundItem.getAll();\n    if (!groundItems) return false;\n\n    for (var i = 0; i &lt; groundItems.length; i++) {\n        var item = groundItems[i];\n        if (VALUABLE_LOOT_IDS.indexOf(item.getId()) !== -1) {\n            // Don&#x27;t pick up if inventory is full (unless it&#x27;s coins which stack)\n            if (Game.info.inventory.isFull() &amp;&amp; item.getId() !== SS_ITEMS.COINS) continue;\n\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                try {\n                    Game.interact.groundItem.pickup(item);\n                    Game.sendGameMessage(&quot;[SlayerBot][RI] Picked up valuable: &quot; + item.getId(), &quot;Bot&quot;);\n                } catch(e) {}\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\n/**\n * ssBuryBones -- Bury bones for prayer XP\n */\nfunction ssBuryBones() {\n    if (isExecuting) return false;\n\n    var boneIds = [SS_ITEMS.BONES, SS_ITEMS.BIG_BONES];\n    for (var i = 0; i &lt; boneIds.length; i++) {\n        if (Game.info.inventory.getItemCount(boneIds[i]) &gt; 0) {\n            isExecuting = true;\n            Utility.invokeLater(function() {\n                try {\n                    Game.interact.inventory.consumeItem(boneIds[i]);\n                    Game.sendGameMessage(&quot;[SlayerBot][RI] Burying bones for prayer XP&quot;, &quot;Bot&quot;);\n                } catch(e) {}\n                isExecuting = false;\n            }, Utility.getDelay());\n            return true;\n        }\n    }\n    return false;\n}\n\n/**\n * countAllFood -- Count all cooked food in inventory\n */\nfunction countAllFood() {\n    var count = 0;\n    var foodIds = [\n        SS_ITEMS.COOKED_ANGLERFISH, SS_ITEMS.COOKED_SHARK, SS_ITEMS.COOKED_MONKFISH,\n        SS_ITEMS.COOKED_SWORDFISH, SS_ITEMS.COOKED_LOBSTER, SS_ITEMS.COOKED_TUNA,\n        SS_ITEMS.COOKED_SALMON, SS_ITEMS.COOKED_TROUT, SS_ITEMS.COOKED_SHRIMPS,\n        SS_ITEMS.COOKED_CHICKEN, SS_ITEMS.COOKED_MEAT\n    ];\n    for (var i = 0; i &lt; foodIds.length; i++) {\n        count += Game.info.inventory.getItemCount(foodIds[i]);\n    }\n    return count;\n}\n\n/**\n * getPlayerGP -- Get coins in inventory\n */\nfunction getPlayerGP() {\n    return Game.info.inventory.getItemCount(SS_ITEMS.COINS);\n}\n\n// =============================================================================\n// MASTER ENTRY POINT -- Called by main state machine\n// =============================================================================\n\nvar riPlan = null;          // Current resource intelligence plan\nvar riPhase = &quot;analyze&quot;;    // analyze, level_up, gather_food, gather_gear, gather_ranged, done\n\n/**\n * enterResourceIntelligence -- Called when bot needs resources for a task\n * @param {string} monsterName\n * @param {number} taskCount\n * @param {object} monsterData - from SLAYER_MONSTERS\n */\nfunction enterResourceIntelligence(monsterName, taskCount, monsterData) {\n    riPlan = analyzeTaskRequirements(monsterName, taskCount, monsterData);\n    riPhase = &quot;analyze&quot;;\n    Game.sendGameMessage(&quot;[SlayerBot][RI] -------------------------------------------&quot;, &quot;Bot&quot;);\n    Game.sendGameMessage(&quot;[SlayerBot][RI]  RESOURCE INTELLIGENCE ACTIVATED&quot;, &quot;Bot&quot;);\n    Game.sendGameMessage(&quot;[SlayerBot][RI]  Task: &quot; + monsterName + &quot; x&quot; + taskCount, &quot;Bot&quot;);\n    Game.sendGameMessage(&quot;[SlayerBot][RI]  Difficulty: &quot; + riPlan.difficulty.name, &quot;Bot&quot;);\n    Game.sendGameMessage(&quot;[SlayerBot][RI]  Strategy: &quot; + riPlan.food.strategy, &quot;Bot&quot;);\n    Game.sendGameMessage(&quot;[SlayerBot][RI] -------------------------------------------&quot;, &quot;Bot&quot;);\n\n    // Route to first action\n    if (riPlan.barrows.shouldDoRuns) {\n        riPhase = &quot;barrows&quot;;\n        initGearGathering(riPlan.gear);\n        gatherGearPhase = &quot;barrows&quot;;\n    } else if (riPlan.levelUp.shouldLevel) {\n        riPhase = &quot;level_up&quot;;\n        startLevelingUp(riPlan.levelUp.plans[0]);\n    } else if (riPlan.food.strategy !== &quot;GATHER_BEST&quot; || countAllFood() &lt; riPlan.food.foodQuantity) {\n        riPhase = &quot;gather_food&quot;;\n        initFoodGathering(riPlan.food.bestTier, riPlan.food.foodQuantity);\n    } else {\n        riPhase = &quot;done&quot;;\n    }\n}\n\n/**\n * handleResourceIntelligenceTick -- Called every game tick when in RI mode\n * @returns &quot;DONE&quot; when all resources are gathered\n */\nfunction handleResourceIntelligenceTick() {\n    if (isExecuting) return;\n\n    // Always try to pick up valuables\n    if (ssPickUpValuableLoot()) return;\n\n    switch(riPhase) {\n        case &quot;level_up&quot;:\n            var levelResult = handleLevelingTick();\n            if (levelResult === &quot;DONE&quot;) {\n                // Check if there are more skills to level\n                if (riPlan.levelUp.plans.length &gt; 1) {\n                    riPlan.levelUp.plans.shift();\n                    startLevelingUp(riPlan.levelUp.plans[0]);\n                } else {\n                    // Move to food gathering\n                    riPhase = &quot;gather_food&quot;;\n                    // Re-analyze with new levels\n                    var levels = getAllPlayerLevels();\n                    var newFoodPlan = planFoodForTask(riPlan.difficulty, riPlan.taskCount, levels);\n                    initFoodGathering(newFoodPlan.bestTier, newFoodPlan.foodQuantity);\n                }\n            }\n            break;\n\n        case &quot;gather_food&quot;:\n            var foodResult = handleGatherFoodTick();\n            if (foodResult === &quot;DONE&quot;) {\n                // Check if we need gear too\n                if (riPlan.gear.meleeArmor &amp;&amp; riPlan.gear.meleeArmor.obtainMethod !== &quot;GE&quot;) {\n                    riPhase = &quot;gather_gear&quot;;\n                    initGearGathering(riPlan.gear);\n                } else {\n                    riPhase = &quot;done&quot;;\n                }\n            }\n            break;\n\n        case &quot;gather_gear&quot;:\n            var gearResult = handleGatherGearTick();\n            if (gearResult === &quot;DONE&quot;) {\n                riPhase = &quot;done&quot;;\n            }\n            break;\n\n        case &quot;barrows&quot;:\n            handleBarrowsRun();\n            if (gatherGearPhase === &quot;done&quot;) {\n                riPhase = &quot;gather_food&quot;;\n                initFoodGathering(riPlan.food.bestTier, riPlan.food.foodQuantity);\n            }\n            break;\n\n        case &quot;done&quot;:\n            Game.sendGameMessage(&quot;[SlayerBot][RI] [OK] All resources gathered -- returning to slayer task!&quot;, &quot;Bot&quot;);\n            return &quot;DONE&quot;;\n    }\n}\n\n/**\n * quickCheckSupplies -- Fast check: do we have enough food for one more trip?\n * Called between trips to decide if we need to re-enter RI\n */\nfunction quickCheckSupplies(monsterData) {\n    var foodCount = countAllFood();\n    var difficulty = getMonsterDifficulty(monsterData.combatLevel || 0, monsterData.maxHit || 0);\n    var neededPerTrip = estimateFoodPerTrip(difficulty, selectBestFoodTier(getAllPlayerLevels()));\n\n    if (foodCount &lt; neededPerTrip) {\n        Game.sendGameMessage(&quot;[SlayerBot][RI] Low on food (&quot; + foodCount + &quot;/&quot; + neededPerTrip + &quot;) -- entering resource gathering&quot;, &quot;Bot&quot;);\n        return false;\n    }\n    return true;\n}\n\n// =============================================================================\n// RANGED SUPPLY GATHERING -- Arrows, bolts, etc.\n// =============================================================================\n\nvar rangedGatherPhase = &quot;idle&quot;;\n\nfunction initRangedGathering(quantity) {\n    rangedGatherPhase = &quot;check&quot;;\n    Game.sendGameMessage(&quot;[SlayerBot][RI] Init ranged supply gathering (&quot; + quantity + &quot; arrows/bolts)&quot;, &quot;Bot&quot;);\n}\n\nfunction handleGatherRangedTick() {\n    if (isExecuting) return;\n\n    var levels = getAllPlayerLevels();\n\n    // Determine best arrow type\n    var bestRanged = selectBestRangedWeapon(levels);\n    var ammoId = bestRanged.ammoId;\n    var ammoCount = Game.info.inventory.getItemCount(ammoId);\n\n    if (ammoCount &gt;= 100) {\n        Game.sendGameMessage(&quot;[SlayerBot][RI] Have &quot; + ammoCount + &quot; ammo -- sufficient&quot;, &quot;Bot&quot;);\n        return &quot;DONE&quot;;\n    }\n\n    // Method 1: Buy from Lowe&#x27;s archery shop in Varrock\n    if (getPlayerGP() &gt;= 500) {\n        if (!isNearLocation(SS_LOCATIONS.VARROCK_ARCHERY_SHOP, 10)) {\n            walkToLocation(SS_LOCATIONS.VARROCK_ARCHERY_SHOP);\n            return;\n        }\n        buyFromShop(SS_NPCS.LOWE_ARCHERY, ammoId, 100);\n        return;\n    }\n\n    // Method 2: Kill chickens for feathers -&gt; fletch arrows\n    if (levels.fletching &gt;= 1) {\n        // Kill chickens for feathers\n        if (!isNearLocation(SS_LOCATIONS.LUMBRIDGE_CHICKENS, 15)) {\n            walkToLocation(SS_LOCATIONS.LUMBRIDGE_CHICKENS);\n            return;\n        }\n        // Collect feathers\n        var groundItems = Game.info.groundItem.getAll();\n        if (groundItems) {\n            for (var i = 0; i &lt; groundItems.length; i++) {\n                if (groundItems[i].getId() === SS_ITEMS.FEATHER) {\n                    isExecuting = true;\n                    Utility.invokeLater(function() {\n                        try { Game.interact.groundItem.pickup(groundItems[i]); } catch(e) {}\n                        isExecuting = false;\n                    }, Utility.getDelay());\n                    return;\n                }\n            }\n        }\n        if (!PlayerHelper.isInCombat()) {\n            var chicken = Game.info.npc.getNearest([SS_NPCS.CHICKEN]);\n            if (chicken) {\n                isExecuting = true;\n                Utility.invokeLater(function() {\n                    try { Game.interact.npc.attack(chicken); } catch(e) {}\n                    isExecuting = false;\n                }, Utility.getDelay());\n            }\n        }\n    }\n}\n\n// =============================================================================\n// SHUTDOWN -- Reset all self-sufficiency state\n// =============================================================================\nfunction OnShutdown_SS() {\n    riPlan = null;\n    riPhase = &quot;analyze&quot;;\n    gatherFoodTier = null;\n    gatherFoodPhase = &quot;idle&quot;;\n    gatherGearPhase = &quot;idle&quot;;\n    gatherGearTarget = null;\n    levelingSkill = null;\n    levelingPhase = &quot;idle&quot;;\n    barrowsPhase = &quot;walk_to_barrows&quot;;\n    barrowsBrother = 0;\n    barrowsRunCount = 0;\n    rangedGatherPhase = &quot;idle&quot;;\n    Game.sendGameMessage(&quot;[SlayerBot][RI] Resource Intelligence Engine shutdown. All states reset.&quot;, &quot;Bot&quot;);\n}\n\n// =============================================================================\n// MODULE LOADED\n// =============================================================================\nGame.sendGameMessage(&quot;[SlayerBot][RI] ---------------------------------------------------&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  RESOURCE INTELLIGENCE ENGINE v2.2 LOADED&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  &quot; + SS_FOOD_TIERS.length + &quot; food tiers (chicken -&gt; anglerfish)&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  &quot; + SS_MELEE_WEAPONS.length + &quot; melee weapons, &quot; + SS_MELEE_ARMOR.length + &quot; armor sets&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  &quot; + SS_RANGED_WEAPONS.length + &quot; ranged weapons&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  &quot; + VALUABLE_LOOT_IDS.length + &quot; valuable loot types tracked&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  Barrows: &quot; + BARROWS_BROTHERS.length + &quot; brothers mapped&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]  Features: Task analysis, level-up decisions, tier selection,&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]           food gathering, gear smithing, leather crafting,&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI]           Barrows runs, ranged supply, GP generation&quot;, &quot;Bot&quot;);\nGame.sendGameMessage(&quot;[SlayerBot][RI] ---------------------------------------------------&quot;, &quot;Bot&quot;);\n\n// =============================================================================\n// HELPER FUNCTIONS -- Two-step item usage patterns (Blood Runes API pattern)\n// =============================================================================\n\n// Use an inventory item on a game object (e.g., raw food on cooking range)\nfunction useItemOnGameObject(itemId, gameObj) {\n    Game.interact.inventory.useItem(itemId, MenuAction.WIDGET_TARGET);\n    Utility.invokeLater(function() {\n        Game.interact.gameObject.action(gameObj, MenuAction.WIDGET_TARGET_ON_GAME_OBJECT);\n    }, 300);\n}\n\n// Use an inventory item on another inventory item (e.g., needle on leather)\nfunction useItemOnInventoryItem(itemId1, itemId2) {\n    Game.interact.inventory.useItem(itemId1, MenuAction.WIDGET_TARGET);\n    Utility.invokeLater(function() {\n        Game.interact.inventory.useItem(itemId2, MenuAction.WIDGET_TARGET_ON_WIDGET);\n    }, 300);\n}\n\n// EQUIPMENT ID LIST -- hardcoded to avoid .id property access TypeScript errors\nfunction getAllEquipmentIds() {\n    return [4151, 4587, 11902, 1333, 1331, 1329, 1325, 1321, 1277, 11865, 11864, 10828, 1163, 1161, 1159, 1157, 1153, 1155, 11832, 3140, 1127, 1123, 1121, 1119, 1115, 1117, 11834, 4087, 1079, 1073, 1071, 1069, 1067, 1075, 12954, 8850, 1201, 1199, 1197, 1195, 1191, 1189, 11840, 4131, 4129, 4127, 4125, 4121, 4119, 7462, 7461, 7460, 7459, 7458, 7457, 7456, 7455, 1059, 6585, 1704, 1731, 1725, 11902, 20727, 4156, 4168, 4166, 4164, 8923, 7053];\n}\n\n\n// =============================================================================\n// V24 NEW HELPER FUNCTIONS\n// =============================================================================\n\n// -----------------------------------------------------------------------------\n// getBestRangedWeapon -- Returns best ranged weapon for level\n// -----------------------------------------------------------------------------\nfunction getBestRangedWeapon(rangedLevel) {\n    for (var i = 0; i &lt; RANGED_WEAPONS.length; i++) {\n        if (rangedLevel &gt;= RANGED_WEAPONS[i].rangeReq) {\n            return RANGED_WEAPONS[i];\n        }\n    }\n    return RANGED_WEAPONS[RANGED_WEAPONS.length - 1];\n}\n\n// -----------------------------------------------------------------------------\n// getBestArrows -- Returns best arrow type for level\n// -----------------------------------------------------------------------------\nfunction getBestArrows(rangedLevel) {\n    for (var i = 0; i &lt; ARROWS.length; i++) {\n        if (rangedLevel &gt;= ARROWS[i].rangeReq) {\n            return ARROWS[i];\n        }\n    }\n    return ARROWS[ARROWS.length - 1];\n}\n\n// -----------------------------------------------------------------------------\n// getBestArrowCraftingTier -- Returns highest arrow tier the player can craft\n// -----------------------------------------------------------------------------\nfunction getBestArrowCraftingTier(smithLevel, fletchLevel, miningLevel) {\n    var tiers = [&quot;rune&quot;, &quot;adamant&quot;, &quot;mithril&quot;, &quot;steel&quot;, &quot;iron&quot;, &quot;bronze&quot;];\n    for (var i = 0; i &lt; tiers.length; i++) {\n        var tier = dbLookup(ARROW_CRAFTING, tiers[i]);\n        if (tier &amp;&amp; smithLevel &gt;= tier.smithLvl &amp;&amp; fletchLevel &gt;= tier.fletchLvl &amp;&amp; miningLevel &gt;= tier.miningLvl) {\n            return tier;\n        }\n    }\n    return dbLookup(ARROW_CRAFTING, &quot;bronze&quot;);\n}\n\n// -----------------------------------------------------------------------------\n// getRunesForSpell -- Returns array of {runeId, quantity} for a given spell\n// -----------------------------------------------------------------------------\nfunction getRunesForSpell(spellName) {\n    var spells = {\n        &quot;Wind Strike&quot;: [{ runeId: 556, quantity: 1 }, { runeId: 558, quantity: 1 }],\n        &quot;Water Strike&quot;: [{ runeId: 555, quantity: 1 }, { runeId: 556, quantity: 1 }, { runeId: 558, quantity: 1 }],\n        &quot;Earth Strike&quot;: [{ runeId: 557, quantity: 1 }, { runeId: 556, quantity: 1 }, { runeId: 558, quantity: 1 }],\n        &quot;Fire Strike&quot;: [{ runeId: 554, quantity: 1 }, { runeId: 556, quantity: 1 }, { runeId: 558, quantity: 1 }],\n        &quot;Wind Bolt&quot;: [{ runeId: 556, quantity: 2 }, { runeId: 562, quantity: 1 }],\n        &quot;Water Bolt&quot;: [{ runeId: 555, quantity: 2 }, { runeId: 556, quantity: 2 }, { runeId: 562, quantity: 1 }],\n        &quot;Earth Bolt&quot;: [{ runeId: 557, quantity: 2 }, { runeId: 556, quantity: 2 }, { runeId: 562, quantity: 1 }],\n        &quot;Fire Bolt&quot;: [{ runeId: 554, quantity: 3 }, { runeId: 556, quantity: 4 }, { runeId: 562, quantity: 1 }],\n        &quot;Wind Blast&quot;: [{ runeId: 556, quantity: 3 }, { runeId: 560, quantity: 1 }],\n        &quot;Fire Blast&quot;: [{ runeId: 554, quantity: 4 }, { runeId: 556, quantity: 4 }, { runeId: 560, quantity: 1 }]\n    };\n    if (dbLookup(spells, spellName)) {\n        return dbLookup(spells, spellName);\n    }\n    return [];\n}\n\n// -----------------------------------------------------------------------------\n// getBestSpell -- Returns best combat spell for magic level\n// -----------------------------------------------------------------------------\nfunction getBestSpell(magicLevel) {\n    if (magicLevel &gt;= 59) return { name: &quot;Fire Blast&quot;, magicReq: 59 };\n    if (magicLevel &gt;= 41) return { name: &quot;Wind Blast&quot;, magicReq: 41 };\n    if (magicLevel &gt;= 35) return { name: &quot;Fire Bolt&quot;, magicReq: 35 };\n    if (magicLevel &gt;= 29) return { name: &quot;Earth Bolt&quot;, magicReq: 29 };\n    if (magicLevel &gt;= 23) return { name: &quot;Water Bolt&quot;, magicReq: 23 };\n    if (magicLevel &gt;= 17) return { name: &quot;Wind Bolt&quot;, magicReq: 17 };\n    if (magicLevel &gt;= 13) return { name: &quot;Fire Strike&quot;, magicReq: 13 };\n    if (magicLevel &gt;= 9) return { name: &quot;Earth Strike&quot;, magicReq: 9 };\n    if (magicLevel &gt;= 5) return { name: &quot;Water Strike&quot;, magicReq: 5 };\n    return { name: &quot;Wind Strike&quot;, magicReq: 1 };\n}\n\n// -----------------------------------------------------------------------------\n// getBestPotion -- Returns highest tier potion recipe for a type\n// -----------------------------------------------------------------------------\nfunction getBestPotion(herbloreLevel, potionType) {\n    var typeMap = {\n        &quot;attack&quot;: [&quot;Super attack&quot;, &quot;Attack potion&quot;],\n        &quot;strength&quot;: [&quot;Super strength&quot;, &quot;Strength potion&quot;],\n        &quot;defence&quot;: [&quot;Super defence&quot;, &quot;Defence potion&quot;],\n        &quot;prayer&quot;: [&quot;Prayer potion&quot;],\n        &quot;restore&quot;: [&quot;Super restore&quot;, &quot;Restore potion&quot;],\n        &quot;antipoison&quot;: [&quot;Super antipoison&quot;, &quot;Antipoison&quot;],\n        &quot;antifire&quot;: [&quot;Extended antifire&quot;, &quot;Antifire potion&quot;],\n        &quot;ranging&quot;: [&quot;Ranging potion&quot;],\n        &quot;magic&quot;: [&quot;Magic potion&quot;],\n        &quot;combat&quot;: [&quot;Super combat potion&quot;]\n    };\n    var candidates = dbLookup(typeMap, potionType);\n    if (!candidates) return null;\n    for (var i = 0; i &lt; candidates.length; i++) {\n        var recipe = dbLookup(POTION_RECIPES, candidates[i]);\n        if (recipe &amp;&amp; herbloreLevel &gt;= recipe.potionLevel) {\n            recipe.name = candidates[i];\n            return recipe;\n        }\n    }\n    return null;\n}\n\n// -----------------------------------------------------------------------------\n// getTaskQuality -- Returns &quot;good&quot;, &quot;bad&quot;, or &quot;neutral&quot;\n// -----------------------------------------------------------------------------\nfunction getTaskQuality(taskName) {\n    if (!taskName) return &quot;neutral&quot;;\n    for (var i = 0; i &lt; GOOD_TASKS.length; i++) {\n        if (GOOD_TASKS[i].toLowerCase() === taskName.toLowerCase()) return &quot;good&quot;;\n    }\n    for (var i = 0; i &lt; BAD_TASKS.length; i++) {\n        if (BAD_TASKS[i].toLowerCase() === taskName.toLowerCase()) return &quot;bad&quot;;\n    }\n    return &quot;neutral&quot;;\n}\n\n// -----------------------------------------------------------------------------\n// hasSafeSpot -- Returns safe spot data if exists, null otherwise\n// -----------------------------------------------------------------------------\nfunction hasSafeSpot(monsterName) {\n    if (!monsterName) return null;\n    var keys = Object.keys(SAFE_SPOTS);\n    for (var i = 0; i &lt; keys.length; i++) {\n        if (keys[i].toLowerCase() === monsterName.toLowerCase()) {\n            return dbLookup(SAFE_SPOTS, keys[i]);\n        }\n    }\n    return null;\n}\n\n// -----------------------------------------------------------------------------\n// getSuperiorNpcId -- Returns superior NPC ID if the monster has one\n// -----------------------------------------------------------------------------\nfunction getSuperiorNpcId(monsterName) {\n    if (!monsterName) return null;\n    var keys = Object.keys(SUPERIOR_MONSTERS);\n    for (var i = 0; i &lt; keys.length; i++) {\n        if (keys[i].toLowerCase() === monsterName.toLowerCase()) {\n            return dbLookup(SUPERIOR_MONSTERS, keys[i]).superiorId;\n        }\n    }\n    return null;\n}\n\n// -----------------------------------------------------------------------------\n// getAttackStyleForFocus -- Returns attack style widget child based on training focus\n// -----------------------------------------------------------------------------\nfunction getAttackStyleForFocus(focus, attackCap, strengthCap, defenceCap, attackLevel, strengthLevel, defenceLevel) {\n    // If a stat is at its cap, never use a style that trains it\n    var attackCapped = (attackCap &gt; 0 &amp;&amp; attackLevel &gt;= attackCap);\n    var strengthCapped = (strengthCap &gt; 0 &amp;&amp; strengthLevel &gt;= strengthCap);\n    var defenceCapped = (defenceCap &gt; 0 &amp;&amp; defenceLevel &gt;= defenceCap);\n\n    // If all capped, use controlled (shared xp) or defensive\n    if (attackCapped &amp;&amp; strengthCapped &amp;&amp; defenceCapped) {\n        return ATTACK_STYLES.CONTROLLED.widgetChild;\n    }\n\n    // Prefer the requested focus if not capped\n    if (focus === &quot;attack&quot; &amp;&amp; !attackCapped) return ATTACK_STYLES.ACCURATE.widgetChild;\n    if (focus === &quot;strength&quot; &amp;&amp; !strengthCapped) return ATTACK_STYLES.AGGRESSIVE.widgetChild;\n    if (focus === &quot;defence&quot; &amp;&amp; !defenceCapped) return ATTACK_STYLES.DEFENSIVE.widgetChild;\n    if (focus === &quot;shared&quot;) return ATTACK_STYLES.CONTROLLED.widgetChild;\n\n    // Fallback: pick lowest uncapped stat\n    var lowest = Infinity;\n    var bestStyle = ATTACK_STYLES.CONTROLLED.widgetChild;\n    if (!attackCapped &amp;&amp; attackLevel &lt; lowest) { lowest = attackLevel; bestStyle = ATTACK_STYLES.ACCURATE.widgetChild; }\n    if (!strengthCapped &amp;&amp; strengthLevel &lt; lowest) { lowest = strengthLevel; bestStyle = ATTACK_STYLES.AGGRESSIVE.widgetChild; }\n    if (!defenceCapped &amp;&amp; defenceLevel &lt; lowest) { lowest = defenceLevel; bestStyle = ATTACK_STYLES.DEFENSIVE.widgetChild; }\n\n    return bestStyle;\n}\n\n// -----------------------------------------------------------------------------\n// getBestPickaxe -- Returns best pickaxe for mining level\n// -----------------------------------------------------------------------------\nfunction getBestPickaxe(miningLevel) {\n    for (var i = 0; i &lt; PICKAXES.length; i++) {\n        if (miningLevel &gt;= PICKAXES[i].miningReq) {\n            return PICKAXES[i];\n        }\n    }\n    return PICKAXES[PICKAXES.length - 1];\n}\n\n// -----------------------------------------------------------------------------\n// countArrows -- Counts all arrows in inventory\n// -----------------------------------------------------------------------------\nfunction countArrows() {\n    var total = 0;\n    for (var i = 0; i &lt; ARROWS.length; i++) {\n        total += Game.info.inventory.getItemCount(ARROWS[i].id);\n    }\n    return total;\n}\n\n// -----------------------------------------------------------------------------\n// countRunes -- Returns count of specific rune in inventory\n// -----------------------------------------------------------------------------\nfunction countRunes(runeId) {\n    return Game.info.inventory.getItemCount(runeId);\n}\n\n// -----------------------------------------------------------------------------\n// hasAntifireProtection -- Checks if player has antifire or extended antifire\n// -----------------------------------------------------------------------------\nfunction hasAntifireProtection() {\n    // Check all antifire potion doses\n    var antifireIds = [2452, 2454, 2456, 2458]; // Antifire 4-1 dose\n    var extAntifireIds = [11951, 11953, 11955, 11957]; // Extended antifire 4-1 dose\n    for (var i = 0; i &lt; antifireIds.length; i++) {\n        if (Game.info.inventory.getItemCount(antifireIds[i]) &gt; 0) return true;\n    }\n    for (var i = 0; i &lt; extAntifireIds.length; i++) {\n        if (Game.info.inventory.getItemCount(extAntifireIds[i]) &gt; 0) return true;\n    }\n    return false;\n}\n\n// -----------------------------------------------------------------------------\n// getBestFishForLevel -- Returns the best fish the player can catch\n// -----------------------------------------------------------------------------\nfunction getBestFishForLevel(fishingLevel) {\n    var fishNames = [&quot;shark&quot;, &quot;monkfish&quot;, &quot;swordfish&quot;, &quot;lobster&quot;, &quot;salmon&quot;, &quot;trout&quot;, &quot;shrimps&quot;];\n    for (var i = 0; i &lt; fishNames.length; i++) {\n        var spot = dbLookup(FISHING_SPOTS, fishNames[i]);\n        if (spot &amp;&amp; fishingLevel &gt;= spot.levelReq) {\n            return spot;\n        }\n    }\n    return dbLookup(FISHING_SPOTS, &quot;shrimps&quot;);\n}\n";
