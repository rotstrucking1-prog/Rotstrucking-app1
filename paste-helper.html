<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slayer Bot v8 - Paste Helper</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; margin: 0; }
h1 { color: #e94560; text-align: center; }
.version { text-align: center; color: #0f3460; background: #e94560; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 20px; margin: 10px auto; max-width: 300px; }
.btn { display: block; width: 90%; max-width: 500px; margin: 15px auto; padding: 20px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; text-align: center; }
.btn-config { background: #16213e; color: #e94560; border: 3px solid #e94560; }
.btn-util { background: #0f3460; color: #00d2ff; border: 3px solid #00d2ff; }
.btn-main { background: #533483; color: #e94560; border: 3px solid #e94560; }
.btn-commit { background: #e94560; color: white; border: 3px solid white; margin-top: 30px; }
.btn:active { transform: scale(0.95); }
.status { text-align: center; padding: 10px; font-size: 18px; color: #0f0; margin: 5px; }
.info { text-align: center; color: #888; font-size: 14px; margin: 5px; }
.error { color: #f00; }
</style>
</head>
<body>
<h1>SLAYER BOT PASTE HELPER</h1>
<div class="version">VERSION 8</div>
<div class="info">Fetches v8 code directly from GitHub (cache-busted)</div>

<button class="btn btn-config" onclick="copyFile('CONFIG')">Copy CONFIG (38 lines)</button>
<div id="status-CONFIG" class="status"></div>

<button class="btn btn-util" onclick="copyFile('UTILITIES')">Copy UTILITIES (5,628 lines)</button>
<div id="status-UTILITIES" class="status"></div>

<button class="btn btn-main" onclick="copyFile('MAIN')">Copy MAIN (1,507 lines)</button>
<div id="status-MAIN" class="status"></div>

<button class="btn btn-commit" onclick="copyCommit()">Copy Commit Message</button>
<div id="status-commit" class="status"></div>

<script>
var timestamp = Date.now();
var baseUrl = 'https://raw.githubusercontent.com/rotstrucking1-prog/Rotstrucking-app1/main/';
var files = {
    'CONFIG': 'slayer_CONFIG.txt',
    'UTILITIES': 'slayer_UTILITIES.txt',
    'MAIN': 'slayer_MAIN.txt'
};

function copyFile(tab) {
    var statusEl = document.getElementById('status-' + tab);
    statusEl.textContent = 'Fetching ' + tab + '...';
    statusEl.className = 'status';
    
    fetch(baseUrl + files[tab] + '?v=8&t=' + timestamp + '&r=' + Math.random())
        .then(function(r) { return r.text(); })
        .then(function(text) {
            return navigator.clipboard.writeText(text).then(function() {
                var lines = text.split('\n').length;
                statusEl.textContent = tab + ' COPIED! (' + lines + ' lines) - Now paste in DZ with Ctrl+A, Ctrl+V';
                statusEl.className = 'status';
            });
        })
        .catch(function(err) {
            statusEl.textContent = 'ERROR: ' + err;
            statusEl.className = 'status error';
        });
}

function copyCommit() {
    var statusEl = document.getElementById('status-commit');
    navigator.clipboard.writeText('slayer bot v8').then(function() {
        statusEl.textContent = '"slayer bot v8" COPIED! Paste in DZ commit field with Ctrl+V';
    }).catch(function(err) {
        statusEl.textContent = 'ERROR: ' + err;
        statusEl.className = 'status error';
    });
}
</script>
</body>
</html>
