<!DOCTYPE html>
<html>
<head>
<title>DZ Paste Helper v9</title>
<style>
body { background: #1a1a2e; color: #eee; font-family: monospace; text-align: center; padding: 20px; }
h1 { color: #0f0; font-size: 28px; }
h2 { color: #ff0; }
.btn { display: inline-block; margin: 10px; padding: 15px 30px; font-size: 18px; cursor: pointer; border: 2px solid; border-radius: 8px; font-weight: bold; }
.config-btn { background: #2196F3; color: white; border-color: #1565C0; }
.util-btn { background: #FF9800; color: white; border-color: #E65100; }
.main-btn { background: #4CAF50; color: white; border-color: #2E7D32; }
.commit-btn { background: #f44336; color: white; border-color: #b71c1c; }
.status { margin: 10px; padding: 10px; font-size: 16px; }
.ok { color: #0f0; }
.err { color: #f00; }
#preview { background: #0d0d1a; border: 1px solid #333; padding: 10px; margin: 10px auto; max-width: 800px; text-align: left; max-height: 200px; overflow-y: auto; font-size: 12px; white-space: pre; }
</style>
</head>
<body>
<h1>SLAYER BOT v9 PASTE HELPER</h1>
<h2>VERSION 9 -- 17 TypeScript Fixes</h2>
<p>Click a button to copy that file to clipboard, then go to DZ editor tab and Ctrl+A, Ctrl+V</p>
<div>
<button class="btn config-btn" onclick="copyFile('config')">Copy CONFIG (38 lines)</button>
<button class="btn util-btn" onclick="copyFile('utilities')">Copy UTILITIES (~5628 lines)</button>
<button class="btn main-btn" onclick="copyFile('main')">Copy MAIN (~1507 lines)</button>
</div>
<div>
<button class="btn commit-btn" onclick="copyCommit()">Copy Commit Message</button>
</div>
<div id="status" class="status"></div>
<div id="preview"></div>
<script>
var ts = Date.now();
var urls = {
config: 'https://raw.githubusercontent.com/rotstrucking1-prog/Rotstrucking-app1/main/slayer_CONFIG.txt?v=9&t=' + ts,
utilities: 'https://raw.githubusercontent.com/rotstrucking1-prog/Rotstrucking-app1/main/slayer_UTILITIES.txt?v=9&t=' + ts,
main: 'https://raw.githubusercontent.com/rotstrucking1-prog/Rotstrucking-app1/main/slayer_MAIN.txt?v=9&t=' + ts
};
function copyFile(name) {
var el = document.getElementById('status');
el.innerHTML = '<span>Fetching ' + name.toUpperCase() + '...</span>';
fetch(urls[name], {cache: 'no-store'}).then(function(r) { return r.text(); }).then(function(text) {
var lines = text.split('\n').length;
return navigator.clipboard.writeText(text).then(function() {
el.innerHTML = '<span class="ok">' + name.toUpperCase() + ' COPIED! (' + lines + ' lines)</span>';
document.getElementById('preview').textContent = text.substring(0, 500) + '\n...\n[' + lines + ' total lines]';
});
}).catch(function(e) {
el.innerHTML = '<span class="err">ERROR: ' + e + '</span>';
});
}
function copyCommit() {
navigator.clipboard.writeText('slayer bot v9').then(function() {
document.getElementById('status').innerHTML = '<span class="ok">COMMIT MESSAGE COPIED: "slayer bot v9"</span>';
});
}
</script>
</body>
</html>
